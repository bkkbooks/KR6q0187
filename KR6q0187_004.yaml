body:
  text: 皇明金華宋濂著雲棲袾宏輯虞山錢謙益訂碑重興太平萬壽禪寺碑銘洪武七年七月二十四日呈帝御武樓下中書右丞相胡公惟庸率百官晚朝上詔曰太平府萬壽禪寺宜復還浮屠氏彼道者流當自造玄妙觀居之先是有詔江東諸州縣各留寺觀一區以聚道釋之衆餘皆罷斥寺適在所斥之數玄妙觀道士以觀基卑陋而寺之室宇尚虛擅假之以為棲止之地越十年皇上知之故特有是詔于是緇流咸集手持香華望闕遙拜以謝寵恩既退復相與言曰寺即吳之化城當吳之時佛法雖至中國而大江以南則無有也赤烏中康居沙門僧會實來祈獲釋迦文佛真身舍利始創三寺其二即金陵之保寧海鹽之金粟其一即今寺也在郡治西北若干步及宋武帝築凌歊臺干黃山嘗繞寺中立為二十八子院度僧一千人寺益增重由唐以來尤多名僧其清升者築舍利塔大戒壇清風亭李太白同季父陽冰來游為賦詩亭中有升公湖上秀燦然有辨才之句縣令李玄則新造銅鐘白又為作銘一時高風雅韻固已照映古今矣宋景德間敕改化城為萬壽而安撫使張安國書其門額自時厥後明悟大師萬新來為住持當世名士如楊次公郭功父皆與萬新游其倡酬之詩至今人能誦之元祐初僧文躍進聖德頌六首朝論嘉之奏錫紫衣師號建炎三年寺燬于金兵紹興某年郡守郭偉因築州城移寺于武雄營其地去郡治之東若干步重搆之功則慈濟大師蘊文也繼蘊文而主寺事者乾道元年則法清併子院為二十而去其八寶祐某年則妙淨修放生池鑿石架梁干其上元大德元年則善才創外三門及重閣五楹間嚴奉一大藏教天曆二年則喜聖建大雄調御之殿重紀至正四年則宗明鑄大鴻鍾而覆以岑樓惟茲蘭若自吳至今已歷一千二百有餘歲名人輩出後先經營匪一朝夕矧又遭逢有道之朝尊崇像教使既廢而復興吾儕敢不竭力上承德意寺舊以甲乙相傳子院尚存一十有八盍若合為一更為十方禪剎請高行僧主之言已衆僧翕然同辭走白于當塗縣曰百福住山海岩智公廣慈圓悟大師曇芳忠公得法上首也踐履無愧古人願使居之縣言之府府上之儀曹儀曹達于中書得報下如所請海岩既蒞事勇于有為既葺調御殿重飾佛菩薩護法天王諸像又建圓悟堂九楹間改子院殿堂作水陸梵變修內外三門築周垣三百六十餘文其用功歲月則自七年之冬以至十年之秋云海岩以成之為不易也命道證妙期來徵豫記豫以年耄辭而天界大禪師泐公及虛白杲公力為之請乃作而言曰世降道微斯民益難治頑嚚狡狂日接踵而生非西方大聖人演為果報之說豈易懾其非心哉柳子厚所謂陰翊王度者是已歷代帝王敬恭匪懈而聖世為尤隆蓋以此也況萬壽為一郡之首剎海岩與其徒殫志畢慮唯恐有廢墜又援荊國王文公蔣山故事合諸子院而為一亦可謂之賢矣雖然有成有壞世間相耳毗盧樓閣不離世間不即世間斯得萬劫而長存者善學佛者又當于此求之銘曰像法東流達于真丹赫兮焞焞如日行天大江之南何獨不照神師實求敷其化導精誠上通籲之益堅設利忽降有聲鏗然啓大伽藍如鼎斯峙茲惟化城表法攸寄背孫涉劉大駕幸臨翠華鸞旗焜耀叢林唐宋之間名緇輩出丕建法幢為世楷則薦紳豔之投分惟勤光華所及五色成文高風雅韻照映今古人天所瞻如到寶所泰運方新室廬尚虛孰意鵲巢而鳩來居皇明照燭洞見毫髮詔下九天還其故物龍象駿奔有嘆有吁自非帝力奚能致斯乃鳩乃功乃萃乃積精白一心以承休德夷者崇之䵝者飾之缺者完之什者植之棟宇翬飛舟彠藻麗兜率天宮來移人世有鍾鍠鍠有鼓龐龐說法于堂其聲孔揚其聲孔揚黑白聳聽結習皆空各正性命惟皇御曆手執金輪與佛同仁覆燾無垠太史造銘贊揚帝德鑱諸堅玫昭示無極句容奉聖禪寺興造碑銘句容縣之東四十五里有地曰白土埭邍陸衍迤林樾蒼潤鬱岡虎耳良常諸山屹立乎東西聯輝分彩神秀之所融會而奉聖禪寺宅焉按金陵塔寺記初名永定梁武帝時有大桑門寶亮主之帝方尊崇釋乘聞亮精通義學命撰涅槃經疏參訂辨博允契朱佛甚深微妙之旨寺因籍之增重與諸大剎爭雄唐季兵燹縱橫寺日隳廢僞吳楊氏據有金陵其檢校僕射許褒遵厥父司空雍之命新作之割腴田在句容丹徒者若干畝以飯浮屠夫人景氏猶以為未足復施句容田若干埤益之宣城二比丘曰義爽曰廷規行業峻潔僕射具疏延居寺中蓋大和年間也至宋大中祥符初始賜今額沿于宋季又復摧敝弗支群僧皆風雨散去丹徒之田亦為閭右民施茂等所奪元至元中住持平山坦公不憚四千里之遠北訴于中書移文江南總攝且命下其符于鎮江凡歷七載之久殫三往返之勤侵疆乃平山既遷化滅庵受公繼之後雖數易其主而未遑設施至正二年癸未笑岩禪師往補其處當屢廢之餘室如縣罄積逋之未庚者踰五千緡笑岩晝夜不自寧議鬻不毛之山以償敝衣縮食孜孜以興建為務不四三春秋粟盈于倉帛溢于囊乃剪歲荒乃闢靈場乃樹棟梁九年己丑釋迦寶殿成明年庚寅摶土塑佛菩薩暨大弟子護法神王諸像環以大阿羅漢慈容穆如几座香華嚴奉如式曾未幾何三解脫門又成右設涅槃之居以處有疾僧伽左建僕射父子祠而他施者附之又明年辛卯演法之堂又成名之曰正法眼閲三月棲禪之室又成名之曰清淨覺海且拓其術徑別築小山門以為喉襟通名曰定林山西廡及衆寮次第而就又四年乙未像四天王神于山門繚以周垣延袤三百餘堵委蛇縵回如雲橫阜截防限遂嚴又明年丙申禪師遷保寧而懷楚津公南宗定公先後而至皆刻厲有為益其土田當是時大明建都江左而浙右猶未盡平寺當毗陵京口之衝騎步之兵爨息者旁午睹其宏敞嚴飭戟手相戒不可犯洪武二年庚戌仲綸彌公來司寺事病東廡之未稱也撤其故腐易以新堅而規制于是乎大備殿以間計者凡三室與門如殿之數堂如門之數而溢其二兩廡如堂之數而加以七倍其懸鍾之樓則仍其舊焉仲綸潛心內行為四衆之所趍仰且念笑岩錙銖之積以克潰于成視衒奇鉤貨以病民者相去萬萬苟不圖之顯刻金石則後來者何自而知之力請濂為之記夫自辛卯兵變以來江淮南北所謂名藍望剎多化為煨燼之區而狐兔之跡交道過其下者無不為之太息奉聖禪居有如魯靈光巋然獨存非惟金浮碧明照映于山色水光之際而鍾魚之互答初不異於承平時豈亦有數存于其間乎雖然人事之盡誠足以勝天自非主之者疊矩重規求其持久而不墜若此或未之見也讀豫文者尚念昔人搆締之艱而繼承于無窮哉笑岩名善愈族某氏明之昌國人說法嗣仲芳倫公耆舊僧宗鉉笑岩同邑人是寺之役其功為最多繫之以銘曰皇矣像教自西徂東丕建塔廟牖于民衷青天震雷以聳群聾蹶然以興豁爾而聰句容之墟白土之里川媚山輝靈和萃止彼阿練若雄焉中峙由梁洎元成壞凡幾有偉一師飛錫而嘆不創寶所妄邪孰閒白業所感在彈指間靡仆不起何闕弗完湧殿峨峨飛樓㵝㵝像變嚴嚴梵夾晢晢觚稜騰翔舟艧絢麗兜率天宮下移人世粵自興戎劫火揚埃莊嚴勝域鞠為草萊此獨巋然鸞騫鳳回都人聚觀一何壯哉賦形兩間固囿乎數人定勝天如鳥建羽千里奮飛能令顛墜式纘式承胡寧弗顧寶華樓閣不涉有無光明發舒號為毗盧遍覆大千了無缺餘凡爾方袍攝心淡洎來居來游無證無作太史勒文因病注藥尚祛昏迷同歸妙覺重建繩金寶塔院碑南昌之城南有佛剎曰千福相傳唐天祐中異僧惟一之所建也當經營之初發地得鐵函四周金繩界道中有古劍一設利三百餘顆青紅間錯其光燁然于是建寶塔取設利藏焉改千福為繩金塔院落成之日爇栴檀香香氣鬱結空濛中僧伽大士顯形于其上正與塔輪相直萬目咸睹君子疑異僧蓋大士之幻化云初郡多火焚堪輿家謂塔足以厭勝之已而果驗宋治平乙巳知軍州事程公某以其有關于民最為吉徵鳩錢二十五萬修之紹興庚午尚書張公某來佩郡符復倡衆洊葺之一旦塔影倒現于治工游氏家上廣下鋭層級明朗寶輪重蓋一一具足元至正壬寅戎馬紛紜院宇鞠為椔翳惟茲塔巋然獨存瓴甓亦且摧剝殆盡乙巳夏六月院僧自貴與弟子匡弘同袍善慧各抽衣盂之資創庫堂于東偏日夕以興復為己任國朝洪武戊申夏四月清泉蘭若僧道溟與前三比丘披伽黎衣手執熏爐向塔前發大弘願曰惟塔廟之建起信心而入菩提今廢壞若是不可以不圖溟等誓盡今生為之惟威力加護焉誓畢持曆走民間施者多應其月癸丑衆工皆興趍附如蟻忽有巨甓自顛墜稠人中咸無所損傷又明日乙卯五色光起塔間豳豳熒熒圍繞良久而歿冬十一月某甲子塔完塔凡七成成各六稜環以峻宇前廠小殿以奉僧伽大士欄檻堅緻洞戶玲瓏簷牙翬飛寶鐸如語觀者以為帝釋天宮所造化現人間己酉春三月道溟示寂匡弘等嘆曰院役其可不終事乎益聚施者之財于冬十有二月造釋迦寶殿一所摶土以肖三世諸佛殿後復搆屋三楹間直達僧伽之殿中塑曼殊師利普賢觀自在三尊像莊嚴岩岫從壁湧出挾以兩廡前至于三門門內甃以方池紺緑可鑑一如大伽藍之制訖功之日則甲寅冬十一月某甲子也惟我如來弘開度門樹塔立廟所以使其見像起信信為一切功德母萬善皆自此生非徒聳觀瞻而已也矧能助地形之勝消弭災害陰騭生民廢而不興是豈人情也哉道溟之與三比丘精進弗懈終能遂所志而後止非其才有過人者不致是也匡弘等不遠千餘里來請豫記因為歷序其事而系之以贊曰稽首大慈父利益于群生塔婆之所建種種諸方便聳起霄漢間有如蒼龍角人有遙觀者至誠皈命禮不待登伽藍已足攝憍慢所以四大海無處不建立異僧何國人杖錫來洪都指地發鐵函中有設利羅光輝奪人目其數過三百封緘重瘞之樹塔鎮其上四衆方作禮香霧空濛中乃見僧伽像作彼慈憫相身被鬱多羅手執青楊枝欲開甘露門以解熱惱故成壞雖相尋神幻終不滅影倒治工家下鋭而上弘化導于衆生示以順逆故忽遭戎馬興鞠為椔翳場巋然撼風雨中有不壞者溟等發弘願誓加莊嚴力熒熒五色光出現于塔表萬目皆瞻仰以為未曾有施者如川至不日告成功欄楯互周匝洞戶各軒敞帝網日交參寶珠仍絢爛繪畫諸菩薩以及天龍衆擁護于後先生獰若飛動自茲彈指間湧殿及崇閎一一皆現前鎮茲清淨域福遍一切處畢方不敢見永無鬱攸孽人見有為跡不知皆無為會事歸一心無非無上道我今作贊辭筆下起樓閣內有無縫塔光覆大千界一涉思惟間即墮外邪見蘇州萬壽禪寺重搆佛殿碑蘇之長洲東北二里萬壽報恩光孝禪寺在焉初晉義熙中有沙門曰法愔自西域至中夏與慧遠法師結社廬山已而來蘇以念佛三昧化導有情蘇人翕然歸之為建淨壽院梁時更名安國唐長壽二年又更名長壽尋燬于兵吳越錢氏有國中吳軍節度使錢文奉重作之又更名安國長吳壽禪院始易禪僧明彥主之宋大中祥符二年丁普公為奏改為萬壽崇寧二年詔加崇寧于萬壽之上政和初又更名天寧紹興七年復詔更今額為徽宗薦嚴之所元至正末天下大亂寺為兵所焚群僧散走鞠為椔翳之場國朝洪武癸丑蒲圻魏君觀來為郡周視廢基蹙額而言曰是剎之廢不得名浮屠不足以起之行中禪師仁公乃寂照和尚世適今住虎丘德涵道融堪為人天師且兼通儒家經發為辭章嚴簡而有法內外之學雙至中興之責庶其在是乎遣使者致書幣凡三往而後應之視其寢室則床第篾如也稽其榖粟則盎無斗儲也訊其執役則童隸無有也師泊然獨居若享萬鍾之祿者曾未幾何僧之散者復還遠近清修士魚貫而來有饋食者有供三衣者有施黃白金者禪師曰可矣戒左右重搆大雄殿五楹間鑿石于山市林于江陶瓦于郊工者奏技壯者獻力鞠明究曛不督而集四阿有嚴若翬斯飛丹雘絢爛眩人心目僝工于甲寅春二月至乙卯冬十月厥事告成禪師太息曰寺之凡役殿為巨殿既成門廡堂室當易為爾吾耄矣宜選春秋強盛者繼之禪師乃退居松林蘭若勤舊合輿議延瑩中瓛公嗣其席瓛公嘗請業禪師不復固辭乃走吳江水月廢剎輦致三世如來像妥奉殿中觀者起敬瓛公晝夜孳孳將次第成禪師之志復來請文以示後之人誠可謂賢也已嗚呼大千界中不離一念建治銷毀隨感而形者也茲剎付之虐焰化樓觀而為灰燼果誰使之哉此一念也今也翦翳剔荒變瓦礫而成梵宮又孰為之哉亦一念也善惡之所繫其懸隔有如此者可不慎歟禪師起廢之功無讓于開基瓛公善繼之力必漸復于舊觀皆肇于一念之善者也法社緇衣之士來居于茲來游于茲尚當擴而充之為聲聞為緣覺為菩提薩埵雖等妙二覺亦可拾級而升無有出于此念之外者毋徒委為有漏因果而忽之哉寺有唐僧貫休所畫十六羅漢像頗著靈異吳越時邵思寶等共建尊勝二石幢今猶存詩曰牽牛南斗姑胥墟義熙神僧建梵居相傳正受啓凡夫以法籠絡為周阹汙泥欲現金芙蕖盛衰相尋雲卷舒歲幾及千道如初飛樓湧殿薄太虛鬱攸毒焰翻赤烏化為灰燼無復餘上遮叢棘下夫須白煙斜日寒隼呼虎丘尊者名浮屠見性炯若摩尼珠胸中藏書比石渠應聘而起三嘆吁食無糗糧衣無襦赤立何以興吾廬瀟然一榻結雙趺風聲颯颯撼州閭四方聞者魚貫趍布帛盈橐粟滿車捆載有若神鬼輸成此寶搆只須臾龍礎承楹列砆碔榱題攢星塗以朱日月回薄氣扶輿攝慳破執道力驅空中樓閣齊毗盧法筵誰嗣乃其徒利如干將溫六瑚吳江有剎委平蕪尚留像變金作膚妙莊嚴像愍且都輦致中座清蓮敷直揭紅日升天衢大綱既挈萬目攄三門夾序暨堂塗勢可馴致當不孤秪今勝概敻然殊里白駢首施拜膜鏜鞳始獲聞鼓魚有情弱質同巴且暮枯寧復論朝腴一念搖曳風中旟大雄慈憫猶己痡乃假塔廟作世模由外修內垢淨除事為不落有與無空空色色皆真如作銘者誰列仙儒鐫之青瑤字縈紆後千百載期不渝毗盧寶藏閣碑烏傷之墟有山鬱盤名伏龍山山顛有寺號為龍壽宋治平中又更聖壽寺廢已久莽為荊榛元泰定末有大導師千巖長公飛錫而來從者如雲一彈指頃幻成樓閣導師示寂後十二載比丘如海來補其處四衆悅服如公在時十二時中常作思惟金口所宣十二分教受持之者發明自性此烏可闕乃與勤舊良杞是圖西往姑蘇扣諸檀度所施白金數將十鎰奉以為贄于福嚴院請致毗盧大藏尊經滿六百匭稛載而歸鄉之善士至四三千奔走往迎爰自山麓以達殿堂約二里所夾道耦立各各合掌次第受經而傳遞之縱橫錯綜無弗及者琅函既登頭面接足禮佛而退海之與杞又復思惟有經無閣與無經同何以自表啓人敬心孜孜持曆遍走民間欲聚銖黍以成丘陵杞弟德鄰素樂真因盡心化導惟日不足又有僧修宣勞其間歷七年久始見功緒乃撤舊堂載築載營均齊合度無有傾陊于是命工伐木于林琢石于山造陶于原鍛鐵于冶總總林林不戒而趍而其梓人曰陳新氏亦絶葷肉率匠蒞役國朝洪武龍集丁巳陽月斯屆其日乙卯始奠梁楹閲六十旬乃訖厥功閣敉五間其高七尋周以明軒觚稜騫飛蚩尾衝霄猶如化宮影落天半中像大悲具千手眼左右于佛飾以黃金種種莊嚴華侈勝特東西相嚮列以長龕攢布庋格妥至諸部索怚覽藏毗奈耶藏阿毗曇藏其為功德微妙難思刊定因果窮究性相垂範四儀嚴制三業研真顯正核僞摧邪無所不具無所不感有信禮者如聞世雄出大音聲天風海潮震蕩空際一歷耳根萬劫不磨重閣之下仍設高座演說妙法以聳人天龍鬼之聽遐邇之人來游來瞻舉手加額歎未曾有海復來謁請述記文用告來者是纘是葺永久不壞我聞法藏總為五千四十八卷以別計之凡六百億三萬一千八百八十八字之多于一字中各有點畫于點畫中各備形聲是名為字積字至于三百四百或千萬言是名為經積經以至恆河沙數無有窮極悉會于一是名為心譬之于佛自一至十自十至百自百至千千佛千身于一身中各具手眼是名為佛一有不具于相則乖大慈悲父以一佛身用表千身示現神變出千手眼顛倒捧執靡不如意是名大慈大悲之道是名法藏或微或顯不越一心心外無法法外無物千佛各具不見其少大悲通具不見其多此何以故清淨海中微塵剎土佛身充滿無有限域天地日月河山草木飛走游泳洪纖高下有情無情或出或沒在佛身中與無外者雖其手眼至那由他及無算數亦不見餘況止一千由此而觀手眼同遍于虛空界不見一隻亦猶契經充塞宇宙不睹一字無體之體無文之文終日呈露遍照十方斂藏于密初無一髮苟以凡情妄加度量如刀割水非狂則愚金華居士逢此勝緣歡喜踊躍記閣成事意有未盡復說偈曰我聞善慧師善巧度迷情建立大機輪中三乘教運行才一周功與持誦齊後代踵遐軌嚴飾日益勝黃金暨丹砂栴檀衆香等合成大寶藏湧現瀛海中大龍負之出天魔鬼神衆手持刀劍具護法禦不祥苟一撼動之循環不復停光色聲香類一一相奮軋如談苦空義聞者得殊利誠以寶輪轉衆法與之俱法轉心亦轉頓悟在剎那此以何因緣乃獨尊閣之膠執于一隅森列衆星比如如屹不動曷以發群機其于立法所寧不稍乖戾當知一切法本來常寂靜靜為動所基非靜動奚寄動靜二俱泯始不為境轉來升斯閣者日見衆寶函周遭逐心施不翅風雨疾回視他轉輪昭昭涵萬象清淨若止水毫髮不動搖方知非動靜不受有相攝若人以相求執燈入寶山竭力若窮探得一而遺十紅日行中天衆寶皆現前一覽心目了無有隱遁者此豈有奇因不為相縛故我今稽首禮作此法藏偈千佛為證明同歸大悲海四明阿育王山廣利禪寺碑銘四明阿育王山廣利禪寺在郡城東三十里阿育王山即鄮山昔在周厲王時東天竺國有阿育王造寶塔八萬四千貯釋迦文佛真身舍利命耶舍尊者放光役諸鬼神分布于四天下而鄮山當其一故更名之晉太康三年并州獵師劉薩訶受梵僧指授即改行為僧易號慧達遍求舍利塔于洛下齊城丹陽皆弗獲行至會稽之鄮山忽聞地下鍾聲慧達哀益切越三日忽舍利與寶塔從地涌出其相青色似石非石高一尺四寸廣七寸五成四角光明殊勝慧達見已悲喜交集而塔之出現實肇于斯時矣義熙元年安帝始搆塔亭覆護而度二七僧守之宋元嘉中文帝增創祠宇且以封襲未嚴斫木為浮圖三成函之梁普通三年武帝又命建殿堂房廊奉之賜額為阿育王寺大同五年帝令其孫嶽陽王察改浮圖為五成繪帝暨昭明太子二像藏焉仍施黃金五百兩造銅佛四百軀寫經論五百卷鑄四鐵鼎以鎮四角尋蠲復其賦調給兵三十設營防衛陳宣帝度僧守塔如義熙之數唐中宗遣使賜金又下詔加護之至武宗朝并省海內佛寺塔歸越州官庫宣宗立像教重興又入于開元寺鄮山僧訴于觀察判官蒯希逸而還之懿宗咸通中又度僧三七人守之梁貞明二年錢武肅王遣弟鏵等迎塔作禮明年正月回止西陵岸放光照江中其明如晝又改浮圖為九成第三成置七寶龕用以貯塔周顯德五年寺災文穆王請致武林龍華寺新其浮圖其成如前數而藻飾有加焉中龕雜用百寶範黃金為座懸珠瓔以莊嚴之宋初寺又新大中祥符元年復賜以廣利為額拓為十方禪剎其主僧自宣密素公始可考見宣密五傳至大覺璉公名振天下仁宗待以殊禮作詩頌十七篇遺之熙寧三年大覺為搆宸奎閣蘇文忠公軾實記其成大覺日與九峰韶公佛國白公參寥潛公講道一室扁曰蒙堂叢林取則焉高宗即位以寺為舍利所宅親灑宸翰錫名曰佛頂光明之塔大覺十五傳至大慧杲公紹興間來領寺事四方學徒川奔濤湧而食或弗繼乃于奉化忠義鄉隄海塗成田一千餘畝名般若莊大慧四傳至妙智廓公纘承益虔淳熙元年冬孝宗之子魏王愷出鎮其土二年孟夏四月瞻舍利毫光發祥青紅交絢變幻不一更用黃金為塔而藏寶塔于中冬十月一日孝宗遣內侍省西頭供奉官李裕文取塔入內妙智護之行舍利現于塔顛如月輪相又現兩角如水精珠若此者三御書妙勝之殿四字俾揭于塔所妙智再傳至佛照光公緇錫坌集不減于昔時盡鬻賜賚之資市田四千餘畝視大慧加三倍焉名吉祥莊佛照十五傳至笑翁堪公有權貴人至寺戲問曰舍利何在笑翁指道傍松謂曰此處即有已而松枝皆放光貴人驚異即寺之門巷建二石塔以表之笑翁又倣古制纍石為塔者三列于寺右以瘞僧之歸寂者宋季寺又災寶塔附安別院元至元十三年春三月世祖命使者奉塔至開平龍光華嚴寺尋遷燕都聖壽萬安寺集僧尼十萬于禁庭大廟青宮及諸官署建十六壇場香燈華幡之奉備極尊崇世祖親幸臨之夜有瑞光從壇發現貫燭寺塔相輪之表又自相輪分金色光東射禁中晃耀奪目世祖大悅命僧録憐占加送塔南還更賜名香金繒詔浙江省臣郡長吏增治舍利殿宇笑翁十二傳至頑極彌公適際良會遂以詔書從事未曾幾何甍棟雄麗如天成地湧上薄雲漢寶塔還于故處頑極四傳至橫川珙公道被華夷禪學為之中興僧伽來依法輪者至無席以容二十三年大建堂宇以居之橫川九傳至雪窗光公寺復新豪家所據諸莊田土園林盡復之且以詔使之臨祗奉無所至正二年春二月又造承恩閣七楹間黃文獻公溍為之作記雪窗四傳至扶宗宏辨禪師約之裕公已歷六十二代矣禪師以笑隱欣公法子入我國朝自廬山圓通選補其處戒律精嚴言行一致智慧福德皆絶出乎等夷從洪武初元以迄今茲一座十年宗綱丕振風雨不動安如泰山寺之勤舊竭其力而翼贊之有若嶽林住持象先輿公築黃賢塘得田三千餘畝名報本莊有若雲石起公市史氏之田其數如黃賢塘名忠義莊二莊皆與般若為鄰大佛寶殿則又雲石葺之三解脫門則僧伽智華作之修演法之堂并撤其房廬為下蒙堂則白雲住山智珠營之補東塔院者沙門自悟也造西塔院者又象先也西塔肇建于唐元宗東塔在迦葉足跡之左即寶塔所涌之地下至庫院雜室則出于比丘智寧之力也凡寺制宜有而摧敗不支者悉舉而更之禪師念締搆之艱不可無以示來者俾其徒師秀至浦陽山中徵文以為記嗚呼大雄氏真身舍利乃戒定慧重修所成必八吉祥六殊勝之地方妥安之其在震旦者一十有九唯阿育王山顯著特異自晉逮今歷一千九十七年之多國王大臣以及氓隸靡不歸依金銀重寶施之弗吝當其祥光發現瞻之仰之不翅嬰孺之思父母蓋如來以慈悲願力攝受有情神通廣博隨念而應所以啓功德之信心袪塵勞之妄念也何其至歟然而臨師位者多名世之士秉法門之正令飆旋霆奔一入其庭心空疑釋致使舍利之感久而滋彰名重五山光照佛日此亦幽明兩致其極者也禪師起繼芳躅益殫志慮當鼓魚寂寥之時熾然建立金碧燦爛于水光山色間浙河西東未見有如斯之盛者是宜詳紀之使後人扶植于悠久也寺東一里餘有聖井靈鰻在焉相傳隨塔而至呼為護塔神折鮮花誘之輒二紅蟹導之而出因作淵靈廟祀之以其與塔相關也特附見焉銘曰巍巍大雄攝受有情持紅日輪中天而行其一照燭大千洞見毫髮靡物不昭無幽弗達其二靈明入滅有不滅存五色神變萃斯骨身其三無憂聖王捶碎七寶造塔收之萬佛旋繞其四誰放指端白毫相光藥叉奔逐隨光瘞藏其五支那之國海東之域鍾聲發祥塔乃涌出其六上自帝王下達民萌歷代崇之精白一誠其七唯其所在天龍呵衛有感則通靈光顯瑞其八神燈暈紅烈火殞空或射九天燁如白虹其九千目環睹如佛出世攀引莫能繼之以淚其十依之主之代有偉人據蓮花座說法如雲其十一四方駿奔孰非龍象一喝之餘凡情俱喪其十二聲應氣求霧滃雲蒸千有餘歲無廢不興其十三有大導師來接遐軌佛智之孫廣智之子其十四長眉廣顙大類慈恩其徒翼之各展度門其十五湧殿飛樓聳起無際化海為田有禾穟穟其十六像教陵夷慨慨其永嘆浙河西東似斯實難其十七法王能仁覆壽無外佛子體佛引之弗贊其十八昔人有言難逢者時優曇之現四衆來依其十九疇無舍利中含法界亦有樓閣不涉成壞其二十色非青黃其光焞焞不假彈指諸門洞開其二十一苟能荷擔直入無礙手擎摩尼于法自在其二十二玉几之山其青無瑕法雷常鳴諸天散花其二十三敢告來者以纘以述功烈巍然與山無極重塑釋迦文佛臥像碑銘蘇州報恩萬歲教寺乃吳赤烏初大帝為乳母陳氏所建名曰通玄唐玄宗因其年改作開元吳越錢武肅王為之起廢揭以支硎山報恩寺舊額宋徽宗崇寧初加以萬歲之號至佛日嵩公來為住持專講華嚴經疏尊為賢首教寺寺有淳祐巨閣七楹間下覆釋迦文佛滅度之像相傳自唐則有之州民攀慕徼福者殆無虛日元季僞吳張士誠據有其地惑五行家之言強謂佛臥非吉徵更造立像民情焦然弗寧及僞吳亡德岩法師俯徇群情起主寺事不二三年殿堂樓閣門廡寶塔之屬皆一一葺治易腐為堅煥焉如新已而嘆曰諸役幸粗完像可不復于古乎于是走告民間不分耄倪皆舉手加額競輸貨帛以後為愧法師乃戒摶土之工斫嘉禾為骨骼承以高座塑臥像其上塗以五色覆以綵衾諸弟子涕淚悲泣環列前後摩耶佛母亦立其側悵然興哀唯曼殊普賢二大士神情閒曠超出死生之外用意精緻形模宛然像長六十六尺六寸高一十二尺曼殊等像高一十八尺經始于洪武十二年春三月某日其年夏五月某日訖功縻錢萬有奇用功百有奇伻來俾濂記之嗚呼佛之法身猶如虛空本無去來何有生滅其示八相以覺群迷不過降本垂跡俾同人法而已本則真諦跡則俗諦真俗混融皆不思議之事烏可以異觀哉況八萬四千無非度門觸類而入洪纖畢達姑以入滅論之實具華嚴五教大旨小乘雖除我執殊達性空但知實色故示之以涅槃非近于愚法聲聞教乎色法二相本無自性皆從緣生滅度之際斷緣歸空非近干大乘始教乎應身雖法亦屬幻有幻有既滅真空獨存真空既存幻有亦住二體互融了不相礙非近于大乘終教乎滅而非滅非滅而滅非滅而有既滅而空空有雙泯理事交奪如如不動無即無離非近于大乘頓教乎娑羅林間居然唱滅靈山會上儼爾常存隨舉即色隨舉即空如示一身不起于座如化多身遍滿塵剎無量為一一為無量力用相收縱橫自在非近干一乘圓教乎諸有情衆若勝若劣來瞻靈像隨其機宜證入教位至于混極不翅親聞盧舍那演說圓滿修多羅之為快法師此舉其千樹教基續慧命有功于法門甚大非止福澤被于一州而已抑濂聞昔人設像俱有所表見非苟然也如來中居表衆生大覺之心飲光勝尊在左表自利之行慶喜在右表利他之行曼殊乘師子表大智而降嗔也普賢騎象王表大行以制貪也他如劍斧兩神則表觀空擇法二智取義深遠使人目擊而道存故歷代襲之定為常法而此涅槃之像奈何獨無所表乎濂因略舉雜華之說斷然謂五教之理咸具不然佛法遍滿一切處是果何言哉濂既為作是記殷勤遐仰復學主夜神以偈贊佛之語繫之于後法師名淨行德巖其字也博通帝心雲華賢首清淨定慧諸家晝力振其宗于將墜之時一彈指間悉起諸廢其化導有緣以成法師之志者善長正宗二沙門也偈曰世雄大悲利群物果後三權不思議既由應身顯法身從體起用宣妙法人機既得饒益故倡入滅度示化儀化儀有始而有終所以懲創懈怠者七寶床中右脅臥慧日一朝竟西沒娑羅樹林皆變白諸天哀號雨天華四衆圍繞共悲哽妙香結樓奠金棺發三昧火而自焚各分設利建塔廟如來雖入般涅槃畢竟終無涅槃者是知一性鎮常住不從變易有生滅倬哉賢首古伽藍三吳法會斯第一乃造涅槃微妙相因相攝入有情衆近遭紛更紊常制緇素煢然失依怙有大比丘起復古最先補苴諸樓閣一一莊嚴成妙境次令埏土肖靈像五色高纏廣博身州民瞻禮至灑泣如還故鄉逢故物此即大乘正法門種種皆能濟群品觀者毋以像觀像如觀雜華大經王字字化為法焰雲雲中化佛皆現前一身示現無量身無量身中現一身令我悉除邪見綱直濟難思解脫海行住坐臥皆見佛佛之智慧如虛空無性無生無所依大光明藏時時現與我無同亦無別從上所言真實法衆生慎勿懷疑念重建龍德大雄殿碑佛法之入中夏始于漢明帝永平八年此說殆非也中夏知有佛蓋已久矣周穆王時西域有化人來能出入水火王為築中天之臺列禦寇之書所載西方有大聖人不治而不亂不言而自信不化而自行雖不明言其為佛其事固皆佛也況乎天竺室利房等持經來奏而始皇謝去之漢武帝詔霍去病討胸奴獲休屠王祭天金人祠之甘泉成帝命劉向校書天祿閣往往多見佛書哀帝遣景憲使大月氏得其王口授浮屠經而還是則明帝以前經之與像中夏皆有焉至于永平以後而其教法始恢弘耳然而中州之人奉佛者雖多江南塔廟則自吳大帝赤烏四年康僧會所造建初寺始婺之浦江從仙華山降勢而下其東支蜿蜒而來曰龍峰峰之麓龍德寺在焉乃法懷禪師道場初名乾元宋大中祥符元年更今名嘉定中寧宗親書寺額以賜之寺無碑碣可徵不知何時建立相傳為赤烏中子竊惑之僧會之化方行建業而浦江在千餘里外何緣遽有興蘭若事乎乾元乃唐肅宗紀年以年名寺其殆或肇于唐歟寺廢將圮元大德九年住持僧善興及其徒永鎮悉撤其舊而新之先是龍峰之上有塔七成宋天聖三年僧咸若募兵部侍郎胡公則捐錢五十萬所建至是亦一新之且造塔院一區湧殿飛樓雄麗華煥為一郡佛宮之冠歲時祝釐縣之諸浮屠悉萃焉元末兵亂一夕皆為煨燼寺之二比丘至德守約衋然傷心乃合謀曰前人之功吾儕不可不繼也而力未能遍及宜先其大者以為衆倡樂善之士豈無從而和之者乎于是黜衣縮食重創大雄殿五楹間其廣一百一十尺深比廣閷二十尺崇比深復閷其四十尺經始于洪武九年之十月落成于十三年之三月匠以日計者八千米以石計者一千錢以貫計者五千而所就之夫弗與焉二比丘以成功之孔艱也欲使嗣人知所保護介豫學子吳誠來請記嗚呼久遠劫來諸佛出世其化度前後固不可以詳知而先儒則謂穆王之世中夏已昉見之越一千六十餘年至明帝法始盛行又越一百七十餘年至吳大帝江南方知有佛祕藏之莫顯至道之難聞亦已甚矣今也祗園梵林交接乎東西琅函玉笈充牣于左右則其證修宜若易易然者而闡提之人猶日衆多自非增崇其像變宏侈其寶坊何以新其瞻視而袪其疑妄者哉此二比丘所以協力起廢而不敢緩也真如妙智含生本具當繼軌轍而興事功者不數年間一復大德舊觀豫安敢謂無其人哉故因作記特稽佛法緣起而嘆其不易遭逢意將起人之敬信苟謂泛引而續言之非知豫者也系之以詩曰西方大聖天人師將本垂跡攝群機五色神光貫太微九龍行水香襲衣木齡寂默和天倪明星一出絶去來大音演法寶華垂像教東漸自蒼姬祕藏弗顯昧若黟後千餘歲寢光輝白馬馱經息鴻盧從此祠廟覃夏夷仙華名山如曳旗青龍東逝勢欲飛穹塔為角舟木鬐掩映樓觀聳巍巍倣佛兜率中天移劫火洞熾風鼓威盡化丹臒為荒椔二士見之心酸嘶欲符西土化人為彈指勿使神鬼窺四阿凌虛截絳霓一倡當知百和隨千楹萬礎列參差行看規制踰昔時調御丈夫示弘慈擲埴索塗哀世迷手擎日月耀九馗疾步長趨絶險巇歷劫難值心勿疑浦陽長江流渺瀰江水可竭道無虧興作起壞屬之誰尚告繼者徵斯碑官巖院碑浦江縣東南三十五里有山穹然拔起於衆峰之間者曰康侯山又曰官岩山俗以其形蹲踞如獅子又稱之曰獅子岩從岩趾斜入六百餘步崖木四環最號幽邃有古招提在焉梁大同間比丘尼元淨始建院岩北石洞前號曰安和後更名兜率至唐會昌之季燬于火其故基至今猶存咸通初祖燈大師自越之上虞飛錫而來遂縛禪岩內會歲旱獨上絶頂祈請捐身投崖下而卒俄頃大雨火化得五色舍利民感之就岩之西為建今院八年丁亥因山賜額為官岩云燈之事備載洪遵郡志中而比丘之經始則出於縣民蔣氏之所私紀年世遼邈莫考其詳所可考者宋大中祥符癸丑重建釋迦寶殿天福己未刻木為諸菩薩護法神王諸像景定庚申妙空大師智印嘗出主杭之旌德顯慶教寺以衣盂之資命其徒六人造經鍾二樓暨圓通堂方丈三門兩廡之屬復聞于朝以奉仁烈皇后楊氏神御院益增重國朝延祐丙辰院僧宗勝建普賢大士閣明年丁巳宗尚悉易殿之楣楹新其四檐而加闢焉復摶土益舊木像礱石為床座而妥置之使與殿稱至順壬申景輝作潮音堂于殿之北墉至正癸未華光寶閣成越三年丙戊集僧之堂又成七年丁亥香積之室又成其費一出於衆僧唯閣之役頗殷賴邑大姓洪君榮助之而始就榮之二弟盛興復為創鷲峰潛碧兩亭自是院之規制一如大伽藍四方人士來觀來游但見穹樓傑閣飛動於蒼煙涼翠閒恍若登耆闍崛山親逢如來法會之未散莫不歡欣贊詠得未曾有比丘普安曾不以是為既完且謂自祥符癸丑至今歷三百四十有三年其中更幾世幾人始克致有于是苟不圖文刻諸貞玫則後來者何以知其艱哉乃以烏傷朱君烈所述顛末走青蘿山中而求濂為之記濂所居距岩不十里近一出戶輒望見之當天朗氣清時嘗同二三子捫蘿攀葛而上俯瞰縣北岩坑仙華諸峰如萬馬東行或駐或躍而浦陽江之水蜿蜿蜒蜒又如白龍南飛一瀉數十里繞岩腹而去周圓原野星羅綦布諸池沼廁其中直小甌耳方呼酒放歌天風自東北起四山鱗甲一時皆動同游或戰掉不能留誠天地間勝絶之地也宜為有道浮屠之所都而興仆補壞代不乏人也濂因弗辭而為之記系之以詩曰獅子之岩下瞰巨江涵靈茹和吐陰納陽其一不有大雄曷檀奇絶乎地湧成琉璃宮闕其二誰操化機寂我鼓鍾若龍若象遁棲無蹤其三有大導師飛錫而至以清淨身化為甘雨其四我民咸言盍報有年一彈指頃樓閣現前其五歷年四百何以弗墜世有長材愈作愈麗其六陽馬四騫枛棱高翔金浮翠流熚熚煌煌其七觀者如登妙莊嚴域見種種光暨種種色其八惟世間相起滅弗停中不滅者永劫猶存其九矧是有為俱繫虛妄當悟以心毋取于相其十若事若理本無二門苟涉分別即非一真其十一我述我文鐫諸堅石後千萬年與山無極其十二明覺寺碑四明有伽藍曰明覺者其地在太白山陰唐天復初沙門居納始縛庵廬修習禪觀至宋某年比丘某拆而大之殿堂門廡一如它浮屠之制郡守張某為請于朝而畀以今額元泰定間寺僧厄于科繇之煩悉以土田質于民間寺事日廢至正戊戌僧子琦籍其步畝圍落之數往告阿育王山象先輿公曰琦不敏不足敬承先訓使塔廟一一委諸草莽人其謂我何然而非神力不可以擲象非定見不能以移山古莫不然今豈弗類惟公儉以持己誠以格人格人易以集事持己率以動物合是二者何廢之不興何壞之不補今敢以圖籍進公其受之言畢胡跪作禮而退當是時敗屋數楹頽然荒菅叢棘中饑鼪窮鼯後先笑呼白草涼煙舉目凄斷象先初頗難之已而曰人患志弗堅耳苟堅矣事豈有不可為者邪于是悉發其儲畜市材僦工剔彼薉荒土復燥剛位仍面陽自戊戌至于丙午不十年間咸如舊貫土田質于民者既贖歸之而新置之數又倍于昔仍令寺僧甲乙世主之噫何其能也世之營建塔廟者未必無其人苟不售奇衒巧以病夫民則籍豪氓大賈出力而任之所以事不難成而功緒易見也今象先不資衆因不動聲氣成此勝域偉特莊嚴四輩之士如登耆闍崛山親睹如來五色相光非其力之弘見之凝不足以與于斯也此無他由能信其所有故能成其所無是則信者入佛之門建善之本也勒諸貞石以告後之人尚知以信為最相與嗣葺之俾勿壞象先台之臨海人俗姓王氏得度于雪窗光禪師深通內學其來請文者則用晦熙上人也系之以偈曰如來設教亦多種建立塔廟乃其一塔廟皆屬于有為于真實際無相涉不知何以濟群迷耆闍崛山及諸處重閣講堂無不具儼然如來在會時衆生貪著于五欲紛紜膠葛不暫停有如飛鳥投網中其心在在難比喻我佛重以慈憫故建茲莊嚴妙勝域所以奪妄欲趍真太白山陰降支隴山川鬱蟠護靈氣有一尊者飛錫至結茅敷坐縛禪寂後來繼者翕然聚化為寶坊矗天起金碧晃輝映林谷鍾魚互答朝夕間何期鞠為狐兔區遠近睨者增太息阿育王山善知識殷勤赴我桑門請彈指頓開樓閣門無有一物不現前我聞成壞世間相畢竟中有不壞者曠大劫來至于今無生無滅無增減此為毗盧法性門佛與衆生同此入光明照徹大千界不分內外及中邊我因造記說伽陀以言語觀即非是麗水陳孝女傳碑附陳孝女妙珍處之麗水人父南溪為神祠祝史蚤夭母某氏更適他族妙珍依大母林氏以生林嬰末疾妙珍刲股雜淖糜以進疾遂瘳或告之曰此若女孫股肉之功也林悲泣曰吾耄矣死固當然何用苦若耶疾復如初妙珍倀倀如有失賣衣走浮屠氏作諸禳禜事皆不應林忽昏昡妙珍解髮相紏纏哀號良久乃蘇自是氣益弱僅有一絲相屬妙珍計無所出燃香右臂上稽顙籲天乞以身代復不應至正四年四月壬申夜夢一丈夫冠烏紗巾服青布袍來告妙珍曰爾勿憂能剔肝食之則愈矣妙珍問曰欲剔將焉從丈夫指右脅示之且俾吞紅藥半丸吞已遂覺甲戌妙珍乃具湯沐浴露禱上下神祗時空中雨墜妙珍之身獨不霑濕若有張蓋覆之者妙珍益喜持刀視脅下見紅痕如縷長可三寸許就痕上割之血滂然流再割之了無所見妙珍懼乃擲杯珓卜於神逮俯身拾之而肝忽出懸亟刃之置几上爇香自誓云大母倘得生終身持菩薩戒不復適人矣尋取肝聶而切之雜竹萌烹之大母食才下咽其疾頓愈妙珍懲前事戒左右勿漏言然創巨甚幾至危殆復夢神人語之曰無傷也宜練紙作灰傅之妙珍從其言果愈時年十四耳後三年林以壽終妙珍造塔瘞之復然頂申前誓棄家為優婆夷前進士永嘉高明來官郡録事為上其事部使者大名高履覆按得實以聞次于朝詔有司具烏頭雙表之制旌表其門仍月給粟一斛養其終身時八年春二月也郡守固始黃某以其事有涉名教也命儒學教授鄭汝原為記其事于石云史官曰人子之於親本宗一氣苟可以死生者勢當共之肯以形體既分而視之有異耶當親有疾時呼號天地鬼神遑遑求索茫昧中力有可致雖萬死弗之顧又奚暇毀傷絶滅之計耶或者作鄠人對痛斥之余不知其何所見耶夫孝忠無二道忠臣肝腦塗地世未嘗指以為非顧獨於孝子而疑之耶此決非韓子之文其依倣而托之者耶余聞之慈溪黃東發之言如此因造陳孝女傳故備論之孝女持菩薩戒終身為優婆夷此現女人身得度者也故附載于此
