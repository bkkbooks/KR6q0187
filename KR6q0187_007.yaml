body:
  text: 皇明金華宋濂著雲棲袾宏輯虞山錢謙益訂序瑞巖和尚語録序豫觀大梵天王問佛決疑經所載梵王以金色波羅夷花獻佛請為說法佛拈花示衆人天百萬悉皆罔措獨金色頭陀破顏微笑佛云吾有正法眼藏涅槃妙心實相無相分付摩訶迦葉嗚呼此非禪波羅蜜之初乎人生而靜性本圓明如大月輪光明遍照凡蘇迷盧境界具濕性者大而河海小而沼沚無不有月是故有百億水則百億之月形焉仰而瞻之而中天之月未嘗分也月譬則性也水譬則境也一為千萬千萬為一初無應者亦無不應者體用一源顯微無間也大聖全體皆真不失其圓明之性如月在寒潭無纖毫障翳清光燁如也凡夫為結習所使業識所縛而唯迷暗是趨如月在濁水固已昏冥無見加以獰飆四興翻濤鼓浪魚龍出沒變幻恍惚欲求一隙之明有不可得矣故聖人之心主乎靜靜而非靜而動亦靜也凡夫之情役于動動而不靜而靜亦動也吾達摩大師特來東土以迦葉所傳心學化被有情欲澄濁為清止浪為平直入于覺地而後止故其體常寂而寂無寂也其智常照而照無照也其應常用而用無用也至此則其妙難名矣然未易以一蹴到也惟一惟虛坐忘其軀或緩或徐長與神明居懼其散而弗齊也設疑情以一之恐其志而自畫也假善巧以引之慮其偏而失正也挽沉溺以返之其道蓋如斯而已歷代諸師各尊所聞守此而不敢失逮我育王琪公起于東海之濱秉執法柄弘開度門達摩大師之道煥然中興入其門者無非龍象而竺元道公號為世嫡今吾恕中慍禪師則又竺元之入室弟子也初受度于元叟端公多聞法要拈香酬恩則歸之道公厥後俯徇衆請出世象山之靈巖黃巖之瑞巖皈依者日益衆名聞東夷使者入貢中國兼奏請住持師因奉詔來南京力辭其行皇上憫其耄也特從所請一旦將歸隱鄞江其徒居頂以二會語徵豫序豫久聞師名亦嘗窺見語言之一二茲又獲睹其全驚霆奮而疾飆馳山嶽移而海水立鬼神泣而魑魅奔有聞之者凡情盡喪豫故不辭為稽決疑經所載以啓禪源法水月之喻以明性源推達摩之教以為學源歷題之于首簡豫老且病凡求文繽紛于前悉皆謝絶而獨為師拈此者憫大法之陵夷樂師言之契道也雪窗禪師語録序或問于余曰菩提達摩西來以不立文字為宗蓋欲掃空諸相直究本心而趨真實覺地者也名山宿德何莫非達摩之子孫為之徒者因其說法往往編以成書號曰語録無乃與不立文字之旨相戾乎曰非是之謂也扶衰救弊各隨其時節因緣有不可執一而論者矣昔我三界大師演說大小乘諸經其弟子結集為修多羅藏至繁且多也復慮後之人溺于見解而反為心纍故以正法眼藏付于摩訶迦葉拈華微笑之間無上甚深妙法含攝無餘此亦化道之一法門耳非真謂鹿野苑至跋提河所言皆當棄之也不然如來自兜率下生何不即以單傳直指示人顧乃復勸誘而弗置之邪去佛既遠學者纏繞名義不能出離誠有如如來之所慮者達摩出而救之故取迦葉微笑之旨專以示人蓋亦有所甚不得已焉爾育王禪師以三昧力入智慧海初說法于白馬寺繼遷開元已而住阿育王山兼領天童寺事四會之間緇素翕集所以啓人天龍鬼之聽屹立不遷如真正幢涉險度危類大法船若見若聞皆獲利濟至若垂三語以驗來學又如臨萬仞懸崖撒手而立非上根大器豈易入其閫奧者哉虞文靖公贊師之語謂為佛果一枝鳳毛麟角者其言良可信不誣也師入滅之十四年其上首弟子象先輿公月徑滿公以所録語徵余為之序余故舉扶衰救弊各隨其時節因緣者言之于以見達摩之宗非有違于先佛諸師之録非有違于達摩其事雖殊理則同也有若禪師此録之行後有因語言而入者雖不得見師而師之惠利所及益遠矣雖然靈妙一真直超三界其大無外其小無內雖無物之不攝欲求一物了不可得于斯時也無煩惱可除無法門可學無衆生可度無佛道可成尚何有言語文字之足論哉觀斯録者又當于是而求之人能于是求之始于禪師之道與有聞矣禪師名悟光字公實姓楊氏別號曰雪窗成都之新都人南堂禪師語録序豫壯齡時與千巖長公為方外交千巖以南堂禪師偈贊示余余讀之驚曰是有所證悟者之言也絶枝蔓去町畦而不墮于情識之境不意大法凋零而能見斯人哉千巖以余言為然當時之所見僅一二章耳自時厥後或吳或楚或梁宋或魯衛名僧開士多有謁余浦陽江之上者余既見輒問見南堂否曰見之曰有何言遂各解囊相示見漸多則其心慕之為愈至及來京師其弟子祖灊海壽復持三會語畀余而求為之序讀之連日因獲盡其大觀焉嗚呼據獅子座演如來法其任甚不輕也在他人為之東剽西掠拈綴成篇而椎鑿之痕故在師則混融無跡不異雲流而天空者矣在他人為之拘滯一偶動輒有礙或得乎此竟遺于彼師于殺活之機縱橫皆自如矣在他人為之氣索神沮不自振拔而無以應來學之求師乃圓滿充足覃及于諸方矣有若師者其所造詣誠非凡情之可度量哉夫以少林西來惟究心源言辭直截初無隱晦傳至大鑒恐為世諦流布不得不祕護而密持之歷代碩師隨時升降慈憫峻厲各立戶庭其接引雖若有不同所以袪逐妄緣而挽入正塗者則一而已矣逮及宋季尚奇騁異背其師授而流于頗僻者漸多有之君子言之未嘗不為之太息師能循蹈矩彠惟祖武是繩提唱真乘使人復見大鑒遺意其扶樹正宗之功夫豈小哉余之慕師非一日巨細之辭皆獲觀焉故知師為獨深而謂非他人之所能及然可惜者師之名位不滿于德使其說法五山布靉靆之慈雲澍滂沱之教雨則其功逮被又不止今之所見而已雖然名外也非內也德內也非外也師內重而外輕者也苟以在外者之崇卑以為在內者之低昂是不知師者也師之行業余既詳書成記勒之堅玫復為讀斯録者著其說如此千巖在定光中又未必不以余言為然也師諱清欲字了庵南堂其號也族姓朱氏台之臨海人嘗住開福本覺靈巖三禪剎云千巖禪師語録序往豫家居時嘗謁千巖禪師于烏傷伏龍山當是時遐邇學子望風奔湊曾未幾何化荒墟為樓觀易空寥為金碧鍾鼓之聲上徹霄漢嗚呼何其能也蓋禪師以無能為能不用為用芳蘭生于幽谷而馨香遠聞蒼璧韞于玄璞而光輝外發禪師處于遐壤而人競從之有道之士其果有異于庸常者歟且禪師在時其弟子嗣詔嘗録其語鍥梓以傳豫嘗獲觀之其敷宣大法如雲雷迭興而九龍噴雨也如大醫王制藥隨證而愈疾也如摩醯三眼光明洞照而無不至也由是知禪師之道不實不虛不有不無不中不邊在普應之門蓋亦鏗然有聲者也以能以用窺禪師者抑亦末矣禪師既入寂兵燹方張所謂語録者皆為煨燼經今十有餘年矣一庵鄰上人自幼侍禪師與聞其道乃以舊本重刻不遠一千餘里來徵豫序豫謂禪師之道見于言讀其言自可知其道又何以序文為然稽之古德其語存于今者多名縉紳為題辭不若是固不足以表正宗之所寄第豫也非人惡足為禪師之重輕以禪師與豫交也因不辭而為之書雖然禪師之道不落有無中邊虛實者固不可以語言文字求也欲求禪師之道其亦得魚兔而忘筌蹄者乎禪師行業豫嘗為撰塔上之銘茲不書上人方閲三藏諸經連年不自休今又孜孜而為是圖亦可謂不悖其師者也育王禪師裕公三會語録序古之人道感而形化曷嘗貴于言哉甚不得已而有言言或易于遺忘又甚不得已而記録之雖曰形諸簡編然懼不能行遠又甚不已始刻文梓而傳之其言之也欲擊蒙于當時其傳之也將澤物于後世惓惓為道之心為何如哉此濂于歷代諸師之言不能無感也激者則曰靈明中居一塵不可留況語言文字紛穢龐雜足以礙沖虛而窒真如達摩氏東來持楞伽經以印人心楞伽佛口所宣也君子尚謂其墮于枝蔓況後來師弟子策勵之言乎曰不然也人之根性不同而垂接之機亦異其上上者一見之頃情塵自然銷霣何假于言哉若下下者朝夕誨之淡如嚼蠟竟不知其味苟欲絶文字令其豁然自悟是猶采鳧藻于山顛求女蘿于海底終不可得也今之去古亦遠矣自大鑒以來其語具在人仰之者如應龍升天海立雲流或現大身或現小身不可凡情測度儻不因其言而求之則其超然獨立不墮色聲者奚從而知之既知之必將則而象之若以其窒真如而礙沖虛一切斥去濂不識其可乎不可乎雖然寶積經云如來所演八萬四千法藏聲教皆名為文離諸一切言音文字理不可說是名為義法藏且爾況下于斯者乎以此觀之當略其文而究其義可也然而取魚者必資筌搏兔者當用蹄兔與魚既獲而無事于蹄筌吾心源既澄識浪自息復何義之云乎濂之區區又不能無感于後之人也育王禪師裕公三坐道場策勵學徒如青天霹靂聞者掩耳演說無上妙道如升蘇迷盧山闊視四天下百物無所遁藏大司徒楚國歐陽文公謂其言出入宗乘內典左右逢原其文涉獵百氏燦然可睹鞔峰住山恕中慍公謂其設施踔厲不愧為大慧七世孫皆知言濂頗獲與公游嘗以賸語三卷質正于公公不鄙而題識之許其可以入道今已十閲寒暑矣公之徒師秀不遠千里以公三會語請濂序而傳之嗚呼公之有言與秀之汲汲圖此者夫豈得已者哉濂雖不文因不辭而書諸首簡云古鼎和尚四會語録序贊古鼎禪宗銘公以臨濟十七世孫四坐道場為黑白之所宗仰一旦祝釐江浙省垣現白光三道丞相康里公見之極加敬禮未幾將示寂語其徒曰觀世音蓮臺至矣安坐而逝及火化舌根齒牙數珠俱不壞五色舍利燦爛無數國史危先生已托其行業為文勒諸碑而四會語未有序之者師之得法上首今天界禪師西白金公屬濂作之濂覽已合爪言曰是真正語是不著有無語是雷轟電掃語學者隨所悟入如慈雲遍覆法雨普沾小大根莖皆獲生成非入正知見具大力量者孰能與于此嗚呼世安復有斯人乎哉非謂果無之也求其真淳無僞若師者鮮也濂既為敘其事復歆豔之歆豔之不足復作伽陀一章贊之其辭曰我觀我師四會語一言一句皆真實河沙妙義總含藏其中無餘亦無缺及至能所齊泯時欲覓片言不可得有如十萬虛空界種種色相皆現前或飛或潛或動植以至洪纖高下等枯榮生死及崩竭了然不染虛空相而亦不出于虛空真相如如不動故師昔嘗登寂照場耳邊一喝三日聾惟聾故使功用絶絶後通身皆是耳自茲出世入翁川翁川海水亦生耳但聞魚龍哮吼聲即使波濤增洶湧繼升補陀洛伽山合掌問訊觀世音目能觀色耳聞聲音聲何獨以目觀不知本來無耳目見所不見聞不聞盡大千界無礙者中天竺國凌霄峰所談妙法皆如是只因妙法法難思結集已落第二義眉間放出白毫光七寶蓮臺向空至此皆遊戲神通事于師之道不相攝師之道大不思議千古贊歎莫能盡姑以第二門中觀可以洗空于結習可以觸動于悟機可以速證于菩提是宜流通于世間視如照耀光明幢我言或誣有如水徑山悅堂禪師四會語序根有利鈍故所教有異同悟有淺湥故所印有小大施其善巧之力釋彼結習之固非假言辭難窮實際所以達摩歷辨于六宗臨濟有發于三要照耀今古函蓋乾坤茲其為巨浸之輿梁作昏衢之燈燭也歟有若悅堂顏公禪師以東嶼正嫡弘西來太宗初住崑山之東禪轉吳門之萬壽升虎林之南屏遂陟雙徑樹大法幢凡四坐道場名聞京國遣使者再下璽書護其教且有金襴法衣之賜藩王大臣無不函香問道黑白駿奔如衆歸市禪師隨機接引霑被為多其善誘弗倦則春氣津津太和襲人也其發蒙撤蔀則翳捲太清冰釋洪河也其警省振勵則震雷虩虩喪厥匕箸也其含弘攝授則山不讓塵海不擇流也由是而觀所教有同異非根有利鈍者歟所印有小大非悟有淺深者歟前謂施善巧釋結習假言辭窮實際者其道豈不在于斯歟昔者先師黃文獻公現宰官身敷宣般若與禪師為方外交而禪師受度婺之寶林又在豫父母之邦稽茲緣契實繫中情禪師上首南峰珵公得法最蚤乃出四會語僤題首簡豫竊聞之入奧室者能探于幽邃升危岑者始矚于冥茫松月大師印公禪林之獅子法海之長鯨也其稱禪師之道高于圓照佛照二公其言豈虛發者哉惟賢知賢蓋可徵矣仰前哲之風徽作後武之矩度究其遺轍足證新功是録之行其必有超然獨得于語言之外者乎雲棲曰四會語録今無存松月亦未知何許而曰道高于圓照佛照夫二公豈易及哉而曰過之更俟賢者考正重刊寂照和尚四會語題辭寂照和尚元叟端公既示寂金華黃文獻公為銘其塔蜀郡虞文靖公為序其四會語二公以文辭名天下亦云備矣其入室弟子清泰子楩金山惠明天寧祖闡復合辭請曰舊刊所録先師語不幸燬于兵然非此無以見道之所存竊懼不傳子楩三人者已協力命印生重雕之矣敢重以首簡請為序雖然序猶可略也先師事蹟多涉神異狀行者輒諱而不書神異之事大乘者固所不樂聞苟録以示入道之士亦足以起其正信初何傷乎願併識之序中豫不敢辭稽子楩等言公平頂古貌眼光鑠人頷下數髯磔立凜然如雪後孤松坐則挺峙行不旋顧英風逼人凜如也所過之處衆方歡譁如雷聞履聲輒曰端書記來矣噤默如無人賓友相從未嘗與談人間細故舍大法不發一言秉性堅凝確乎不可拔自為大僧至化滅無一夕脫衣而寢其從南屏歸化城受經夏夕啓窗而臥忽一梵僧飛錫而來與談般若樞要亶亶不絶未幾騰空而去虎岩師主雙徑時嘗言道家者流有上章謁帝者其還甚遲因叩之答云為選徑山四十八代住持故天閽久不開爾公正符其數公朝京師夢徑山潭龍君持金匙舉食食公數凡十又八公主法席實十八春秋也公將示滅所剪爪髮留瘞化城幻有庵逮啓視之設利纍纍然生矣公之遺事有若此者皆宜補書以見于世不可略也蓋公道契佛祖名震華夏誠堪輿間氣之所鍾其祥應之至亦出自然非苟涉于神怪者比也文獻所謂門庭之盛規重矩疊法雷普震裂地轟天文靖所謂譬諸名藩鎮以宿將隱然持重風霆不驚握機行令舒卷自由足以使方城連戌有所仰放不敢踰越其言誠不誣哉濂何敢復贊一辭頗念文靖之學粗聞而知之又執弟子之役於文獻之門者最久於是勦其緒論重申之如此嗚呼公之四會語其尚假濂文以傳之哉子楩字用堂惠明字性源祖闡字仲猷皆設化一方黑白成皈仰云徑山愚庵禪師四會語序或問于濂曰世間至大者何物也曰天與地也曰至明者又何物也曰日與月也曰然則佛法亦明且大也其與天地日月並乎曰非然也曰其義何居曰天地日月寓乎形者也形則有成壞有限量雖百億妙高山中涵百億兩曜百億四天下以至于恆河沙數皆有窮也皆有止也此無他囿乎物者也若如來大法則不然既無體段又無方所吾不為成孰能為之壞吾不為後孰能為之先吾不為下孰能為之上芒乎忽乎曠乎漠乎微妙而圓通乎其小無內其大無外真如獨露無非道者所以超乎天地之外出乎日月之上大而至于不可象斯為大矣明而至于不可名斯為明矣是故以有情言之則四聖以至六凡或覺或迷佛法無乎不具也以無情言之則火水土石與彼草木或洪或纖佛法無乎不在也三乘十二分教不能盡宣也八萬四千塵勞門不能染汙也嗚呼罄徂徠之松以為煤斷淇園之竹以為管其能盡贊頌之美乎然而佛法固明且大也其靈明之在人者萬劫雖遠不離當念一念不立即證菩提亦在夫自勉之而已濂雖不敏每遇學佛者喜談而樂道之初不以其證入淺深而有間其意頗有見于斯也徑山住持以中禪師名智及學徒尊之號曰愚庵俗姓某世居姑蘇得法于元叟端公歷住隆教普慈二剎帝師錫以明辨正宗廣慧禪師之號已而升淨慈遂主今山四據高座敷揚佛法以聳人天龍鬼之聽緇素相從如雲歸岫其弟子某會粹成書介吾友用堂楩公請文以題其首濂懸燈而疾讀之其解人膠纏如鷹脫絛鏇摩雲而奮飛也其方便為人如慈母愛子一步而三顧也其宏機密用如大將臨陳旗鼓動而矢石集也誠一代之宗師而有德有言者歟雖不二門中一法不存何況於言覽者當求禪師言外之意使意見兩忘而忘忘亦忘方近道矣嗚呼佛法超乎天地之外出乎日月之上豈細故哉人患不求之爾今極其贊頌而書于此録之端實欲起人之敬信也繪畫虛空非愚則惑濂蓋無以逃其責矣楚石禪師六會語序大慧提唱圓悟之道于徑山神機妙用廣大無礙入其門者凡情盡喪得法弟子不翅千餘人各闡化原而佛照于其中稱為善繼佛照之後而妙峰紹之妙峰之後而藏叟承之如持左券相授器度吻合無差爽者寂照在四傳之餘復能克肖前人誠所謂世濟其美者然而諸師證入雖有不同其上接西來宗旨使人離垢氛而發精明者則一而已矣寂照之弟子楚石禪師蚤以穎悟之姿鋭意于道一時名德若晦機若虛谷若雲外爭欲令出座下師皆謝之惟詣寂照之室反覆參叩一聞鼓嗚群疑水消世間萬物總總林林皆能助發真常之機自是六坐道場說法度人嬉笑怒罵無非佛事至于現寶樓閣及種種莊嚴導彼末法因相生悟其與一實境界未嘗違背聲聞之起水涌山出逮世緣將盡顏色不異常時翛然坐脫如返故廬則其俊偉光明較于恃口給而昧心學者其果何如也哉嗚呼大慧之道至矣自它宗言之執持正法作獅王哮吼者固往往有其人第近年以來傳者失真瀾倒波隨所趣日下司法柄之士復輕加印可致使魚目渾珍揚眉瞬目之頃輒曰彼已悟矣何其易悟哉人遂誚之為瓠子之印非特此也五家宗要歷抄而熟記之曰此為臨濟此為曹洞法眼此為溈仰雲門不問傳之絶續設為活機如此問者即如此答多至十餘轉語以取辦于口名之曰傳公案若是者皆見棄于師者也今觀師之六會語小入無內大入無外機用真切無愧先德唯具金剛眼者有以知余言之有在也余耄矣厄于索文者繁多力固拒之此獨樂序之而弗置者憫魔說之害教表正傳以勵世也師諱梵琦其字楚石行業之詳則備見塔銘中其來徵序者得法上首瑩中瓛公也靈隱和尚復公禪師三會語序無相居士坐清淨室想清淨觀忽有沙門號曰曇鍠合掌頂禮而作言曰我師靈隱三坐道場法音之震有如轟雷蟄蟲皆興飛行自在各適恆性又如晨鍾人正昏酣一聞音聲颯然驚覺同袍宗演及諸上首假觚翰力成文句身唯願居士開光明藏洞照篇端使信心者同入如來大華嚴海居士微笑告沙門言爾師所演大乘正法當時聞者注耳熏心一切纏結悉皆解脫既解脫已萬法皆空何況于言爾等結集翰墨假合畢竟大法果何所寄若謂出于翰墨之間湘竹兔毫魚膠松煤不能說法譬如石工手持錐鑿鑿彼崖石為菩薩相首戴華冠面如滿月塗以黃金間以五彩珍珠瓔珞種種具足爾意云何是真佛不沙門白言如是如是復告沙門當觀實相惟是像佛四體奇偉被服絢麗固無異者若比真佛神通變化無量無邊二者孰勝以此思惟佛身充滿遍周沙界豈同崖石拘礙方所況此文句才脫口吻即第二義書之簡編去道逾遠又如畫師和丹抹黛經營想像貌師子王拳毛旋螺利距削鐵威稜氣焰可怖可愕迫而視之勢若飛動爾意云何是師子不沙門白言如是如是復告沙門有像皆假是師子相形模生獰踞視左右亦無異者若比于真奮迅跳擲百獸盡伏二者孰劣以此思惟物唯真者方能動物寓形縑素與木石等況此文句不見形聲徒存其跡用之求道如捕風影沙門當知法尚善權難齊一軌如求兔者必假于蹄欲致魚者定資于筌魚兔既獲筌蹄則棄法因言入言入法空亦復如是是知汝師顯說密說權說實說縱說橫說無非闡揚我佛如來第一了義有能于此文句之中或四三句或五六句乃至無句勿著色求勿著聲求忽然悟入譬一切衆眇者能視跛者能履瘖者能言疾者能起其為霑丐胡可喻云若執文句反為留礙沙門當知有物混然萬有之宗不依形色不墮斷常入離出微內外體淨衆生迷惑無繩自纏大覺世尊大含攝故大慈憫故別有正傳曰思惟修一念不生一法不立一法不立萬象朗融非生非佛非真非妄非小非大非一非多此即所謂常空不有常有不空初無對待亦無能所從古諸師燈燈續焰咸以此故汝師繼承倡明大教一機一言皆轉法輪法不流通是為祕法宜示信心共入圓智既入圓智法何嘗法法而非法是為法法法法之法不可思議我言真實善思念之沙門聞說心大歡喜信解受持作禮而退靈隱大師復公文集敘才體也文其用也天下萬物有體斯有用也若稽厥初玄化流形品物昭著或洪或纖或崇或卑莫不因才之所受而自文焉非可勉強而致也姑就植者言之黃者白者青者紅者黑而澤者紫豔而瘦者翠白而緗緣者五色交糅變幻而不恆者一囿于氣而弗可移也至于洛陽有花則絶類絶倫其植物中之至文者歟又以動者言之雙角而火鬣者兩羽而飛者炳朗而斕班者介而紫暈者鱗而含金者衆彩錯布焜煌而難名者亦局乎氣而不能更也至于岐陽有鳳則超群拔萃其動物中之至文者歟非惟物也而人亦然有一人之人有十人之人有百人之人有千萬人之人有億兆人之人其賦受有不齊故其著見亦不一而足所謂億兆人之人聖人是也千萬人之人賢人是也百十人之人衆人是也衆人之文不足論賢人之文則措之一鄉而準措之一國而準措之四海而準聖人之文則斡天地之心宰陰陽之權掇五行之精無巨弗涵無微弗攝雷霆有時而藏而其文弗息也風雲有時而收而其文弗停也日月有時而蝕而其文弗晦也山崖有時而崩而其文弗變也其博大偉碩有如此者而其運量則不越乎倫品之間蓋其所稟者盛故發之必弘所子者周故該之必備嗚呼此豈非體大而用宏者歟或曰上帝降衷不以知愚而有偏若子之言不幾局囿乎氣而不遷者乎曰非是之謂也其性同其才或不同雖以七十子之從聖人其學各得其才之所近況下此萬萬者乎由是而觀因才所受而自文者人與動靜之物概可見矣濂之學文五十餘年群書無不觀萬理無不窮碩師巨儒無不親自意可以造作者之域譬諸登山攀躋峻絶不為不力而崇顛咫尺不能到也此無他受才之有限也世固有卮匜者焉有壅盎者焉有沼池者焉有溪澗者焉有湖江者焉有溟渤者焉水充其量則止小固不能為大大亦不能為小也濂皆官禁林四方以文來見者甚衆晚閲見心復公之作穠麗而演迤整暇而森嚴劍出襓而珠走盤也發為聲歌其清朗橫逸絶無流俗塵土之思置諸古人篇章中幾不可辨遐邇求者日接踵于門既得之不翅太難珊瑚之貴公卿大夫交譽其賢名聞九天皇上詔侍臣取而覽之特褒美弗置濂因謂當今方袍之士與逢掖之流鮮有過之者焉今來朝京師其徒曇鍠編類成書釐為十卷來徵濂為之序嗚呼文者造化之英華古今之綸貫斷不可闕也有若公者拔于十百之中超然騫舉而慕賢者之閫奧其可傳遠無疑濂烏得不倡體用之說以驗同志哉有訕濂陷于一偏而不可為訓者非知言者也不加功于文者也是膠柱調瑟而弗知變通者也用明禪師文集序昔者蘇文忠公與道潛師游日稱譽之故一時及門之士若秦太虛朝補之黃魯直張文潛輩亦皆願交于潛師相與唱酬于風月寂寥之鄉宛如同聲之相應同氣之相求者有識之士疑之則以謂潛師游方之外者也其措心積慮皆與吾道殊初不可以強而同文忠公百世士及其門者亦英偉非常之流其于方內之學者尚不輕與之進何獨于潛師皆推許之而不置邪殊不知潛師能文辭發于秀句如芙蓉出水亭亭倚風不霑塵土而其為人脫略世機不為浮纍所縛有如其詩此其所以見稱于君子而其遺芳直至于今而不銷歇也歟四明永樂用明詗公蚤從月江印公究達摩氏單傳之旨踰十餘年不懈自覺有所悟入一旦忽慨然曰世諦文字無非第一義吾可以不求之乎于是形之于詩皆古雅俊逸可玩已而著為文辭章句整而不亂言辭暢而不澀論議正而不阿聲名籍籍起群公間會先師黃文獻公游浙水西用明橐其所作來見復成詩八十韻以為贄黃公讀已大加稱賞遂日與黃公游及其東還烏傷用明又賦詩餞之黃公因造序文一篇以遺用明其聲氣之同蓋翕如也今年春余奉詔來京師總修元史適與用明會于龍河佛舍用明出詩文各一巨冊示余曰子黃公之高第弟子也盍為我序其首嗟夫黃公以道德文辭高出一世固當代之文忠公而吾用明之作亦何愧于潛師顧余視黃秦朝張諸君曾不足以供灑掃之役何敢為用明序乎獨念及黃公之門三十餘年知用明受知為深幸與用明交亦似無間諸君之于潛師者序蓋不得不作也雖然大圓鏡中無一物不攝初無一物可攝實有非世諦文字之所能解此蓋用明與月江講之熟矣奚俟余言哉姑攄其鄙見以為敘使後之讀者知古今人未嘗不同不特文忠公之與潛師而已也水雲亭小稿序余在金華山中觀蛻岩張先生集有跋夢堂噩公用堂楩公吳中唱和卷後其言曰詩家寥寥叢林有人殆與唐皎宋潛方駕余竊以謂夢堂之詩幸已見其一二矣而不知用堂所賦為何如意其必高爽而絶塵者乎不然先生何為以如晦參寥擬之也及來南京獲與用堂會于護龍河上間出詩文一帙所謂水雲亭小稿者俾余序之非惟其詩可稱道如先生所示其文亦深穩平實而多言外之趣因竊自歎方外之人其用志不分乃能如斯之工也或謂余曰達摩氏西來其所傳者心法而已矣何以詩文為哉子所取于用堂者淺矣嗚呼是何言歟是何言歟昔我三界大師金口所宣諸經所謂長行即序事之類所謂偈頌即比賦之屬汪洋盛大反覆開演天地日月山川草木城邑人物飛仙鬼趣羽毛鱗甲莫不攝入故後世尊之號曰文佛如此而能文吾惟恐其不能文也大師姑置之不敢妄論次而毗尼諸聖賢暨天親無著台衡清涼諸師或結集羯摩律文或造為百法等論或撰為大經義疏卷軸繁夥汗牛充棟使其不能文其果能致是乎諸師又且置之至于近代尊宿如明教之嵩寶覺之洪北澗之簡無文之粲咸弘宗樹教作為文辭其書滿家殆不可以一二數也嗚呼使無若而人佛法果能光明俊偉有若今日否乎所謂傳心之法固在于所當急而一切棄之而弗講吾未見其可也若夫拈花摘豔勸淫蠱俗者之為則當斥而棄之爾余之有取于用堂者夫豈淺淺者哉抑余聞實際理地一法不立本真獨露迥脫根塵遍覆大千不見其大退藏于密不見其小一涉有為即成剩法況所謂文辭者哉吾知用堂現沙門身應世間相一念不生直超三界其志蓋甚大也寄情翰墨不過游戲而苟以區區之跡觀之則幾于惑者也唐皎宋潛云乎哉用堂族陳氏古靈先生之諸孫今居四明嘗掌內記雙徑已而分座說法緇素咸服出世鄞之護聖奉化之清泰凡禪林若古鼎銘公笑隱欣公斷江恩公儒林若袁文靖公揭文安公黃文獻公皆嘗參叩及交游云丹陽居士賀學仁男賀烺賀炌賀焜施資共刻護法録第七卷計字九千零三百五十五箇該銀四兩六錢七分八厘桐城釋在定對句容潘省耕書進賢陳叔道刻天啓辛酉元年春四月徑山化城識
