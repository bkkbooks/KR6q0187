body:
  text: 皇明金華宋濂著雲棲袾宏輯虞山錢謙益訂國初應召大浮屠塔銘凡十有三人大天界寺住持孚中禪師信公塔銘有序至正十七年化即龍鳳三年大天界寺住持孚中禪師信公示寂之十四年其弟子似桂謁濂于禁林合掌胡跪而為言曰先師之塔在金陵牛首山者則真骨與設利之所藏其別分爪髮衣履而瘞之則四明之太白山也太白之銘佛真文懿大師國清噩公實為之而牛首乃師之全塔反有石而無詞不幾於甚闕典歟居士深究內典為吾徒之所信向海內尊宿多濬發其幽光豈宜於先師獨漠然忘情乎庸敢援例以請濂來江表聞稱師之德者人人不能殊則師誠有道之士也文辭固無益於道後之人欲求其行業則將何所徵之哉因不敢讓而謹書之師名懷信字孚中俗姓薑氏明之奉化人父某嘗為某縣校官母劉氏夜夢大星墮室中有光如火亟取而吞之覺即有孕及誕狀貌異凡子性凝莊不妄舉動唯見沙門至其家必躍而親之稍長受三經於宋進士戴公表元經旨悉暢達然非其好也年十五離家從法華院僧子思執童子之役已而祝髮為大僧受具戒於五臺寺聞延慶半巖全公弘三觀十乘之旨復與之遊久之且歎曰教相繁多浩如煙海苟欲窮之是誠算沙徒自困耳即棄去渡浙河而西凡遇名叢林輒往參扣下語多枘鑿弗合不勝憤悱華藏竺西坦公遷主明之天童景德禪寺師隨質所疑竺西一見知為法器厲色待之不與交一語師群疑愈熾一日上堂舉興化打克賓公案問師師擬曰俊哉師子兒也師自是依止不忍去就維那之職竺西入滅天寧雲外岫公來繼其席命師司經藏管鑰文采漸致彰露不可掩遏泰定丙寅行宣政院請師出世明之觀音師策勵徒衆視分陰若尺壁唯恐其失之天曆己巳遷住補怛洛迦山師不以位望之崇效它浮屠飭車輿盛徒御以誇衒於人自持一鉢丐食吳楚間鎮南王具香華迎至府中虛心問道語中肯綮且出菩提達摩像求贊師運筆無停思辭旨淵邃王甚嘆服宣讓王亦遣使者奉旃檀香紫伽黎衣請示法要師隨其性資而導之二賢王雄藩之望首加崇禮諸侯庶民無不望風瞻敬施資填委姑蘇産奇石師遂購善工造多寶佛塔十三層載歸海東俾信心者禮焉駙馬都尉高麗王繹而吉尼丞相撒敦以師行上聞詔賜廣慧妙悟智寶弘教禪師之號及金襴法衣一襲至正壬午升住中天竺山天曆永祚寺乙酉遷天童不半載間百廢具舉佛殿之役最巨亦撤弊而更新之丹輝碧明照耀海濱師建塔中峰之祖庭慨然有終焉之志己丑冬十月江表大龍翔集慶寺虛席行御史臺奉疏迎師主之龍翔文宗潛邸及至踐祚建佛剎於其地棟宇之麗甲天下其秉住持事者若笑隱欣公曇芳忠公皆名德之士舉行百丈清規為東南之楷則居亡何毀于火忠公新之惟海會堂未就而化僉謂繼忠公之躅非師無以厭衆心往反者三師始赴之暨升座提唱宗乘萬耳聳聽委蛇不迫而玄機自融無小無大皆歡然親戴之或謂龍翔初政稍示威嚴以懲驕慢之習師笑而不答師度衆誠感孚乃出衣盂之私補前未建之堂不日而集會元政大亂戎馬紛紜寺事日見艱窘師處之裕如一不以屑意一旦晨興索蘭湯沐浴更衣趺坐謂左右曰吾將歸矣汝等當以荷法自期勵精進行可也言畢而瞑侍者撼且呼曰和尚去則去矣寧不留片言以示人乎師復瞋目叱之侍者呼不已師握筆書曰平生為人戾契七十八年漏泄今朝撒手便行萬里晴空片雪書畢復瞑時丁酉秋八月二十四日也壽七十八臘六十九停龕七日顏面如生作禮者旁午而名薌蠟炬積如丘陵九月一日荼毗於聚寶山前舍利如菽如麻五色燦爛雖煙所及處亦纍纍然生貯以寶瓶光發瓶外其上足弟子某以某月日坎牛首山東麓為宮藏之復建塔於其上師賦性恬沖喜氣溢顏間生平未嘗以聲色忤人人有犯之者頷首而已然進修極勤自壯至耄默誦法華經一部雖暑爍金寒折膠無一日闕者屢感蓮花香滿院芬郁異常非世間者可比當大明兵下金陵僧徒俱風雨散去師獨結跏晏坐目不四顧執兵者滿前無不擲杖而拜上嘗親幸寺中聽師説法嘉師言行純愨特為改龍翔為大天界寺寺之逋糧在民間者遣官為徵之師之將告終前一日上統兵駐江陰沙州上當晝而寢夢師服褐色禪袍來見上問曰師胡為乎來也對曰將西歸故告別耳上還聞師遷化依與夢中正同大悅詔出內府帛幣助其喪事且命堪輿家賀齊叔為卜金藏舉龕之夕上親致奠送出都門之外其寵榮之加近代無與同者師有五會語録行于世其傳法上首則雙林致凱江心慧恩大慈寶定某剎寶璋瑞岩文淵保福宗秩翠山志理淨土永顯妙智淨琚定光文托某剎明晟天華士謙豐安至慶聖泉普彝福林道巽五峰普錫石門永泰霞嶼元良廣祜永瑰皆其人也惟昔天童坦公以一真之學上承松源四葉之傳黑白趨慕儼如毛之有麟甲之有龜也師亦以真承之故能樹精進幡持金剛劍入般若關巋然為一代人天之師此無他真則不妄不妄則近佛之道矣宜乎遭逢維新之朝上簡帝心昭被殊渥至親枉乘輿而臨幸之龍光赫奕絢耀吐吞至今山川尚有餘輝是當揭之崇碑明示方來使學佛者有所歆豔而起信焉系之以銘曰乾竺之道貴乎一真真則非妄日趨精明煌煌松源其道孔熾正暢旁達非真曷致惟廣慧師起於海東歷抵諸師罕契其逢太白諸峰上摩穹碧舉頭觸之堅如鐵壁一喝轟霆豈直耳聾毫髮之端妙義俱融天高日晶森羅萬象不即不離了明諸相五坐道場六振其宗一音演法聞者心空此妙法華權實雙舉我受我持忘其寒暑天香何來鼻觀先聞豈伊天女吐茲奇芬誰謂靈通與道乖牾我尚不有亦何心故世緣已竭幡然西歸夢寐潛通皇情為怡烈火如輪煆茲玄魄設利燦然逐煙而結在昔諸師何人不然誕勝真漓多隨物遷師我藩維師我干櫓舍我而逝有生孰度寵恩聯翩來自九天師則何憾名與道傳太史造銘建于牛首此山若移斯文方朽時上為吳國公甫定金陵戎馬倥傯乃崇信法門加禮于信公若此此國初護法第一盛事宜表而出之天界善世禪寺第四代覺原禪師遺衣塔銘洪武四年化浮圖之為禪學者自隋唐以來初無定止惟借律院以居百丈大智禪師方建叢林規矩至宋而樓觀方盛然猶不分等第惟推在京巨剎為之首南渡後始定江南為五山十剎俾其拾級而升黃梅曹溪諸道場反不與其間則其去古也益遠矣元氏有國文宗潛邸在金陵及至臨御詔建大龍翔集慶寺獨冠五山蓋矯其弊也國朝因乏錫以新額就寺建官總轄天下僧尼當是時覺原禪師實奉詔蒞其職夫當興王之運親受聖皇付囑以統釋教之事誠優鉢曇華千年一現者也其順寂也惡可不勒群行以詒後世乎師諱慧曇覺原其字也姓楊氏天台人父某母賈氏夢明月自天而墮取而吞之遂有娠夢吞明珠有娠及生容貌嶷如長不與群童狎每入塔廟輒對法王瞻禮父母察其有方外緣俾依越之法果寺比丘某法果寺苾芻大均年十六為大僧受具戒已而學律于明慶杲公習教于高麗教公聽止觀于上竺澄公真積力久忽拊髀嘆曰毗尼之嚴科文之繁固吾佛祖方便示人若欲截斷衆流一超直入非禪波羅蜜曷能致之時廣智禪師笑隱欣公敷揚大法于中天竺海內仰之如景星鳳凰師往造焉備陳求道之切廣智斥曰從外入者即非家珍道在自己奚向人求耶師退凝神獨坐一室久之未有所入廣智一日舉百丈野狐語師大悟曰佛法落我手矣只為分明極翻成所得遲廣智曰爾見何道理敢爾大言耶師展雙手曰不直一文錢廣智頷之乃命侍香師造廣智智問曰何處來師對曰遊山來智曰笠于下拶破洛浦遍參底作麼生師曰未入門時呈似了也智曰即今因甚不拈出師擬議智便喝師當下脫然有省他日智展兩手示師曰八字打開了也因甚不肯承當師曰休來鈍置智曰近前來為汝説師即掩耳而出智頷之天曆二年己巳龍翔新創文宗命廣智為開山住持師實從之為掌藏鑰師隨至掌藏鑰繼分座相與激揚祖佛機緣裨贊法門綱紀識見出群聲譽彰著明年庚午廣智如燕都見文宗于奎章閣同行者皆股栗不能前師獨神氣恬然廣智嘆曰真吾家師子兒也及歸適寺新鑄銅鐘成廣智曰吾聞非福慧雙全者莫先鳴鐘即令師擊之至順二年辛未奉行臺檄出世牛頭山之祖堂寺師畚剔穢荒為之起廢使殿閣一新且改其號為祖山寺至正三年癸未遷住清涼廣慧禪寺師撙節諸用其起廢一如牛頭帝師嘉之授以淨覺妙辨禪師之號十五年乙未復遷保寧禪寺十六年丙申王師定建業師謁皇上于轅門上見師氣貌異常歎曰此福德僧也命主蔣山太平興國禪寺時當儉歲師化食以給其衆無闕乏者山下田人多欲隸軍籍師懼寺田之蕪廢也請于上而歸之山之林木為樵者所剪伐師又陳奏上封一劍授師曰敢有伐木者斬至今蓋鬱然云踰年丁酉賜改龍翔為大天界寺詔師主之每設廣薦法會師必升座舉宣祕法要車駕親帥群臣幸臨恩數優洽吳元年丁未太內新成將登寶位詔師引千二百衆披閲大藏真經用嚴清淨覺地師升師子座舉揚大法上親帥群臣幸臨瞻聽師法音洪暢妙契皇情為之大悅出內帑帛三十匹以施自是每設廣薦法會師必升座説法車駕幸臨恩數優洽遠邇學徒聞風奔赴堂筵至無所容凡祖庭規矩師備行之濟濟繩繩粲然攸敘觀者唶唶曰三代禮樂無以加焉先是僧堂寮庫有司權以貯戎器久而不歸上見焉亟命相國李韓公出之且親御翰墨書天下第一禪林六大字懸于三門洪武元年戊申春三月開善世院特視從二品特授師演梵善世利國崇教大禪師住持大天界寺統諸山釋教事頒降誥命俾服紫詔師領院事服紫衣及金襴方袍御製誥命其略曰自豫肇業命爾匡宗德風振起于法門景運贊襄于家國特授演梵善世利國崇教大禪師住持大天界禪寺統諸山釋教事當是時遴選有序銓衡至公宗社有志之流山林抱道之士聯鑣而迭出咸居名山大剎焉自古崇尚法門于斯為盛章縫之士以釋氏為世蠹請滅除之上以其章示師師曰孔子以佛為西方聖人以此知真儒必不非釋非釋必非真儒矣上亦以佛之教陰翊王度卻不聽上聞寺僧多行非法命師嚴馭之師但誘以善言諸郡沙門汙染習俗實悖教範或勸當痛治師曰諺有云大林有不材之木能盡去乎祗益釋門之纍耳事呈露者勿恕可也二年乙酉冬中風得瘖疾遂罷院事三年庚戌春三月病良已燕處東軒誘接來學匡弘祖道孜孜無少懈夏六月奉使西域廷議西域未臣伏上以彼域敦尚佛乘特命師往詔尚書趙某為之副師承命即日登途自浙閩而之洋凡歷國邑布宣天子威德莫不聞而來歸四年辛亥秋七月至省合剌國道憩僧伽羅國布宣天子威德其國王喜甚館于佛山寺佛山精舍待以師禮寅夜參承令闔國臣民悉得瞻禮師隨機開導咸蒙法益九月庚午示微疾食飲弗進甲戌見王有欲歸之意王令名僧咸來相慰王命醫進藥餌師從容謝卻之王與群臣惶惶惕惕若失所恃乙亥沐浴更衣呼左右謂曰豫不能復命矣亟命尚書至謂曰某幻緣終此不能復命矣跏趺端坐夜參半問云日將出否曰未也已而復問至于四三曰日出矣怡然而逝其日蓋丙子云壽若干臘若于世壽六十有八僧臘五十有三踰五日留七日顏貌如生王大敬嘆斫香為棺聚香代薪築壇而荼毗之王與百僚送至壇下命比丘千餘旋繞誦諸陀羅尼咒至火滅方已拾靈骨祔葬其國舍利塔中時有白煙一道上燭于天薪盡火滅舍利無算舌根齒牙不壞乃收舍利靈骨及不壞者祔葬其國辟支佛塔先是彼佛曾亦懸記今之開祔適符其言非偶然也七年甲寅秋九月丙寅同門友天界住持宗泐奉遺衣藏于南京聚寶山雨花臺之側云甲寅冬尚書趙某還朝奏陳其事皇上聞而嗟悼敕天界蔣山二寺住持宗泐等以師之遺衣藏于雨化臺之左云師廣顙豐頤平頂大耳面作紅玉色耳白如珂雪目光爛爛射人學者見之不威而懾及即之也盎然而春溫其遇禪徒隨機而應未嘗務為奇巧聞者自然有所悟入嘗示衆曰春風浩浩春日遲遲黃鸚啼在百花枝箇中無限意消息許誰知語未既遽有僧問曰心意識遏捺不住時如何師厲聲曰是誰遏捺師室中謂僧曰二六時無你啖啄分無你趣向分會麼僧罔措師曰未明三八九難免自沉吟師五會説法門人輯録成書欲傳後學師則毅然斥去之遭際昌辰寵賚便蕃凡位居臣列被召必以名惟師誥敕咸以大禪師為稱前所未有也雖位隆望重恆處之若寒素無毫髮自矜意為人寡言笑喜怒任真不能以貴賤異其顏色當勾稽簿書至不能辨真贋卒為下人所欺亦弗恤也然而毗翊宗教無一息敢忘廣廈細旃之間從容召對據經持論每罄竭其蘊蓄松園之復釋道私祖之免皆師之所請也師平生不輕度弟子其嗣法上首蔣山法印國清導升天寧純一道場願證中竺淨戒天界行椿育王常在皆有聞叢林間願證應緣入仕為應奉翰林文字翰林李證親預入室大懼師行泯沒件繫成書授之淨戒以戒尚風義死生不易其操必能昭廓其幽潛今證已亡矣戒果能謁濂求為塔上之銘濂嘗與師遊而與願戒交尤洽不得以不敏辭濂聞之龍翔禪林實甲天下創建之初非名德之重莫能主之是故廣智握真如印柄道明宗常使輝光照燭于幽隱矣及今六合載清真人撫運崇尚佛乘賜額建官以統馭其衆非得法于廣智者亦孰能當其始乎嗚呼何其規重矩疊而一倡一新也在昔馬駒蹴踏機用森嚴出其門者無非龍象有是學者固有是師先德固亦然矣由是方之廣智之傳實由正宗師之所契親得其髓固非常情之可擬議然稱人之善必本具父師厚之至也濂敢竊取茲義序其事而為之銘銘曰金陵有寶剎昔為潛龍居飛翔起中天樓閣重重現聖皇握金輪重馭四大海易為大天界以表正法故惟師蚤修證廣智法會中惟師乘願力示現優曇花帝命作總持欲符于前烈弘護法王法如寶雙眼目袛恐昏翳蝕光明不遍照況能攝威儀見者生敬畏統率諸僧伽無不從化者出持使者節直抵中印土道憩一王城懇請為説法群羌如見佛膜拜稽首禮佛法遍天下根本中印土受命宣仁德以彼尚佛乘道憩僧伽羅群羌如見佛膜拜稽首禮懇請為説法四大本假合笑指空中雲聚散不留迹築壇聚衆香付之大火聚沙門逾一千圍繞作梵唄收骨藏勝塔作鎮于異域闔國諸沙門圍繞作梵唄拾舍利靈骨祔葬辟支迦異域王臣衆瞻禮祈永鎮眷此行道所何以示四衆同袍有大德假物以顯理遺衣在故篋見衣如見師瘞之雨華臺當與靈骨同我知此衣中何啻千萬縷絲絲具暖性性圓即菩提師性千古存是有無邊身譬之虛空相普現于一切何假有漏形方號為真實實際是真空永離于言説我持不壞筆太虛以為紙銘此無縫塔了不見一字若以兩耳觀始造不二義雲棲刻本與翰苑續集稍異因附注之按洪武實録庚戌夏六月癸亥命僧克新等三人往西域招諭吐番仍命圖其所過山川地形以歸蓋即曇公奉使事也實録與大政記俱不載趙尚書為副之事洪武中列卿亦無所謂趙尚書者恐即是年三月趙秩奉使之訛也集稱省合剌國即榜葛剌西印度國為釋迦得道之所而雲棲本稱僧伽羅國遍考未聞也似當以翰苑續集為正志之以俟再考洪武實録二十一年二月重建天界善世禪寺于城南初元文宗天曆元年始建大龍翔集慶寺在今都城之龍河洪武元年春即本寺開設善世院以僧慧曇領教事改賜額曰大天界寺御書天下第一禪林榜於外門四年改曰天下善世禪寺五年又改為善世法門十四年革善世院十五年設僧録司于內至是燬于火上命徙于京城南定林寺故址仍舊額曰天界善世禪寺李大猷傳附李願證字大猷姑熟人父深肥遁山林以書詩為教自號靜軒母陶氏無嗣晝夜禱於觀自在佛夜夢一比丘尼乘白鹿車抱嬰兒授之曰此福慧兒也善視之既而有娠生未逾月兒忽身熱如火不進乳陶方以為憂復夢前比丘尼持栗數顆嚼食之夢覺兒汗如雨遂瘳年四歲嬉戲父膝下因授以記姓書兒曰此有何義讀之將奚為父大驚更以孝經一誦即能暗記稍長益駿發異常父嘗手書首楞嚴圓覺二經逐卷取讀之力白父母學佛於城南頓覺蘭若祝髮受具戒制今名願證走大石山中與僧法秀遊秀有高行願證期取法焉久之杖錫來南京謁淨覺師於天界禪林師見其俊邁命為侍者謂之曰子才鋭甚宜留意文學他日期子弘宗扶教也於是獨坐一室竺墳魯典無不研窮之著為文辭森然有奇氣一時名公巨卿皆愛敬之與其相倡酬師尋命掌書記洪武戊申出世嘉興水西寺庚戌遷吳興之道場未幾退居武康山中著觀幻子內外篇以合儒釋一貫之妙其內篇曰釋教其目十則宗本教述會源非即必悟示證最志古今不昧寂動也外篇曰循本其目如釋教之數則性上性中性下人物道述克己至樂言命為己學方也曰適治其目如循本之數則禮樂封建井田兵問用刑尚德儒吏經權三尚圓象也曰史論其目如適治之數而逾其二則宋襄儀秦秦漢文武儒老魏吳漢晉虛玄梁上梁下隋唐後周也皆踔厲前人其光燁燁不可襲祕聲名突起縉紳間癸丑之冬願證還天界濂時侍皇上升武樓遙望禪林顧濂曰其中有良僧乎濂對曰近有二僧從吳越中來皆能文辭上曰其名謂何濂對曰一則願證一則證傳上曰試取觀之濂因進證傳文一編上親覽終卷曰是或儒者之所不及復問願證所著濂對曰太常丞張丁家有往復論性書遂遺中官召丁攜書至上復覽如前喜曰論議甚高其鐵中錚錚者乎明日召見謹身殿慰勞備至敕吏部皆除應奉翰林文字賜第太平門及妻妾各二凡日用百需之物無不周復命中祕給書籍令閉門習讀三月俟髮長勝冠然後蒞職後三月願證有疾上意其沉鬱多痰賜藥吐之疾稍減已而復劇中使問疾者絡繹于道竟不起病將革時唯仰首言曰死則死所可憾者受上之深恩不能報爾遂口授其友草謝表表未終而逝上夜夢願證來謝服大布寬衣巾稍欹叩其家人服色正同因移棺撼巾不正上尤嗟異焉時洪武甲寅春二月也壽三十七云史官曰昔在宋時仲靈嵩師鐔津李氏子也每夜戴觀自在像誦其號十萬乃寢自是世間章句不學而能遂作原教論明儒釋一貫以抗諸儒之説韓魏公琦歐陽公修皆尊禮之今願證亦李氏子其母亦纍禱觀音而生亦博極群書亦著為論説以明儒釋之道亦異天哉豈弘宗扶教代當有其人歟濂固不敢謂願證之如仲靈也其志之所存抑果有不同者歟然仲靈進正宗記僅得仁宗賜紫方袍及明教之號願證則屢被龍光親拔為王官使其得壽則道行于時澤兼被于蒸黎不特如仲靈專輔本教而已木方榮而風折之悲夫濂與願證交愛才之念不下於韓歐二公弗忍其名不傳也故徇全室泐公之請具著其事於篇高皇帝御製跋儒僧文云侍講學士宋濂言及有僧名傳者儒釋俱長邇來以文求臣改益臣試開展過目篇篇有意文奇句壯奚啻干專門之學臣是以敢煩聖聽誦之再三果如濂言然僧所以求改益者非也朕知僧之意有所精學卒無揚名之處故特求名儒以改益之由此而揚名欲出為我用濂曰恐無此乎朕謂濂曰云何如是觀人古賢人君子託身隱居非止一端未必執于本業而不為君用朕觀此僧之文文華燦爛若有光之照耀無玄虛弄假之訛語句真誠貼體孔門之學安得不為用哉洪武八年實録亦同按傳即郭傳字文遠會稽人與願證同召後升修起居注遷考功監令高皇帝號咷求賢不遺于禪衲正欲其居官食祿輔君澤民闡揚如來博修之道非欲以儒易釋以利祿破苦空也願證輩俱未竟厥施而姚恭靖卒以比丘現身高皇帝之作人遠矣哉至宗泐辭官則又反覆讚嘆權實雙顯非大聖人不能與于斯也佛日普照慧辨禪師塔銘洪武三年化皇帝端居穆清念四海兵爭將卒民庶多歿於非命精爽無依非佛世尊不足以度之惟洪武元年秋九月詔江南大浮屠十餘人於蔣山禪寺作大法會時楚石禪師實與其列師升座説法以聳人天龍鬼之聽竣事近臣入奏上大悅二年春三月復用元年故事召師説法如初錫晏文樓下親承顧問暨還出內府白金以賜三年之秋上以鬼神情狀幽微難測意遺經當有明文妙揀僧中通三藏之説者問焉師以夢堂噩公行中仁公等應召而至館于大天界寺上命儀曹勞之既而援據經論成書將入朝敷奏師忽示微疾越四日趣左右具浴更衣索筆書偈曰真性圓明本無生滅木馬夜鳴西方日出書畢謂夢堂曰師兄我將去矣夢堂曰子去何之師曰西方爾夢堂曰西方有佛東方無佛耶師厲聲一喝泊然而化時七月二十六日也天界住持西白金公法門猶子也為治後事無不盡禮時制火葬有禁禮部以聞上特命從其教荼毗之餘齒牙舌根數珠咸不壞設利羅粘綴遺骨纍纍然如珠其弟子文晟奉骨及諸不壞者歸于海鹽卜以八月二十八日建塔於天寧永祚禪寺葬焉嗣法上首景瓛復偕文晟以仁公所造行狀來徵銘仁公博通內外典文辭簡奧有西漢風其言當可信弗誣謹按狀師諱梵琦楚石其字也小字曇耀明州象山人姓朱氏父杲母張氏張夢日墮懷而生師方在襁褓中有神僧摩其頂曰此佛日也他時能照燭昏衢乎人因名之為曇耀云年七歲靈性穎發讀書即了大義或問所嗜何言即應聲曰君子喻於義至於屬句倣書皆度越餘子遠近號為奇童九歲棄俗入永祚受經於訥翁謨師尋依晉翁詢師於湖之崇恩詢師師之從族祖也趙魏公見師器之為鬻僧牒得剃染為沙門繼往杭之昭慶受具足戒年已十有六矣詢師遷住道場師為侍者居亡何命司藏室閲首楞嚴經至緣見因明暗成無見處恍然有省歷覽群書不假師授文句自通然膠於名相未能釋去纏縛聞元叟端公倡道雙徑師往問云言發非聲色前不物其意何如元叟就以師語詰之師方擬議欲答元叟叱之使出自是群疑塞胸如填巨石會元英宗詔粉黃金為泥書大藏經有司以師善書選上燕都一夕聞西城樓鼓動汗如雨下拊几笑曰徑山鼻孔今日入吾手矣因成一偈有拾得紅爐一點雪卻是黃河六月冰之句翩然南旋再入雙徑元叟見師氣貌充然謂曰西來密意喜子得之矣遽處以第一第二座且言妙喜大法盡在於師有來參叩者多令師辨決之元泰定中行宣政院稔師之名命出世海鹽之福臻遂升主永祚永祚師受經之地為創大寶閣範銅鑄賢劫千佛而毗盧遮那及文殊師利普賢千手眼觀音諸像並置其中復造塔婆七級崇二百四十餘尺功垂就勢偏將壓師禱之夜乃大雨風居氓聞鬼神相語曰天寧塔偏亟往救之遲明塔正如初遷杭之報國轉嘉興之本覺更搆萬佛閣九楹間宏偉壯麗儼如天宮下移人世帝師嘉其行業賜以佛日普照慧辨禪師之號佛日頗符昔日神僧之言識者異焉會報恩光孝虛席僉謂報恩一郡巨剎非師莫能居之師勉徇衆請而往尋退隱永祚築西齋為終焉之計至正癸卯州大夫強師主其寺事時塔燬于兵師重成之景瓛為鑄寶壺冠于顛感天花異香之祥師舉景瓛為代復歸老于西齋云師為人形軀短小而神觀精朗舉明正法滂沛演迤有不知其所窮凡所蒞之處黑白嚮慕如水歸壑一彈指間湧殿飛樓上插雲際未嘗見師有作君子謂師縱橫自如應物無迹山川出雲雷蟠電掣神功收斂寂寞無聲由是內而燕齊秦楚外而日本高麗咨決心要奔走座下得師片言裝潢襲藏不翅拱璧師可謂無愧妙喜諸孫者矣師世壽七十五僧臘六十三得法者曰祖光曰景瓛受度者曰明誠曰正定等其説法機用則見於六會語其遊戲翰墨則見于和天台三聖及永明壽陶潛林逋諸作別有淨土詩慈氏上生偈北遊鳳山西齋三集通合若干卷並傳于世豫慕師之道甚久近獲執手護龍河上相與談玄因出賸語一編求正師覽已歎曰不意儒者所造直至于此善自護持師之善誘推此一端亦可概見及聞師歿與國史危公哀悼不自勝危公亦深知師者也銘曰大鑒密旨餘十傳妙喜起蹴龍象筵有如大將據中堅鐵卒十萬佩櫜鞬或觸之者命髮懸誰歟五世稱象賢佛日曉出瀛海𤲬紅焰閃閃行中邊流光所至無幽玄憶初飛西來北燕彤樓畫鼓金星纏一擊三際皆廓然火中新敷清淨蓮紺色涵空絶蔓牽自茲口噴百丈泉洗滌五濁離腥羶內而諸夏外朝鮮紛紛來者人駕肩示以實相非空言塔廟赫赩名山川一佛能變萬與千會萬歸一道則全不識誣為有漏緣帝敕中使來傳宣鍾山説法超沉綿萬人瞻依曲兩拳一朝入滅同蛻蟬西方彈指即現前白玉樓閣琉璃田金鈴寶樹演真詮師之往矣神弗遷寂光常定無偏圓我作銘詩翠琰鐫昭朗盛烈垂年年高皇帝每遇大浮屠輒咨詢鬼神情狀不一而足其所以拔濟幽明制作禮樂蓋皆原本于此世之儒者拾宋人唾餘便欲撥去一切輪回因果多見其不知量也雲棲曰本朝第一流宗師無尚於楚石築石室扁曰西齋有西齋淨土詩一卷彼自號禪人而淺視淨土者可以深長思矣愚庵及公有悼楚石和尚詩三首其一曰潦倒奚翁的骨孫高年説法屢承恩麻鞋直上黃金殿鐵錫時敲白下門煩惱海中垂雨露虛空背上立乾坤秋風唱徹無生曲白牯狸奴亦斷魂其二曰聖主從容問鬼神當機一默重千鈞荼毗直下金門詔火聚全彰淨法身平地驚翻三世佛等間瞎卻一城人大悲願力知多少枯木花開別是春其三曰匡床談笑坐跏趺遺偈親書若貫珠木馬夜鳴端的別西方日出古今無分身何啻居天界弘法毋忘在帝都白髮弟兄空老大剎竿倒卻要人扶寂照圓明大禪師壁峰金公設利塔碑銘洪武五年化禪師諱寶金族姓石氏其號為壁峰生于乾州永壽縣之名胄父通甫宅心從厚人號為長者母張氏亦嗜善弗倦有桑門持鉢乞食以觀音像授張且屬曰汝謹事之當生智慧之男未幾果生禪師白光煜煜然照室幻恆多疾纏綿衾枕間父母疑之曰此兒感祥徵而生其宜歸之釋氏乎年六歲依雲寂溫法師為弟子既剃落受具戒遍詣講肆窮性相之學對衆演説纍纍如貫珠聞者解頤已而撫髀嘆曰三藏之文皆標月之指爾昔者祖師説法天華繽紛金蓮湧現尚未能出離生死況區區者邪即更衣入禪林時如海真公樹正法幢於西蜀晉雲山中亟往見之公示以道要禪師大起疑情二三年間寢食為廢偶攜筐隨公擷蔬於園忽凝坐不動歷三時方寤公曰爾入定耶禪師曰然曰汝何所見禪師曰有所悟爾曰汝第言之禪師舉筐示公公非之禪師置筐于地拱手而立公又非之禪師厲聲一喝公奮前揕其胸使速言禪師築公胸仆之公猶未之許笑曰塵勞暫息定力未能深也必使心路絶祖關透然後大法可明耳禪師聞之愈精進不懈遂出參諸方憩峨眉山誓不復粒食日採松柏啖之脅不沾席者又三年一念不生前後際斷照體獨立物我皆如自是入定或纍日不起嘗趺坐大樹下溪水橫逸人意禪師已溺死越七日水遏競往視之禪師燕坐如平時唯衣濕耳一日聽伐木聲通身汗下如雨嘆曰妙喜大悟十有八小悟無算豈欺我哉未生前之事吾今日方知其真耳急往求證於公反覆相辨詰甚力至于拽傾禪榻而出公曰是則是矣翼日重勘之至期公于地上畫一圓相禪師以袖拂去之公復畫一圓相禪師于中增一畫又拂去之公再畫如前禪師又增一畫成十字又拂去之公視之不語復畫如前禪師于十字加四隅成卍文又拂去之公乃總畫三十圓相禪師一一具答公曰汝今方知佛法宏勝如此也百餘年間參學有悟者世豈無之能明大機用者寧復幾人無用和尚有云座下當出三虎一彪一彪者豈非爾邪爾宜往朔方其道當大行也無用蓋公之師云先是禪師在定中見一山甚秀麗重樓傑閣金碧絢爛諸佛五十二菩薩行道其中有招禪師謂曰此五臺山祕魔巖也爾前身修道其中靈骨猶在何乃忘之既寤遂遊五臺山道逢蓬首女子身被五綵斃衣赤足徐行一黑獒隨其後禪師問曰子何之曰入山中爾曰將何為曰一切不為良久乃沒叩之同行者皆弗之見或謂為文殊化身云禪師乃就山建靈鷲庵四方聞之不遠千里負餱糧來獻者日繽紛也禪師悉儲之以食遊學之僧多至千餘人雖丁歲大儉亦不拒也至正戊子冬順帝遣使者召至燕都慰勞甚至天竺僧指空久留燕相傳能前知號為三百歲人敬之如神禪師往與叩擊空瞪視不答及出空嘆曰此真有道者也冬夕大雪有紅光自禪師室中起上接霄漢帝驚嘆賜以金紋伽黎衣遣歸明年己丑復召見延春閣命建壇禱雨輒應贈以金繒若干禪師受之即以拯飢乏民又明年庚寅特賜寂照圓明大禪師之號詔主海印禪寺禪師力辭名香法衣之賜殆無虛日自丞相而下以至武夫悍將無不以為依皈已而懇求還山洪武戊申大明皇帝即位于建業明年己酉燕都平又明年庚戌詔禪師至南京夏五月見上于奉天殿且曰朕聞師名久以中州苦寒特延師居南方爾遂留于大天界寺時召入問佛法及鬼神情狀秦對稱旨又二年辛亥冬十月朔上將設普濟佛會于鍾山命高行僧十人蒞其事而禪師與焉賜伊蒲饌于崇禧寺大駕幸臨移時方還明年壬子春正月既望諸沙門方畢集上服皮辨服親行獻佛之禮夜將半敕禪師于圜悟關施摩陀伽斛法食竣事寵賚優渥夏五月悉鬻衣盂之資作佛事七日乃示微疾上知之親御翰墨賜詩十二韻有玄關盡悟已成正覺之言天光昭回人皆以為榮時疾已革不能詣闕謝至六月四日沐浴更衣與四衆言別正襟危坐目將瞑弟子祖全智信請曰和尚逝則逝矣不留一言何以暴白於後世邪禪師曰三藏法寶尚為故紙吾言欲何為夷然而逝世壽六十五僧臘五十又九後三日奉龕荼毗於聚寶山傾城出送香幣積如丘陵或恐不得與執紼之列露宿以俟之及至火滅獲五色舍利齒舌數珠皆不壞紛然爭取灰土為盡禪師體貌豐偉端重寡言笑福慧雙足所至化之故其在山也捧足頂禮者項背相望其應供而出也持香華擊梵樂而迎者在在如是不啻生佛出現其行事多可書弟子散之四方無以會其同祖全等將以某年月建塔于某山制掇其大略請安次王普為狀一通徵濂為之銘上祀方丘宿於齋居濂與禮部尚書陶凱實侍左右上出賜禪師詩令觀之其稱禪師之德為甚備夫聖人之言天也因知禪師之道上與天通下從人望雖不獲遂名山大剎要可以無憾然而月林觀公遠承臨濟正宗其第五傳曰無用寬公竺源盛公竺源之道行于南無用之道著于北禪師蓋無用諸孫也濂近銘竺源之墓今又述禪師之行而文諸碑嗚呼哲人云亡奈何不興大法衰微之嘆乎銘曰臨濟崇崇西來正宗益衍以鴻三虎怒投中有一彪氣可吞牛教相紛拏爪蔓交加入海算沙乃易禪衣乃抵勝師乃治其疵棲身孱顏絶去八還入第一關河水侵淫趺坐樹陰爰濕我襟我松我粻我泉我漿渴飢兩忘實相圓通無物不容悟其本空玄徵肇胎涉彼五臺樓閣門開南奧北湖方衣圓顱水赴雲趨無間儉豐香積之歲且妥其躬其名上聞便蕃宸恩來自帝閽於赫皇明遣使奉迎館于神京龍文成章日晶月光鬱其寵榮四衆所依胡不寧茲而亟其歸泰山崔崔一且其頽靡人不哀有崇者岡白虹吐芒設利之藏金陵梵剎志載嘉靖元年碧峰寺記云洪武五年壬子敕工部黃侍郎重建先是碧峰禪師奏上建寺請名高皇帝御賜號因以題寺按建寺之年即禪師示寂之歲也宋文憲碑文立于次年癸丑七月既望何以不載建寺緣起章明法門盛事耶國初工侍僅黃立恭一人考之欽録集洪武二十年五月鞍轡局大使黃立恭于大庖西奉聖旨至二十一年戊辰御製修報恩寺塔記始稱工部左侍郎黃立恭昔本技流今職工部安得于五年先官工侍耶記稱師棄髮存鬚出使西洋諸國授爵固辭俗所傳西洋記稱碧峰同三寶太監下西洋事蓋委巷小人之語寺記殆承此訛也鄭和等使西洋始自永樂七年師示寂久矣如有之則文憲于天界曇公記奉使西域事甚詳何獨略于師耶記又稱師祈雨靈異為真人所譖投之水火無損後辭歸西域巳時陛辭期午時出潼關是日以上賜袈裟遣守關吏奏上師生于乾州名族而曰西域胡僧示寂金陵荼毗聚寶山而曰辭上西歸師世壽六十五而記稱高帝讚碧峰像云年逾七十幾益又謬矣國初大浮屠惟碧峰最著流傳神異未易更僕寺記所載皆非實録他可知已示現微權與諸法實相無二末法無正知見往往以神通相眩惑請以文憲塔銘正之丙辰冬十一月錢謙益謹跋佛性圓辨禪師淨慈順公逆川瘞塔碑銘有序洪武六年化濂自幼至壯飽閲三藏諸文粗識世雄氏所以見性明心之旨及遊仕中外頗以文辭為佛事由是南北大浮屠其順世而去者多以塔上之銘為屬衰遲之餘諸習皆空凡他有所請輒峻拒而不為獨於鋪敘悟緣評騭梵行每若不敢後者蓋欲表般若之勝因啓衆生之正信也有如佛性圓辨禪師者濂安得而不銘諸按其嗣法弟子行圓所造年譜師諱智順字逆川溫之瑞安陳氏子也有翁媼精修白業既沒蓮華現門屏間師之大父母也翁生道羡娶婁氏屢至哭子其情不勝哀乃塑智者大師像事之一夕夢僧頂有圓光逆江流而上招婁氏謂曰吾當為汝之子及寤而有娠師既生美質夙成年五歲即從季父學季父引生徒渡溪抵萃墅師力欲相隨季父怒麾之還已而溪暴漲季父生徒皆溺死然自少不喜畜髮翛然有塵外趣婁氏弗能留七歲俾依仲父慧光於崇興精舍稍長受具戒於天寧禪院其父亦樂修淨觀俄離俗同居精舍中精舍將圮師即協衆力葺之時年甫十八君子固知其為適用之材暨習法華經歷三月通誦其文慧光尤器之使出遊永嘉無相院覺源璿法師愛師俊朗挽其為嗣會橫雲嶽法師大弘三觀十乘之旨于水心法明寺師往而受其説衆推為上首居亡何走鴈山雙峰不契所言復走千佛寺毒海清法師方開演長坐御講請師為綱維之職軌範為之肅然毒海入寂師感世相無常嘆曰義學雖益多聞難禦生死即禦生死舍自性將奚明哉遂更衣入禪復走閩之天寶山參鐵關樞公公圓悟八世孫也授師以心要遵而行之似有階漸欲依公而住公叱曰丈夫不於大叢林與人相頡頑局此蠡殼中邪拂袖而入師下旦過寮潸然而泣或憫之慰曰善知識門庭高峻拒之即進之也公聞其事笑曰吾知其為法器姑相試爾乃延入僧堂中師壁立萬仞無所回撓雖晝夜明暗亦不能辨踰月因如廁便旋睹中園匏瓜觸發妙機四體輕清如新浴出室一一毛孔皆出光明目前大地倏爾平沈喜幸之極亟上方丈求證適公入府城師不往見水濱林下放曠自如已而歷抵諸師皆不合又聞千巖長禪師鳴道烏傷伏龍山往叩之其所酬應者皆涉理路飄然東歸燃指作發願文細書於紳必欲見道乃已復自念非公不足依洊走閩中見焉公偶出遊遙見師喜曰我子今來也越翌日師舉所悟求證公曰此第入門耳最上一乘則邈在萬里之外也乃囑之曰汝可悉棄前解專於參提上致力則將自入閫奧矣師從公言踰五閲月一日將晚參擬離禪榻忽豁然有省如虛空玲瓏不可湊泊厲聲告公曰南泉敗闕今已見矣公曰不是心不是佛不是物是何物師曰地上磚鋪屋上瓦覆公曰即今南泉在何處師曰鷂子過新羅公曰錯師亦曰錯公曰錯錯師觸禮一拜而退公曰未然也公披大衣鳴鍾集四衆再行勘驗師笑曰未吐辭之前已不相涉和尚眼目何在又為此一場戲劇邪公曰要使衆皆知之遂將宗門諸語一一訊師師一一具答公然之復囑曰善自護持勿輕泄也久之令掌藏室尋請分座説法公既捐館師嗣住院事非惟舉唱宗乘寺制有未備悉補足焉甓驛道達於山門踰六七里擇地搆亭以增勝概衆方賴之忽爾棄去過杉關抵百丈上迦葉峰渡江入淮禮諸祖之塔經建業回浙中超然如野鶴孤雲無所留礙尋返永嘉會王槐卿造報恩院于瑞安大龍山首延師為之主參徒寢盛至八百指師建僧堂棟居之石室巖禪師主江心豔師之為復以第一座處師師翩然而往未幾又以何山精舍棟宇湫隘不足以容衆拓之為大伽藍為建大雄寶殿及法堂三門兩廡方丈庫院之屬而塑像繒壁諸莊嚴事亦次第告完平陽吳德大創歸原寺歸原援報恩之例請師開山師慈憫心切亦不欲拒既至為造小大鼓鍾魚板法器而叩擊之授職分班升堂入室皆按清規而行時東海有警元帥達忠介公帥師鎮台遣使聘師入行府師以達公方有事干戈絶之弗見達公慕詠弗置篆逆川二字遺之師因飯囚戒其勿萌遁逃心即重見日月不久而赦書至周吳二囚以師為神其後山寇竊發二囚實為渠魁所經之處焚毀欲盡歸原報恩以師故獨存師終不遑寧處避入無礙菴又還歸原朝廷為降院額賜師今號及金襴法衣師曾不以為悅悉散其衣盂所畜退居一室掘地以為爐折竹以為箸意淡如也溫城淨光塔雄鎮一方年久將壞方參政初嘗戍其城欲賦民錢葺之命師蒞其事師曰民力凋攰久火焰炎炎而復加薪吾安忍為之必欲見用官中勿擾吾事若無所聞知可也方諾之師乃定計城中之戶餘二萬戶捐米月一升月獲米二百石陶甓掄材若神運鬼輸紛然四集鎮心之木以尺計者其長一百五十最難致之師談笑趣辦七成既粗完其下仍築塔殿宏敞壯麗九斗之勢益雄一旦颶風作其上一成挾之以入海濤衆咸傷之師曰塔終不可以就乎持心益固遣其徒如閩鑄露盤輪相及焰珠之類日就月將欄楯硐戶一一就緒金鮮碧明猶天降而地涌也縻錢過十萬而工役弗與焉辨章燕只不花出鎮閩省道過東甌夜觀塔燈熒煌知師所造乃謁師問道并談般若經師用漢言而直解之辨章甚悅顧謂左右曰西天諸師授我以密義尚不能相協今聞逆川師言則心地開明矣亟呼舟同載入閩宜政分院請師住東禪廢剎不一載間殿堂矗如門廡森如藏庫燁如摶土以設諸像梵容穆沖各隨相變現靈山一會儼然未散畢功之日省院臺府諸官與大比丘衆共落其成師則曰未也復甃東南二門通逵若干丈營福城東際花藏海南參初地三牌門營普庵堂以施茗飲浚湯泉二所以利浴者限以垣墉縈紆其徑路而馬牛無自而入補刊開元藏經板仍印施之其可以弘濟人者無不為也先是淨業慶成東報國舶塔寶月松峰諸寺兵燹之餘莽為荒榛福建行中書將籍其産于官師言於辨章獲仍其舊辨章欲閲大藏尊經于家或以几席什器難具為辭師令浮屠一百七十人為什分辦於各剎表以題號一時畢聚仍畫為圖使按圖序次列之給役於飲饌間者亦更番而進每以鍾鼓為節後先不紊辨章悅曰使吾師總戎則無敗北之患矣師俄散財如歸原時恬然而退辨章留之不從會雪峰虛席辨章強師補其處師不得已啓行未行先鳩工師二十人往拯室廬之欹側者既至絲毫之費咸自己出緇素莫不從化有徐子剛者據寺之安仁莊收粟萬斛聞師至亟輸還之部使者橐歡自負通楞嚴寶積二經輕視諸人師以關鍵詰之斂衽而去已而思還溫方參政具船迎之千佛院災無有起其廢者師彈指頃千佛閣成未幾前門左右廡又成俄東甌內附師潛居林泉若將終身江心蘭隱逸禪師市材于山欲建萬佛閣而年耄力不勝遂以屬師師起而應之亦不日而成且為砌釋迦寶殿創解脫門以至蒙堂經室無不具足初師采材於山道經普安院院燬已久唯山門巋然煙雨中師見之笑曰吾為爾移山門為佛殿何如衆皆合爪指謝之師為撒瓦輦致故基一毫無所損徐取寺山之木重完僧堂而後返皇上尊尚佛乘召江南高行僧十人於鍾山建無遮法會師與其列升座演説聽者數千大駕幸臨慰問備至號為一時寵遇竣事還錢唐清遠渭公方主淨慈舉師以為代師初不從繼而嘆曰所貴沙門行者隨緣應世何所容心哉乃振錫而往淨慈當兵後凋落殊甚師亟還鄉召匠計傭竭其筐篋而來欲大有設施而諸僧負官逋者係纍滿庭師為之出涕悉代償之會中朝徵有道浮屠以備顧問衆咸推師師至南京僅四閲月沐浴書偈而逝實洪武六年八月二十日也世壽若干僧臘若干二十一日闍維于聚寶山獲設利無算得其法者曰文顯曰興富曰某其一即行圓於是持靈骨而歸建塔于某處以明年月日藏焉師有五會語若干卷善財五十三參偈一卷皆傳于世大雄氏之道不即世間不離世間烏可岐而二之我心空邪則凡世間諸相高下洪纖動靜浮沉無非自妙性光中發現苟為不然雖法主所説經教與夫諸祖印心密旨皆為障礙矣嗚呼道喪人亡埃風渺瀰焉得逢理事不二有無雙泯者相與論斯事哉師自得道之後坐紫檀座既已説法度人出其餘力往往莊嚴塔廟使人為遠罪遷善之歸斯蓋近之矣或者不知專委為人天有漏之因夫豈可哉夫豈可哉銘曰大法雖無外兮收攝在一門玄漠不可象兮視之儼若存了不分精粗兮無對乃為尊若涉有情見兮雜糅成盈虧理事本不二兮縱橫隨所之渾涵造大同兮遍照光陸離東甌見休徵兮蓮華出屏間異僧佩圓光兮逆流踏波瀾玄符既敻拔兮何能滯塵寰峨峨天寶山兮鑄鐵為關扉奮迅一朝入兮窺破生死機盡洗結習垢兮真體露巍巍方知有為相兮不離無為宗彈指幻塔廟兮毗盧樓閣同因敬乃生悟兮自外而廓中歷坐古道場兮手執青楊枝甘露恆四灑兮餐之甘若飴木石被霑潤兮談玄分五時大明麗中天兮佛日同輝昭所資生育功兮欲使陰泠消爰集清淨衆兮梵音撼海潮唯師所説法兮無耳亦當聞一言歷耳根兮千劫不作塵天光下照燭兮恩寵何便蕃卷舒每隨時兮孤雲本何心生滅已兩空兮遺蹤邈難尋勒辭在中林兮振德無古今大天界寺住持白庵禪師行業碑銘有序洪武六年化大天界寺住持白庵禪師諱力金字西白吳郡姚氏子其母周氏夢一龐眉僧類應真者直趍房闥摩斥弗退因驚呼而覺遂懷娠時至而育奇芬馥郁滿庭年臨五六方頰圓額白皙如玉琢見者無不憐愛縣大夫時抱載車上歸與妻妾環玩之欲索為子父母靳弗與逮七歲穎悟異常凡書一覽即能記憶或見佛像輒五體投地作禮而退一日請于母曰兒患世相起滅不常將求出世間法可乎母曰出家甚苦爾年幼豈能堪乎曰兒心自樂之想無苦也自後請之不已父母知志不可奪俾依吳縣寶積院道原衍法師為弟子十一歲祝髮受具戒精研三觀十乘之旨領其樞要衍公主秀之德藏師為綱維之職軌範肅然忽喟然嘆曰名相之學略諳之矣盍棄諸緣而往躋覺路乎遂更衣入虎林謁古鼎銘公于雙徑古鼎一見輒以法器相期示以德山見龍潭語師奮迅踊躍直觸其機從而有契銘公俾掌記室曾未幾何分座後堂敷宣大法如山川出雲靈雨霑潤四衆信服復升居前堂聲光燁燁起叢林間至正丁酉出世住蘇之瑞光寺會嘉興天寧寺災郡守二咸曰非師不足起其廢具禮幣遣使者力邀致之師至未久儼如兜率天宮下現人世道路過者莫不瞻禮贊嘆帝師大寶法王聞師之賢授以圓通普濟禪師之號師之幼喪父唯有母存乃去城東一舍築孤雲庵以奉養焉同袍或議之師呵之曰爾不見編蒲陳尊宿乎何言之易易也洪武改元皇帝御大寶曆弘闡佛乘首開善世院俾擢有道浮屠蒞天下名山杭之淨慈主席尚虛僉欲起師居之疏與幣交至浙江省丞復遣使趣之師皆力辭乃退居同歸庵迎母以養僕夫忽夢庵前有瑞花如芙蓉然光彩絶異或謂夢者曰此花天子當取之而去旦而述其事人以為誕已而有旨起師住持大天界寺命將下之日乃僕夫所夢之宵也師應詔至闕見上于外朝慰勞優渥即令內官送其入院賜以天廚法饌萬機暇時召入禁庭奏對稱旨蓋師精通西竺典及東魯諸書其與薦紳談論霏霏如吐玉屑故咸樂與之遊至于勘辨學子務以直指心源宗説兼行機用迭發尤使聽者敬仰不置四年春詔集三宗名僧十人及其徒二千建廣薦法會干鍾山命師總持齋事師能靈承上旨凡儀制規式皆堪傳永久尋以母年耄舉徑山泐公自代復還庵居五年冬詔復建會如四年大駕臨幸詔師闡揚第一義諦自公侯以至庶僚環而聽之靡不悅服一日忽示門弟子曰吾有夙因未了必當酬之汝等勿以世相逼我未幾示微疾謝去醫藥飲食手書一偈委順而化實六年十二月二十四日也停龕六旬始行荼毗之法視其貌如生數珠齒牙不壞于火設利羅無算觀者競取之而去世壽四十有七僧臘三十又六所度弟子某等二十餘人嗣法上首出住名山者保寧覺慧等又二十餘人三會語有録謀建塔於嘉興城西環翠蘭巖以某年月日舉靈骨及不壞者藏焉師神觀秀偉智辨縱橫以宗教為己任不畜私財每得財施輒舉以給貧者嘗以楞伽經及法寶壇經乃釋門心要當毒暑時揮汗謄鈔鍥梓以傳師既歿覺慧惟恐其遺行泯泯晝夜弗自寧件繫群行為書乞豫為塔上之銘豫惟臨濟之傳至于寂照大師其道益光明盛大故其子若孫亡慮數十人各主名山務識本源至今接武而奮者尚未已也如師者亦其一人焉此無它傳授之真穎悟之正而無它岐之惑也夫塔之有銘始于梁而尤盛於唐以為不若是無以繫學者之思而景先哲之行也豫不敢廢此義遂因慧覺之請為造銘曰一真妙心兮圓同太虛迷者自蝕兮唯塵之拘曷治曷攻兮在靜其慮禪斯有學兮流于中土臨濟正宗兮奕葉其光傳至寂照兮愈亢厥宗子孫蟄蟄兮各闡化機要使青蓮兮出于汙渠唯師之生兮孰乘願輪豈伊應真兮憫世度人學兼內外兮卓然名家轉彼名相兮為德之華紺目一瞬兮大法畢具見者悟之兮無句之句寶華樓閣兮彈指即成示現世間兮何經何營三蒞精藍兮其法益崇曷以徵之兮設利青紅生死去來兮不礙真圓飛鴻印雪兮瓜趾宛然塔婆新建兮下瘞靈骨銘以揭之兮來者是則上天竺慈光妙應普濟大師東溟日公碑銘洪武十二年化皇帝受天明命奄有方夏鴻仁惠澤覃及幽明于是有學僧伽奉詔入京上御奉天殿丞相御史大夫暨百僚咸在而僧伽魚貫而見時東溟大師年最高白眉朱顏其班前列上親問以升濟沉冥之道師備述其故上悅顧衆而言曰邇來學佛者唯飽食優遊沉薶歲月而已如金剛楞伽諸經皆攝心之要典何不研窮其義苟有不通質諸白眉法師可也自後數召見字而不名人皆以為師榮及建鍾山法會請師説毗尼淨戒聞者開懌時洪武五年春正月之望也師辭歸杭之上天竺山日修西方安養之學冥心合道不雜一念十二年秋七月朔日夢青蓮華生方池中華色敷瘦清芬襲人既寤召弟子妙修曰此生淨土之祥也吾去人間世殆不遠乎至四日趺坐書頌合爪而寂世壽八十又九僧臘七十有三其月十日奉全身藏于山之西峰妙應塔院妙修乃具行業來言曰先師有墜言吾死非宋學士不可以銘吾塔執事嘗與先師遊敢援斯故竊有所請濂前年幸謁師見師精神浮動眉宇間戲謂師曰法力所攝師之四體當益強濂歲歲上京師必過虎林必與師談辨如今日也師曰學士固未艾老身石火電光爾烏能久乎遂一笑而別豈意師果翛然而西往乎銘何敢辭師諱慧日號東溟天台赤城人宋丞相賈魏公諸孫志慕空門往縣之廣嚴依平山等公落髮為桑門時子庭訓公講台衡之學于赤城師走輪下而受其説依科指授便能領其大義觸類而長日增而日益子庭嘆曰投凡下峻阪不足以喻其迅疾也北峰之道其藉之以大昌乎自是子庭一屬意于師歷代相承微旨所以扶正斥邪伐異歸同者無不言之師之學沉浸醲郁而名動一時矣一旦假寐似見有竹橫地下竹上所凝者白粥粲然師因臥而餐之及覺言于子庭子庭曰竹粥與竺同音子得就地以食其緣殆在上下兩天竺之間乎子宜亟行師即持瓶錫而出遠度浙河拜竹屋淨公于上竺觀音教寺竹屋見師俊穎輒留之所處頗卑濕師賦詩以述其事竹屋見之謂其衆曰此郎不凡他日當嗣主茲山不可以少年易之為遷燥剛之地遇之如賓友會有營繕之役而施金帛者接踵而至勤舊僧欲偈示氏名以勵其餘選工書者衆卒無以應師揚袂出曰吾試為之霞布雲舒精采煥發竹屋見之尤喜且曰吾前言果不謬矣翹翹蒼松挺出于荊榛之上者非其類也邪命典賓客尋更掌僧籍竹屋既示寂越溪澄公自演福來繼其後越溪甚器師延居後堂之板首未幾出世吳山聖水越溪念之弗忍舍復招還山處以上座以表儀四衆吳楚閩蜀之士趼足而至者動以百計師隨其性竇淺深而疏導之作人之盛當時罕有其比元重紀至元四年行宣政院采諸人望以主列剎而師獲住薦福歷三暑寒下竺靈山教寺災至正元年宣政使高公納麟謂非師無以膺起廢之任移師蒞之師至修普賢大士殿雲間大姓蔡氏邀師至家施錢十萬緡師過姑蘇大致香楠為材曾未幾何大雄寶殿成蔡卒其妻夏氏為刻佛菩薩洎觀自在大阿羅漢諸像黃文獻公溍實為之記四年高公又遷住上天竺子庭所謂上下兩天竺之徵至是益驗矣師知緣契在斯夙夜注心罔敢怠遑走募多金之家初修大殿次建三解脫門次鑄巨鍾搆危樓以冠之次營重閣講堂上祠諸祖下為講法之所他若白雲堂選佛場及諸寮宇一一皆完復罄已橐甓通塗自普門達于三門凡寺制所宜有無不具焉帝師大寶法王嘉師法行賜以金襴法衣及慈光妙應普濟大師之號十六年師自念人貴知止汲將焉求竟撾鼓而退隱于會稽山水間飄飄然如野鶴孤雲人不知其為師江浙行省丞相達識帖穆爾公方領宣政院事遣使者以物色訪之力請還山躬帥僚屬香華以迎師知其誠復再正法席前後所住凡二十五年國朝洪武改元始獲謝事于塔院云師軀斡修偉眉長一寸餘其白勝雪目睛閃閃射人道德餘光所照不問耄倪見師經行輒曰我白眉和尚來也爭持香華以為供養居常顏面嚴冷片言不妄發即發雖對王公大臣未嘗出一軟媚語至于誘掖後進色溫如春陽天台四明所著諸書循環開授止而復初聽者咸謂披青雲而見白日其在京時輿論以瓦官升元教寺乃天台初釋法華道場不可久廢乃以其事上聞即天界禪林別建室廬以存舊號請師開山師為升座説法九府大浮屠皆俯首以聽風聲所被遐邇翕然歸心師所度弟子甚衆其在下竺則圓具等十人上竺近二百人而妙思妙本妙修為最先嗣其法系者則思齊行樞允鑑允忠良謹普知文會元琇景梵各闡化于一方今繼師住上天竺者即妙修也濂聞法智尊者中興天台之道五傳至北峰為尤盛北峰諸子無不競爽而佛光桐州剡源為最良剡源之孫曰越溪而桐州之孫則玉岡也師為佛光再傳之嗣視越溪玉岡為法門兄弟先後同荷大法攝受有情法筵特為江南之最奈何越溪玉岡同年化去而耆德偉望唯師之存巋然如魯靈光聳人瞻敬三十八年之間其弘宗助教有功多矣苟不勒諸圓廟之碑何以垂示罔極而慰學者之思哉乃從妙修之請而述銘曰人天之際所貴惟誠能貫鐵石可達潛冥世之修學思證無生舍此不務其將孰營倬彼大師為時俊英依科攻義分疏尋經春蒸卉木水翻建瓴天延法胤神夢符禎出演鴻寶丕昭性靈龍鬼夜聽寶華晝零肯昧道器一混渭涇飛樓矗矗湧殿亭亭棟吻獸攫桯礎螭擎琅函飾鳳華虡鏗鯨一實所感百物交并有仆必起無廢不興惟心所證諸緣莫攖塵毫無纍體用咸貞罄竭表裏吻合幽明出言石墜轉𦕎霜凝釋門蓍蔡剎海章程屬茲像末倚作金城豈期蓮萼遽生淨泓三宗抱戚四衆含情魂遊樂國魄閟泉扃世相莫廢人文是徵後千百載尚信斯銘佛心慈濟妙辨大師別峰同公塔銘洪武二年化華嚴建宗始于帝心大士帝心作法界觀門及妄盡還源觀以傳雲華雲華傳賢首賢首既終而其徒慧苑等悉叛師説後百有餘年僧統清涼國師遙遵遐軌丕弘教緒國師傳圭峰圭峰傳奧奧之後又復廢逸朗現父子相繼而作補葺粗完現傳璿璿傳源二師陰搜陽闡其宗于是乎中興源傳沖沖傳觀觀傳會會傳心心傳悟悟號竹坡自吳來越開法景德教寺越之有賢首教自悟始悟傳介介傳瓊瓊傳南山萃冥承國師之旨大能發越受學者至千餘人萃傳春谷遇遇傳今佛心慈濟妙辨大師同公上溯圭峰凡一十六代矣公諱大同字一雲其號別峰越之上虞王氏子世推簪纓之族父有樵母陳氏妊師已十月父見龐眉僧振錫而行問僧來自何所曰崑崙山也竟排闥而入父急追之寂然無有也暨出聞房中兒啼聲笑曰兒豈向來浮屠也幼極俊爽覽諸載籍輒會其玄奧父授以辭章之訣握筆翩翩輒有可觀遂以纘承家學屬之母獨嘆曰是子般若種也可俾其纏繞塵勞乎命捨家入會稽崇勝寺從僧貴遊已而剃落受菩薩戒會春谷講經景德公復往依之獲受五教儀玄談二書又謁懷古肇師受四種法界觀懷古春谷皆南山大弟子深于華嚴之學者也公天分既高又加精進之功凡清涼一家疏章悉攝其會通而領其樞要義趣消融智光發現識者心服之春谷升主寶林華嚴教院召公謂曰子學精且博矣恐滯于心胸以成粗執曷從事思惟修以剷滌之乎公即出錢塘見佛智熙禪師于慧日峰下舊所記憶者一切棄絶唯存孤明耿耿自照如是者閲六暑寒佛智嘉其有成欲縻以上職不聽而去俄上天目山禮普應本禪師普應見已期之如佛智公將久留普應曰賢首之宗日遠而日微矣子之器量足以張大之母久淹乎此也為贊清涼像而遣之公喜曰吾今始知萬法皆本一心不識孰為禪那而孰為教乘內外自此空矣亟還寶林見春谷且告之故春谷曰可矣乃命之司賓尋升上座當時相從者皆宏偉之龍象公為分講雜華玄門會要統宗必極其所言宋故官徐天祐王易簡聞之相與崇獎莫置聲光煥著五尺童子皆能知其名郡守范侯某憐春谷僧臘已高風之使讓其席公毅然不答侯設伊蒲供延公親與之語公曰有是哉所貴乎道者在明師弟子之分垂訓後人苟乘其耄而攘其位豈人之所為乎明公縱愛我厚名義不可犯也侯不覺離席把公臂曰別峰誠非常人也元延祐初始用薦者出世蕭山淨土寺公自念圭峰以來纍葉相承其間或絶或續繫執法者之賢否遂發弘誓力持大法晨講夕演雖至于勞弗敢少懈天曆初朝廷新設廣教都總管府遴選名山主僧一歸至公升公住景德重紀至元中行宣政院遷主嘉禾之東塔公不赴時宰臣領院事乃改寶林寶林清涼肄業之地人咸為公榮公固守謙退遲回不上州牧邑尹山林友社交疏延請亦不允至第二疏始投袂而起倣終南山草堂故事建高齋闢幽舍招徠俊乂浙水東西莫不擔簦躡屩爭集輪下公竭忱開授比景德為尤勤法筵之盛不減東山時公復念許玄度皮道輿蕭察三公程師孟汪仲舉二郡守有修建塔廟之勳立五賢祠以世祀焉至正初順帝御宣文閣近臣有以公之道行聞者帝嘉之特賜金襴伽黎衣帝師大寶法王亦俾以六字師號隱然作鎮江南宗門恆倚之以為重狀元忠介公泰不華守越病旱無以禳僉謂非公不可公為爇香臂上以請雨即澍公蒞事一紀餘以疾固辭堅臥崇福庵中未幾部使者持節行郡迫起之元季寺焚于兵公奮然有為創演法堂及方丈室皆六楹間堂以實三藏梵典室以修首楞嚴期殿閣門廡將次第經營而時事日棘公因退處瞻博迦室年垂及於八十矣皇明御極四海更化設無遮大會于鍾山名浮屠咸應詔集闕下入見于武樓獨免公拜跽之禮命善世院護視之次日復召賜食禁中及還復有白金之賜洪武二年冬十二月得疾久不瘳口占辭衆語端坐而蛻實三年春三月十日也世壽八十一僧年六十五越七日遵治命就城南竹山準法闍維收餘燼瘞焉所度弟子泰來元善如坻性徵慧朗智仙真詣總該其嗣法分布列剎者則妙心大衍皋亭善現高麗若蘭景德仁靜薑山明善延壽師顗南塔國琛福城大慧景福性澄妙相道稱法雲道悅小寶林日益淨土梵翱也公神宇超邁伏犀插腦長身而玉立美談吐遇王公貴人輕重教門者發論袞袞弗休其挺已衛道理或不直雖斧鑕在前不少挫其氣中歲稍涉魔事至中之以危法公不顧下帷卻掃日味華嚴其人一旦自斃然其遊心文翰賓接賢公卿燕饗贐遺唯恐不盡其意永康胡公長孺吳興趙文敏公孟俯巴西鄧文肅公文原長沙歐陽文公玄烏傷黃文獻公溍武威余忠宣公闕咸樂與公交函詩往來無虛歲晚歲與安陽韓莊節公性李著作孝光唱酬于水光山色間尤極其情趣扶㨁他宗無塵毛猜忌聞其賢也斂衽不暇斷江恩師少林學也薦之主天衣天岸濟師台衡教也挽之尸圓通至于甄別人品摩厲後進三宗屢得其人古林茂師之主保寧馭下過嚴楚僧無賴者數人將訴之于公府公偶遇于旅邸設豐食食之從容謂曰吾雖不識古林聞其為禪林名德子等將不利之君子以為何如人不如且己否則恐罹大咎也衆沉吟良久稽首列拜而去事遂寢公性至孝自恨蚤喪父養母純至及亡春秋祭禮無闕且請名臣書父母群行樹碑于墓生平無躁進意高麗瀋王遣參軍洪瀹施大藏經于二浙瀹自負通內外典不復下人入越見公茫然如有失力言于王邀公遊燕都將振拔之過吳辭以疾而還持律甚嚴不敢違越撫世酬物終始如一不以久近為礙而散其誠逮革代之後囊無一錢唯存書史五千卷盡散其徒之能文者著述頗多未脫稿輒為人持去其外集曰天柱稿録公自制詩文曰寶林編類聚古今人為寺所作者也嗚呼賢首之宗不振久矣凜乎若九鼎一絲之懸公獨能撑支震耀使孤宗植立于十餘傳之後凡五十年非賢者其能致是乎濂總修元史時開局于善世院始獲識公公以濂為文獻公門人時相過從慰勞者甚厚及公既歿公之徒總該久與濂仲子中書舍人璲遊乃奉天衣萬壽禪寺住持元淨狀來求銘濂久未及為而璲為該請之愈力今該以材獲選俾返初服為河間長蘆都轉運鹽使司判官又移書申言之今家食多暇據狀所書推原傳授行業之詳而為銘文辭雖繁而不敢殺者稱人之善法當如爾也銘曰中天調御説大華嚴最勝種智萬有俱含煌煌帝心冥承遐受昏蒙之中鑿開戶牖熾極而衰微焰欲灰不有清涼曷振其頽黃龍入夢鱗鬣照日首枕尾蟠臺之南北曾未再傳離而去之諸師繼興是考是毗載之則升委之則墜不弘在人道何行廢奕葉之餘靈承者公搴華茹滋號為法雄謂彼雜華如來智海於覺定中而得自在帝珠出現寶鏡臨空交光互照真俗俱融不善效之或膠於相若不剷除孰非吾障旋光內燭耿耿孤明一法不立廓落無營安住毗盧靈慧自發內外皆空觀心無物出世度人從者如林據摩尼座揚清淨音旃檀熏心醍醐灌頂香味所加動靜雙領詔下九門召入禁廷恩光赫赩佛日增𭵦賢首之宗非公誰寄慧力之施茲焉為至報緣已終輕如脫蟬定光常寂白虹在天龍鬼護塔陰飆颯爽塵沙有生望門稽顙扶宗宏辨禪師育王裕公生塔之碑有序洪武十一年立示寂年未考我如來設教騁威神妙智之力示超絶極致之理視萬劫為旦暮剎那之頃三際現前是故以生滅為一雖出入靡常而真如之性炯然長存既無染淨亦無寡多習其學者往往深入禪定後天地而不凋不知孰謂之死孰謂之生也扶宗宏辨禪師現坐玉几道場説法度人而絶去來之相預建塔於廬山石耳峰下期他日為設利之藏其上首弟子師秀持嶽林佳山良珵所聚事行徵濂為銘勒諸塔上嗚呼有若師者其殆能齊死生晝夜之理者乎師名崇裕字約之毗陵陳氏子其母某氏夢龐眉異僧乘肩輿直叩寢門呼曰吾將假館于斯母覺時有娠十月而生四歲始學步七歲入小學資識超群童上十六解通儒家言然體素尪弱十日而九疾每睹佛菩薩像輒胡跪瞻禮依戀不忍舍父母以其應夢冀徼靈釋氏愈之命從壽昌院東林曉公為沙彌院有大梨木三十年不發花及師之來花開滿枝結實大如斝東林知為祥徵度為大僧俾受具足戒俄蓬纍而出登雙徑山謁寂照端公鞠明究曛唯以觀心為急務閲二年未有所證入偶遊東坡池因操觚成一偈寂照見之喜云此龍象器也命為侍者使其便于咨叩師弗從復走天目山見佛慧義公佛慧受以萬法歸一語師淬礪益力雖金墻鐵壁必欲拓開乃已佛慧亦期師有立所以警發者甚至又三年師急于求證復走中天竺山參廣智欣公一造戶庭如膠漆相入即決以超脫死生大事廣智為舉臨濟無位真人之言且詰之云爾還知否師不覺下拜廣智云爾何所見而作禮耶師答云拜者非是他人廣智云從門入者豈家珍耶師云和尚慎毋欺人也廣智首肯者久之越五年元文宗詔建大龍翔集慶寺于金陵起廣智為開山第十世師復往依焉選充維那之職未幾升主藏室留廣智左右者十餘年盡得其所為道御史中丞張公起巖問廣智云選佛場中僧伽如此衆多其有弗悖般若者乎廣智云戒律精嚴言行不相背馳唯崇裕一人自受度以來脅不沾席者三十載矣張公深加獎嘆師之聲光自是日起叢林中朵兒只國王時以江浙行省右丞相領行宣政院事遴選諸方住持名既上猶恐其未公也投鉤而定之師始出世太平南禪報恩光孝禪寺瓣香之祝蓋嗣廣智云師以誠遇物黑白翕然宗之一日令圬人塓壁壁中隆然如有物函抆之已而復然抉之獲悉達多太子像乃佛牙所刻成師召工傳以黃金金迸裂設利從中涌出寺僧覺阜雕小香殿奉之遐邇施者日新月盛數載之內百廢具舉名聞于朝帝師大寶法王錫以今號尋遷九江圓通崇勝禪寺宋之初有神僧道濟德公將示寂纍青石為塔語其徒曰此塔若紅即吾再來暨圓機旻公來鎮法席塔果紅色人異之旻公人號為古佛及其臨終復爾懸記有三百年後大興佛事之讖師入院之夕衆僧夢旻公至而其塔燁然有光者彌月人尤異之先是寺之獅子巖大樹皆枯澗泉亦竭至是樹則重榮泉則再湧識者謂自旻公至師正踰三百之數其能動物蓋不徒然也寺當災毀之後唯佛殿法堂粗立餘皆瓦礫之區師會歲之入庀匠傭工創僧堂旃檀林以居學子新梵音閣七間中塑觀音大士傍列二十五圓通像若三門鯨音樓經藏寶閣及上下塔院屬勤舊協心而成之時榮國公火你赤以朝之重臣總戎江西慕豔師之慈行洊請敷宣大法申弟子之禮受持五戒而退洪武九年上即皇帝位發號施令雷動雲合開善世院以統攝釋教命大浮屠主之諸方以師名聞移主四明阿育王山廣利禪寺寺居五山之一領其事者若大覺璉公大慧杲公無準範公橫川琪公俱一時名德風動四方繼之者頗難其人聞師之臨少長咸悅香華遠迎者接踵于道時當仲冬風恬日妍天樂四聞萬口稱頌爭言見未曾有及其接引未悟專指單提向上之功棒喝縱橫逢者膽落兩序之衆自慶獲所憑依相與戮力凡宮室之傾仆者起之缺者補之䵝昧而剝蝕者完飾之五彩彰施赫奕亦既美矣而元輿智起二師復營田七千餘畝以資食輪議者謂猶慈明之有楊岐宏智之有石窗也五年秋上敕儀曹建廣薦法會於鍾山遣使者徵高行僧十人而師居其首師至召至便殿問以佛法大意師以偈獻上覽之大悅因命師書天界寺額賜食上前師或假寐鼻息微有聲鄰坐引裾覺之上嘆曰此老人無機心誠善知識也師容貌魁梧日用之間服粗食櫔一出於天性無所勉強生於大德甲辰今年七十有五而康寧如六十餘人屢欲撾鼓而退為衆所擁留而止三會語各有録行之于學者所度弟子曰某曰某云惟我昭覺大師上紹臨濟正傳得法者固多而虎丘大慧為最盛虎丘四傳而為破庵為松源二宗角立子孫繁庶大慧五傳至佛智晦機師大辨明慧洞徹心源實與二宗抗衡而大中大夫廣智全悟大禪師出承其後師表人天上膺帝眷而聲名愈彰矣師以敦篤之資凝定之學當皇明建國之初作鎮名山續佛慧命歷十春秋輝光益衍非有大福德者不能與於斯也古佛乘願輪而再至意者或其然乎是宜有以昭示方來不當拘泥常情而弗預圖之也濂耄矣以辭章為口業有來謁者力拒閉之今特徇師秀所請而為之者嚮真乘之善果締般若之正因也銘曰廣智人天師普度有情衆天華散毫端無非作佛事光明覆一切盛大莫與等若非古佛生定無能繼者懸記若燭照皎皎不可誣不然龐眉者何以叩吾寢庭梨久絶華何以發祥徵歷抵於諸家氣如獅子王一聲哮吼間頓使百獸伏出世方為人佛牙薦靈異脫彼泥塗內設利自然露俄入圓通頂種種示方便俯視九江水欲以一口吞塔放百寶光彌月光益熾起行庭宇間故物若宛然巖樹與澗泉本是無知物誰知枯竭餘重榮亦重涌譬諸籥中灰時至氣斯應不假於外來實由因中起言言有徵驗建立大道場所以彈指頃宮殿而一成移住玉几峰非惟緇素集鬼神若相迎天樂半空聞咸謂未曾有以法作布施有如大雲興遍周河沙界震雷虩虩鳴甘雨沛然下大根與小莖無不賴霑潤大乘境界中諱言神異事我今備説之欲警闡提者植此窣堵波不異青蓮花上品上生者他時來示現故靈隱住持朴隱禪師淨公塔銘洪武十一年化嗚呼人之生也出沒氣化之中因成果隨夙有一定之業世雄氏所謂假使百千劫所作業不亡者一旦遇合雖大覺法王亦或有所不免故濂于朴隱禪師之事恆若有傷焉師住杭之靈隱入院甫浹日寺之左右序言曰寺政實繁乏都寺僧司之師曰若等盍選其人乎衆咸曰有德現者稱多才昔掌崇德莊田能闢其萊蕪以食四衆儻以功舉其誰曰不然師諾之先是勒舊有聞歆現之獲田利率無賴比丘請于前主僧代之及現之被選也大懼發其姦私走崇德縣列現過失縣令丞置不問未幾有健令至上其事刑部刑部訊鞫既得實以師為寺長失于檢察法當緣坐移符逮師或謂師曰此三年前事爾況師實不知且不識聞宜自辨訴可也師笑曰定業其可逃乎至部部主吏問曰現之犯禁爾知之乎曰知之曰既知之當書責款以上師即操觚如吏言尚書暨侍郎覽之大驚咸曰師當今名德也惡宜有是洊審之務得其情師了無異辭于是皆謫陝西為民聞亦大悔且泣曰聞草芥耳豈意上纍師德蚤知至此雖萬死不為也師弗顧行至寶應謂從者道升曰吾四體稍異常時報身殆將盡乎夜宿寧國禪寺寺之住持總虛了公與師為舊遊一見甚歡師女弟之夫陳義安時為青州衛知事移戍鳳陽以道經寺中師悅曰吾遺骸有所托矣是夕共飯猶備言遷謫之故不見有備色明旦忽端坐合爪連稱無量壽佛之名泊然而逝實洪武十一年正月十九日也義安與總虛為其龕斂以俟師之季父至道衋然傷心遣其法孫梵譯走寶應梵攜骨而還骨間舍利叢布如珠縣大夫及薦紳之流來觀皆嘆息而去其年四月八日至道同其徒結竁于山陰和塔祖隴之側瘞焉嗚呼師初以童子從弘教大師立公于至大報恩寺大師使其祝髮受戒于昭慶濡律師師嶷然有遠志韓莊節公性以道德辭章下帷授徒師亟往從之韓公察其精敏首開以群經要旨次訓以為文程度俯仰變化開闔曲折悉洞然于心胸伸紙引墨思源源而不可遏韓公為之撫几稱善天岸濟法師以佛海大弟子通台衡止觀諸書開講于虎林之集慶師又往從之法師為析三千性具之義及四明孤山同異之辨波瀾浩蕩廉陛高嚴師能一一領解台宗諸大老競以書聘之欲令出門下師不從元叟端禪師説法雙徑山人尊之為當代妙喜師又往從之入門叟厲聲一喝師若聞雷霆聲黏縛盡脫遽稽首作禮叟曰汝果何所見邪復問答四三轉皆愜叟意叟顧左右曰是般若位中人也遂録為子命歸侍司尋遷掌記室師年已二十七矣久之出遊建業大龍翔寺寺主廣智全悟欣公精貫儒釋二家行文為世模範不輕與人見師特盛稱之繼往臨川謁虞文靖公集虞公尤稱之一留九十日乃還他若黃文獻公溍蒙古忠介公泰不華翰林學士危公素其同辭稱師無異于虞公名聞行宣政院元至正十六年請師出世會稽長慶寺升天衣萬壽禪寺四方問道者聞風來歸師以氣衰倦于將迎營精舍一區而歸老焉即前所謂和塔處也元亡皇明龍興詔天下名桑門建會鍾阜升濟幽靈輪番説戒師與上竺東溟日公五臺壁峰金公特被召入內庭從容問道賜食而退已而辭歸和塔若將終身焉洪武九年冬十二月靈隱虛席諸山交致疏幣延師主之師不得已而赴未及期年而崇德之禍作矣嗚呼世之學浮屠者不為不多習教者不必修禪修禪者未嘗聞教師則兼而有之且通儒家言文又足以達其意敷闡大論發揮先哲釋門每于師是賴千百人中不能一二見焉竟以無罪謫死苟不歸之于定業將誰尤哉師歿後一年譯請虎丘大師仁公疏為事狀以某與師友也來徵銘嗚呼師于死生空矣譬如雲影谷音曾無繁著何假于銘哉然不見諸紀載恐無以白師于天下後世濂因詳著其事而勒諸碑蓋誠有傷于中也師生于越會稽縣父倪機母嚴氏皆號士族其諱元淨其字天鏡別號為朴隱一時文勝多紀詠之容貌魁偉襟懷煦然如春世間機阱捭闔之術不識為何物性尚風義斷江恩公與師締忘年交斷江卒師為刊布詩集復請虞公銘其塔三主名山起廢補壞具有成績壽六十七臘五十三三會語有録二卷詩文曰朴園集葺若干卷所度徒弟曰自宗曰梵詠曰梵諤等若干人嗣法而住院者曰禪慧智湛曰龍山普明曰昭福楚馨等又若干云銘曰我觀群生所作惟業黑白雖殊影響無別因緣合并如磁引鐵神應自然牢不可脫干越之墟降生良緇氣量軒然欲吞虹霓義理蠶絲自何而推闢其通塗非東魯書乃經乃史載攻載讀擲其幽微罔不昭燭形諸萹翰龍錦盈束擲地鏗然聲逾金玉此亦粗迹盍返其真性具之旨何妙弗臻圓通萬類不隔絲塵從而學之捷如轉輪文橐教筌弸中彪外苟或滯之觸境斯礙曷若觀空超然無對拔劍一麾千軍咸退本既茂矣末則有光手握玄珠三鎮道場扶衰振弊作世法幢以何因緣魔力遂疆訾金非純斥玉多璺笑談受之容色非慍我初無生死亦無忿執亦斬風于風奚損古先至人橫罹凶危委以大順理亦類斯顧茲有衆倚若蓍龜身亡道隨寧不遐思天能勝人是非自定外物去來豈傷吾正我造銘文用白師行萬里無雲一天如鏡續傳燈云師自謂從上諸老多由教入禪吾亦究別傳之旨乎登華頂參無見睹又如玉几見石室瑛室與語大奇之曰吾法叔徑山元叟和尚具大眼目今代妙喜也子欲了巳躬事往見勿後師遂參叟于不動軒又云杭諸山請居靈隱辭再四僉曰而祖佛照妙峰而父寂照而兄了幻皆説法靈隱于今振墜緒提宏綱捨和尚其誰哉師幡然而起處州福林院白雲禪師度公塔銘洪武三年化師諱智度號白雲因以為字處之麗水人族吳氏年十五慨然有出塵之趣欲就浮屠學其父德大與母葉氏咸鍾愛師峻辭拒斥之師不火食者纍日若將滅性者父母知志不可奪使歸禪智寺空中假公剃髮受具戒即寺側楞伽庵深習禪定每趺坐達旦不寐如是者四三春秋已而嘆曰六合之大如此頽然滯一室可乎遂出遊七閩遍歷諸山無有契其意者復還郡之白雲山因澄禪師道場遺址築福林院以為憩息之所日取楞嚴圓覺二經鈔疏而熟讀之不假師授章旨自通已而復嘆曰拘泥文字中如油入麵了無出期德山所謂窮諸玄辨若一毫置於太虛者信不誣也盍去之乎又出遊浙河之西見靈石芝公於淨慈未幾又上天目山參斷崖義公談鋒銛利人莫之敢攖時無見睹公説法天台華頂峰大振圓悟之道師復踰濤江往拜之問曰西來密意未審何如無見曰待娑羅峰點頭卻與汝言師以手搖曳欲答無見遽喝師曰娑羅峰頂白浪滔天花開芒種後葉落立秋前無見曰我家無殘羹剩飯也師曰此非殘羹剩飯而何無見頷之服勤數載翩然將辭還無見囑之曰昔南嶽十五歲出家受大鑒記莂後得馬祖授之以心法針芥相投豈在多言邪勿掉三寸舌誑人須真正見解著於行履方為報佛之深恩耳師佩服之弗敢忘師既有所證入儼然如白雲在天卷舒無礙又走長沙見無方普公走雲居見小隱大公凡當機問答無異華頂時至正甲申縣令長徇緇素之請迎師旋福林與毒種曇成山欽二公互相策勵如恐失之甲午復隱楞伽菴壬寅王府參軍胡公深安安翼元帥王君佑復請至福林甲辰御史中丞章公溢招致龍泉之普慈僧徒相從雲輸川臻多至八百人檀施日集食飲無闕者乙巳移茅山丙午遷武峰從者恆如初國朝吳元年丁未復隱禪智之岑樓洪武己酉適建法會於蔣山有詔起天下名僧敷宣大法而師與焉師初力辭戌將強起之師曰心境雙忘隨緣去住復何拘礙耶遂行暨師至而會事解嚴遂還杭杭人奉師居虎跑度夏始入秋輒趍華頂明年春二月示微疾浩然有歸志四衆堅留之師曰葉落歸根吾所願也遂回福林五日忽沐浴易衣索筆書偈曰無世可辭有衆可別太虛空中何必釘橛遂擲筆而逝是歲三月一日也壽六十七臘五十二龕奉五日顏色鮮潤闍維之夕送者千餘人火餘得五色舍利及齒牙數珠等法弟大賢上足仁哲奉骨以某年月日瘞于院西若干步善女人唐淨德為建塔其上禪師靜謐寡言機用莫測臨衆無切督之威嚴厲之色唯以實相示人所至之處人皆傾慕如見古德或持香華供養或繪師像事之不可以數計空中無見歿師皆為建塔求名公卿撰銘表之師度弟子凡二十人平日隨機開導所作偈頌不容人録故今無傳者豫聞信心為一切功德之母苟能信焉奚道之不造奚法之不明自圓悟八傳至於無見究其所得所證何莫不由於此也師自幼齡即能信吾佛之道決可脫離死生一息不少怠所以卒能徹究心源而縱橫自在也世之知師者孰不曰無見有子而方山有孫者乎誠可尚也豫嘗接師護龍河上無懈容無蔓辭有問則言無則終日澄坐而已因語二三子曰其所謂信人也哉今弟子某奉道巖之狀求豫為銘豫頗知師銘蓋不可不作也銘曰華頂之峰有道所居隨時演法太音鏗如入其門者無非獅子我福林師聞風而起當機一喝兩耳為聾法體如如情識頓空歷觸諸師見者驚愕言出霆奔無蟄不作振錫而歸我亦何心舉首睇之白雲在岑形雖遁藏文采日露學徒蒸蒸雲輸川赴解爾纏縛袪爾翳昏其心濯濯其容誾誾乘運而遊或出或處葉落歸根古今一軌塵緣既盡翛然而化協擲筆坐脫如人赴家世相有滅其性常在若謂師亡青山可改佛真文懿禪師無夢和尚碑銘洪武六年化洪武六年二月甲申佛真文懿禪師年已八十有九一旦無疾忽戒浴易衣出器物分遺叢林諸友命弟子曰三界空華如風捲煙六塵幻影如湯澆雪亙古亙今唯一性獨存吾將入滅聽吾偈曰吾有一物無頭無面要得分明涅槃後看言訖斂目危坐而逝當是時師寓象山瑞龍之別室其嗣法住持能仁寺智巖與所度弟子全體等共闍維之以是年某月日窆于天台國清某山體懼無以昭示來裔請恕中慍公評騭群行成書介方外友用堂楩公虛白杲公詣余求塔上之文師諱曇噩字無夢自號為酉庵慈溪王氏子也祖申宋某年進士真州六合縣主簿父祿元慶元路稅課大使母周氏夫人師生六年而稅課君歿夫人命從鄉校師遊氣岸高騫有一日千里之意洎長窮覽儒藉徹其義髓人有叩者竭其始終而語之蟬聯不能休自以為無書不探知解具至遂學文於修道先生胡公胡公諱長孺其文為時所宗見師大加賞識久之藻思濬發縱橫順逆隨意之所欲言聲名頓出諸老生上已而心有所感彈指歎曰攻書修辭此世間相爾曷若求出世間法乎乃白夫人走奉化廣法院禮子文良公為師聞雪庭傳公主真之長蘆乃往依焉遂剃除鬚髮為大僧師之春秋二十有三矣繼受具足戒於杭之昭慶凡釋氏契經與台衡賢首慈恩諸文晝夜摩研不知有飢渴寒暑已而復歎曰教相如海苟執著不回是覓繩自纏爾曷若求明本心乎於是篤意禪觀又久之雪庭遷住靈隱師往侍左右雪庭示寂元叟端公由中天竺來補其處元叟風規嚴峻非宿學之士莫敢闖其門師直前咨叩了無畏懼機鋒交觸情想路絶迅電一掣怒霆隨擊內外如一靡間毫忽自一轉至於六七語愈朗烈元叟欣然頷之命掌內記延祐初詔建水陸大會於金山浙名浮圖及賢士大夫皆集師佐元叟敷陳法要及與群公辨論義趣英發莫不推敬鎮南王聞之延師至廣陵尊禮備至彌年方遣徑山虛谷陵公道價傾東南慎選書記之職絶難其人既得師緇白交慶重紀至元五年浙東帥閫合府公邑令請師出世慶元之保聖再遷慈溪之開壽三轉於國清帝師大寶法王嘉師之高行錫以今號師之所至皆以擔荷大法為己任煆煉學徒孳孳如不及多有開悟之者瑞龍院欲易甲乙住持為禪剎師為開山院因賴以增重直與名伽藍相齊海上颶風發驟雨如注層樓修廊俱仆師所居亦就壓人意作虀粉矣亟撤其覆索之一巨木橫榰榻上師危坐其下若神物為之者師凡四坐道場去留信緣皆略無凝滯不久引退叢林中慕其名德之高每闢室以居之師數戒諸徒曰吾與爾等研究空宗當外形骸忘寢食以消纍劫宿習然後心地光明耳自是日惟一食終夜凝坐以達於旦國朝洪武二年詔徵江南有道僧而師與焉館于天界寺既奏對上憫其年耄放令還山越四年而終師修身廣顙昂然如野鶴之在雞群文思泉湧有持卷軸求詩文者積如束筍當風自清美師從容就席縱筆疾揮須臾皆盡長短精粗無不合作鄉先生袁文清公桷指師謂人曰此阿羅漢中人也觀其所作驃騎山疊秀軒列清軒三賦駸駸逼古作者渡江以來諸賢蹈襲蘇李學以雄快直致為誇相師成風積弊幾二百年不意山林枯稿之士乃能自奮而能至於斯也翰林學士承旨河東張公翥曰噩師儀觀偉而重戒行嚴而潔文章簡而古禪海尊宿今一人耳其為縉紳所推許類若此日本國王雖僻在東夷亦慕師道行屢發疏迎致之師堅不往王與左右謀欲劫以歸浙江宣慰使完者都藏之獲免自時厥後凡遇師手迹必重購之而去且詫其能放異光云師平生製作甚富悉不存稿晚年重修歷代高僧傳鍥梓行世筆力遒徑識者謂有得於大史遷嗚呼真如性海無不攝妙用流行見諸文句其與實相不相違背苟欲岐而二之失之遠矣唯師達理事之無礙本性既明所寓皆法辭章散落於四方者俊偉光明無非佛事特用表而著之以見不二門中本來一體無分別異同者猶未能泯本迹而忘物我也其視師為何如哉銘曰惟釋迦文説法如雲雨被大千百物咸仁弟子結集為一藏教言之不文曷資化導末流相承纏蔽語言所以達摩直探心源救弊扶衰吾道爾翼豈以饐故并忘其食師生名閥研究儒書洊攻竺典無幽不攄終入空宗縛習禪定出抵諸方以正性命如獅子兒哮吼一聲凡情盡喪何有死生剎那之頃法身呈露以何因緣為無著故曰吾有作依佛為師敷宣大法非文孰宜咳唾之間無非妙義或縱或橫理事不二有文之文人所易知無文而文識者其誰四坐道場機用由此無舌而談震驚百里颶風揚威裂屋駕濤梁木其壞不損絲毛古云有道靈物呵護豈惟人欽神亦歆慕世相有盡起滅空華白月在天一塵不遮我施文辭以作佛事書窣堵波庶幾無愧續傳燈載師遺言曰三界空華云云吾之幻軀今將入滅滅後闍維煆骨為塵不可建塔以纍後世明辨正宗廣慧禪師徑山和尚及公塔銘洪武十二年化姑蘇之區山川清妍其所育人物性多敏慧學禪那者以攻辭翰辨器物為尚雖據位稱大師亦莫不皆然自宋季以迄于今提唱達摩正傳追配先哲者唯明辨正宗廣慧禪師一人而已師諱智及字以中蘇之吳縣顧氏子父茂卿母周氏師之始生靈夢發祥及入海雲院為童子智光日顯釋書與儒典並進其師嘉之同見閩國王清獻公都中公大賞異留居外館撫之如己子使其祝髮受具足戒師聞賢首家講法界觀往聽之未及終章莞爾而笑曰一真法界圓同太虛但涉言辭即成賸法縱獲天雨寶華于我奚益哉遂走建業見廣智欣公于大龍翔集慶寺廣智以文章道德傾動一世如張文穆公起巖張潞公翥危左丞素皆與之遊以聲詩倡酬為樂師微露文彩珠潔璧光廣智及群公見之大驚交相延譽唯恐後師之同袍聚上人訶曰子才俊爽若此不思負荷正法甘作詩騷奴僕乎無盡燈偈所謂黃葉飄飄者不知作何見解師舌噤不能答即歸海雲胸中如礙巨石目不交睫者踰月忽見秋葉吹墜于庭豁然有省機用彰明觸目無障師雖自慶幸然不取正有道恐涉偏執于是杖策遊虎林升雙徑山謁寂照端公自列其所證甚悉初寂照嘗以法器期師聞其言喜甚因勘辨之師隨機而答如隼落秋空而兔走荒原也精神參會不間一髮未幾命執侍左右以便咨叩俄遷主藏室師取三乘十二分教益溫繹之宗通説貫袞袞如縣江河聲光煒燁頓超諸老上至正壬午江南行宣政院舉師出世昌國之隆教海濱之民暨清淨四衆手持香華百里歡迎如見諸佛師為升座説法不翅大將樹建旗鼓申令發號聞者靡不畏服乙酉轉鄰剎普慈其激揚誘掖如隆教時戊戌江浙行省左丞相達識帖穆爾兼領院事延師主杭之淨慈兵燹之餘艱窘危厲人所不能堪師運量有方軌範峻整綽有承平遺風較之普慈君子恆謂過之丞相猶謂未盡尊師之道辛丑之秋復請住持徑山補寂照故處師亦不辭而往風動四方考德者愈衆亡賴男子瞿範日叨盤飧主庖者厭之瞿御而去赴部使者訴院之僚屬受賕誣師為通裏私使者攝師問狀師了無懼色癸卯省憲二府白其冤強師復還徑山緇素駿奔如戴父母至有樂極而悲泣者皇明龍興洪武癸丑詔有道浮屠十人集京師大天界寺而師實居其首以病不及召對乙卯賜還窮隆山山即海雲所在也戊午八月忽示微疾至九月四日索筆書偈而逝九日行荼毗法火焰化成五色有氣襲人如沉水香齒牙數珠不壞遺骨紺澤類青琉璃色室利羅交綴于上是日其徒大均士龍等藏于所居山之陰寶盈分爪髮歸徑山卜于無等才公塔右瘞焉世壽六十八年為僧五十一夏度弟子若干人嗣其法者若干人師長身山立昂然如孤松在壑威令嚴肅其下無敢方命故所至百廢具興然處事達變接引後進又如春風時雨之及物使人不自知元帝師以為賢為錫今號云師在天界時濂頗獲聞其緒論于其歿也上首弟子普慶住持道衍藉是之故自狀其行來請銘夫圓明妙性實具三千四聖六凡悉從中現諸佛不得已而説經雷動蟄驚風行草偃者為明此性也諸祖不得已而忘經絶其枝末直探其本根者亦明此性也性在是則道在是矣奈何道喪性乖非惟學徒為然至于師表當世者一從事于末學曲藝之間以資清玩其去佛祖之道蓋亦遠矣有如師者可不表之以為東南龜鏡哉師出世時窮隆山石夜走及蒞普慈神降于人述師清嚴之狀天之生師殆不偶然四會語有録其機緣已備載之茲不敢勦入也銘曰華梵諸祖所了唯心函乾蓋坤開陽闔陰萬彙藝藝靡不苞括肯捐全軀而局一髮奕葉相仍軌轍弗殊融通小大無礙無拘猗歟禪師神觀孤聳文彩漸彰雲流山涌一旦易慮面壁自治攝念入定如斬棼絲秋葉之零飄墮庭戺仰視青天一碧萬里我性之覺證諸碩師機鋒交觸劍戟差差出世海濱人天拱手發祥徵白石夜走全提正印法鼓頻撾以眼聞者斷除空華由其見凝轉識為智珠璣落紙亦第一義方嶽大臣遣使候迎陟于南屏惟德之馨名山列五首曰雙徑匪私于師東南龜鏡輕儇小夫憯不自懲皎皎白璧何憂蒼蠅風騰波掀萬辭嗟惜是非既昭重蒞舊席昔師之去泉流哭聲師今之旋卉木榮世緣已終微笑而滅設利如珠綴于紺骨末學競奔曲藝宏施胡不反觀本實在斯遺光所被千載猶淺瞻之仰之誰敢不勉虞居士楊捐資刻護法録第一卷計字三萬一千五百零四箇該銀一十五兩七錢五分零三釐楊釋元韜對句容潘省耕書上元許一科刻天啓辛酉元年春二月徑山化城寺識
