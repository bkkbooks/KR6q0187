body:
  text: 皇明金華宋濂著雲棲袾宏輯虞山錢謙益訂誥西天僧撒哈咱失里授善世禪師誥大雄氏之道以慈悲願力導人為善所以其教肇興於西方東流於震旦歷代以來上自王公下逮士庶無不歸依而信禮之其來非一日矣欲使其闡揚正法陰翊王綱非擇其人曷稱茲任爾撒哈咱失里生於西域樂嗜佛乘纏結頓空冥心契道邇者不憚山川險阻直抵中華衝大磧之埃氛度流沙之莽蒼其志可謂堅且確矣朕嘉其遠誠特加以善世禪師之號爾尚靈承佛敕救濟群生冥頑而怙惡者爾推報應之說以導之貪嗔而敗事者爾舉恬寂之行以啟之庶幾符能仁之本願協大道之至中則子一人爾嘉爾其懋哉和林國師朵兒只怯列失思巴藏卜授都綱禪師誥浮圖之教入中國者千三百年其徒眾之繁剎寺之廣不設長以統制之則其道不肅其法不嚴非所以示尊崇之意援選良材用符善道爾朵兒只怯列失思巴藏卜生鄰佛土尊禮碩師其於三乘教法想已聞之熟矣以西土之人長西方之教孰謂非宜今特命爾為都綱副禪師統制天下諸山爾尚精勤弗怠蚤夜孜孜體如來之願力化導有情頑者繩之為良惡者禦之為善其與具生吉祥相為表裏共闡正宗庶幾陰翊王度之功於是乎在爾其懋哉洪武實錄七年十一月甲子詔以西竺僧班的達撒哈咱失里為善世禪師朵兒只怯列失思巴藏卜為都綱副禪師御製誥賜之高皇帝御製集有授善世禪師詔云特加爾具生吉祥善世禪師更加朵兒只怯列失思巴藏卜為都綱副禪師統制天下諸山相為表裏而文憲都綱禪師誥亦云與具生吉祥相為表裏然則具生吉祥即撒哈咱失里蓋華梵之異也筆以俟考贊血書華嚴經贊有序上人幻滅嚴持梵行欲求無上真如之道嘗自念言華嚴大經實中天調御第一時所說一乘頓教最為尊勝欲爇松為煤入以香藥搗和成劑以書此經而彼松煤者假物所就具黑暗相有染白法欲煆汞為丹承以空露研潤如法以書此經而彼汞丹者炫燿可觀能盲人目非助道者欲椎赤金素銀廉薄如紙復粉為泥以書此經而彼金若銀雖曰重寶外塵為體初不自內以是思惟身外諸物若勝若劣若非勝非劣若一若多若非一非多皆不足以稱此殊利維我一身內而心膂肺肝外而毛髮膚爪資血以生資血以成資血以長資血以至壯老暨死是則諸血眾生甚愛如梵摩尼一滴之微莫肯捨者我今誓發弘願於世尊前以所難捨而作佛事從十指端刺出鮮丹盛於清淨器中養以溫火澄去白液取其真純蘸以霜毫志心繕寫滿八十卷尊閣聖壽禪居昔者樂法比丘當無佛時欲聞佛語了不能得乃信婆羅門言以皮為紙以骨為筆以血為墨願書一偈況今百千妙頌十萬正文不止于一縱捐軀命以報佛恩無足為異於血何吝唯願法界有情或見或聞證入雜華藏海證入雜華藏海已即得六根清淨得六根清淨已即得自性清淨得自性清淨已即得四天下微塵剎土中一切眾生皆悉清淨無相居士未出母胎母夢異僧手寫是經來謂母曰吾乃永明延壽宜假一室以終此卷母夢覺已居士即生今逢勝因頓憶前事於是親爇五分妙香香雲輪囷結為寶網遍覆經上乃復合爪向佛散華作禮而稱贊曰雜華淨智海九會之所說一音所演唱十處放光明信解行證門總攝無復餘如是具五周如是辨六相如是分十玄妙義皆充足以至四法界二十重華藏無邊香水海教條有差別性相了無礙圓融與行布非異亦非同一可為無量無量亦為一重重無有盡是為功德聚如來最上乘龍宮所祕藏上人出身血嚴飾書此經於一一滴中普含十方界於一一界中普現光明臺於一一臺中普成師子座於一一座中普見分身佛如上無數佛皆具大威德眉間白毫光遍滿一切處共宣大乘法聞者應解脫譬如日月王照三千大千悉見種種色法能破暗故譬如大洋海一平乃如掌無丘陵堆阜法能平等故譬如陽春至大地盡發生諸根各萌芽法能霑溉故譬如梵志夢一夢千劫事不過剎那間法能融攝故譬如子憶母未見心已至形神皆兩忘法能無離故譬如黃金色金色不相分金亡即色亡法能不二故譬如石性堅初不從外得石性自圓滿法無修證故能如斯見解見經不見血若加精進力見佛不見經及至成道已見性不見佛我性如虛空了無能見者無見中有見全體即呈露苟執於所見亦非我本性見見二俱泯此為真見見真見復何有性本無物故一心歸命禮祇夜以為替諸妙樓閣門彈指一時啟新都謝陛跋曰蘇州半塘寺有法寶二一為善繼上人血書華嚴大經一為雉兒塔上人血書經後我明宋文憲公序之讚之據序乃知上人永明師後身而文憲公前身也永明師直超極樂轉度娑婆西方一大菩薩文憲公黼黻皇猷宣揚聖諦東土一大宰官上人從永明師二轉而書此經再轉而終此卷其入母夢時不曰善繼而竟曰延壽蓋挈前因以徵後果共一大事因緣文憲公豈作誑語乎余一再瞻仰此經毋論筆鋒遒勁行款清勻自始至終不見一毫怠墯相而血光融瑩漸變金光非永明師一轉後身而能然乎文憲公序則事昭贊則義了書復標解非永明師再轉後身而能然乎二百三十餘年寺運式微萬曆丙戌汪司馬公遊吳頂禮瞻仰嘆為希有尋憩焦山宗人汪子建以寺僧來願以是經權寄肇林精舍暫藉宰官護持司馬告之且命其弟仲嘉與約他日寺僧稍能興復仍復歸其原函寺僧亦以雉兒塔寄王居士半偈菴萬曆壬寅曇旭比丘有緣吾土而寺僧孫徒明德有願還經一時宰官居士開士等並贊成其勝移書仲嘉仲嘉謹如約此經既還塔亦歸附十六年間彈指去來楚人之弓延津之劍豈可思議哉檢文憲公集稍差數字在集乃公定本在經乃公的筆集稱幻滅當是善繼上人別號而聖壽禪居或半塘寺中藏經所耳茲並識之右謝陛少連跋載此經去來事甚詳第云永明師一轉為善繼再轉為文憲以文憲為善繼後身誤也按文憲為永明後身見此經序讚及永明像讚中而善繼之為永明與文憲之為善繼則未知何據也文憲序讚載其門人李耑鄭淵所刻潛溪後集中蓋文憲未入國朝之作而善繼寫經始於至正二十五年乙巳成於次年丙午文憲生於元至大庚戌計是時五十有七年矣序云今逢勝因頓憶前事文憲殆親見善繼者安得為善繼後身乎三世去來如屈信臂不可思議然以應身信之則後先歷然謝氏之訛不可不訂也丙辰冬十月過半塘瞻禮是經因志其後錢謙益記重刻金剛般若尊經序贊三界大師所說般若蓋非一種而金剛般若尤為明心之要金剛般若多至五千餘言而阿耨多羅三藐三菩提九言又為一經之要九言之中而菩提二字復盡攝其義蓋菩提者覺也佛則能覺眾生則迷也此經拳拳勸誘欲眾生去迷而就覺爾比丘弘暢孳孳向道其心堅如鐵石近獲吳興趙魏公孟頫所書是經刻本以閩中未之見也特歸重刻之乃來求贊以廣流通贊曰金剛大願海普覺於一切眾生正昏迷夜行大澤中冥冥無所睹了不辨南北坑阱在左右蛇虺復橫縱軀命不自保喪壞在俄頃忽遇紅日輪赫然出東方萬象都照了細可分毫毛四維及上下無往不洞達是經之化導功德亦如是比丘最善巧嗜道如嗜利鍥刻行閩粵見者起信心經如大火聚威燄照天赤眾生妄想心見之作灰燼經如四大海中墨萬舟楫眾生沈溺者濟之升彼岸經如香積廚珍膳咸充足眾生飢虛者聞香悉飽滿推類而言之更僕莫能盡佛法難度量贊歎輒成妄返觀自性中各有金剛王與佛本一同慎無輕棄者金剛經靈異贊有序杭州周縉頗知書聚二三童子講習市中日誦金剛經甚謹童子閔生觸翻佛前燈油染於經杭之民俗凡經像弊汙輒投濤江縉因束以紅燄倣其俗行之時元之大德庚子也越三年癸卯經忽還於舊所半為潮沙所裹而紅燄如故縉驚喜與吳門僧儉拂去沙塵其粘綴者逐番分析之遍請叢林開士題識左方後八十一年當國朝洪武庚申經入沙門宥悌之手復重加裝即南屏山中請濂說贊贊曰至誠動物靡間毛髮此感彼應如磁引鍼況乎契經世雄所說至心受持昭答如響昔周氏子朝夕嚴事經有染汙投諸江潮閱三春秋忽返元所經實紙成難同鐵石非金剛力焉能不壞經無羽足不能飛行非金剛力誰挾而至由此而觀佛語所至百神訶衛無能捐者然而此經觚翰所假雖載佛言靈從何起世之法藏所模經文充棟汗牛未聞皆驗應知萬法實本一心由心誠故而經應之心靈經靈理無疑者是知此心其大無外其小無內神通妙用一一具足不假外求有能精進入在上乘證妙覺位亦無留難今因贊經推而達之欲作佛者此心即是善思念之慎毋退轉新刻法華經敘贊有序蘭溪天真禪師竺源遠公發真正心務欲流通大法請故翰林侍講學士陳公達繕書法華經七卷鍥諸文梓歷三年始成復不憚溽暑竭蹶來青蘿山中俾余作贊惟此法華經王乃三界大師第五時所說凡六萬九千七百二十四言蓋前四時之所開演若華嚴則觕妙適均若鹿苑則純觕無妙若方等則為觕者三為妙者一若以般若較於方等減去一觕而其妙正同度門雖弘皆未能遍收群機唯至法華開權顯實而使藏通別三者咸歸一乘所謂純圓獨妙者也嗚呼世尊五十年間說大乘經諸佛境界不共三乘位次者其尚有加於此歟書寫而刊布之宜也斯贊之所由作其辭曰維妙法華經中之王如山宗岱猶河趨海其義云何大寂定場獨一乘法無二無三天真比丘徵彼哲士假觚翰林寫卷凡七其初肇自片言之微漸成文句遂柝品第中間無算塵沙點畫縱橫順逆左右鉤連諸變幻事一一皆從三千性相熾然出現若正若依以及假名攝歸一妙無餘欠者虛空有盡而此功德歷劫無盡法界眾生與佛真身本來不異雞號而興至於日沒擾擾前塵分別影事妄勝真迷不自覺知入生死輪如來哀愍以方便故說大乘法蘇迷盧山廣博高勝或可挾持此修多羅未易得聞乾闥婆城日高則隱或可控搏此修多羅未易得聞優曇缽華千年一現或可獲睹此修多羅未易得聞我今讚揚實本佛言初非誑語諸有情眾生希有想生難遇想生精進想或於其間領解義趣不昧一心相由是空法由是假中體絕待三一圓融修性冥泯大光普照明了無礙彈指之間證無上慧洪武十三年夏五月五日前翰林學士承旨嘉議大夫知制誥兼修國史兼太子贊善大夫金華宋濂景濂撰八支了義淨戒序贊善世禪師薩訶拶釋理自天竺來東土敷宣正法化導諸有情眾近依契經開演八支了義淨戒分別事理二犯事犯易遮理犯難制於是推致其極使人咸知法性本空初無證修斷常不立真妄雙泯佛之大戒蓋無踰於此矣禪師既已著為儀文命其弟子智光譯為華言以廣流通而請金華宋濂為之序濂遂合爪作禮而說贊曰我聞波羅提木叉二百五十為防止於中各具四威儀合為一千無剩欠過去見在及未來循環終始至三千若以三千攝眾義分配身口七支間漸成二萬一千數對治三毒諸惡業大無不統小無遺輾轉八萬四千門法門高深固難測終不能違事理外事戒為緣通萬境乃於別別無因果據行凌犯即制伏是則名為別解脫理戒由其斷惑故道性虛通隨類遣不隨緣別起纏縛是則名為正解脫西天佛子最善巧開演八戒度眾生重輕利鈍盡包羅內外無為亦如是法門雖多趨則一此謂持簡以御煩有能被此護命鎧魔軍雖強不敢侵三學殊塗戒為首由戒生定以至慧願入毘盧大道場一念不生成正覺寫經為像及血書心經贊有序無授上士請能細書者寫經成觀音大士像復出指端血書心經於像後來請余贊贊曰法門之相有總有別真身為佛佛說為經經屬於法佛乃屬人人法二相了不相即今因寫經以成佛身縱橫曲折無非經者小如沙塵中含法界可喻總相復刺鮮丹重書契經願力所致如黃金色大雖徑寸視等針鋒可喻別相總別雖異其理則一由是觀之佛法廣大無所不攝即別即總非別非總上士於此忽然證得展卷之間不見有經經且不有而況於佛乃知妙用在吾一心與經與佛三無差別善思念之我說非妄觀音大士觀瀑像贊南贍部洲東新羅國有一苾芻號曰靈困以三昧力於一毫端現大士相其相云何寶冠華𩯨素衣繽繙翹足而坐於崖石間其崖東邊有一石陜陜中有水下注無際其水微妙如娑羅林自根而莖自莖而條前後相續無間斷者大士旁睨容顏端嚴舉手指水不喜不慍沙門似杞具大辯才睹是相已五體投地而作是言水之怒者無如流瀑飛空直下其長或至一千餘仞或至三萬及無算數鬥巖射壑晝夜六時無有暫捨雖神鬼眾聞其音聲亦生怖畏譬諸眾生曠大劫來以迄今茲無明所覆造諸惡業火性所激觸山抵石以至殞命肝腦塗地方其怒時盡十方界日月星宿霞電雲露盡十方界山林墳衍草木鳥獸盡十方界州邑樓閣民人聚落了無所見以何因緣怒所激故怒火所爇有明皆喪大士所指因水以喻明覺真性慈憫方便最為第一爾時於越有一長者鄔波索迦聞沙門言瞻仰讚嘆善哉善哉沙門當知不識水性因石而怒為復石怒緣水乃見或水石中各有怒性謂水之性其怒因石怒在水外水性無怒長江鼓濤懷山蕩陸其勢可怖非關於石謂石之性其怒因水怒在石外石性無怒懸崖下崩飛電擊丸聲聞百里非關於水謂水與石各有怒性一鱗不生倒含太虛內外若鏡不見有怒屹立弗磨苔蝕蘚封萬古如一怒從何起沙門當知法界無邊空為本性性中本空中實非空萬物盪摩展轉成妄如水流躍非水之性舍彼二者欲求水性了不可得如石裂霣非石之性舍彼二者欲求石性亦不可得如是思惟微塵國土山河大地或淨或垢皆吾法身諸佛菩薩天龍八部夜叉羅剎有情無情皆吾法性性中所具不遺一物一物不留法界眾生無明煩惱即是如來正遍知覺善思念之此乃大士因水以喻明覺真性沙門聞我所說妙法驩喜踊躍異口同音共說無上伽陀章句稽首毘盧華藏海無量光明遍一切本來清淨無染著凡夫逐妄以迷真有如空裏本無華空裏華生由眼翳華生華滅剎那間空相如如元不動願憑大士般若力脫此八萬塵勞門縱如瀑流千萬變轉物不為物所轉矧茲幻象出豪端境相了知非實有因非實有悟真空即證如來大圓智觀世音菩薩畫像贊有序梵稱阿縛盧枳伐羅唐言觀世音也其觀世音菩薩與南閻浮提眾生有大因緣凡眾生有急難者一稱菩薩名號皆得解脫凡諸所求亦復如是是故奉其像者十室而九各出巧思莊嚴妙相永嘉林一清為上原尹治政之餘稽首參禮用清淨毫畫東大瀛海水勢噴湧傍有磐石菩薩見天人相翹其一足坐彼石上護法大神身被寶鎧駢立於左善財童子乘蓮葉舟合爪遙禮自右而至其上日輪正照雲氣杳漫其下龍女持珠仰首而獻品物咸秩觀者動容如親見菩薩於補阤洛迦山也比丘似桂乃孚中信公之上足也耽嗜般若如飲醍醐以濂信嚮佛乘持像請贊濂觀一清運筆皆有所表見非徒為虛飾而已中繪菩薩現大悲相表慈憫眾生故在大瀛海中表香水法界故日輪正照表本性圓明故雲影交重表塵沙無盡故大神威嚴表降伏魔軍故善財贍禮表正信不回故龍女獻寶表地無所愛故惟觀此像者目擊道存不以像視像而以法視像瞻禮之頃三十七道品一時證入八萬四千塵勞門悉皆降伏則畫是像者其於進道亦不為無所助也胡跪作禮而說贊曰稽首大士天人師神通變現於一切尋聲救我眾生苦是則名為觀世音大東瀛海洛迦山岩洞時時發光彩示以澎湃海潮音或因音聲而入者即得見佛了無二有一宰官施善巧能以繪畫作佛事大士寶相毫端現翹足而坐衣褊褼慈容顒顒屹不動紅光下照日正中雲影交加無盡藏善財南詢虔作禮腳踏蓮華以為舟龍女持珠向空獻種種皆為法歡喜上有威神金剛王護持佛法極嚴猛我知大士無形相有相當與虛空等虛空廓落遍十方胎卵濕化皆含攝以至河沙諸品類一一皆於相中現中求一髮不可得願執須彌以為毫舒卷六合以為紙畫此無邊相好身大地眾生眼皆見見者人人皆作佛百千劫罪悉消除不許役役從外求一彈指頃皆究竟吳道玄觀音贊觀音妙智力頓超塵沙界吳生縱善畫徒能具凡體我假六神通欲寫光明藏須彌以為筆太虛以為紙經歷無量劫但成一隻眼此眼若開時十方俱照了一塵一沙中有皆觀自在魚籃觀音像贊有序予按觀音感應傳唐元和十二年陝右金沙灘上有美豔女子挈籃鬻魚人競欲室之女曰妾能授經一夕能誦普門品者事焉黎明能者二十女辭曰一身豈堪配眾夫邪請易金剛經如前期能者復居其半女又辭請易法華經期以三日唯馬氏子能女令具禮成婚入門女即死死即麋爛立盡遽瘞之他日有僧同馬氏子啟藏觀之唯黃金鎖子骨存焉僧曰此觀音示現以化汝耳言訖飛空而去自是陝西多誦經者烏傷劉某命括人吳福用金碧畫成一幀月旦十五日展而謁焉請余序其事序已繫之贊曰惟我大士慈憫眾生耽著五欲不求解脫乃化女子端嚴姝麗因其所慕導入善門一剎那間遽爾變壞昔如紅蓮芳豔襲人今則臭腐蟲蛆流蝕世間諸色本屬空假眾生愚癡謂假為真類蛾赴燈飛逐弗已不至隕命何有止息當知實相圓同太虛無媸無妍誰能破壞大士之靈如月在天不分淨穢普皆照了凡歸依者得大饒益願即同歸薩婆若海童真觀音像贊有序金華何牖德輝獲陽翟吳道玄所畫童真觀音像乃五臺山碑本以蓮葉為裀蓋而十蓮華圍繞之用表本跡十妙不二門覽者因相生悟而法華之微旨具見於斯然其運思精深措筆遒勁真殊勝之事也德輝將重刻寘於智者壽聖禪寺翰林學士承旨金華宋濂為作贊曰我觀大士相示現一切法不坐七寶床唯藉蓮華葉蓮葉生水中清淨無染著華身與佛身畢竟同一體如來所說法取喻此最切本跡十妙門不見有二相若從有眼觀見華不見佛一顯而一隱見精不忘故或逢無目人華佛一時現非見卻成見功德難思議佛身遍法界是華亦復然華佛二俱泯定得大自在魚籃觀音靈照女二贊惟觀世音誓救群迷現不實相變滅斯須破凡夫執返乎物初一真所攝萬境自如惟靈照女入不思議以般若種得方便智聚首而談無非實際至今靈光照乎天地龍眠居士畫十八應真相贊第一尊者張拱立海牛脊絕流而過指海為地截斷眾流尚不見水何所覓牛第二尊者溯風立飛濤中足踏缽多羅手提大地靡物弗舉只一盂間收盡海水第三尊者乘巴且葉傲睨太空水珠亂濺葉尤上何分水陸即海是路未入水時一葉已度第四尊者與前尊者共泛蕉葉一沙彌荷橐隨後跼步殊甚天上地下獨立無偶沙彌何人乃躡其後第五尊者坐綵帨中雪眉垂兩肩四海鬼獰甚舁之行長眉垂肩不來不去任爾東西弗離故處第六尊者橫杖在腕有大黿負而西黿半隱水中杖挑須彌目鑠日月愍諸有情證龜成鱉第七尊者瞪目東望口噓氣成雲雲中現七成塔景無縫寶塔不因外見優缽曇華千年一現第八尊者玩塔景微笑一王孫持果獻之景固非真塔亦是假一笑之餘語默雙捨第九尊者氣貌甚偉杖錫衝衝行足下寶珠輪有光炫燿如火平視四極一杖指定足下寶珠圓光交映第十尊者騎海魚魚鼓鬣而逝有洋洋自適意乘魚而來我未嘗乘青山過雨白雲如蒸第十一尊者布杖于海赤足躡之杖如龍悠悠西奔汝杖猶龍游戲海中一息萬里不假寸風第十二尊者左手擎梵缽噬脣仰視小龍蜿蜒自南來昂首作奮勢真龍出現風雲應符雨大法雨普活焦枯第十三尊者踞崖石坐左攬衣右舒指指空若有所示一指之下領納大千真如境界不分中邊第十四尊者手執脩多羅欲讀未讀回顧鄰坐者佛尚不有何況於言無水起波中復駕船第十五尊者側耳聽經神觀清淨如在禪定時經從耳入當以目聽耳目兩忘非動非定第十六尊者騎鹿行山檜柏蕭森陰颸翛翛吹衣騎鹿而行何曾移步欲問西來笑指庭樹第十七尊者跨斑文虎手持降魔法杵過前巖巖下雜華如畫為無怖畏全提宗印大吼一聲萬山皆震第十八尊者藉草趺坐作入定相白毫光宛轉起兩眉間瞑目而坐心同太虛一塵不立無欠無餘十八大阿羅漢贊有序東山禪師以所畫應真像求予贊予謂應真何待贊有贊則贅矣東山迫之甚因為說偈其詞曰惟諸應真度嶺涉海各騁神通作此戲劇騎魚駕黿乘蘆履缽遊行自在眼不見水毒龍猛獸帖耳馴擾最可怖愕噓氣成塔諸狡獪事不一而足我問應真大乘境界無物不攝物無留礙何故執著樂此小法應真漠然似不聞者我乃思惟諸應真像一一現前何不我答諦而視之乃畫師假悟吾一心如良畫師妍媸短長縱橫圓方一濡毫間無所不有雖駭人目終非真實由是而觀萬物無實隨聲逐色輾轉成妄觀此卷者願空諸心心空法空必定見佛達摩大師贊有序括蒼吳福平川以善畫名叢林間龍門海公請寫初祖圓覺大師真像威德如生觀者聳然起敬翰林學士承旨宋濂為之造贊而國子博士鄭君仲舒書之贊曰系傳香至法證圓真闢六宗之異戶歸甘露之一門操智慧刀斬纏蔽之枝葉裂煩惱網見清淨之本根重冥穩泛已歷三年之久少林壁觀竟忘九載之勒流支屢毒而甘之如蜜蔥嶺游行而歿兮若存精明焜煌乎日月氣宇函蓋乎乾坤此所以一華五葉之記遍周沙界而大法彌尊也邪高峰妙禪師像贊目光凝定爍破大千戒體圓明直探性原青山萬仞不出死關名高天下法留世間永明智覺禪師遺像贊有序禪師諱延壽字沖玄餘杭王氏子也得法於天台韶國師大弘法眼正宗華夷尊慕座下弟子至二千人淨慈禪寺藏其遺像雖多歷年所儼若生存會濂過錢塘其住持同庵簡公以像求贊濂因造之而請同庵繕書其上贊曰我聞智覺大導師進修精明無與等誦經群羊來跪聽習定鳥巢衣襵中一旦撥開光明藏際天蟠地悉開朗如揭日月照群迷無有擿埴索塗者諸法盡從緣生滅此實佛語非我語人知生滅總由緣庶幾不為識神惑因病發藥此為最何翅藥王奪命丹四性寂然本不生三知廣喻益親切有如慈母於赤子煦嫗護持不少忘性相二宗互矛盾有礙如來正法輪更相質難辨異同折以一心歸覺路譬猶欲適長安者道塗紛紜走車馬或南或北或西東及其至處見不別呼為宗鏡名實稱萬別千差咸照了道高非特被真丹海外之邦尤企豔金絲伽黎及澡瓶遣使來施不復吝我與導師有宿因般若光中無去來今觀遺像重作禮忽悟三世了如幻靈山一會猶儼然願證如如大圓智蒲庵禪師畫像贊蒲菴禪師豫章豐城人名來復字見心以日南至生故取易卦語識之有志行清淨行欲絕塵獨立遂歸釋氏與同袍恭肅翁誓屏諸緣直明涅槃妙旨久之窺見全體無礙然未以為至走雙徑謁法喜大師楚公自陳厥故當機鋒交觸如鶻落兔走不閒一髮法喜深然之留司內記越三載復約標士瞻修西方淨土於吳天平山刻期破障比禪觀尤力浙省左丞相達公九成慕師精進起住蘇之虎丘辭不赴會兵起避地會稽山中慈溪與會稽鄰壤中有定水院直東海之濱幽闃遼敻可以縛禪復延師出主之師為起其廢禪門典禮依次舉行瓶錫翩翩來萃乞食養之共激揚第一義諦尋以干戈載塗不能見母作室寺東澗取陳尊宿故事名為蒲菴示思親也自時厥後鄞人士請師居天寧寺時寺為戍軍營子女獿雜其褻穢尤甚師言於帥閫移其屯斥群奴汛掃建治其弊壞一還舊貫師望日以重大夫士交疏勸主杭之靈隱適有詔徵高行僧師兩至南京賜食內廷慰勞優渥洎建大會鍾山師奉敕升座說法辭意剴切聞者咸有警云師敏朗淵毅非惟克修內學形於詩文氣魄雄而辭調古有識之儒多自以為不及其推師者李諭德好文則曰任道德為住持假文辭為游戲陳狀元祖仁則曰禪源妙悟教部精探內充外肆僧中指南至於楚國歐陽文公玄潞國張公翥見諸觚翰間者獎予為尤至言多不載師之徒鍠嘗畫師像求予贊予知師頗詳故倣近代儒宗之例歷舉其行而繫之以辭者將以勵夫人人也辭曰大法如如流於旃丹不有君子荷之實難慧照正宗世濟其美一十九傳至于法喜據蓮花座大振玄風師承一喝三日耳聾聾極而聰至聞蟻戰祗為圓虛物無不見既入悟關可廢學功妄滅方真慧極則通乃即天平棲神淨域禪觀混融不二不一方嶽致聘耳若不聞優缽曇花卻見海濱有典必行無墜弗舉鍾魚互答笠鞋川委移錫州城歸者紛紜轉穢為淨載揚清芬有峰飛來千載不起師復主斯法筵重啟聲華遠揚達于帝宸有詔起之說法如雲錫饌禁中恩遇優渥四眾傾仰秋空孤鶚形諸辭章太陰四垂雷春飆揚鬼神晝馳人爭傳寶如襲芳師笑受之吾游戲耳內外兩充如師幾人闇室非燈曷昭群昏學徒歆豔丹青肖像我作贊詞毋住于相按復見心豐城縣西王氏子至正二年丙子祝髮于本縣西方寺洪武八年行腳至天界寺十五年除授僧錄司左覺義十六年欽發鳳陽府槎芽山圓通院修寺住坐洪武二十四年山西太原府捕獲胡黨僧智聰供稱胡丞相謀舉事時隨泐季潭長老及復見心等往來胡府復見心坐凌遲死時年七十三歲泐季潭欽蒙免死著做散僧事見清教錄甚詳野史稱復見心應制詩有殊域字觸上怒賜死遂立化於階下不根甚矣田汝成西湖志餘載見心臨刑道其師訢笑隱語上逮笑隱而釋之尤為傅會笑隱入滅于至正四年而為之弟子者宗泐也來復未嘗師笑隱野史之傳訛可笑如此全室禪師像贊笑隱之子晦機之孫具大福德足以荷擔佛法證大智慧足以攝伏魔軍悟四喝三玄於彈指合千經萬論於一門向上關如塗毒鼓撾之必死殺活機類金剛劍觸之則奔屢鎮名山教孚遐邇詔陞京剎名溢朝紳夙受記於靈山之會今簡知於萬乘之尊雲漢昭回天章錫和於全帙寵恩優渥玉音召對於紫宸屹中流之底柱轉大地之法輪信為十方禪林之所領袖而與古德同道同倫者耶全室禪師台之臨海人名宗泐字季潭八歲從天竺笑隱訢公學佛十四薙髮二十受具洪武四年住徑山以西白禪師金公薦應召稱旨五年命住天界丁巳奉使西域十五年還朝開僧錄司授右街善世以胡黨獲譴著住鳳陽槎峰建寺十九年取歸天界廿四年復領右街善世居無何以老賜歸槎峰渡江示寂于江浦之石佛寺詳見比丘心泰塔銘約之禪師畫像贊龐蔚之姿宏辯之才一衲二十年脅不沾席談玄八萬偈舌若驚雷崖樹重榮兆法門之復振塔光呈瑞疑古佛之再來炯炯乎眼光閃鑠沈沈乎氣宇弘恢渢渢乎九江風動澄澄乎玉几天開蓋真超於實際斯不染於纖埃彼自安於部婁曾莫陟其崔嵬倘於斯而觀感庶立懦而興頹南堂禪師像贊南堂和尚既入滅其得法弟子大禪安公思慕之弗置乃繪其像來求予贊贊曰樹般若幡有舌如霆當空一震百蟄咸醒松源之宗獨造其妙手折蓮華臨風自笑靈隱良禪師遺像贊眼光閃鑠如秋隼之橫寥廓也威鋒峭崿猶於菟之踞叢薄也文彩彰灼藻火施而江漢濯也正令揮霍春雷霆而撒霰雹也縈然而若有著也悠然而無所泊也洸然而不可度也沈然而堪任其託也是無忝佛智之孫廣智之子超然而頓覺者也般若松贊有序千岩大師於元泰定之冬度濤江而來憩止烏傷伏龍山山有龍壽寺廢基大師遂縛庵以居手植一松庵前誓曰此地般若當興吾松其茂乎自時厥後大師之道盛行遂化瓦礫之區為伽藍松亦寢長柝為二榦詰曲糾蟠如虯龍夭矯勢欲飛動至正丁酉春南枝忽悴其夏大師示寂嗚呼松雖植物其有知興衰死生之意者哉後植松五十一年為國朝洪武丁巳住山龍門海公同大師之上首良杞請吳興林君子山繪畫成圖求濂因稽大師之言以般若號之且為之贊大師諱元長會稽人贊曰大師東來化導有情青松手植用表真乘觀爾榮悴以占廢興有聲四達播德維馨為法來者霧滃雲蒸樓閣頓現儼如化城松亦有知森勁摩冥夭矯欲奮虯龍騫騰孰謂卉木本乎無情有感斯應壹出乎誠惟誠之至通神致靈勗爾龍象慎毋敢攖視松如師是儀是刑天高月白風度成聲恍如演法誨言初聆太史作贊勒於岩扃百世之下庶幾可徵其年五月五日前翰林學士承旨金華宋濂撰觀音石贊虎林翁君祥卿得圓石一大可五六寸上現圓通大士妙嚴寶相坐寶蓮華善財童子合爪侍側蓋大士住不可思議解脫門能以神變作諸佛事攝受眾生大則示化真身於補怛洛迦山小則寄影像於一木一石不假人為自然天造無非自慈愍中發現祥卿因請濂作贊以顯神功以示闡提生我慢者贊曰玄黃既肇分白石即受質斯時未有佛云何能應現千劫皆佛化難以時節拘劫初與劫終常居寂光上石本無情物其頑無與等初無感通者云何佛示像微塵剎土中塵塵皆是佛有情與無情本來同一體諸佛亦無數動曰那由他云何圓通佛獨此示神變圓通於支那夙有大因緣所以不會捨如母之憶子如來談諸相皆是虛妄集云何自著相曷以釋迷網由相以悟性正如指指月見月指則忘寧有繫執故以此四者觀唯知佛願弘聖凡盡融攝調御菩提心假石顯靈異超出思慮表既非圖繪力又匪鐫勒功幻成妙嚴相七寶作瓔珞瞑目結跏坐正以慈愍故用警闡提者徒爾增怠慢當知神通力乃復有斯事始悔未見時口出不淨語如仰首唾天唾還著面故愚癡誠可念寧忍加斥逐我願大地人無不知三依見石非見石見佛亦非佛但見無量光各自心中發遍照十方界明如日月燈十方諸品類盡得諸佛智銘大慈山虎跑泉銘虎跑泉在杭之大慈山廣福定慧禪院距城南十里而近唐元和十四年性空大師來遊茲山樂其靈氣鬱盤縛庵其中尋以無水將他之忽有神人言曰自師之來我等徼惠者甚大奈何棄去南嶽童子泉當遣二虎來移師無患也翼日果見二虎以爪跑山出泉甘冽勝常大師因留止建立伽藍蘇文忠公守杭日為之賦詩有虎移泉眼趁行腳之句蓋紀實也大師諱寰中蒲阪盧氏子得法於百丈海一時龍象如臨濟玄趙州諗南泉願巖頭奯雪峰存咸來咨叩道要則其德服鬼神彰灼靈異有不難致者嗚呼拔劍刺山水為之湧折腰拜井泉乃仰流武夫健將一誠之所格尚若此況大師心悟無際者乎洪武戊午冬十有一月濂朝京師道經山下今主僧定巖戒有道之士也亟要濂觀泉且被法衣率其徒同舉梵咒久之泉觱沸而出若聯珠然已而微作湧勢濂心異之定巖遂來謁銘銘曰天一所形厥質乃凝潛行重淵與氣俱升至人來居地不愛寶誰信清泠生於虎爪山后川君與道為謀肯私一勺不師之留師既留止化泉為雨式沛且滂潤於千里幻此荒墟遂成寶坊群生依之為正法幢命世大才猶能類象來游來咨如山答響代祀雖邈聲華弗虧至今草木尚被餘輝我於世緣逢觸輒礙泉特相知獻萬珠琲擾擾征驂風埃渺瀰有素者衣化而為緇願挹寸波如習禪定洗滌根塵一時清淨唐鑄旃檀神王銅像銘狻猊作冠被于背副以黃金神武鎧匡衛正法億萬載淨慈寺新鑄銅鐘銘有序皇明洪武十一年冬十有一月庚寅杭之淨慈報恩禪寺住持夷簡重治鐘樓成復聚銅二萬觔鑄鉅鐘懸之用物甚弘皆比丘安靜善立化斂所致夷簡請為銘與鐘相為無極銘曰南屏之山中有梵宮新作鉅鐘聲震太空一音普被如佛住世乘戒圓融勝劣無滯人天龍鬼莫不能聞所說既泯始顯本真昔觀世音由聞而證圓通三昧廓然正定矧其神功闔闢化衡攝其陰趣升為陽明聞聲而覺覺我元性我性本空執覺亦病今三大士成斯勝因以考以擊以警昏昕天光發舒化佛湧出我鐘熾然共宣妙法惠香寺新鑄銅鐘銘浦陽有大蘭若在白麟溪之濱者曰香嚴創建於東晉時年代遼邈所鑄之鐘或成或壞不能盡知其可知者宋寶元間繼隆大師實為之隆嘗走汴京得中宮賜銅為助而兵部侍郎胡公則力相其事至慶曆甲申鐘始成越七十有八年睦寇至燬焉時宣和辛丑之春二月也普照大師子文即帥其眾而繼為之至甲辰冬十月鐘復成越二百三十年寺災鐘又毀焉則今至正癸巳之秋八月六日也沙門普照與同流六十有二人謀曰成壞之相勢常相因而鐘者所以警昏昕昭法度祛障蔽也吾等不可以不亟圖遂走告里之善士于君珹珹乃捐錢一千五百緡俾合餘燼而新之銅以斤計舊者三千八百有奇新者二百有奇至冬十二月二日鐘復成昔天台智者大師深弘法華之旨未十餘傳其教幾絕吳越國師德韶為聞十錢忠懿王遣使航海求其書於高句驪後卒盛行當時之人以國師與智者同族姓疑其乘願輪而再世焉今照之名與子文之號正同或後或先又皆以音聲為佛事較之國師其跡固殊所以昭前人之業使之貽永久而弗墜者則一而已夫豈偶然哉雖然大圓覺海本無異同孰能分別後先形相若區區致泥於名跡之間亦惑矣必也因聲而生悟因悟以入道庶幾無負於斯鐘之建也與濂近遷居寺東五里青蘿山中與僧崇侃游甚洽侃一旦來謂濂曰子盍銘吾鐘乎迺為之銘曰如來法門千差萬別孰方便故以一音攝有靈者鐘即廣長舌或震或撞熾然而說其一五時所宣諸修多羅無量妙意中無不包一歷耳根千劫弗磨寅緣入道莫此為多其二白麟溪濱有大蘭若是惟香嚴法器所舍鬱攸構災一夕而化畢竟有形終屬幻假其三寺之比丘咸作是言彼成壞相如風轉輪往過來續後先相因不有廢者吾何以興其四迺謁檀那迺咨鳧氏迺簡赤金以歸鑪錘侈弇中程薄厚隨軌外圓中虛與法為體其五若龍象眾暨諸鬼神胡跪作禮靡間幽明臺虡高懸有聲鏗鍧如獅王吼如蛟龍鳴其六上徹諸天下入九地因聞生悟弗述邪趣聲聲攝入曾無留礙盡轉如來大圓鏡智其七我昔嘗聞此妙音聲不從鐘出不由耳生隨處充滿非減非增願咸諦聽同證真乘其八清淨境亭銘補怛洛伽山者在東大洋海梵語補怛洛伽華言小白華傳云山有二皆觀音大士示現之地其一自西竺歷羅剎鬼國暨諸魔土始至其境其一即華嚴大經所說善財南詢之處蓋今所也山絕起海中周圍僅百里滿望冥茫無際翁洲遠山隱隱天外如青螺幽闃遼敻不可名狀寶陀禪寺在山南去寺三里至潮音洞洞腳插海張頤欲飲怒風驅濤進退擊衝作海潮音故名洞左佛跡二印石上洞顛通穴天窗白光注其底如月唐大中間梵僧拜洞前燔十指禱之指且盡大士為現身說法授以七色寶石厥後襲以為常人以誠感輒應或現紫金自在相縞衣被體而縹帶貫之珠瓔紛然懸或現千首千臂像護法大神翼衛乎後先可怖可駭稍轉而右為善財洞嵌巖中坼窈黑不可測外則峻巖壁立泉毿毿滴下如珠名菩薩泉善財時現黛目粉面寶蓋華鬘皆明潔可指數從洞拆而北有石類香爐類天鏡類佛牙奇甚唯磐陀石上最寬平可坐百人雞初號遙見扶桑五色光發照東方盡白久之湧出日輪赤如火流光燭海波閃爍不定或輕煙明霞左右蔽虧愈致妍麗誠奇觀也自石折而西有獅子峰形如狻猊作跳躑之勢有象巖有佛手峰皆以其形名有三摩地嘉木櫹森怪石駢列臥者離立者蹲欲起者迎躍以舞者其他勝概難可以數計大抵山在海岸孤絕處重巒複嶂蒼翠如洗紫蓀白葩濯濯滿地山丹樹高數丈絳花繞枝鮮澤如珊瑚林黃金沙四布尤璀燦眩目可玩海水震盪無雲自雷終日轟轟然頻伽之禽繽飛于青空中上下和鳴彷彿如稱佛號氣象靘曠絕不類人世登高四顧神思飛動若寘身琉璃瓶中一髮塵土不得相侵誠霄壤間勝特之境也洪武庚戌春正月部使者贛州劉君承直與寶陀大師行丕抱杖西東游使者曰皆清淨境也盍為亭大師乃建于寺之南嶺上從三十尺衡如之左倚山右入潮音洞云予聞從西方過十萬億國名淨土纖穢不存以黃金為地寶樹重重迦陵頻伽能演妙法人思至之有不能得豈意東海之區清淨之境為頗近之邪是宜大士顯靈于其地勒銘亭上并叩知唯心之學者大師字大基行丕其名鄞人也宗說兼通行解相應蔚為時之名僧初由佛隴昇主是山匡眾說法恢復產業而振興乎叢林席者非茲之可備載故略而不書銘曰大海東匯厥名維瀛并包川洛混合坤經鯨波四繞龍島中停濯濯綠淨皦皦青縈片滓弗立纖塵不驚如蓮出水類鑒含明流雲斂翳新旭爭熒金沙布地寶樹森屏巨石佛足嵌洞潮聲大士顯瑞梵童揚靈仙帶翻縹玄珠垂瓔月相穆穆飆馭泠泠龍君持戟水伯捧旌衛茲勝特控此高冥倬彼開士爰謀建亭草平匪砥有覺惟楹直溯寂廓將齊攖寧塵因道寂境逐心清徜徉淨國周流覺城敢告來裔庸勒新銘頌夕佳樓頌有序夕佳樓在虎林西山中去城僅五里所文明海慧法師始作之法師修習西方觀想當日如懸鼓時必面西作禮舉唱佛號滅妄歸真不使毫髮散亂其命名夕佳雖取陶潛氏語意蓋他有所屬也法師之子具庵玘公復能丕弘父業法華一宗恒藉之為大法船獲濟度者甚眾具庵以樓徵文為述頌曰大雄妙嚴清淨海攝受無邊有情眾眾生念念在散亂猶如火生積薪間倏忽起滅不暫停乃以神通方便智教之繫念專於一惟彼西方安養土無量壽佛之所住琉璃宮殿黃金地九品蓮臺池中生眾寶鳥林能演法極樂永斷一切苦其土正值日沒處眾生知用日為觀舉頭見日如見佛開目閉目盡明了佛光解破諸暗故心定如山不可移性中如如顯日相四教修行隨解進能想所想各異證三藏有見皆生滅通則無實如幻化二教皆以事定故別知本性元是佛次第觀中可馴致圓門妙解敻然殊心具一切依正法以具緣即心日現法界心起法界日此則名為空假中非三非一即三一用智破惑顯自性猶大醫王出良藥入口熱惱變清涼種種觀法斯第一粵從大法來真丹修者習者無量眾冥睹如來親接引身乘七寶金剛臺一彈指頃生彼國海慧尊者發弘誓嚴潔斯樓建道場每當山氣夕佳時遙注西方作禪觀尊者行成生上品有子夙具大乘器本性之日常在目妙勝光明時發見我生本是菩提種誤嬰世網未解脫暮年遘此殊特事如飲醍醐生慶快願結樓煩淨社緣西向落日志心禮唯心唯色妙難思當處顯現無非佛天台教宗圓具圖頌三千性相百界千如此天台教觀第一義也有能於此悟入融萬法而歸一心即一心而達三諦其近於佛之知見乎比丘法咸示濂圓具圖像於是合掌作禮而說頌曰我觀妙境不思議三千性相恒宛然心佛眾生本無二不為迷悟有增減大充法界小塵沙一一具此無量法須知一念即三千三千一念亦如是譬如空懸十寶鏡鏡前爇一光明燈一燈遍入一切處一切攝歸一燈內光光涉入了不礙互遍互融無盡藏此境即空即假中而亦不落空假中非先非後非異時舉一即三三即一事理俱攝無差殊修性齊照亦不別五佛開顯大車譬只此一乘圓具旨若祗觀心不觀具乃以一觀分二家或約三諦作二造有昧圓融祕密義妄嗔染淨無異觀是非能所亦雙泯遍虛空界盡法身一法外求即邪道唯此如來正法輪有非語言能擬議大海可飲風可捕歷劫讚嘆莫能盡偈朽室偈并序材仲禪師嘗名其室為朽而徵辭于韓莊節公黃文獻公二公既為之發揮無餘蘊矣而材仲又以濂為黃公弟子復令說偈繼之濂也何人而敢犯是不韙哉雖然不敢辭也為之偈曰鄞有開士屢主名剎其所住處邃館曲房堅緻華好開士顧之獨名為朽我問開士彼所謂朽雨風所侵螻蟻所蠹棟撓檐拔今則靚飭如上所云以朽為名不亦厚誣開士答言屬世間相無有弗壞譬如春華朝上穠冶夕則零墜何有真實今之所居雖號堅好我目視之無不朽者楹桷壯麗視如敝漏丹雘絢耀視如䵝昧超然此身如託虛空畢竟虛空無有壞相豈惟是室觀人亦然地水火風假合而成迷者自恃等于金石四大各離身在何處身即是幻世即是夢而況是室終歸于空若能于此入正思惟觀室無室觀身無身庶幾可入真空觀想我問開士善學佛者無欣無厭如開士言是有厭心所言朽者因堅而名有堅有朽理之必然木縱已朽堅性終在我本無堅朽從何生堅朽未忘心何能一況樂觀空是為空病空病不除反實所有我說是空非有非無其室永存何緣能朽如觀空者空而非空空何有礙開士聞已破顏微笑揚眉而語子言固佳但我門中一義不立立即成妄請返塵轅毋戲論法柳庵偈并序本然淨上士吳興人也問道于淨慈同庵禪師已而侍司陞主藏經之室結廬苕谿上環植垂柳遂扁曰柳庵因以自號黃鶴仙人為繪成圖予謁同庵南屏山中本然乃來徵予說偈偈曰柳乃植物類既已強名柳庵與柳異趣曷以柳名庵庵柳不相涉況復號諸人若使會于一適越而首燕雖欲強相從畢竟無合日咄茲繪事假非柳亦非庵庵中亦非人無一是真實咸因觚翰力幻出諸影像盲者來捫摸但見紙成軸絕類梵志家夢中而說夢重重皆虛妄誰為能覺者眾生強分別見異不見同世間諸品類隨念各現前諸佛善圓融見同不見異萬彙方芸芸含攝盡歸一非指可喻指非馬可喻馬難以目之睹乃成心所障有人斯有庵有庵斯有柳三者無二相物我齊冥故上士志心聽我說柳庵偈白石雖點頭未嘗談一字清齋偈并序義中勝禪師結室于中天竺取契經語名之曰清齋詞林宗工各出新意侈張而斧藻之意亦至矣全室翁同雲巢丈人以義中證修近道必欲得予言予學日墜何足以與此然而清齋者香嚴妙悟之所義中既豔其名則法其道亦宜也不然何取於清哉無相居士為說偈曰中竺有虛室八窗皆洞然觸目無礙者有境皆攝入煙霞草水石鳥獸昆蟲等以至世間事何物不可狀此以何因緣獨名為清齋纖塵了不生正以清淨故昔有一童子嘗居清淨室冥寂于至道見焚沈水香由是作思惟香雖根于水非火則不發火縱能燎原熾然不可遏苟非遘香水香氣從何起因知木為自煙火乃為他自他共和合無因能行空觀茲四相義幻有即空相四大所合成其法亦復然又況木火聚煙氣未曾升鼻觀已先通緣我有鼻故香乃從鼻入我若無鼻時墻壁瓦礫等瓦礫與墻壁未聞知有香皆由自性起不假外物故又況二物者斯須即變滅唯存灰燼餘欲求是香者去來杳無跡畢竟性空故吾性本來空雖空無不攝不落有無間妙香無去來因茲悟密圓發明無漏果得證香嚴號二十五玄聖各說最初事成道由圓通七大十八界各各有所入久近雖兩異偏圓或二殊其教已開顯偏行即圓融悟理既一同誰復分遠近聖性無不通順逆皆方便主伴實相濟後先了不別敷演真實義普度有情眾聞者當悟省勝師取契經揭名其齋居當行無上道真證圓通智若外而不內如龜毛兔角欲見不可得居士說偈已忽見清齋東爛然大月輪躍出瀛海中光明悉照燭清徹無纖翳特為作證明表此清淨法贈簡中要師游江西偈有序方外範堂儀公來言同袍有原要宇簡中者日本之人也姓藤氏為其國貴族年九歲依能仁國濟國師給灑掃之役久之國師為薙落受具足戒尋往建仁與聞在庵禪師大法要旨遂使侍香左右每慕中夏禪宗之盛洪武甲寅夏不憚鯨波之險航海而來憩止南京大天界寺聞江右多祖師道場欲往禮其靈塔頗聞古有贈言之禮世恒相因先生能不廢之乎予曰此吾俗間事也簡中學絕俗之道文字且不當立況予之賸語邪範堂曰請為一偈何如予曰杳冥之中其光如暾不依形立常與道存雖偈亦奚以為範堂曰此姑寘之第二門中何事不可說先生自通一大藏教乃欲遏絕初機之士乎予曰本自現成誰為初機一且不有孰居第二強生分別去道茲遠也範堂曰先生辨固辨矣吾無以酬之簡中必欲徼片言之賜慈悲者果能拒耶予笑曰如此則或庶幾也于是合十爪而唱偈曰諸法本無滅是故無所生其意果云何本性不變故眾生墮虛妄常見有生滅因緣十二支猶如玉連環鉤鎖不可斷正滯無明根根斷枝葉枯豈復能滋生若能斷其生而死自然滅不見有一法滅將從何起如來最方便示此思惟修蕩相而明空功德難思議如執金剛劍寒鋩湛秋水斬除諸煩惱智慧即現前轉移剎那間不見有真妄如種缽特摩出自淤泥中華雖未敷榮其實已全具雙舉復雙收不見有先後如然長明燈于彼昏暗室明生暗即亡非暗往他所明暗本無二不見有出入沙門汝當知此乃真實義迴光自返照照性亦并忘前滅既不接後起亦不引前後際皆斷無思心正住所謂諸因緣銷殞無餘者江右多古塔骨朽已千載塔前諸樹林晝夜談妙法熾然雖不停無耳乃得聞沙門汝當知勿墮于色聲有佛與無佛不可生執著行行早休歇契彼無上道雲谷偈雲出谷中境也氣之所寓也道陵師沙門也其以雲谷自號是寓乎寓者也若以一真法界言之凡所寓者皆妄也況妄之又妄者乎一旦心空法空則諸妄皆真矣何雲谷之有哉為說偈以明之偈曰白雲出空谷此是山中境上士以自號是心隨境轉我日本無雲雲出亦非谷終日遍太虛不著於一處我心能轉之一一皆自在此為空谷義上士當聽聞聞聞了不聞頭頭皆是道苟著於一邊但見谷中雲初如一縷絲漸成兜羅綿敷布於四方遂成澤物功此是第二門初非真實義勿謂老書生妄意談般若說聲外鍠師字說曇鍠上士以聲外為字請予為之說夫鍠鐘之聲也聲果在外乎曰外也鐘雖在內其扣擊之也其音遠揚或一里所焉或四三焉或十焉鏗鍧震撼如雷電發於太空果在外非內也然而人必有形而影始隨之天必行雲而雨始從之銅必成鐘而聲始應之不然則摶泥肖鐘叩之則紞然寂無遐聲削木為鐘撞之魄然縱有聲不踰於戶閾矣如是謂之內可也非外也此猶涉於偏也由體以達其用內而外也從末以推其本外而內也此猶局於器也一沙之內法界具焉內乎內而非外也虛空無盡何有限封外乎外而非內也此猶未能忘乎境也我無內孰能求吾之外我無外孰能求吾之內此非內非外也非外非內則內外混融矣雖然聲無內外也心有內外也心生而內外生心滅而內外滅即大雄氏所謂知一切法即心自性者也心實即有心虛即無慎勿為內外所惑也余嘗宴坐般若場中深入禪定有鉅鐘朝夕出大音聲我未嘗聞之也此無他所聞既寂能聞亦泯能所雙絕非聞聞而聞聞自見矣於斯時也求聲之在內者尚不可得況聲外者乎上士以聲外為字蓋欲離夫聲塵而超出其間也非謂鐘之聲有內外也然有外則有內既曰聲外而未忘乎內是逃影而行日中也予懼其泥夫跡也因辨聲之有內外者以貽之上士四明人蒲庵翁入室弟子也禪宗教典皆潛心探賾而尤精詩文叢林中咸敬禮之蒲庵寓居京師護龍河上上士凡三次來省士大夫高其行義云報恩說為罕無聞沙門作如來所說父母恩難報經云父母於子有大增益設使右肩負父左肩負母經歷千年正使便利背上未足報父母之恩佛言如是則凡有父母者不問在家出家皆當報恩何以故我之肌膚筋骸非父母不生我之飢飽寒燠非父母不節我之出入勞逸非父母不念我之就安避危非父母不分我之循理屏欲非父母不教我之離俗學道非父母不成父母恩德至廣至大雖竭恒河沙算數亦不能盡天台有一沙門名曰無聞既著福田衣參善知識晝夜六時每思父母恩深未知所報不遠千里特來娑羅林中五體投地而白無相居士曰難報經中所說父母之恩鴻博勝羨不可思量弟子欲假如來三昧之力升濟神明未知何法而可唯願居士慈悲分明開示居士告言沙門汝善念之夫愛者生死之根輪回之本何以故眾生由情生恩由恩生愛由愛生執由執生戀由戀不捨遂成妄緣輾轉出沒無有休息沙門汝欲報恩莫先入道汝欲入道莫先割愛愛盡情盡性源自澄能如是者名大報恩何以故愛為欲水混混不窮能滋長一切無明枝葉茂骫纏結難可剪除能割愛者乃菩提道愛為利劍鋒刃難觸能斬伐一切智慧善果生意刊落不使萌發能割愛者乃菩提道愛為毒藥眾苦慘刻能斲喪一切眾生身命七竅流血彈指變壞能割愛者乃菩提道愛如猛燄光芒燭天能焚毀一切盧舍器物化為灰燼無復孑遺能割愛者乃菩提道愛如虎狼爪牙銛利能吞噉一切有生等類窺伺摶噬最可悕愕能割愛者乃菩提道愛如魑魅幻化不一能迷惑一切修善之士顛倒錯謬喪其本真能割愛者乃菩提道愛如敗航檣傾楫弊能沉溺一切渡河海者漂流轉徙不到彼岸能割愛者乃菩提道愛如枳棘叢生道傍能鉤罣一切塗行商旅冠服綻裂惱人心意能割愛者乃菩提道愛如傾崖摧墮無時能壓碎一切動植諸物有識無識皆為虀粉能割愛者乃菩提道愛如蚖蛇口噴毒火能戕賊一切血肉身軀裂膚墮指受其毒苦能割愛者乃菩提道以是思惟愛之為害不可具言沙門汝善念之汝能割愛即可破妄汝能破妄即是返真直入菩提之路福德所被無量無邊雖聚七寶高如蘇迷盧山持用布施不足過也是為大功德力是為不思議勝力是為十方大覺如來三昧神力報父母恩孰出於此沙門聞已得大饒益頓然了知恩愛本空法塵清淨常熟縣居士楊捐貲刻此護法錄第九卷天啟癸亥年秋月徑山化城識
