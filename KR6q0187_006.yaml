body:
  text: 皇明金華宋濂著雲棲袾宏輯虞山錢謙益訂序金剛般若經新解序金剛般若經世尊第四時所說中夏六譯互有不同唯童壽本詳略適中甚得義趣名僧達賢箋之者亡慮千餘家唯天親無著二論師探索微隱不失說經本意無著以一十八住為義天親以二十七疑為宗發明理觀事行之詳破一切執斷一切疑至於智鏡相即能所俱妙三觀之圓融三諦之冥泯即一而三即三而一蓋有不可思議者矣其經之至中夏殆將千年或顯或晦各繫其時若論遭逢之盛則未有如今日者也欽惟皇帝陛下懋昭大德建中于民欲使感發自新一歸至化嘗以三界大師行深願重其利濟群生為甚急演說言教雖多而金剛經專言住修降伏與心經楞伽二經大旨略同其舉揚心學最切乃詔天界禪師季潭泐公會江南禪教有學諸師參用古注而定其說于是季潭與演福法師大璞公同加箋釋且懼二論師文旨玄奧學者未能卒曉因據二十七疑而革蕭統分第之陋仍推問答深意而究脈絡之貫通務令明白簡切而免纏繞支離之患既成諸師重加校訂始入奏於華蓋殿皇上覽而可之敕同新箋二經鍥梓流通季潭貽書俾濂序其事濂以昏耄為辭雙林住持南翁凱公復來請之甚力乃為言曰西方聖人以一大事因緣出現於世無非覺悟群迷出離苦輪中國聖人受天眷命為億兆生民主無非化民成俗而躋於仁壽之域前聖後聖其揆一也金剛經凡五千八百二十四言揭之篇端從長老須菩提以至菩薩但應如所教住不過三百九十六耳三問三答之間其大體咸具已無餘蘊矣而乃躡前語跡斷後疑情展轉滋多直至二十有七方止其諄諄善誘欲啓人信解者為何如哉皇上自臨御以來宵衣旰食勵精圖治禮樂形政燦然備舉所以裁成天地之道輔相天地之宜以左右民者既無所不用其極今又彰明內典以資化導唯恐一夫不獲其所其設心措慮實與諸佛同一慈憫有情所謂仁之至義之盡者也於戲盛哉濂幼齡時輒讀金剛感應傳見其所紀神異事甚衆然皆持誦精誠之所格持誦猶爾況通其義趣者乎又況達性相二空而歸於一實境界者乎殊盛之利誠未易窺測也誦是經者宜思皇上之大德孳孳焉以進道為念斯可也不然則天龍鬼神實鑒臨之可不畏哉新刻楞伽經序洪武十年秋九月丙子朔濂朝京師冬十有一月丙申入辭將還山時皇上御武樓下顧濂言曰卿言楞伽為達摩氏印心之經朕取而閲之信然人至難持者心也觸物而動淵淪天飛隨念而遷凝冰焦火經言操存制伏之道實與儒家言不異使諸侯卿大夫人咸知此縱未能上齊佛智其禁邪思絶貪欲其不胥為賢人君子之歸濂謹對曰誠如聖諭第其文學簡古義趣淵微宋臣蘇軾頗嘗患其難讀耳上曰此書生纏蔽文義之過也朕於宮中略覽數過已悉領其大旨即敕奉御取經示濂且點誦曰如佛語心品第十卷所言諸識有二種生謂流注生及相生有二種住謂流注住及相住有二種滅謂流注滅及相滅此三相者最為微隱唯佛能究言之第四卷所言自心妄想非性智慧觀察不墮二邊先身轉勝而不可壞得自覺聖趣是般若波羅蜜此言六度萬行互相融攝成菩提分皆由般若成立尤為深切般若心經若金剛般若經皆心學所繫不可不講習也言已上復口解心經數章睿識神見皆超出乎常倫於是賜食禁中而退又明日戊戌考功監臣某奉旨於大天界寺俾天下諸浮屠咸讀三經命既下育王禪師崇裕靈承德意孳孳如弗及且以二經世已盛行獨楞伽見者殊寡乃購求雷庵受公集注鏤版而行之徵濂為其題辭惟我釋迦如來五時說法而此楞伽實與維摩思益楞嚴三昧金光明勝鬘等經皆在第三方等時所說疏經之家謂以楞伽為名實相為體佛語心為宗自覺聖智為用經凡一百五十一品茲所存者特其一爾其言幽眇精深誠為攝心樞要之書也欽惟皇上以生知之聖一觀輒悟詔天下諸浮屠是習是講將使真乘之教與王化並行治心繕性遠惡而趣善斯心也即如來極度群生之心也何其盛哉禪師敬恭明詔罔敢怠遑日以流通為務亦可謂之賢矣為沙門之學者宜受而持之庶幾上報寵恩而不負靈山之付囑濂故備著天語之詳于篇首使讀者各有所警發焉新注楞伽經後序皇帝既御寶歷丕弘儒典參用佛乘以化成天下且以般若心經及金剛楞伽二經發明心學實為迷途之日月苦海之舟航乃洪武十年冬十月詔天界禪師臣宗泐演福法師臣如重加箋釋明年春三月心經金剛經新注成已徹睿覽秋七月楞伽注又成上御西華樓宗泐如同侍從之臣投進上覽已悅曰此經之注誠為精確可流布海內使學者講習焉宗泐即奉詔鍥梓於京師天界禪林如還杭之演福私念與宗泐同被上旨豈宜以天界為拘乃刻二經於演福獨楞伽卷帙浩繁未遂厥志蚤夜以為憂淨慈禪師臣夷簡乃為撰疏勸諸同袍暨樂善者助成之起手於又明年夏五月至冬十一月訖功費錢三千緡云惟楞伽一經具藏通別圓四教大旨所以斥小乘之偏破邪見之惑無非欲顯圓宗自覺正智而已第其文辭古奧讀者殊未易曉東都沙門寶巨嘗為之訓詁援據雖若該博而于經意多邈然不相入胥臺雷庵受公徒襲寶巨之緒論自不能伸一喙二者咸無取焉唯柏庭法師善月依天台教旨著為通義敻然絶出常倫苟以經文顯白者正之亦未免有遺憾他尚何望哉如以辨博無礙之智游戲毗盧藏海台衡之書無不融攝故其論著雖有徵于柏庭反覆參驗務不失如來說經本意宗泐又能裁度旨趣約繁辭而歸精當遂使數百載疑文奧義煥然明暢誠亦可謂靈承皇上嘉惠蒸民之意弘昭大覺立教度人之方者矣嗚呼佛之大法惟帝王長興之宗師能傳之今一旦遭逢如此之盛讀是經者小則當思遠惡而遷善大則當思明心而見性庶不負聖天子之大德哉楞伽阿跋多羅寶經集注題辭大雄氏所說阿跋多羅寶經凡經三譯其四卷者宋元嘉中中印度求那跋陀羅也其十卷者後魏延昌中北印度菩提流支也逮至于唐實叉難陀來自于闐復以跋陀之譯未弘流支之義多舛與僧復禮重翻為七卷則久視初也於是判教諸師提綱挈領李通玄則以五法三自性八識二無我為言智覺延壽則以實相佛語心自覺聖智為言一則因理以顯事一則從事以推理理事兼究則經之奧義無餘蘊矣然自菩提達摩東來震旦謂此經四卷可以印心遂授其徒慧可故宗禪定者世受其說而其文辭簡嚴卒未易通所以傳之者寖微至宋張文定公方平見于南譙悟其為前身所書乃以錢三十萬屬蘇文忠公軾印施江淮間蘇公親為書之且記其事自是流布漸廣雷庵禪師正受病句讀之難通也與同袍智燈據跋陀之本而參以魏唐二譯原其異同歷疏于經文之下復稽唐注古本暨宋僧寶巨閩士楊彥國之說而折衷之凡經綸疏録有涉于經者亦托其精華附焉名之曰楞伽寶經集注自慶元乙卯之三月至丙辰之四月始克就緒其用心可謂勤矣且如來說經不即語言不離語言矧此楞伽實詮圓頓八識洞然號如來藏大包無外小入無內本性全真即成智用觀身實相與淨名同若彼二乘滅識趣寂譬如迷人忘己之頭狂走呼號別求首領此乃諸佛心地法門不假修證現前成佛禪宗之要蓋莫切於此矣或者則曰西來之宗一文不設若謂初祖持此印心非愚則惑子不聞達觀穎公之言乎曰不然也佛法隨世以為教當達摩時衆生滯相離心故入義學者悉斥去之達觀之言猶達摩之意也苟不察其救弊微權而據以為實則禪那乃六度之一先佛所指持戒為禪定智慧之本者還可廢乎雷庵之注其有功於禪宗甚大非上根宿智不知子言之為當也此經舊嘗刻版姑蘇幻住庵近毀於火天界禪師白庵金公意欲流通乃購文梓重刻於旃檀林來徵余為之序豫幼時頗見正平張戒集三譯之長采諸家之注成書八卷以傳大意略同惜雷庵不及見之白庵妙悟真乘旁通儒典為叢林之所宗師苟求其說而補入之則其功又豈不大於雷庵哉般若波羅蜜多心經文句引實際理地不染一塵固在於心明萬事門中不離一法必資於言解此古今之通義也昔我三界大師從兜率天化成白象冠日之精降神於維羅衛國苦行於伽闍山中得無上道成最正覺蓋憫大地衆生不知真性染纏使以成有漏逐色聲以陷諸妄汩沒死生弗能解脫於是坐寶蓮華師子之座演說無上甚深妙法開頓漸之正門垂權實之祕教其第四時廣宣諸般若經而大部般若合六百卷凡四處一十六會所說顯之以五蘊以總其綱申之以十二處以核其變廣之以十八界以極其趣小無不該大無不統誠所謂冥衢之燈燭業海之方舟也撮其樞要實惟心經是經凡三譯今世所傳二百五十八言者乃貞觀間三藏法師玄奘所翻攝須彌於一毫芒斂溟渤於一涓滴其神功浩浩乎不可思議是以歷代寶之如摩尼珠為之注釋凡百十家溺教文者曲引傍喻自相疑難其失也蕪尊禪義者逐字為訓辭荒意幻其失也鄙務高深者獨研大旨盡略微文其失也簡安淺陋者不知次序前後失倫其失也雜殊不知了空法塵聿依佛智皆不出乎是經雖法華十萬餘言華嚴四天下微塵數品廣略固殊旨義無二奈何以至精至微之典而以小德小智之見輕測真乘妄談般若也哉如濂不敏奧自壯齡頗閲三藏諸文於是不量蕪陋為之訓解蕪者剔之鄙者雅之略者補之雜者一之裁成文句一卷總數千言宿學之士其亦何事於斯庶以便初機者爾或者則曰三千性相盡屬空名一實境界諸念不立何為執滯於教體之間哉是不然渡巨河者必用筏以濟見明月者須假指以標若欲廢法觀空因空顯性何異采蘋於山椒而求魚於木末也不亦傎乎雖然靈光獨耀迥脫根塵體露真常不拘文字苟徒隨語生解其去一真薄迦梵地蓋益遠矣忘白馬之舊馱焚青龍之新鈔必有蓋世人豪者興濂日望之至正元年正月朔日幅巾男子金華宋濂引善財南詢華藏海因緣序沙門那道輝以其師淨慈禪師所著善財南詢華藏海因緣一卷示豫先集經以備其事次作偈以釋其義不待詳分科段遍閲疏鈔而經旨瞭然自明嗚呼可謂善談雜華者已夫雜華之宗以言乎性則太虛洞然而無物以言乎相則萬象森然而駢列所謂森然者即行布也一而萬者也所謂洞然者即圓融也萬而一者也圓融不礙行布故一為萬而不見其少行布不礙圓融故萬為一而不見其多此其大較也然而善財之見文殊根本之智已得畢乎一者也而差別之知未圓欲見乎萬者也今姑舉其略而陳之則所不舉者可推而見矣凡其所參五十又三或順或逆或小或大或淺或深皆各有所證其登妙高峰不見德雲而于別峰相見示法普見也見善住空中變化隨念而至明法無礙也見海幢放種種光光中皆有種種奇勝示法無盡也見勝熱婆羅門登山投火得寂靜樂明法無怖也見自在王修學書數第印療病建宅鍊藥及農賈等業示法工巧也見無厭足王決囚可駭及觀宮殿皆是衆寶之所合成明法如幻也見遍行外道調伏九十六衆離諸異見示法普觀也見婆須密女身出光明照諸衆生令離貪欲明法無染也見德生童子有德童女證入大悲大智示法幻住也見大莊嚴園毗盧樓閣慈氏領諸菩薩從他方來彈指一聲樓閣門開善財即入見一樓閣中有一切諸妙樓閣一一樓閣中皆有慈氏一一慈氏前皆有善財一一善財皆悉合掌回顧一善財之身遍入一切善財身內一切善財身皆攝歸一善財身內互遍互融互攝互入如燈鏡交光重重無盡善財既證此一切境界莊嚴藏解脫門文殊遂舒金臂過一百一十餘城按善財頂告以法解雖已周而行未圓之故於是往見普賢在如來前一一毛孔出種種佛剎諸微妙事善財見身中交光互現一切不思議事悉皆成就嗚呼善財前之所歷者行布也後之所證者圓融也非圓融不足以見體統之全非行布不足以昭發用之盛圓融體用雙泯者也行布則因用而各顯其體者也其後之所證莫知為之先前之所得莫知為之後二之則非也是知盡十方剎土皆是善財盡十方剎土皆是文殊盡十方剎土皆是一大香水海孰為行布孰為圓融哉苟謂其無所證入乎則于涉歷無微不探也苟謂其有所證入乎則性本圓明初無一法之可得也至矣妙矣蔑以加矣雖然經旨宏深非有識者為之開明初機之士何自而知佛國師而下頌而釋此者凡十人禪師蓋後出而益奇者也或曰以偈釋經可乎曰如來說經長行之後必以偈重宣之善慧大士用偈釋金剛經而後世箋經家多效之何為而不可也禪師名智順字逆川溫之瑞安人鐵關樞公入室弟子也出世溫之雅山繼主福之東禪雪峰今住持前剎云大般若經通關法序大般若波羅蜜多經凡六百卷唐三藏法師玄奘所譯卷帙紛紜浩如煙海學者未易背之鳳城雪月大師大隱發其巧智創為通關之法而四明演忠律師省悟重為編定而益加精嚴其法畫十二圖用十三法二十九界八十四科為之都凡諸圖所列或齊行或各行或單位或避位或間位或加法或鉤鎖連環或廣略不過一千言間總攝初分難信解品一百三卷無一字或違噫亦異矣先是浙水東見者甚鮮逮宋淳熙中有異僧載經行甬東暗誦弗休大姓沃承璋以為疑抽一二卷試之其誦如初卷且出關法以授承璋承璋乃刻板流通元至正初黃巖沙門絶璘琚公獲拾儀真歸刊雲峰證道院未幾燬於火雪山成公嘗受經于絶璘思繼前志復重刊而行之增以佛國白禪師所解名相繫諸關後使人了知義趣云惟般若尊經乃統攝世出世間色心諸法皆歸實相其功用不可思議譬如四大海水茫無邊際攝之入一毛孔無所增減而彼大海本相如故所謂舒之則大包無外卷之則小入無內者也雪月以方便智造是通關之法一彈指頃能背其經六分之一其饒益群生甚大雪山父子又能篤意傳布唯恐或後皆不負先佛囑纍者矣雖然真覺性者中一辭不立光明殊勝洞照無礙大阿難等結集八藏諸文一一自光明中發現讀是關者儻能於此求之則山河大地有情無情咸成文句身不待較繁簡於卷帙之間也雪山遍參諸方嘗主藏鑰于靈隱景德禪寺其衛道之志蓋皎然云寶積三昧集序釋氏之書有三法藏焉曰經曰律曰論經則佛與菩薩等所說論則諸賢聖僧所著唯律必佛口親宣而非諸大弟子之得與聞也然而三藏之間統為十二部分為大小中三乘廣大殊勝無所不攝其文久流中國至秦而絶漢遣郎中蔡愔及秦景往使天竺受其書以歸自是譯師疊至代有所增以卷計者梁則五千四百隋則六千一百九十八唐承隋亂之後稍有廢逸開元之目則五千四十八至貞元中則又增二百七十五宋太平興國以來或翻譯或編纂或收貞元未附藏者又增七百七十五逮元有國又增二百八十六其中頗不能盡知今以千文紀之自天至遵為號者五百八十六通為六千二百二十九卷噫嘻其廣矣哉學其書者茫若望洋至于皓首而不能周覽唐僧智升嘗編入中國歲月及譯人姓氏名曰開元釋教録美矣而不采其文也宋戶部尚書王古隨其次第而釋其因緣至於佛會後先華譯同異咸志之名曰法寶標目佳矣而弗表其義也優婆塞陳實分門別科頗括祕詮名之曰大藏一覽近矣惜糅之自造諸偈而又擇焉不能精也東山立庵大師崇志頗病焉乃於延祐之初掇拾三藏英華上自三寶流通中至天仙天標坤維人倫之凡時劫根塵世諦塔寺道具衆器之屬下及珍寶飲食花木禽獸地獄之品析二十門釐為四卷文貫始終事有源委部居整比秩焉不紊遂取法界體性經中語名曰寶積三昧集鍥梓於壽聖禪林立庵既示寂板廢不存白庵禪師萬金以精進力深入禪教三昧旁事孔籍亦臻其閫奧悼立庵利物之心勤而傳世之不遠也復為銓次義例分卷為五重刻而布之以濂閲大藏者凡三稍涉戶庭請序其首簡濂取覽之儼然如探故物雖未獲窺其全而金銀琉璃車渠瑪瑙珊瑚琥珀衆寶之積爛然溢目矣於是胡跪作禮而說贊曰巍巍法王寶號為修多羅毗尼阿毗曇三千大千界以及無算數無物不含攝無土不現身護法金剛王手持蓮華杵或執七寶劍各逞神通力晝夜不暫離魔軍及末伽無有能壞者善慧施方便為轉大法輪一轉千佛轉佛佛具千佛千佛亦復然輾轉至無邊此最勝功德如雲雨太空草木花藥等根莖皆霑溉如來真正幢無巨亦無細汪洋四大海了不見涯涘苟取一滴水濕性靡不具炎炎大火聚力可鎔天地餘燼存一粟炎體終弗滅日輪行中天其廣千由旬光入寸隙中圓明具日相若耆闍崛山山石立萬仞一沙細於塵孰敢謂非石所以二尊者各出本來智一取六千卷束之四卷間如將須彌盧納之於針孔一噓寒灰焰死後使復然光照閻浮提利彼有情衆智者能移物勿為物所移佛言雖至寶執著亦為障我有大寶藏不落文字中六處放光明七佛時行道時時宣妙法法法悉皆忘定見自性佛共成無上道傳法正宗記序表大法之真傳起群生之正信宜莫如書然而真丹身毒相去絶遠梵言華言重譯或殊況屢遭滅斥之禍生乎其後者必搜羅墜逸遍觀會通然後能定是非之真謏聞之士苟獲窺其一偏遂執為確然之論斯亦過矣嗚呼闢邪說之膠固伸正議於千載之下不有先覺學者將何所從哉昔者濂讀涅槃經及智度論頗知釋迦文佛以正法授迦葉世世相傳具有明證故自前魏支彊梁樓至洛邑譯續法傳自七佛至二十五祖婆舍斯多而止東晉佛馱跋陀羅至廬山所譯禪經自迦葉至二十八祖達摩多羅而止逮夫後魏之時崇道屏釋而沙門曇曜蒼黃逃竄單録諸祖之名匿巖穴間僅及二十四祖師子尊者而止佛運重啓曇曜進為僧統吉迦夜等遂因之為付法藏傳其去前魏已一百九十餘年東晉亦六十二年矣東魏那連耶舍至鄴復備譯西域諸所傳授事跡其次第與禪經不差毫髮則全闕之分有不待辨而自明矣唐興曹溪大弘達磨之道傳布益衆義學者忌之而神清為甚乃據法藏傳所列謂師子遭難絶嗣不傳猶以為未足誣迦葉為小智不足承佛心印指禪經實後來傳會難以取徵而好論議之徒紛紛而起矣宋明教大師契嵩讀而病之博采出三藏記洎諸家紀載釋迦為表三十三祖為傳持法一千三百四人為分家略傳而秀出宗證繼焉名曰傳法正宗記復畫佛祖相承之像明其世系名曰定祖圖申述禪經及西域諸師為證以闢義學者之妄名曰正宗論共十二卷其衛道之嚴凜凜乎不可犯也濂竊聞之太平真君之七年魏太武用崔浩言宣告征鎮佛像胡書皆擊破焚燒當是時諸種經論多煨燼之末屋壁之深藏蓋至于久而後出以此觀之曇曜之流固未必能見禪經至于諸師之論義學者亦未必能盡聞之顧執一時單録不全之文而相為詬病猶將十指而掩日月之光一口而吸滄溟之水多見其不知量也大師之辨析夫豈得已者哉甬東祖杲禪師以誠篤契道汲汲焉准恐法輪不運合衆緣重刻以傳嗚呼書不流通與無書等大師固有功於宗乘而杲公之為則又有功於大師者也皆不可以不紀因追序其作者之意於首簡云重刻護法論題辭衢州天寧住持端文禪師不遠千里而來請曰吾宗有護法論凡一萬二千三百四十五言相傳宋觀文殿大學士太保張天覺之所撰其弘宗扶教之意至矣盡矣昔者閩僧慧欽嘗刻諸梓翰林侍講學士虞集實為之序兵燹之餘其版久不存端文以此書不可不傳也復令印生刻之今功已告完願為序其首簡序曰嗚呼妙明真性有若太空不拘方所初無形段沖淡而靜寥漠而清出焉而不知其所終入焉而不知其所窮與物無際圓妙而通當是時無生佛之名無自他之相種種含攝種種無礙尚何一法之可言哉奈何太朴既散誕勝真漓營營逐物唯塵緣業識之趣正如迷人身陷大澤煙霧晦冥蛇虎縱橫競來追人欲加毒害被髮狂奔不辨四維西方大聖人以慈憫故三乘十二分教不得不說此法之所由建立也衆生聞此法者遵而行之又如得見日光逢善勝友為驅諸惡引登康衢即離怖畏而就安隱其願幸孰加焉不深德之反從而詆之斥之是猶挾利劍以自傷初何損於大法歟嗚呼三皇治天下也善用時五帝則易以仁信三王又更以智勇蓋風氣隨世而遷故為治者亦因時而馭變焉成周以降昏嚚邪僻翕然並作絏縲不足以為囚斧鍎不足以為威西方聖人歷陳因果輪回之說使暴強聞之赤頸汗背逡巡畏縮雖螻蟻不敢踐履豈不有補治化之不足柳宗元所謂陰翊王度者是已此猶言其粗也其上焉者炯然內觀匪即匪離可以脫卑濁而極高明超三界而躋妙覺誠不可誣也奈何詆之奈何斥之世之人觀此論者可以悚然而思惕然而省矣雖然豫有一說并為釋氏之徒告焉棟宇堅者風雨不能漂搖榮衛充者疾病不能侵凌緇衣之士盍亦自反其本乎豫竊怪夫誦佛陀言行外道行者是自壞法也毗尼不守軌範是棄者是自壞法也增長無明嗔恚不息者是自壞法也傳曰家必自毀而後人毀之尚誰尤哉今因禪師之請乃懇切為緇素通言之知我罪我豫皆不能辭矣禪師豫章人知寶大法如護眼目然身服紙衣躬行苦行遇川病涉者梁之塗齟齬者甓之枯胔暴露者掩之今又刻此論以博誠無愧於有行沙門者矣釋氏護教編後記西方聖人以一大事因緣出現於世自從鹿野苑中直至於跋提河演說苦空無我無量妙義隨機鈍利分為頓漸無小無大盡皆攝入薩婆若海既滅度後其弟子阿難陀多聞總持有大智慧結集為修多羅藏而諸尊者或後或先各闡化源優波離集四部律謂之毗尼金剛薩埵於毗盧遮那前親受瑜伽五部謂之祕密章句無著天親頻升知足天宮咨參慈氏相與造論發明大乘謂之唯識宗旨西竺龍勝以所得毗羅之法弘其經要謂之中觀論燉煌杜法順深入華嚴不思議境大宣玄旨謂之華嚴法界觀毗尼之法魏嘉平初曇柯羅始持僧祗戒本至洛陽而曇無德曇諦等繼之立羯磨法唐南山澄照律師道宣作疏明之四分律遂大行是為行事防非止惡之宗薩埵以瑜伽授龍猛猛授龍智智授金剛智唐開元中智始來中國大建曼茶羅法事大智道氤大慧一行及不空三藏咸師尊之是為瑜伽微妙祕密之宗唐貞觀三年三藏玄奘往西域諸國會戒賢於那蘭陀寺因受唯識宗旨以歸授慈恩窺基基乃網羅舊說廣制疏論是為三乘法相顯理之宗梁陳之間北齊惠聞因讀中觀論悟旨遂遙禮龍勝為師開空假中三觀止觀法門以法華宗旨授慧思思授天台國師智顗顗授灌頂頂授智威智威授惠威惠威授玄朗朗授湛然是為四教法性觀行之宗隋末順以法界觀授智儼儼授賢首法藏至清涼大統國師澄觀追宗其學著華嚴疏論數百萬言圭峰宗密繼之而其化廣被西方是為一念圓融具德之宗瑜伽久亡南山亦僅存其盛行於今者唯天台慈恩賢首而已此則世之所謂教者也世尊大法自迦葉二十八傳至菩提達摩達摩悲學佛者纏蔽於竹帛間乃弘教外別傳之旨不立文字而見性成佛達摩傳慧可可傳僧璨璨傳道信信傳弘忍忍傳曹溪大鑑禪師慧能而其法特盛能之二弟子懷讓行思皆深入其閫奧讓傳道一一之學江西宗之其傳為懷海海傳希運運傳臨濟慧照大師義玄玄立三玄門策厲學徒是為臨濟之宗海之旁出為溈山大圓禪師靈𧙗𧙗傳仰山智通大師慧寂父唱子和微妙玄機不可湊泊是為溈仰之宗思傳希遷遷之學湖南宗之其傳為道悟悟傳崇信信傳宣鑑鑑傳義存存傳雲門匡真大師文偃偃之氣宇如王三句之設如青天震雷聞者掩耳是為雲門之宗玄沙師備偃之同門友也其傳為桂琛琛傳法眼大師文益益雖依華嚴六相唱明宗旨迥然獨立不涉凡情是為法眼之宗遷之旁出為藥山惟儼儼以寶鏡三昧五位顯三種滲漏傳曇晟晟傳洞山悟本大師良價價傳曹山元證大師本寂而復大震是為曹洞之宗法眼再傳至延壽流入高句驪仰山三傳之芭蕉徹當石晉開運中遂亡弗繼雲門曹洞僅不絶如線唯臨濟一宗大用大機震蕩無際若聖若凡無不宗仰此則世之所謂禪者也嗚呼教之與禪本無二門依教修行蓋不出於六度梵行而禪定特居其一由衆生根有不齊故先佛示化亦不免其異耳奈何後世各建門庭互相盾矛教則譏禪滯乎空寂禪則譏教泥乎名相籍籍紛紛莫克有定是果何為者邪此則教禪異塗猶可說也自禪一宗言之佛大勝多與達摩同學禪觀達摩則遠契真宗勝多所見一差遂分為有相無相定慧戒行無得寂靜六門非達摩闢之安能至今廓如也慧能與神秀同受法於弘忍能則為頓宗秀則別為漸宗荊吳秦各各行其教道一神會又同出於能者也道一則密受心印神會則復流於知解一去弗返而其末流若大珠明教慈受輩尚何以議為哉自教一宗言之慈恩立三教天台則分四教賢首則又分五教粗妙各見漸圓互指終不能歸之一致可勝歎哉此雖通名為教各自立宗猶可說也自夫本教之內言之律學均以南山為宗真悟智圓律師允堪著會正記等文識者謂其超出六十家釋義之外何不可者至大智律師元照復別以法華開顯圓意作資持記又與會正之師殊指矣不特此也四明法智尊者知禮孤山法慧大師智圓同祖天台同學心觀真妄之異觀三諦之異說既已抵牾之甚霅川仁嶽以禮之弟子又操戈入室略不相容諫書辨謗之作逮今猶使人凜然也其他尚可以一二數之哉嗚呼毗盧華藏圓滿廣大遍河沙界無久無餘非相而相非緣而緣非同而同非別而別苟涉思惟即非聖諦又何在分教與禪之異哉又何在互相盾矛業擅專門哉又何在操戈相攻遽背其師說哉雖然適長安者南北異塗東西殊轍及其所至未嘗不同要在善學者慎夫所趨而已比丘永壽嘗以閩僧一源所著護教編示豫自大迦葉至於近代諸師皆有傳贊文辭簡古誠奇作也壽獨惜其不著教禪承傳同異之詳請豫為記以補其闕略豫因以所聞疏之如右文繁而不殺者欲其事之著明蓋不得不然也王忠文公褘叢録中載佛學一篇與此文同末一段云佛之為道本無二門自去聖既邈源遠而流益分於是師異指殊各建戶庭互相矛盾禪則譏教為滯於名相教則譏禪為溺於空寂若律之為用雖禪教所共持而取舍各不同至於為教禪之學者又各立異以取勝一彼一此不相出入自教宗言之慈恩立三教天台則分四教賢首則又為五教自禪宗言之慧能與神秀同受法於弘忍能則為頓宗秀則為漸宗道一神會同出於能道一則密契心印神會則復流於知解其不同如此至若天台教宗之一也而四明知禮孤山知圓性善性惡之說如水炭之不相投臨濟禪宗之一也而或以棒或以喝至橫川珙則復以聲偈其示人之要如柄鑿之不相合支派乖錯論說紛紜殆不得而悉數也忠文與文憲同里同門故其問學之相合如此夾注輔教編序天生東魯西竺二聖人化導蒸民雖設教不同其使人趨於善道則一而已為東魯之學者則曰我存心養性也為西竺之學者則曰我明心見性也究其實雖若稍殊世間之理其有出一心之外者哉傳有之東海有聖人出焉其心同其理同也西海有聖人出焉其心同其理同也南海北海有聖人出焉其心同其理同也是則心者萬理之原大無不包小無不攝能充之則為賢知反之則愚不肖矣覺之則為四聖反之則六凡矣世之人但見修明禮樂刑政為制治之具持守戒定慧為入道之要一處世間一出世間有若水炭晝夜之相反殊不知春夏之伸而萬彙為之欣榮秋冬之屈而庶物為之藏息皆出乎一元之氣運行氣之外初不見有他物也達人大觀洞然八荒無藩籬之限無戶閾之封故其吐言持論不事形跡而一趨於大同小夫淺知肝膽自相胡越者惡足以與於此哉宋有大士曰鐔津嵩禪師實洞山聰公之法嗣以二氏末流之弊或不相能也取諸書會而同之曰原教曰廣原教曰勸書曰孝論而壇經贊附焉復恐人不悉其意自注釋之名之為輔教編若禪師者可謂攝萬理于一心者矣豫本章逢之流四庫書頗嘗習讀逮至壯齡又極潛心於內典往往見其說廣博殊勝方信柳宗元所謂與易論語合者為不妄故多著見於文辭間不知我者或戟手來詆訾豫噤不答但一笑而已今因虛白果公重刻是編其有功學者甚大故執筆言之嗚呼孰能為我招禪師于常寂光中相與論儒釋之一貫也哉獨視霄漢悠然遐思者久之旃檀大愛妙色三經小弓先佛所說旃檀香身大愛妙色三陀羅尼經皆西天譯經三藏朝散大夫試光祿卿明教大師法賢奉詔所譯其在法藏與瑜伽大教王經凡二十七等同車輦字函中功德所被或療惡疾或救海難或出生際諸鬼趣資以解脫誠心求之靡不應感蓋我如來大誓願故神通力故慈憫有情故一彈指頃即能成就無邊殊勝經言可信真實不虛天界沙門太初肇公信之為尤力於是命工鍥梓以廣流通介其同袍一林桂公徵濂引其首夫佛法廣如虛空然無始無終無內無外苟欲繪畫而贊詠之非愚則惑矣姑書其概以起讀者之信心云丹陽居士賀學仁男賀烺賀炌賀焜施資共刻護法録第六卷計字一萬零二百六十六箇該銀五兩一錢三分三厘桐城釋在定對句容潘省耕書進賢陳叔道刻天啓辛酉元年春四月徑山化城識
