body:
  text: 皇明金華宋濂著雲棲袾宏輯虞山錢謙益訂記蔣山廣薦佛會記皇帝御寶曆之四年海宇無虞洽于大康文武恬嬉雨風時順于是恭默思道端居穆清罔有三二與天為徒重念元季兵興六合雄爭有生之類不得正命而終動億萬計靈氛紏蟠充塞下上弔奠靡至煢然無依天陰雨濕之夜其聲或啾啾有聞宸衷衋傷若疚在躬且謂洗滌陰鬱升陟陽明惟大雄氏之教為然乃冬十有二月詔徵江南有道浮屠十人詣于南京命欽天監臣羌以榖旦就蔣山太平興國禪寺丕建廣薦法會上宿齋室卻葷肉弗御者一月復敕中書右丞相汪廣洋左丞胡惟庸移書于城社之神具宣上意俾神達諸冥期以畢集五年春正月辛酉昧爽上服皮弁服臨奉天殿群臣服朝衣左右侍尚寶卿梁子忠啟御撰章疏識以皇帝之寶上再拜燎香于爐復再拜躬視疏已授禮部尚書陶凱凱捧從黃道出午門寘龍輿中備法仗鼓吹導至蔣山天界總持萬金及蔣山主僧行容率僧伽千人持香華出迎萬金取疏入大雄殿用梵法從事白而焚之退閱三藏諸文自辛酉至癸亥止當癸亥日時加申諸浮屠行祠事已上服皮弁服榗玉珪上殿面大雄氏北向立群臣各衣法服以從和聲郎舉麾奏悅佛之樂首曰善世曲上再拜迎群臣亦再拜樂再奏昭信曲上跪進熏薌奠幣復再拜樂三奏延慈曲相以悅佛之舞舞人十其手各有所執或香或燈或珠玉明水或青蓮花冰桃暨名荈衣食之物勢皆低昂應以節上行初獻禮跪進清淨饌史冊祝復再拜亞終二獻同其所異者不用冊光祿卿徐興祖進饌樂四奏曰法喜曲五奏曰禪悅曲舞同三獻已上還大次群臣退諸浮屠旋遶大雄氏寶座演梵咒三周以寓攀駐之意初斸山右地成六十坎漫以堊至是令軍卒五百負湯實之湯蒸氣成雲諸浮屠速幽爽入浴焚象衣使其更以綵幢法樂引至三解脫門門內五十步築方壇高四尺上升壇東向坐侍儀使溥博西向跪受詔而出集幽爽而戒飭之詔已引入殿致參佛之禮聽法于徑山禪師宗泐受毘尼戒于天竺法師慧日復引而出命軌範師咒飯摩伽陀斛法食凡四十有九飯已夜將半上復上殿群臣從如初樂六奏遍應曲執事者撤豆上再拜群臣同樂七奏玅濟曲上拜送者再群臣復同樂八奏善成曲上至望燎位燎已上還大次解嚴群臣趨出濂聞前事一百凄風戒寒飛雪灑空山川慘澹不辨草木鑾輅一至雲開日明祥光沖融布滿寰宇天顏懌如歷陛而升嚴恭對越不違咫尺俯伏拜跪穆然無聲儼如象馭陟降在廷諸威神眾拱衛圍繞下逮冥靈來歆來饗焄蒿悽愴聳人毛髮此皆精誠動乎天地感乎鬼神初不可以聲音笑貌為也肆惟皇上自靈御以來即詔禮官稽古定制京師有泰厲之祭王國有國厲之祭若郡厲邑厲鄉厲類皆有祭其興哀于無祀之鬼可謂備矣然聖慮淵深猶恐未盡幽明之故特徵內典附以先王之禮確然行之而弗疑豈非仁之至者乎昔者周文王作靈臺掘地得死人之骨王曰更葬之天下謂文王為賢澤及朽骨而況于人夫瘞骨且爾矧欲挽其靈明于生道者則我皇上好生之仁流衍無際將不間于顯幽誠與天地之德同大非言辭之可贊也猗歟盛哉祠部郎中李顏主事張孟兼蔡秉夷臧哲職專禱祠親睹勝因謂不可無紀載以藏名山以揚聖德于罔極同請濂為之文濂以老病固辭弗獲既為具列行事如右復繫以詩曰皇鑒九有憲天惟仁明幽雖殊錫福則均死視如生屈將使伸一歸至和同符大鈞其一元綱解紐亂是用作黑祲盪摩白日為薄孰靈匪人流血沱若積屍橫縱委溝溢壑其二霜月凄苦涼颸酸嘶茫然四顧精爽何依寒郊無人似聞夜啼鑄銕為心寧免涕洟其三惟我聖皇夙受佛記手執金輪繼天出治軫念幽潛宵不遑寐爰啟靈場豁彼蒙翳其四皇輿載臨稽首大雄遙瞻猊座如覿晬容香凝霧黑燈類星紅梵唄震雷鯨音號鐘其五鬼宿渡河夜漏將半飆輪羽幢其集如霰神池潔清鮮衣華粲滌塵垢身還清淨觀其六迺陟秘殿迺覲慈皇聞法去蓋受戒思防昔也昏酣棘塗宵行今焉昭朗白晝康莊其七法筵設食厥名為斛化至河沙初因一粟無量香味用實其腹神變無方動皆充足其八鴻恩既廣氛盭全消乾坤清夷日月光昭器車瑞協玉燭時調大庭擊壤康衢列謠其九惟佛道弘誓拔群滯惟皇體佛仁德斯被無潛弗灼有生咸遂史臣載文永垂來裔其十欽錄集云洪武五年壬子春即蔣山寺建廣薦法會命四方名德沙門先點校藏經命宗泐撰獻佛樂章既成進呈御署曲名曰善世曰昭信曰延慈曰法喜曰禪悅曰遍應曰玅濟曰善成凡八章敕太常諧協歌舞之節用之著為定制四年十一月二十一日欽奉聖旨御製廣薦佛會榜文命都省出榜曉諭天下官民士庶人等跋蔣山法會記後附予既從祠部群賢之請為撰法會記一通自謂頗盡纖微近者蒲菴禪師寄至鍾山稿一編其載祥異事尤悉蓋壬子歲正月十三日黎明禮官奉御撰疏文至鍾山俄法駕臨幸雲中雨五色子如豆或謂娑羅子或謂天華墜地之所變十四日大風晝晦雨雪交作至午忽然開霽上悅敕近臣於秦淮河然水燈萬枝十五日將晏載事如記言及事畢夜已過半上還宮隨有佛光五道從東北起貫月燭天良久乃沒已上三事皆予文所未及蒲菴以高僧被召與聞其故目擊者宜詳而予耳聞者宜略理當然也屢欲濡毫補入之會文之體製已定不復重有變更保寧敏機師請同袍以隸古書成茲卷來徵余題故為疏其後使覽者互見而備文云又云右蔣山廣薦佛會記予嚮為儀曹諸君所請而作一則鋪張帝德之廣一則宣揚象教之懿意雖有餘而文不足以發之叢林之間往往盛傳徒增愧赧而已葦舟上人留意宗門樂善如不及近來南京亦繕書一通持歸吳中求予題識左方嗚呼佛法之流通靈山付囑恒在國王大臣讀予記者當知王化與真乘同為悠久猶如天地日月萬古而常新猗歟休哉又余既造此記自知筆力衰弱無以發揮聖皇崇尚佛乘之深意豈期大方叢林競相傳布殊用悚而雪山成上人復索余書一通藏諸篋衍以上人好學之切不欲固辭之雖然余文固非佳然昭代制作之盛足以為千萬世之法者亦備著于其間後之續僧史者必當有所擇焉日本瑞龍山重建轉法輪藏禪寺記我佛如來其正法之流通者有三藏焉一曰修多羅藏二曰阿毘曇藏三曰毘尼藏惟此三藏化導使一切有情滅妄趨真誠昏衢之日月苦海之舟航也琅函玉軸多至五千四百四十八卷眾生根鈍莫能融貫善慧大士以方便力造為毘盧寶藏函經其中一運轉間則與受持讀誦等無有異攝大千于機輪所聚功德不可思議由是薄海內外凡有伽藍者必設置藏室焉日本沙門文珪介鄉友令儀來告予曰本國平安城北若干里有禪寺曰轉法輪藏舊名寶福廢壞已久無碑碣可徵莫知其何時建立正應元年肯庵全公從周防法眼藤道圓之請嘗就遺址而一新之而僧本覺及梅林竹春巖玪相繼來蒞法席自時厥後風雨震凌又復摧塌弗支白草荒煙芻蕘之跡交道矣貞治三年眾以文珪或可以起廢力舉主之初寺無正殿唯有藏室一區藏之八楹皆刻蟠龍作升降之勢數著靈異因祀之為護伽藍神至應安二年文珪欲建殿于其前忽神降于一比丘曰我神泉苑善如龍王也伽藍神來云大藏將傾乃視之漠如而欲有事于殿功是棄所急而不知務也宜亟易為之否則我足一搖此地當為湖苟遵吾言改奉王家神御則國祚佛法皆悠長矣言訖仆地覺而詢之絕無所識知事聞于王王大悅曰余憶幼時乳母時禱八龍之神事正相符即遣中納言藤元賜今額元之行有雙白鷺飛翔前導至寺而止人異之未幾王遜位號太上天皇給地若干畝以廣寺基文珪殫厥志慮出衣盂之資簡材陶甓使其堅良崇室上覆機輪下承鉅木中貫方格層列經匭櫛比繪像精嚴神君鬼伯翼衛後先所謂楹上八龍者塗以金泥鱗爪焜燿角鬣森張陰飆肅然似欲飛動國人聚觀無不慶愜文珪復奉今王之命請贖一大藏經安置匭中規制整飭視舊有加焉經始于某年月日訖功于某年月日縻錢若干貫米若干斛役人若干功大上既棄群臣文珪別于寺東若干步建盤龍院以奉神御如神之所言云文珪近受王命出持使節貢方物于上國大明皇帝嘉其遠誠寵賚優渥文珪敢籍是有請于執事願為文持歸勒諸堅玟以示無極予聞七佛尊經實貯龍宮海藏在昔龍樹尊者嘗入其中睹華嚴經上中下三本因記下本以歸西土是則天龍雖以戒緩在龍種中而其向乘之急得于華嚴會上圍繞盧舍那佛與聞大乘圓頓之教終非他族可及經藏所在其能擁護而顯靈異也宜哉日本初無輪藏有之其從茲寺始文珪承國君之命孜孜弗懈以起廢為己任亦可謂流通大法者已予既為記其事且演說藏中真實了義為偈以繫之文珪字廷用篤志禪觀善繼大林育公之學者也偈曰世尊大慈父憐憫諸有情自從鹿野苑直至跋提河說無量玅法普度于人天根雖有利鈍隨機獲饒益弟子所結集汗牛復充棟善慧施善巧收攝在轉輪圓樞運動間地軸相回旋法王所說法一一皆現前譬如日月燈能放大光明無非真般若不見有一法似茲功德聚盡在轉移內一轉詰習空淨如青琉璃二轉加精進直入智慧海三轉到彼岸安住涅槃城以至千百轉轉轉俱一同循環若弗停我輪未嘗動此以何因緣動靜無相故瑞龍有精藍重建毘盧藏中函貝葉多字如恒河沙沙沙各具佛不翅那由他還以一佛攝攝盡無復餘大包于無外小則入無內是謂神通藏萬劫終不磨非比有漏因成壞每相仍所以天龍眾在在悉護持有時著靈異雷電儵變幻守此清淨域外道不敢干我持如意輪讚此大乘法告爾諸佛子晝夜須勤行有悟片言間全體即呈露不著前後際廓然無聖凡豈惟佛子等龍神亦當聽乘戒二俱急共成無上道四明佛隴禪寺興修記沙門行原不遠千里踰大江而來京師謁余而言曰鄞之天童山岑銳綿鬱上接空際其支隴蜿蜒南下爭奇競秀蒼翠相繆信為靈僧化士之所窟宅後唐莊宗時人見有紅光燭天謂為浮屠氏祥徵因名其地為佛隴焉大比丘咸啟樂其幽邃可以縛禪自天童分其徒結廬以居已而開拓如他伽藍宋至平元年賜額曰保安然猶以甲乙為居守至熙寧五年始釐為十方禪剎主者照玨乃大覺璉公之法嗣黑白瞻依如水赴壑于是悉撤弊陋而更新之夫以有形之物終歸于壞日就月將漸致頹圮元至正某年住持文舜重搆釋迦寶殿未及完而去二十四年江淛行省丞相康里公時領宣政院事選天童內記大基丕禪師主之禪師既至升座說法已環顧而歎且曰起廢吾之責也四輩其無憂居久之歲豐人和儲積漸充禪師曰可矣亟召匠氏補未完之殿堅緻有加若丈室若演法之堂則因舊而葺之若三解脫門則新作之以至廡庫庖湢之屬靡不修治如法復集眾因摶土設像如來中居二弟子旁侍曼殊師利及普賢大士或騎獅子或乘白象王東西而從護法大神各執其物梵容生動如欲語者經始于二十五年之某月落成于國朝洪武二年之某月惟禪師蚤得法于左庵良公通外內典梵行清白薦紳之流皆愛敬之故能于干戈俶擾之中成此勝緣了無難者今雖遷住補陀洛迦山而猶寤寐不離于佛隴禪師之功我眾安敢忘莫堅匪石願圖文歸而鑱諸予聞我佛如來為一大事因緣出現于世蓋以眾生汩沒妄塵念念遷謝起滅不停過去者始息見在者紛拏未來者已續二六時中不知暫捨以此纏縛沈痼出彼入此猶如車輪迴旋無有休止于是興大悲心為說三乘十二分教誘掖蓋欲眾生捨妄趨真以成正覺像教東漸日新月盛凡方州列邑名區奧壤莫不有梵宇禪廬以安處其徒眾亦欲解佛之言行佛之行以究夫妙湛圓明之性而已俗習下衰或藉此為利養而不知先佛忘形為道之計盍不思之香積之供五味豐美視日中一食者為何如穹居華寢方床邃筵視樹下一宿者為何如是宜精進策勵如上水舟單篙直進如磨鐵杵必欲成針不至于成功不止可也禪師之締搆艱勤其意誠出于此圓頂方袍之士于千而來熙熙而處者尚無負禪師之所望哉雖然如來出紅蓮舌輪遍覆大千界中至今演說妙法大地眾生無不得見無不得聞況日照而月臨風馳而雨駛山峙而川流真常之機時時發現無一刻止息有能于此證入世間名相一時頓忘其與如來清淨法身非同非別回視是剎飛樓湧殿雖居塵世亦與香水海中華藏世界等無有異予也不敏盡閱三藏灼見佛言不虛誓以文辭為佛事今因行原之請略為宣說以記寺之成使其徒知所自勵若曰專紀歲月以告來者嗣葺之則其意末矣龍游重建證果寺記我釋迦文佛慈憫有情設宏闊勝大之教真應弘願罔不霑被故凡日月之所照霜露之所墜皆沐浴至化出離苦輪得清淨行列禦寇書所載不治而不亂不言而自信不化而自行蕩蕩乎人無能名者信不誣矣是故塔廟之所在金碧焜煌照耀無際雖其淪壞有時或囿乎數曾未幾何又皆興復如初觀乎此者可見大法之流行與天地相為無窮者矣衢之龍游縣東四十五里有證果道場實始于唐貞觀初縣人士虞道延捐宅宇為之悉入腴田其中已而祝髮受具戒為開山第一祖且以的傳自號修習禪觀誓不忘于正宗一時龍象聞風坌集稱為虞延法師云唐季之亂變為瓦礫之區在宋之初休堂慧公嘗重興之至宋季又廢無住行公入主法席又從而興之逮元季又廢今住持靜山仁公與其同袍本全周公謀曰茲寺自法師創建以來甲乙相傳克底于今日不翅七百餘年之久一旦使其堙墜吾儕之恥也盍相與起其廢乎周公忻然諾之各捐私橐之積以為眾倡乃持曆走民間民有力者嘉二公之淳愨各施其所有遂命斲木淘土之工相與從事至正癸卯二月某甲子新造釋迦寶殿殿凡三間演法之堂其數視殿而嬴其三曰解脫門則數與堂同兩序視門而嬴其二十又五皆次第落成復摶士塑佛菩薩諸像鍊黃金為紙而飾之洪武丙辰九月某甲子又建藏經之室一區而懸鍾之樓亦煥然一新至於棲僧之房凡七各設層搆篴堂靡不具足其制度不異巨剎崇廣嚴麗視昔有加雕甍璇題上凌霄漢彤扉曲砌下映林谷梵唄互聞鍾魚相答往來觀者咸謂當此像教衰落之時能化灌莽之墟而為無上寶坊非賢且智者能致是乎莫不躊躇歎詠而去仁公亦自以締搆艱勤欲俾後人聞知相與保持于悠久忘其春秋之高奔走青蘿山中徵文以記之余按佛說尊那經云無盡功德甚深微妙乃有七種而建立精舍實居第二又按福田經云廣師有七德梵天福而興立佛圖僧房堂閣實居第一嗚呼佛言如是世之人往往斥經營塔廟為有漏因果恒棄之而不務亦何可哉二公惓惓焉以紹述法師為己任斯可謂允合契經之旨者矣雖然樓閣之在世間有成有壞一剎那頃萬變不齊有若吾心所具寶華樓閣先天地而不知所始後天地而不知所終劫火所不能焚毘嵐風所不能破真如無礙湛寂常存學佛者又當于此而求之庶幾精粗不遺理事雙盡者已斯言也非予之私言也蓋嘗風諸師云重建龍興奧源寺記龍興奧源寺在撫之金溪縣北一里後枕鷓鴣之岡前有一峰銳如卓筆上插霄漢而幕阜雲關兩山對峙乎西東若駐若馳若起若伏其秀拔殆難名狀靈宮秘宇之所托也固宜唐元和中有大比丘某飛錫而來徘徊顧瞻縛茅栖止于其中厥後漸成巨剎樓閣崢嶸鍾魚互答于山光水色間一時龍象固嘗盛矣宋崇寧初蕪壞弗治已而復興元至正中江右兵起官署民廬盡罹焚毀寺亦不能以獨存金碧之區倏幻為瓦礫之場荒煙野燐更互明滅使人有悽然之思東曉大師自幼受經斯地喟然歎曰在我法中有為無為皆第一義諦起廢之任吾可不究心乎其徒十有一人驩然相之閭右之族亦間有施貲者于是伐木于林攻石于山徵瓦于陶眾工雲興罔敢後時大師躬程督幾忘食寢遂卜厥日以成功告寶殿中峙邃閣後居旁挾二廡前敞三門以至庫庾庖湢之屬罔不就緒復摶土肖佛菩薩暨護法金剛神諸像梵相嚴穆見者生敬經始于某月日訖功于某年月日初刑部司門員外郎王君經三世與大師游凡大師有所營為皆捐財倡之大師知刑部君與予友善因請具其事狀求予為之記予聞大雄氏說法耆闍崛有重閣講堂之壯麗所以奠安其形軀庇覆其徒眾初未聞其露坐于日星風雨之中也世之昧者弗之察悉諉諸興造為人天有漏之因倀倀然曰吾志諸內不騖諸外彼役志于事功者果何為也哉殊不知般若場中理事無礙內外混融遍覆一切不即世間不離世間苟徒拘泥而墮斷滅之見則違道遠矣今大師耽悅禪味有所證入熾然建立無非佛事其智識過人殊甚備著其事勒諸堅玟庶可為馳騁空言者之深戒歟大師名嗣暹字某族王氏東曉其號也有長材所蒞之處廢無不起既創安樂院于蓋竹原復重造金禪師塔庵恢其土田已而庵爇于火又搆成之及今奧源之役其功為尤偉所謂十有一人則行真希儆希晏希住希誠法旭法吾法昶法椿法睿慧澄其學行皆有可稱云杭州天龍寺石佛記濂自休致以來頗一至杭憩永明慧日峰下天龍寺與永明相去不五里而近其主僧月舟禪師行滿要濂出游寺乃唐天龍尊者駐錫之地宋乾德三年吳越王錢氏為建寶坊因名天龍王之女曾刻木作觀音像畀之至今猶存大中祥符元年改額為感業建炎三年毀于兵元泰定元年擇基于寺南一百步仍重建寺曰天龍焉寺後皆山相傳為越王臺奇石峭秀如瑪瑙森列從寺西斜迤而上僅三十步小塔出灌莽中蓋藏天龍舍利處又斗折而北入妙莊嚴境門又西行六十步平巖幽邃鐫成無量壽佛像塗以黃金累甓為洞戶作欄楯護之香華之器咸刻飭像又刻心經般若繫以太平興國六年左峙石洞尤奇傍勒饒雲齋三字詩一章不能全辨巖前地夷曠月舟云疑此即寺故基柱礎尚在竊按錢氏造寺在太祖乾德四年至太宗太平興國三年方納土上距建立之時已一十七年又三年方有刻像未必其初置寺于此也又東折二十步有慈氏如來暨天親無著侍衛七像其莊嚴一如無量壽又東折三十步又有寶陀大士像石壁上刻天龍寺光明石六字月舟云石能夜現光怪故名其莊嚴一如慈氏三處仍勒佛號于石以金填之濂既周覽徘徊太息顧月舟問其故月舟云斯事甚異國朝洪武七年秋七月十又一日野燎發延及寺山風挾之為聲勢光焰射天黑煙已罩殿廬行滿大懼向木觀音像哀號期與殿俱燼或力解之乃脫三衣祝而焚已而反風滅火繼之以雨明日行山中藤蔓榛棘盡幻為灰始見石像呈露或井沒塵土間行滿驚喜為之剜剔澡滌命工繪飾嚴護如此實其年之冬十月也先是有神光起寺西四十步久而愈明因掘地驗之獲石觀音像舁歸奉之東廡旱潦疵癘禜禱立應由是依歸者眾寺得重振逮今五十六春秋矣今諸像畢出似非偶然之故然寺無一肘之田每乞食以為養而黑白之眾幾二千指非徼靈于大雄氏其能致然歟不可無以示來者明公以文辭為佛事願為書諸碑仍累甓為室以障雨風使與石像同為無極不識可乎濂聞佛之肖像古無有也有之自優填主始東土眾生兢則效之恒聚土以擬梵形或謂土不能悠久復易之以木又慮木可致朽而更之以石石固堅矣亦難期于無壞乃因山而鑿之庶幾與天地同畢大則數十尋小則六七尺在在有之如來以慈憫之故感其精誠時變幻景光以歆動之錫釐卹胤無所不至誠難量功德海也雖然天地亦一物也物必有壞唯本然之佛超絕萬彙而不可以成壞言人具有之而或未能思故濂之為此記使讀者內觀知所重在此而不在乎彼也寺之興復別自有記非像之所繫茲不詳書育王山廣利禪寺塗田記明之廣利禪寺名列五山為浙河東一大叢林緇衣之士執瓶錫而來者動以千計舊雖多土田而淪沒者過半一遇乏食必持缽走民間以乞食為事寺之長老普濟禪師光公既為正其侵彊復謀買田以助之既齎志而歿其弟子象先輿公恢廓而有為乃慨然曰先師之志我不可不就也市奉化縣腴田若干畝有畸錢以緡計者十千九百有畸俾其徒嘗輸力于其間者若廣融若景𪔇等輪掌其事歲收其入六百斛薦于寺中以補其不足且建屋三楹間以為儲偫之所爰伐堅石屬予為之文而勒步畝鄉落之詳于石陰予謂象先之功侈矣固不可以不書然為文之體因其事而著其理始為得之請借田為喻以勵夫進修之士何如象先曰不亦善乎士之進修則不昧因果所謂竊攘質鬻之禍不作吾田固有永而不廢矣予因請佛為證結跏敷坐為說偈曰大田在海濱厥土惟塗泥何物不可藝藝禾乃有成禾根入土已當加保衛力涵受乃糞壅耘耔復以時勿使惡草生若非雨露滋亦不能生成數者既能備時至自然熟嘉穟累累然遍及郊野中我心有如田諸種靡不納青黃與白黑隨其所種生菩提譬嘉禾種之即有秋持戒為保衛忍辱為涵受布施為糞壅精進為耘耔智慧為雨露禪定道乃成人力一不至田雖號膏腴蒿萊日夜長雉兔之所藏蛇虺共出沒化為荒薉區欲求一粒粟有不可得者我心倘不治其失亦復然治心如治田豈不以此故上人最方便市田繼先志食此緇衣眾頓免饑火煎食者或感觸寧不思前喻嗜道如嗜食定知顆粒微視如萬金重進道功或怠亦不易消受刻文于貞玟讀者知自勵更加護持力常使食輪轉吳門重建幻住禪庵記姑蘇幻住庵者元普應國師中峰和尚本公所建立也國師既得法于高峰妙公唯恐人知而挽其出世深自韜晦往游三吳間大德庚子國師年三十又八嘗憩閶門之西麓見松檜蔚然成林問名于居人則曰此鴈蕩也國師喜曰永嘉有鴈蕩山乃應真諾矩羅示下現之所名與之同其般若之當興邪吳士陸德潤聞其言遽以地施之國師縛草庵三間以居趙魏公孟頫為扁之曰棲雲國師趺坐其中而問道者連翩而來至于五百指之多乃創精舍一區僧俗趨功不三月而就所謂堂房門廡咸具乃請名于國師國師曰澄澄水鏡能現之幻體昭昭影象所現之幻跡幻與幻盡覺與覺空斯則超悟之極至也吾儕依此如幻三昧而住宜以幻住名之當是時若南詔之無照鑑西江之定叟泰荊南之鐵印權冀北之指堂月號為一時麟鳳咸集輪下幻住之名藉藉于四方矣又明年壬寅松江瞿霆發延主天目山大覺正宗禪寺國師不俟終日避走南徐而向之相從者皆水流雲散唯絕際中玉亭立二師素掌庵政相守于寥寞之濱自時厥後二師復入寂立之徒湛源止止之徒用庵照補苴漏而思繼承為尤謹元季兵亂一旦蕩為塵埃而不可致詰矣用庵日憂之圖為興建之計僅四十年皆次第就緒而復國師舊觀實國朝洪武戊申之春也庭曲之碑久未有刻文會濂朝京師道過吳中用庵以記為請濂聞國師之道東行三韓南及六詔西連印度北極龍沙莫不躡屩擔簦咨決法要然其心未嘗自以為足屢卻名山而不居飄蕩窮崖孤洲之上誅茅結廬在在以幻住名之其故何耶蓋謂主持宗教必無上大道必夙植福緣必明智通變具是三者然後可其意誠有所激欲以身捍大法俾之去澆而還淳也用庵思祖武是繩木茹澗飲夙夜究明本心其亦可謂無忝于國師孫曾者乎嗟夫諸法固幻也而住者亦幻也知住者之非住始知幻而非幻也幻而非幻則如幻三昧在焉雖然非幻亦幻也是為記蘭溪法海精舍記義烏伏龍山有大浮屠曰千巖禪師長公以高峰之孫中峰之子表樹法幢倡明教外別傳之旨非惟中夏學徒海赴雲蒸遠而龍荒蠻甸弁韓巴僰之人莫不持薌膜拜咨決疑情而其上首弟子既皆于道有證各搆蘭若分續化機大江南北往往有焉若今有源師所建法海精舍亦其一也有源名允清金華人淳熙丞相王魯公諸孫蚤嘗受經石門剛公元至正辛巳繼往千巖座下得度為大僧留神禪觀脅不霑席者十年一旦入室機鋒相撐觸雹撒飆揚莫窮涯際千巖欣然頷之乃屬其出游閩浙江淮間以求印可有源所見諸師了不異千巖時退隱故山文彩自露尋以郡守之聘出世衢之子湖安國禪寺遷信之王山興教禪寺百廢具興皆有光于前人國朝吳元年丁未飛錫蘭溪之龍巖樂其山縈川迴風氣襲藏乃歎曰吾知宮宅地形之術蓋有年矣察其祥徵無有弗驗者如此靈壤可不開般若之場乎遂即南洲建法海精舍一區越三載乃成後聳傑閣中峙寶殿前敞高閎兩序眾寮映翼左右有源徵予為之記予年踰七十凡索文者皆峻斥見有源素髮垂領道貌淵雅語言悃愊無華不覺心許之因為敷坐而倡言曰法界有情種種顛倒執妄為真四大假合如水上沫聚散無定強指為身六塵緣影如火中燄起滅弗停堅認為心隨因成果墮入諸趣出此入彼類風轉輪大覺聖人起哀憐心廣說三乘十二分教使其照知本來真心廣大靈智無物不含無理弗攝心佛眾生三無差別本來真心圓滿空寂周遍百界不動纖塵惟寂智用合三為一人能有所悟入始能了空障執直超無上菩提然非因像生敬因敬生悟思求脫離如無舟筏欲濟大河無有是處古之導師方便設化廣闢精廬為之棲止嚴事像變為之瞻視潔清香華為之供養皆使其革妄趍真了此身心而已今有源灼見于斯取則前古鞠明究曛孜孜弗懈亦可謂度越人人者矣雖然此實人天小果之因耳或具大乘器者來游來止當知萬法本空一塵不立大光普照涉入無礙無佛道可悟無眾生可度洪纖高下草木走飛色色形形紛紜舛錯皆吾一實境界樓觀云乎哉修證云乎哉嗚呼教外別傳之道廣矣大矣又當從此而參之精舍之建其用錢僦工動以千百計茲不詳書而獨舉身心之要為言者財輕而法重也仁和圓應庵記杭之仁和去城東五里所有浮屠庵曰圓應乃雪庵禪師之所築也其地當元季為戰鬥之區莽無居人及歸職方而後遺民稍集往往好勇嗜利屠羊豕以成肆師惻然憫之托缽行化有褚道真與金薌者首迎禮之先是道真之家人夢異僧至其廬倡偈為贈及見師容貌服飾儼然與夢中不殊道真即言之于眾翕然從化遂與薌日乞食饋師且請于右族胡國材其建精舍一區葉氏婦聞之捐地為基以尺計者縱袤若干橫延若干于是道真因之鳩工前敞修門中峙佛殿後聳堂宇翼以兩廡而外則垣墉四周庀事于洪武甲寅春二月甲子至秋七月某甲子遽訖功焉屋以間計者二十粟以斛計者一百工以日計者五百師欲垂示後人乃不遠千里介予學子童徽來請記予竊疑之當兵戈始息創殘猶未起何暇從事于佛乎縱師言之而疇將聽之徽曰不然師之事則有異于人者師本辨章寶寶公之子生有異徵年十五慨然慕道思以善法度人往依帝師法子朵兒班大師薙落為僧遂杖錫南游遍參閩浙諸尊宿得法于伏龍山千巖長公去棲越之范蠡岩岩有虎一夕避去師初不知書靜定之久發為頌贊自然與道合以是之故人愈趨之而庵成無難者予因歎曰人苦無志耳果能以善導人而人孰不化之豈惟浮屠氏哉然而浮屠氏以莊嚴樓閣為有為縱有福報亦人天小果耳其中必有無為之道存所謂無為之道者無小無大無內無外無成無壞無欠無餘不為諸佛而有所增不為凡夫而有所減淵默不言而聲如怒霆凝定未起而身遍沙界是則所謂圓應者也一庵云乎哉惟師能契事理之不二者必知予言為有據徽歸尚以是語之師舊名孛羅帖木兒今改可傳字無授高昌人雪庵乃其徒所號蓋尊之也浦陽栖靜精舍記浦江縣東十五里其地曰花山地勢夷曠宜學佛者居之元至正己亥同縣淨住院沙門明叟昌公與其弟子無聞聰公卓錫于茲晝夜以禪寂為務庚子建演法堂成辛丑佛閣成壬寅大佛寶殿成三門兩序庖庫像設以次咸具皆二公之締搆而諸徒智觀如玢處仁行滿竭力佐佑始克告完于是置山林田園各若干畝用給薪米之費定為成規使甲乙相傳戒勿血食醪飲違佛大禁雞鳴而起日入而息爇香梵唄以祝釐報上不敢怠遑昌公遂名之曰栖靜精舍云初千巖禪師長公說法義烏伏龍山昌公實往咨叩禪師憫其求道懇切示以禪要昌公遵行甚力逮夫功至心空一旦無疾辭眾而說偈云生本非生滅亦無滅撒手便行虛空片月說已端坐而逝時國朝洪武丙辰十月三日也昌公既順寂聰公繼之弗懈益虔深懼來者不知植業之艱勤來徵予文為記俾嗣葺之以致悠久予游宦南京二十年今始納祿而歸州里之事皆若無聞之每見白麟溪隱者鄭源談昌公之制行甚峻而左溪曰師亦備道聰公護戒絕謹因不讓而為之言曰佛之妙法如芬陀利華雖生于水不著于水清淨自然無所染污故契經有云于身無所取于修無所著于法無所住所以然者蓋恐墮于有漏之因也然而根有勝劣功有偏圓未可一軌齊之初機之士必假法像以攝麤執積久馴熟至于心法兩忘始為得之不宜遽謂崇建塔廟之為非也從有漏以至無漏法門次第豈不粲然可徵者乎昌公之建立于初棲禪靜寂洞徹心源談笑去來曾無留礙此又非明效大驗乎嗣守之者宜鑑昌公之所證毋廢其舊規毋隳其成事缺則補而葺之弊則更而新之庶幾不墜前人之志可以入菩提之門而超煩惱之海矣乎昔我大雄世尊以聖賢天人修行住處付囑星宿天龍藥叉大鬼神等分布守護故凡佛剎之所營創幽明之際必有尸之者矣豈曰偶然之故哉不惟僧伽之徒當繼承惟謹世之宰官及賢士大夫多寶長者亦思因果之不昧相與護持之使其永勿壞可也是為記浦陽善應精舍記大德十一年我大雄氏說法度生凡其住處眾所依止以是因緣成大蘭若象教東漸遂建道場湧殿飛樓在在而是其中亦有折一莖草插標立壇作佛事者小大雖殊及其籍是明自心性如指指月指有短長因指見月了無有異浦陽山中有一沙門號曰景岑發大弘願自無始劫以迄于今或神或天或阿須倫泥黎旁生拜諸鬼趣隨業所感輪轉不息所以者何為貪欲故貪故不捨不捨故有我今思惟咸悉棄去搆為梵居見者聞者皆大懽喜輸田荐貝奔走承事大德乙巳迨于丁未凡三暑寒以潰于成殿庭靚飭門廡峻整中像大士踏寶蓮花真珠瓔珞微玅莊嚴旁繪天王暨龍神眾各執器械呵護正法雖悍男子叫呶墮突眾怖畏者來入是室俛首作禮五體投地比諸道場與折草者無小無大同一應感我聞如來真實境界無佛菩薩亦無眾生凡所有者皆是空假如摩尼珠日光所照五色燦爛謂生於珠非日則隱謂出於日光因珠見畢竟二者和合而成根塵互入亦復如是真如妙性本自空寂一物則無況茲室廬盡涉虛幻有無之相在剎那頃豈若心境兩捨不有寂用常如然後出世布大法雲震大法雷澍大法雨俾諸根莖悉獲沾潤是則無真如來遺教若乃執著有漏因果被伽黎衣作塵勞事如蝜蝂者愈重愈困要求解脫無有是處我今復欲廣宣此義而說偈言我觀自身相四大所假合自頂下至踵種種非真實一旦四大離我復在何處我身且不有何況身外物縱彼金銀寶珊瑚及琥珀玻璃瑪瑙等聚如須彌山於己不相涉眾生苦愚癡執著以為命求之不憚遠或入鉅山中逢著諸猛獸或泛大洋海黑風飄船舫流入羅剎國軀命不能保此以何因緣蓋為貪欲故由貪漸滋蔓業障永不淨我今建梵居皈依大悲父旛蓋及床座一一盡莊嚴籍是像教力欲捨諸所有所有既空故空空亦無有譬如大圓鏡中放無量光不去亦不來不內亦不外如如屹不動隨物悉現形苟涉世間相執此有漏因何以能出離汝等比丘眾當識我所說於一剎那間悟此無上道金華安化院記金華安化院在縣東二十里舊號安國宋治平二年更今名嵩頭陀法師所立道場稽諸傳記法師名達摩西域人梁天監十七年自金陵攜鐵魚磬來鳥傷之香山尋于龍腋置寺普通元年南行經余山江水大溢法師張蓋水中亂流而濟至稽亭塘發善慧大士神蹟創伽藍于來山已而西入金華建龍盤寺以及今院後入滅于龍丘資政殿學士洪文安公作郡志時既失于蒐輯不載院之緣起而復謂法師以吳赤烏二年實建龍盤夫赤烏二年係己未歲天監十七年則戊戌也凡歷二百八十年當是時法師之齒又不知其幾矣何其壽耶他不足徵者蓋可知已院既多歷年所其佛菩薩護法天神諸像乃唐貞觀元年所雕宋慶曆三年重加藻繪國朝洪武十年冬十月郡之善士唐良胡貞及比丘宣政各飾其一悉塗以黃金良又勸聚郡力以畢其餘其釋迦寶殿舊搆于宋淳熙三年歲久弊壞元至正十七年冬十二月住持元厚新之其潮音堂至正四年冬十二月主僧宗旨作之其七佛殿建于太定三年秋七月三解脫門造于至正元年秋九月皆住山祖良成之其兩廡仍宋德祐元年之舊庫院復營于元延祐元年冬十一月則諸僧捐資之所致也精進沙門彌堅今已甲乙嗣補其處念院故無碑碣不詢謀于眾命其徒永琇齊賢詣青蘿山中徵文以為記濂聞之西域之僧來中夏者自攝摩騰竺法蘭之後代不絕人往往以宣譯教相建置梵宇為急如法師者亦其一人也菩提達摩之來在普通二年正與法師同時雖曰絕去文字以矯末流之弊而其理行貳人固兼取籍教悟宗之言奈何後世岐而二之禪則直究心源以文句為支離教則循序進修以觀空為虛妄互相訾嗷去道逾遠然以密意言之依性說相非息妄修心者乎破相顯性非泯絕無寄者乎以顯示言之真心即性非顯明心性者乎軌轍雖若稍殊究其歸極則一而已奈何後世岐而二之此濂之于法師不能無所感也斯院乃法師肇立歷代嗣守遺緒隨成至保雕像于七百餘年之久外籍勝因內修覺觀理事雙至不即不離其于達摩氏之道固未始有異也嗚呼希矣是尚可與俗人言哉濂嘗過院中見二豫章圍可十五尺許鬱鬱然如車蓋屹立于門氣象森邃不問知其為古招提矧居是者多樂善好施而永琇等又頗注意禪教不敢墮于一偏有足嘉者故勉從其請而發吾之所感授之以文非惟補郡志之闕緇素讀之必有蹶然而興起者金華清隱禪林記清隱禪林在婺城西三里所禪林而謂之清隱者何昔者郡人士劉主簿嶠嘗隱居于此嶠字子淵事親極孝家雖貧力學聚徒以養非道義錙銖不取蓽門土鉶怡愉如也老干場屋一試吏而止風節行義翕然為邦人所稱說齋先生唐公仲友父子王莊敏公師心尤敬慕之宋淳熙初文閣侍制南澗韓公元吉來守婺訪主簿君于隱所愛其林壑幽清而汲甚遠為鑿井竹間名之曰君子泉泉至今猶存後一百七十餘年為元之至正壬辰有大比丘蘭室馨公既得法于千巖長禪師乃與同袍古道猷公飛錫而來欲建禪林說法度生于是月溪壽公聞二師之賢詣前作禮亟捐茲地以為之基而里中樂善者曰章壽之倡眾聚貲為建殿宇及雕飾諸佛尊像已而棲僧之堂會食之所與夫門廡庖庫諸室次第告完皆二師同心化導之所致而名之曰清隱者蓋不忘其故云當是時五山十剎鐘魚絕響游方之士至無憩足之所君子為之慨焉永歎惟禪林僻處斗隅往來者憧憧弗絕靡所不容多或一二千指皆使其忘行役之勞飲香積之味是誠何理哉蓋二師以誠感人以勤率物故施者川至而日用不匱也予聞佛說毘奈耶律云父母于子有大勞苦護持長養資以乳哺假使一肩持父一肩持母亦未足報父母恩由是觀之大雄氏言孝蓋與吾儒不異夫名區勝地世豈無之二師不彼即而來卓錫於茲誠欲表主簿君之高風而以孝道化度眾生庶幾弗悖如來說律之本旨也嗚呼賢哉圓頂方袍之士入斯林者談空說有之餘尚思感發奮勵有以念其親可也蘭室既已示寂古道今主持其事堅苦清峻為四眾所傾慕云金華永寧禪庵記金華縣東五十五里有一土阜延袤數里餘曰羅漢山先是宋元豐間里之善士鄭君克允與其弟克明于其地冶鐵鑄阿羅漢像五百一十有八山因是而得名像今猶在西巖石佛寺克允則資政殿學士鄭忠愍公剛中之太曾父也二百餘年之後有楊氏子名允真者居于山側與其室人王氏本淨尊禮大雄氏之道同往烏傷伏龍山謁千巖禪師入室弟子蘭室馨公受大乘三聚淨戒凝神入空以縛禪為事一夕夢異僧若來自西域者告曰汝宜于羅漢山建永寧庵以修學禪定覺而異之即其地經行見其坡阤演迤氣象夷曠遂欣然入念慮銖積寸累搆佛廬三楹間中塑觀音大士華冠瓔珞寶相殊勝時則至正戊戌之春也樂善之徒捐山若園五十畝奉之允真手植青松蔚乎成林而庫樓西廡俱先後就緒諸什器百需之物亦莫不備給持瓶錫而來過者日暮塗遠一時一憩神靈之區應真之所示現夫豈偶然必有龍鬼晝夜護持使般若之種孽芽其間亦其勢使焉允真欲為久圖請予文勒石俾世世擇異姓有善行者主之而楊氏之族人不與也予聞神所必至也羅漢之山昔嘗產鐵鄭君兄弟命金工鼓鑄諸像像成而鐵已竭協氣充牣祥光未散禪菴之建實符嘉應宜乎允真之成此不難也然而造者不難而繼者為難嗣主其席者尚思允真之勞勩一椽片瓦視之不翅寶璐庶幾繩繩相傳至永久而弗墜苟或不然則夫冥報之慘具諸載籍予何忍言之讀斯文者尚知所自警哉允真字無識敦實而無為最為近道父曰天祐母姓金氏云寶蓋山實際禪居記衢之龍游縣北三十五里有山曰寶蓋川媚山明而林樾鬱蒼儼與靈區奧壤相埒然僻處下邑無有啟其閟者初盧江有沙門良亮冶父山實際禪寺無用聰公之弟子也沙門年既壯出遊叢林歷叩諸師久未能證入聞千巖禪師長公說法于婺之義烏伏龍山亟往見之禪師普應國師本公之嫡子門庭浩蕩俊衲雲擁見沙門為人誠愨可與進修時加警策之已而命司藏鑰使日閱經律論玄文久之陞居第一座禪師間謂沙門曰如如真性迥出根塵祥光發現照燭乾坤非有絕念之深功不能超出死生而入常寂之場子盍縛茅于重山密林而究明之乎沙門躍然以喜即日下山選地以居之至正丁酉春行至今所俯仰四顧有以愜其志遂駐錫焉遐邇嚮慕奔趨恐後富者捐資貧者效力伐石于巖掄材于林梓人運斤獿夫薦圬不戒而集猶務其私僅四三年功即就緒法堂三楹間成未幾釋迦殿又成其楹間如法堂之數中設三世如來之像左右翼以天王皆用黃金塗之兼之床座華旛及凡供具清淨嚴肅觀者起敬庫院僧室之在東西又如佛殿之數兩廡揆之則溢其五別敞小門樓以為出入之地徑術曲折而蓮花池品列于前四圍有水環之蓋一倣伽藍之制沙門因出實際遂以名其禪居云惟大覺世尊其道所被甚廣無與比倫人徒見中國九州能嚴奉之殊不知西南之諸國如呵羅單于陀利之屬以道里計近或數千遠且二三萬餘而尊崇為尤至國君相祝常以世尊如來稱之則其他概可知也此姑置之勿論又自西方言之自中國歷十萬里至五印度從五印度以西又越大海二重始抵西入之境道塗比前奚翅數倍其所歷城郭人民繁衍富麗又百倍于中國其地唯知有佛教而已餘皆無有也至于巷談里語一舉佛言以為法戒稍有不信而妄行者眾共棄之以此而觀若東若北莫不皆然是故鄭漁仲有云佛之書遍布天下而儒家之言不越于跋提河蓋有以也然乃史傳所載及東伐西使親擊者之所言咸屬南閻浮提南閻浮提則妙高山四隅之一爾經言百億日月百億妙高山皆漸佛教則又非管窺蠡測之所敢知也或者則曰佛書多取譬之言果可盡徵乎曰吾儒亦有之也騶衍謂天下有九九州而一九州則有裨海環之人民禽獸莫能相通如此者九則有大瀛海環其外乃天地際焉禹之所序中國九州其于天下八十一分居其一耳豈獨佛書言之哉余嘗惡夫淺見狹聞之士不足以語大方類夫營寧生人身中游泳腸胃自謂江河之廣周流府藏自詫萬里之遠不知身外之境初無涯涘也所以輕于論議迂固僻陋聞者為之失笑其不智也亦甚矣今因沙門請記余故特一言之使入此禪居者讀吾之文又有以知大覺世尊其道所被甚廣無與比倫則嚴奉之心逾堅嚴奉之心逾堅則將世世嗣而葺之俾不墜壞庶有以副沙門之所願欲若但紀其興起歲月稍涉文學者人人能為之又奚假于余哉沙門號西山精進入道至老猶不懈云栖雲室記中峰本禪師結廬姑蘇城西以為禪定之室翰林學士趙文敏公書其扁曰栖雲迨今數十年中峰卒而廬亦頹壞中峰之孫用庵照師作新室于故址復取故名揭之而屬予以記余笑曰師其欺予乎哉今之廬非昔時之所築也今之人又非中峰也而猶曰栖雲何哉室廬之壽以百年計人之壽以數十歲計禦燥濕閱寒暑屹乎有不傾之勢毅然有不亡之意今欲求而見之且不可得矣彼雲者起滅萬狀不可斯須審視奚為而久棲此室哉文敏公取以為名固異矣師取而重揭之又異也余復以言文之不亦甚異乎雖然自其易化者觀之則天地曾無殊于水中之漚自其可久者觀之流電之光可使比于歲月自其有形者觀之泰山可以齊于毫芒自其無形者觀之一髮可以擬于嵩華久速巨細者跡也有跡者固不足恃以不壞不可以巨細久速論者道也斯道也何間于古今新故之分哉然則安知今之廬異于昔時之所築今之人異于昔之人哉而雲也安往而不在乎嘗試與師登姑蘇之臺而覽古今之變三吳之間崇臺廣榭涼亭燠館敷金碧而壇丹瑤極人力而窮物狀者何可勝數蓋有歌舞未畢而號泣繼之車馬陳于庭而狐兔已游于寢席矣彼之富麗奇瑰苟與栖雲之室絜量大小何啻岡阜之于沙塵今彼皆不復得守而此猶能新其棟宇而不廢何耶蓋無道以保身者雖富麗不能久存而有道之士身亡而名立固不隨世以為變遷也吾坐乎斯瞑目而思之充乎室皆雲也皆中峰也入吾耳而接吾目者皆道也中峰之徒苟有志于道孰不可為中峰哉尚何取于區區之故名也乎師近道者盍以吾言求之松隱庵記唯庵然禪師有道之士也嘗謁石室珙公于霞霧山公告之曰子去我而求憩息之所其必松江之華亭乎華亭民富而趨善富則樂于施與趨善則可化以吾佛之道其必有以處子矣書松隱二字授之以行師如其言至華亭郭匯之陽止焉郭匯者去華亭三十里赤松溪之所注也前有查山後有九峰皆先哲示化之地師憶懸記遂結茅而居其中里人吳某聞乏捐金帛割土地之籍來上願師止勿去遐邇相繼輦石與土堙匯增址以相其役而金彭邵三氏以創建為己任始工于元至正壬辰越二年甲午而佛有殿僧有堂亢而為門夾而為廡凡日用之所宜有者皆具取石室所書名之曰松隱庵師恐歲月滋久無知庵之始末者命其徒慧開同淨慈藏史可傳請文而刻之夫天下之民未有與人以物而不求報者爭尺布銖金多至相毆詈戕害雖親戚不復顧念至見釋氏之徒獻所有捨所愛累千萬不敢靳者其故何哉蓋我大雄氏以慈悲方便攝受群迷慧力足以破貪法智足以祛惑故人樂而趨之庶幾期于妄息而真顯乎或者不知徒謂釋氏能以禍福鉗制人故有所翼而為之嗚呼是何待釋氏之至淺哉然余有一言焉今之細民竭三時之力欲其室廬之完饘粥之充而不可得釋氏之徒皆坐而享之苟不力求其道無忝于大雄氏之教則因果之皦然者甚可懼也有若師者無求于民而民自赴之其道蓋有度越于人者矣承已成之業者多怠而不知自修故詳其辭以告後之人豈非師之所願乎師松江人少祝髮于無用貴公中謁千巖長公于聖壽寺遂傳其道後嗣主其席刺血寫經天花毿毿滿庭云叢桂樓記叢桂樓在杭天龍寺之左偏主僧大道禪師作之大道諱善平越漁浦人初受業寺之慶菴吉公尋升天目山問道于普應國師已而來歸憫天龍之廢且久也慨然有興復之志時瓦礫荊棘散漫左右幾無所容足而大道橐無錙銖獨操一缽日走市中得食舁歸以食眾工得錢以易材木金石百用之具不四三年而佛殿三門兩廡皆成四方學徒之來者皆仰以食于是復以其餘作斯樓左丞周君伯琦以叢桂扁之既而大道以至正辛卯七月十一日示寂其徒奉全身瘞諸樓右而建塔其上且請月菴禪師述其故屬余以記斯樓樓乃大道憩息之所將以致其思焉而余獨感大道之立志堅而成功速也今夫有威力以使人者莫過乎有司有貨財以使人者莫過乎富室然其有所興作皆聚眾謀役群力而為之猶且磨以歲月多者數十年少者十餘年而後成今大道累然一僧非有貨財威力之可使人獨用口舌化導市井之民取其財與力以為己用成宏偉勝大之功若易易焉者雖曰佛氏之教足以動人之信聽然非大道之有志不能也蓋人惟患無志有志矣患守之不堅有志而能堅事無不可為者況一寺乎余嘗病有志者之寡而于大道深有感焉嗚呼後之居斯樓者孰非大道之倫哉讀余言而思大道之為人則斯樓與斯寺不廢矣請記者曰圓淨圓如皆彬彬雅飭有志于禪觀者今居斯樓云松風閣記夫風者天地之噫氣然則生生者誰哉生之者靜之體而應之者動之用也當其萬竅怒號前者唱于而隨者唱喁咸物之自取也庭宇之松蒼髯奮傑于晨露夕月之中遇鮮飆過之冷冷然如鸞鳳之鳴如琴瑟之音昔者陶隱居恒樂之後世幽人狷士又從而效之或取以名其室焉方外恬師靜庵來徵所謂松風閣記予請極其變者而言之可乎始風之未生也斂神功于寂默之中昏昏冥冥萬象雖具不見其跡天機一動隨品物以流形大海遇之重波復浪一瀉萬里千山逢之鱗甲掀動笙鏞間作經簷蔔之林則郁烈酣潤清芬之襲人入鮑魚之肆則腥穢逆鼻觸之而噦嘔如此者不可以一二數苟獨指松而為言非所以極風之變者也然其變者豈皆有繫于風之動哉先覺有云風性本靜以緣起故動儻其性本動則寧有靜時是則物各有以自取也且以吾心言之大用繁興之時怒氣熾然如霆奔火烈喜色熙然如霧廓霞舒興哀則千人霣涕鼓勇則萬夫莫敵皆此一心之變也然心果有變乎心無變其所變者緣爾故當本體澄湛之際無物不有而無一物之留以近取譬所謂生之者靜之體而應之者動之用豈非然歟予家浦陽大山中青松羅垣舍之北南明月之夜白露初零默然出坐庭際松聲到耳乍大乍小或亟或徐中心頗樂之方知隱居酷愛之者良有以也自松聲而推之世間之聲萬變不齊雖不可勝窮其道亦不外是矣嘗一滴之鹹而知滄海之性窺寸隙之光而見日輪之體又何以紛紜為哉恬師學佛之流故予極其變而告之須知變之中而有不變者存不變者何前所謂心者是也心無體段無方所無古今無起滅三世諸佛不見其有餘河沙凡夫不見其不足恬師能索之于此焉則松風朝夕所演無非大乘微玅之法隱居惡足以語此哉閣在越之耶溪上季蘅若公之所建者因得徑山範公所書松風二大字遂揭以為名予謂徑山古之名德其字不可褻玩宜別求善書者易之既告之故復為記其事如右其詳則見天竺法師道公所為文其玅無以加矣予何言哉沖默齋記保寧禪師以沖默號其齋居來徵予記予按字書沖者虛也默者靜也即佛氏空寂之義也惟其沖也故默則沖為體而默為用惟其默也故沖則默為本而沖為末二者之理恒若相因未有默而不沖沖而不原于默者也夫太虛寥廓縱橫自如陽運陰行真宰不動此兩間之沖默也自無生有從有入無外雖紛紜中實有定此萬象之沖默也靈光洞然出入無礙諸緣自忘大用常寂此一心之沖默也我念不生法從何起生滅本空而況于法此諸法之沖默也沖默之義大矣哉嗚呼有情之類亦云夥矣奈何營營逐妄擾擾迷真竭晝夜而實其所無反覆膠滯不求脫離是不知有沖者也風性所激運轉不停欻焉凝冰倏焉焦火十二時中無一息少寧是不知有默者也非大覺真人出而救之將何所底止乎然而玅明真性不涉三際元自沖虛本由默靜無所不容無所不具因無所不容故萬有歷然而未嘗有窒于虛因無所不具故群動森然而未嘗有離于靜靜故非動動亦靜也虛固非實實亦虛也沖乎默乎其造道之樞要乎彼李伯陽所謂致虛極守靜篤者若近乎沖默而涉乎有為也韋應物所謂隱拙在沖默者欲藉是處世以保和為沖寡言為默者也而非其至者也然則何以為至乎必也入不二之門而後真知默也真知默者則無所事乎沖也禪師汲汲求法者也嘗揭沖默以自勵故為略疏體用本末而言之然亦未嘗有所言也禪師名覺慧字敏機吳興人出世嘉興之祥符近從四輩之請分座說法于大天界寺尋主保寧禪剎蓋有志之士也丹陽居士賀學仁男賀烺賀炌賀焜施貲共刻護法錄第五卷計字一萬七千一百五十箇該銀八兩五錢七分五厘桐城釋在定對句容潘省耕書吳文刻天啟辛酉元年夏四月徑山化城寺識
