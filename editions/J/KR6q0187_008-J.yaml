body:
  text: 皇明金華宋濂著雲棲袾宏輯虞山錢謙益訂序送無逸勤公出使還鄉省親序皇帝廓清四海遂登大寶遣使者播告諸蠻夷俾知元運已革而中夏歸於正統其稱臣者高句驪最先交趾次之琉球瑣里又次之于時日本良懷亦令僧祖來奉表而至上嘉其遠誠詔以天寧禪僧祖闡瓦官教僧克勤為使護其還國克勤字無逸通儒釋書湛堂法師諸孫也上召見端門與闡同受法衣軍持錫杖諸物之賜筮日啟行先是日本王統州六十有六良懷以其近屬竊據其九都于太宰府至是被其王所逐大興兵爭及無逸等至良懷已出奔新設守土臣疑祖來乞師中國欲拘辱之無逸力爭得免然終疑勿釋守臣白其事于王王居洛陽欲延闡住持天龍寺無逸獨先還無逸奉揚天子威德諭以禍福必期與闡俱王聞其志不可奪命輿馬來迎經涉北海時近六月大山高插霄漢積雪如爛銀行一月始至館於洛陽西山向陽精舍執國政者猶申天龍之請無逸曰我使臣爾非奉帝命不敢從王如欲闡敷宣大法宜同往請於朝否則有死而已君臣聞之皆大慚服議遣總州太守圓宣及淨業喜春二僧從南海下太宰府備方物來貢所虜中國及高句驪民無慮百五十人無逸化以善道悉令具大舶遣歸無逸等自太宰府登舟五晝夜即達昌國州已而赴南京仍見上端門無逸備陳其故闡亦附奏曰島夷不知禮義微勤臣不能再瞻龍顏矣上悅召對者非一或賜食禁中自持厥後各齎白金百兩文綺二縑皆有副上忽顧侍臣曰勤一沙門爾乃能不辱君命如此學孔子者未能或之先也親賜手詔諭其父華毅使其加冠巾出仕無逸亦念去國三年將還鄉行省覲之禮中朝大夫士幸無逸遭逢盛際競賦詩餞之而以首簡授予序予聞大雄氏設教門雖廣其推仁及物要與二帝三王不大異是故昔之名僧或籌策疆閫或輔弼廟堂事業稱於當時勳名垂於後世其載於史傳者蓋班班可考達人大觀初無形跡之拘儒釋之異也方今堯舜在上治具畢張無逸出將使命言論慷慨已足落倭奴之膽若使施之有政大綱小紀粲然有序他日將與皋夔稷咼比肩是亦法如來行證菩薩道而已大雄氏或親生斯時亦未必不韙無逸之所為也無逸之東還也雲漢昭回之章照臨東越東越人士無不舉手加額以為天光下燭為禎為祥而無逸尊公秪奉璽書當誨之以父子君臣之懿予尚何言哉姑摭其出使之績序以為贈春向暮無逸將戴笠而來予則具壺觴俟於龍江之上矣洪武實錄九年秋八月以華克勤為考功監丞克勤紹興蕭山人少學浮屠洪武四年選至京奉使日本還奏對稱旨賜白金百兩命復姓氏授以是職攷潛溪集克勤和御製詩在洪武六年奏請日本夢窗禪師碑在洪武八年皆云官考功監丞而實錄載授官於九年八月恐國史之誤也恭跋御製詩後附釋門宏勝無理不該無事不攝其於忠君愛物之心亦甚懸懸凡可以致力雖身命將棄之況其餘者乎人徒見其厭離生死輒指為寂滅之行嗚呼此特見其小乘者爾吾佛之為教豈至是哉天寧禪師祖闡仲猷以高行僧召至南京會朝廷將遣使日本詔祖闡與克勤俱祖闡不憚鯨波之險毅然請行上壯之賜以法器禪衣之屬令太官進饌饗於武樓下且諭其國敬浮屠宜以善道行化時天界禪師宗泐嘗賦詩餞之其詩上徹御覽遂俯賜和答詩凡一十八韻首言王化無遠邇一視同仁次言宜誘以善道庶契西來祖意次言經涉海洋雖甚艱險君臣大義毋忘次言以平等法行之無有彼此之異末言使畢言旋方盡始終之義其叮寧反覆之意不亦至哉祖闡受命而行自翁洲啟櫂五日至其國境又踰月始入王都館於洛陽西山精舍一遵聖訓敷演正法無非約之於善聽者聳愕以為中華之禪伯亟白於王請主天龍禪寺寺乃夢窗國師道場實名剎也祖闡以無上命力辭之且申布威德罔間內外所以遣使者來之意王悅命總州太守聞溪宣同僧淨業等奉方物稱臣來貢祖闡既入覲天顏怡悅賜白金壹佰兩文綺二縑祖闡以謂遭逢盛際躬承光寵不可無以示後裔乃粉黃金為泥書上賜和詩成卷勒其副名山屬濂識其事於左古之帝王寵賚方外之士固不敢謂無之而鮮以天章賁飾之者今祖闡之逢可謂優缽曇花千年一現者矣其東旋也將見五色天光垣赫於龍山之上晶晶熒熒直燭霄漢飛潛動植皆與有榮耀焉抑濂聞普覺杲公昔處浮屠中而念君愛物之念皦如出日張魏公稱其非聲聞獨覺私厭生死者比人至今言之祖闡固普覺諸孫也其出將使指不辱君命倭人慕化稽首來庭豈樂寂滅者可冀其萬一哉宜其簡在上心而褒嘉之命屢下也濂不佞忝居法從故不辭而為之書上以昭帝德之廣被下以白釋氏之有良材云王士騏皇明馭倭錄曰按洪武實錄洪武三年三月遣萊州府同知趙秩持詔諭日本國王良懷十月良懷遣僧祖來進貢并僧九人來朝又送被擄人口詔遣僧祖闡克勤等八人護送還國七年五月僧祖闡克勤等還自日本詔賜祖闡克勤白金一百兩文綺帛各二匹祖闡等奏日本贐馬命受之六月日本遣僧宣聞溪等來朝貢馬及方物時日本國持明與良懷爭立宣聞溪等齎其國臣之書達中書省而無表文上命卻其貢仍敕中書省向者國王良懷奉表來貢朕以為日本正君所以遣使往答其意豈意使者至彼拘留二載今年五月去舟纔還備陳本國事體云云十四年上命禮部遺書責日本征夷將軍中有至尊嘉惠日本故遣克勤仲猷二僧行及其至也加以無禮今又幾年矣夫聖諭諄諄一則曰拘留二載一則曰加以無禮則兩僧之不得志於倭可知野史不覈其真而信僧家之粉飾遂以趙秩之奉使為兩僧之功豈實錄乎他如上和宗泐送祖闡詩御製集不載何也錄以博覽者訂焉按祖闡克勤使日本事王冏伯據實錄盡疑野史之誣非也文憲送克勤序云日本疑祖來乞師中國欲拘辱之無逸力爭得免據實錄祖來為良懷所遣良懷方以竊據被逐日本疑祖來因疑護送祖來歸國者此其情也序又云王欲延闡住持天龍寺先遣無逸還無逸再三以死爭之日本既以祖來疑中國其請住持雖曰延之實則拘留耳此即聖諭所謂拘留二載及十四年遺書所謂加以無禮者也無逸歸見上端門備陳其故闡亦附奏島夷不知禮義微勤臣不能再覲天顏矣此實錄所載今年五月去舟纔還備陳本國事體云云也所載白金文綺之賜皆與實錄同上顧侍臣言勤一沙門乃能不辱君命諭其父華毅使冠巾出仕則日本之于闡勤以拘留始以慚服終蓋克勤之力居多安得謂二僧攘趙秩之功洪武六年克勤官考功監丞見實錄十年高皇帝手詔諭山西布政司華克勤見御製文集安得謂野史之言皆僧徒粉飾也實錄主存大體故紀僧事頗略賴文憲集稍志一二高皇帝御製詩見於文憲跋甚確文憲身在禁林豈肯附會僧徒與國史牴牾耶日本之崇佛自唐已然臨濟一宗流傳最盛聖祖遣僧化導有微權焉萬曆初虜王求僧及經江陵命宣大巡撫勿拒且云經必有高皇御製序文方可與之嗚呼知聖祖之微權者江陵也送覺初禪師還江心序往時有大比丘孚中信公以松源五傳之學提唱護龍湖上覺初恩公實與之分座說法罏鞴宏施烹凡煆聖機鋒所觸抉飆奔霆四眾皈依如水赴海曾未幾何孚中示寂覺初乃出世於建業之聖泉遷永嘉之雅山法道亦既大行於時已而江心虛席若牧守若戍將若賢士大夫僉以謂江心古叢林思陵昔日駐蹕之地其名列在江南十剎非有名德如覺初不足以厭服人心各具書疏以延致覺初覺初以慈憫故亦起而赴之及我皇上正位宸極隆興佛乘開善世院於大天界寺置統領副統領贊教紀化等員海內諸名山悉隸之掄選有禪行陟資級者伸為之主其非才而冒充者斥之於是循例為江心擇賢然終無踰於覺初者統領遂合群議仍請覺初居其職會余奉詔總修元史來南京覺初亦振錫自江心而至握手共語情蓋歡如也覺初一旦忽來別曰吾將還江心子可無一言以贈乎嗚呼大雄氏之道頓與漸之謂也以漸言之初臨十信伏三界見思煩惱外凡之位也次至十住位斷見思惑兼斷界內塵沙及伏界外塵沙用從假入空觀次至十行位斷界外塵沙用從空入假觀次至十回向位則伏無明而習中觀已上之種三十通為三賢內凡之位也次至十地位各斷一品無明證一分中道入等覺位又破一品無明入妙覺位至於妙覺始名為佛以頓言之則不階等第直造心源圓妙如如超出三界無煩惱可斷無真乘可證無法門可學無眾生可度此心即佛彼佛即心不去不來忘內忘外不可以形相求不可以方所拘也大抵教中所攝頓漸兼收教外單傳頓為禪旨如來五時所說及拈華微笑無非共一妙用第以根有利鈍之殊故其機有遲速之異耳奈何末流之弊二家角立互相詆訶夫豈佛意也哉頗聞孚中雖參向上一乘日誦法華七卷致感異香滿室不散覺初於禪寂之餘亦留心於教相為人演說弗置是皆不徇一偏而將歸於大同者也敢以此為說以贈覺初覺初其以為然乎否乎雖然大雄氏之道不絕如線扶持而振起之非吾覺初是屬將誰屬邪覺初之還也布大法雲震大法雷澍大法雨使小大根莖無不霑潤豈不弘且偉歟覺初宜憂法道之衰而思日勉焉可也他日余幸杖策東歸訪覺初於海濱升孤之亭步海月之堂見月色與海光同一清淨予與覺初又當相視一笑塔然而相忘也是為序送慧日師入下竺靈山教寺受經序西竺之書動數百萬言雖其廣博漫衍若大海杳無津涯其義趣未嘗不著明剴切可以習而通之自判教諸師各執一說甲是乙非學者始不知夫所趣矣天台智者國師以五時八教判東土諸經五時則華嚴鹿苑方等般若法華涅槃也八教則頓漸祕密不定藏通別圓也其規模宏深節目森嚴可謂盡矣至真諦三藏則不然以涅槃等經為漸華嚴之經為頓漸之外別無他也新羅元曉復造華嚴疏分四教四諦緣起為別般若為通瓔珞梵經為分華嚴為滿滿則一乘別通分則三乘也吉藏師復立三法輪教華嚴為根本法輪三乘等說為枝末法輪法華為攝末歸本法輪法輪言其流轉而不息也自時厥後以釋迦經為屈曲舍那經為平道者此二教乃江南印之所建也以四阿含為四諦般若為無相華嚴為觀行涅槃為安樂大集為守護者此五教乃波頗三藏所說也以阿含等為四諦相大般若等為隱密相華嚴等為顯了相者此三時教乃三藏奘及慈恩基依解深密經所立也而賢首法藏復尊華嚴立為五乘初為愚法小乘二為大乘之始三為大乘之終終始二教並依地位漸次而成四則為頓不階等級一念弗生即入覺地五則為圓一即一切一切即一是為真俗互融具足圓滿無礙法門長者李通玄又別分為十時始為小乘有教為諸凡夫繫著世法以為實有還將有法轡勒彼心次言般若破有明空次言解深密經和會空有令其不滯一邊不有不空次言楞伽明假即真次言維摩即俗恒真次言法華引權歸實次言涅槃令諸三乘捨權向實次言華嚴於剎那際通攝三世圓融盡入一際次言大乘人天三乘雖是同聞得益皆別名共不共次言華嚴會中十方菩薩其來不同共會說法名不共共如是教相離析尤繁然猶據教觀而判之初不若近代寧師合禪教祕密而混言之也寧師以諸乘經律論而祖摩騰曰顯教輪以瑜伽灌頂五部護摩三密曼拏羅法而祖金剛智曰密教輪以直指人心見性成佛之言而祖菩提達摩曰心教輪其言非不佳而去佛之意益遠矣判教諸師家異說而人異論其紛紜有如此者嗚呼為釋子之學者不既難矣乎然不敢以此而遽少之也原其立教皆為對機機有不同教亦多種譬大醫王方便治疾狀有實虛鍼有補瀉隨其所見因時制之苟執於一為害滋甚彼諸師者亦復如是或遂以甲是乙非咎之不已過乎雖然九師興而易道微三傳作而春秋散吾儒且爾予又不得不為學佛者懼也今日師父遊方外以教乘之不易明將往大叢林從碩師而受其說聞予頗究內典求片言以為贈予言贅矣一真法性本自圓明其可以語言文字求之哉予言贅矣送用明上人還四明序佛之書其藏有三曰修多羅藏曰毗尼藏曰阿毗曇藏此則華言所謂經律論者也經則諸佛及菩薩天僊皆可演說論則諸賢聖僧皆可著撰惟律非如來金口所宣則有所不可者故自文殊以降不敢贊一辭逮於雙林入滅結集成藏而優波離尊者復口誦聖言十過眾證無差然後宣布其慎重而不輕也蓋如此然而中夏初未之聞也自曇柯羅持僧祗戒本來洛陽始知有律文又至唐之澄照師作戒疏羯磨疏諸書而律學大傳於天下謂之行事防非止惡之宗真悟師起于宋慶曆間復著會正記十二本以弘澄照之旨嗣真悟而興起者則有大智師焉復以法華開顯圓意造資持記雖與會正稍殊亦無非推明澄照之說而求合乎先佛之制嗚呼律學之難明也久矣自非三師者出而恢弘之其有不失靈山之遺教乎有其人則有其政又豈無望後來之法嗣乎用明上人本諸暨楊氏子素稱儒宦之族自幼從叔父白石琪公遊四明遂令捨家於慈谿崇福寺別江舟毓以為法孫別江能窮法華三觀十乘之旨歲為長期率同袍三十人而暗誦之得上人以為能繼其志極愛之而弗忘復命出湖心廣福寺從師而受律文大義所謂四波羅夷十三僧伽婆尸沙二不定三十尼薩耆九十波逸提四波羅提提舍尼一百眾學七滅諍大乘梵網經十重四十八輕等文皆欲習而通之及典事之久遷靈芝藏司之職今年之春與予胥會南京其威儀之雅問學之佳既足以動人視聽而遊戲篇翰亦皆清逸有可玩者淨覺大師以碩望宿德為釋子所宗亦以上人為法器俾出世於菩提律寺上人將還四明徵予言以為贈予謂律文大義有三師之述作在焉毋事乎多言顧力行何如耳然而律主於戒能戒然後能定能定然後能慧是則戒者作佛之階梯濟人之舟航也可不務乎律之義雖明而所謂持犯開遮之說誰復講而行之為其徒者亦可以永歎矣上人年甚茂志甚大其進未易量也幸勿安於卑近惑於旁岐恪然以三師之道自期則異日律學之再興者又安知不在于上人乎亦在上人自勉之而已予老且多病率爾成文殊無所發越頗聞白石師內外之學兼備蔚為時之名僧上人幸即而問焉其不斥予言為誕為謬則幸矣贈令儀藏主序予聞佛書一須彌山攝一四天下一四天下共一日月須彌有百億則日月有百億焉如是乃至恒河沙不可算數之天下佛法未嘗不流布其間況震旦一國邪日本在東海同為震旦之國又可分疆界之內外邪此所以同慕真乘而至人攝化者亦未嘗遺之也達摩氏自身毒西來既至中夏復示幻化持隻履西歸後八十六年當推古女主之世達摩復示化至其國世子豐聰過和之片岡達摩身為餒者困臥道左世子察其異解衣衣之已而入寂遂藏焉及啟棺無所有唯賜衣存事與隻履西歸絕類所異者當時無人嗣其禪宗爾自時厥後橘妃遣慧萼致金繒泛海來請齊安國師卒令義空比丘入東其首傳禪宗之碑信不誣矣至覺阿之嗣佛海遠道元之承天童淨達摩之宗駸駸向盛原大法之櫱芽實肇見於世子之時歟嗚呼亦可謂遠也已矣範堂儀公日本之人也俗姓藤氏修習禪觀夙夜匪懈至正壬寅秋航海自閩抵浙參叩尊宿咨決法要洪武癸丑冬復來蔣山為侍者尋遷掌藏史叢林中以法筵龍象期之範堂以予頗究內典圓頂方袍之士無不獲文句而去謁予以徵贈言予謂三藏靈文琅函玉軸世所嚴奉者凡五千四十八卷六百億三萬一千八百八十八言其刊定因果窮究性相則謂之經垂範四儀嚴制三業則謂之律研真顯正覈偽摧邪則謂之論三者莫不具焉範堂既司之矣司之寧有不受持讀誦之乎脫若以言演說之多無踰於此也如曰直指人心片言已為餘賸何在于博求耶雖然萬錢陳於前非緡無以貫之萬法散于事非心無以攝之假言以明心挈其綱而舉其要亦古人之甚拳拳者也大抵人有內外佛性無內外人有東西佛性無東西一真無妄充滿太虛大周沙界細入藐微光輝洞達皆含攝而無所遺範堂於此而證入焉一念萬年何今何古寂然不動誰佛誰生當此之時殆非世諦文字之可形容也達摩氏之所傳其大旨不過如是而已範堂遍參諸方諸方尊宿以範堂精進多所印可不知曾有不自寶祕而昌言若斯者乎予見範堂向道之切故舉百億須彌皆有佛法佛法肇興于日本者稍著見焉而末復申之以此者衛法之事嚴而利物之心急也送璞原師還越中序柳儀曹有云真乘法印與儒典並用人知嚮方誠哉是言也蓋宗儒典則探義理之精奧慕真乘則盪名相之麤跡二者得兼則空有相資真俗並用庶幾周流而無滯者也禪林之規分職授事各因其才而責以成功而於內記之選尤難其人凡有關於文辭之事頗資之以達務非熟采竺墳旁通孔籍未易以致之苟能從事于斯則說法名山師表後進階級將自此而升矣其任之重不亦宜乎會稽璞原師其名為德𬎌幼學浮圖法於諸林院長游大方遂干善世禪寺充內記之任善世為海內僧伽所宗龍象之所經瓶錫之所聚揮汗成雨張袂成帷一時號為極盛璞原非惟稱其職兼能近取遠攬深涵淺受而其學益進於前一旦將還東海之上與璞原游者咸惜其去相率發為聲詩命予執簡而序之因繫其辭曰世之學者夥矣溺文學者則局促經畬馳驟藝苑其流必外騖而忘返沈苦空者則措情高遠游志疏曠其流必內躁而失守所以皆倀倀他適不知正塗之從有若璞原其知真乘法印與儒典並用者歟處乎世間不著世間如環之無端不見其止如刀之剖水不見其跡其知空有相資真俗並用者歟循序而上此焉發軔他時出世為人其知所自重者歟予儒家之流也四庫書冊麤嘗披閱三藏玄文頗亦玩索負誇多鬥靡之病無抽關啟鑰之要近惟默坐存誠屏斥而銷霣之於是天光駿發靈景自融方知儀曹之云為漸門者設璞原春秋甚富宜達圓頓之旨尚思得魚兔而忘筌蹄歟白雲悅公時碩德也身居巖壑名聞禁闕璞原嘗師事而親灸之當以予言盾其然否白雲又將有以為璞原告也送季芳聯上人東還四明序吾佛之學明心而已矣然心未易明也結習之所膠滯根塵之所蓋纏沉冥於欲塗顛倒於暗室而不能自知必處乎重山密林之中木茹澗飲絕去外緣而直趨一真之境水漂麥而不顧雷破柱而弗驚久之馴熟忽然頓悟大地山河咸作碧琉璃色能如是不可謂無所證入然恐墮於空寂未敢自信又必擔簦裹糧不遠數百千里求明師而證之機鋒交觸如短兵相接失眼之頃輒至喪身失命及其印可已定退藏於密如護明珠須臾不敢忘去然而修多羅藏其多至於五千四十八卷大無不包細無不統其可委之為賸語耶又必出司藏鑰晝夜研窮之而畢知其說證之於言驗之於心既無分毫之不同矣於是不得已出世度人續佛慧命其階級之不紊功用之甚嚴乃如此奈之何今之執法柄者或不能皆然也余方為之浩歎不止有若季芳上人其蓋有以起余者哉季芳名道聯鄞人也幼讀儒書窮理命之學長依薦巖羲公修沙門行尋掌內記於大天界寺遂嗣法于淨覺禪師矩度雍容進退咸有恒則蓋溫然如玉者也叢林之中咸器重之或挽其為住持事則謙然不敢當且曰我心學未能盡明也三乘十二分之說亦未能盡通也我歸四明山中求諸己而已矣嗚呼若吾季芳之才之美如此苟使之主一剎而領四眾焉何不可者而乃退然不居則夫不及季芳而奔競欲得者為難言矣季芳行哉臨濟之子孫多有隱於鄮山鄞水之間季芳尚即而求之探古佛之真如繙諸經之妙義證入無量薩婆若海江南十剎諸名山當有遲吾季芳來說法者季芳雖欲自謙退不可得矣季芳行哉送天淵禪師濬公還四明序文辭之美者見之於世何其鮮哉非文辭之鮮也作之者雖精而知之者未必真知之者固審而揚之者未必至此其每相值而不相成唐有柳儀曹而浩初之文始著宋無歐陽少師而祕演之名未必能傳至於今蓋理勢之必然初不待燭照龜卜而後知乏也嗟夫浩初祕演何代無之其不白於當時卒隨煙霞變滅而無餘者豈有他哉由其不遇夫二公故然爾此余讀天淵師之所作其有感于中矣乎天淵名清濬台之黃巖人古鼎銘公之入室弟子嘗司內記雙徑說法於四明之萬壽近歸隱於清雷峰中蓋法筵之龍象也余初未能識天淵見其所裁輿地圖縱橫僅尺有咫而山川州郡彪然在列余固已奇其為人而未知其能詩也已而有傳之者味沖澹而氣豐腴得昔人句外之趣余固已知其能詩而猶未知其能文也今年春偶與天淵會於建業因相與論文其辯博而明捷寶藏啟而琛貝焜煌也雲漢成章而日星昭煥也長江萬里風利水駛龍驤之舟藉之以馳也因徵其近製數篇讀之皆珠圓玉潔而法度謹嚴余愈奇其為人傳之禁林禁林諸公多歎賞之余竊以謂天淵之才未必下于祕演浩初其隱伏東海之濱而未能大顯者以世無儀曹與少師也人恒言文辭之美者蓋鮮嗚呼其果鮮乎哉方今四海會同文治聿興將有如二公者出荷斯文之任倘見天淵所作必亟稱之浩初祕演當不專美於前矣或者則曰天淵浮圖氏也浮圖之法以天地萬物為幻化況所謂詩若文乎是固然矣一性之中無一物不該無一事不統其大無外其小無內誠不可離而為二苟如所言則性外有餘物矣人以天淵為象為龍此非所以言之也天淵將東還賢士大夫多留之留之不得詠歌以別之以余與天淵相知尤深也請序而送之贈定巖上人入東序大雄氏之道洪纖悉備上覆下載如彼霄壤無含生之弗攝也東升西降如彼日月無昏衢之不照也弘敷固假明於教儀妙悟須資於禪定所以銷融其麤濁振拔其精降伏其塵勞躋登其實際非知力之所強必頓覺而後成蓋亦戛戛乎其難矣為其學者當究厥誠一法不立而日用熾然六入本空而真機獨露雖有所證未能自信於是遠訪師資以求印可利鋒相觸雨雹為之交馳疑網既祛星月為之朗耀非具大慧充大量要不足以與於斯也定巖戒師吳興士族積菩提之因勵精進之學美譽流於四方純行信於四眾且以見聞未溥踐履或礙汎東大洋海而睹古佛顯化之跡登天台靈巖而詢應真示現之方波濤舂撞皆談苦空林木蔥蒨各彰實相此其立志甚不小也嗟夫世道既降正法不傳辭章之錦繡足以移易其性情勢位之肥甘足以斲喪其智慧雖方袍而圓頂或塵容而俗狀滔滔不返可勝歎哉有如定岩竱心為道如孤雲野鶴弗為世氛之所染如崇蘭幽芷弗為無人而不芳寧不為君子之所取乎所謂充大量具大慧者異日當于定岩徵之也定岩之還也且過南潯省親身居桑門心存孝道大雄氏所說大報恩七篇皆言由孝而極其業定岩又能行之矣則其所可取豈直前所云云哉會余詞林請書首簡顧文逋之叢沓兼羈思之繽紛筆無停思語多未醇同志之士刪而正之可也送允師省母序人之生天賦之以性父母遺之以體德莫大焉故雖尊有天下不敢不事天德為聖賢不敢不事親以是身非我有實天與親畀之也夫吾之身既有所本則凡吾所為者豈我之能為哉實天與親之所命而我行之耳安可忘所自而不察乎古之少恩者雖如申韓商鄧著書排擊堯舜孔子之道且不敢遺其親況於佛氏以慈仁為教者乎故棄其親者非佛氏之意愚者失之耳是以佛氏有報恩之經稱父母恩甚至而昔之賢者若陳尊宿之流多能盡於子道近世之稱名浮圖者亦未有不孝其親者也今上初立極猶恐愚者未察詔浮圖各拜其親定著為律於是習俗為之復美天台迪中允師浮圖之秀者違親而從師於外十餘年矣今歲至京師戚然念親不置將別其徒而歸省謁余求序以道其所欲行之意迪中通內典攻書而能詩其於事親固無庸告之然四方之學佛氏亦有久違其親者乎聞迪中之風而慕效者必名浮圖也贈清源上人歸泉州覲省序大雄氏躬操法印度彼迷情翊天彝之正理與儒道而並用是故四十二章有最神之訓大報恩中有孝親之戒蓋形非親不生性非形莫寄凡見性明心之士篤報本反始之誠外此而求離道逾遠清源上人曩自蚤歲即豔空門剃落於鳳凰之峰典藏於雙檮之剎無微不探有顯皆窮繼出世於龍華俄分座於天界宜了苦空之相庶盡有漏之因蓼莪忽詠陟屺成思贍巖雲之易孤歎春暉之莫報癡鈍翁之寄像終亦何心陳尊宿之編蒲願終其志於是儒門席上之珍法苑同袍之彥察其誠愨各繫聲歌且徵題於首簡用攄發其中情昔者柳州刺史投分濬師及覲省於淮南法鄭商之先犒屬為文采烜著叢林顧予末學焉敢效顰然而見善不揚非君子之操澆俗弗勵豈達賢之為有若上人歷抵大方期于深詣其欲明心見性者歟雖嘗絕學不廢明倫其知反始報本者歟契經最神之訓如來孝親之戒其能服行而弗悖者歟魯典竺墳本一塗轍或者岐而二之失則甚矣自慚蹇馳逐章逢知本跡之不殊思內外之兩盡嘉斯篤行吻合道謨聿增名教之重不昧原本之義表而出之以為世觀焉爾宣城居士徐日晉男徐鏞施貲共刻護法錄第八卷計字八千五百九十一箇該銀四兩七錢零一分江陰釋在琳對句容潘省耕書江右陳叔道刻天啟辛酉元年春四徑山化城寺識
