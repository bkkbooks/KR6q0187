front:
  text: 宋文憲公護法錄序謙益恭讀高皇帝御製文集稽首颺言曰天命我祖統合三教大哉蔑以加矣已讀故翰林學士承旨文憲宋公集則又嘆曰嗟乎夫憲章聖祖者舍文憲何適矣聖祖稱佛氏之教幽贊王綱開國以來凡所以裁成輔相設教佑神靡不原本一大事因緣而文憲則見而知之為能識其大者廣薦之記楞伽金剛之敘通幽明顯權實太聖人之作用存焉傅有之金鐸振武木鐸振文文憲其高皇帝之木鐸與由文憲以闚聖祖之文其猶易之有翼春秋之有傳也與聖人之言天也筭以周髀測以土圭而天體見焉于以憲章聖祖蓋思過半矣聖祖現身皇覺乘願輪以御天又憲應運而起典司禁林輔皇猷而宣佛教前代以翰林學士為內相高皇帝不置相文憲有相道焉雲從龍風從虎聖人作而萬物睹文憲以大儒應聘君臣之際史官頌之至今抑豈知其夙受付囑開華嚴法界于閻浮提其為雲龍風虎又有大焉者乎姚恭靖之于成祖閟現稍異要皆後天奉時佐二祖以章明佛乘日月未改聖謨洋洋而儒生掩耳如塵沙劫事豈不誖哉或謂文憲故服習程朱程朱辭闢佛氏凜干戎索何可越也於戲聖祖不云乎天下無二道聖人無兩心夫道譬之則日也聖祖出而日中天矣程朱見日于牖隙文憲見日于扶桑其廣狹至不同量也生盛明之世而墨守程朱終不能仰青天而睹白日悲夫文憲集無慮數十本余搜次其關于佛事者合諸雲栖所輯校定付梓而僭為之敘以諗于世之憲章者文憲三閱大藏入海算沙有如指掌在儒門中當為多聞總持至其悟因證地著見于文字中必有能勘辨之者固非學人所可得而評騭者也萬曆丙辰冬十有一月朔翰林院編脩虞山錢謙益謹序宋文憲公護法錄目錄卷之一國初應召大浮屠塔銘凡十有三人大天界寺住持孚中禪師信公塔銘天界善世禪寺第四代覺原禪師遺衣塔銘李大猷傳附佛日普照慧辨禪師塔銘寂照圓明大禪師璧峰金公設利塔碑銘佛性圓辨禪師淨慈順公逆川瘞塔碑銘大天界寺住持白庵禪師行業碑銘上天竺慈光妙應普濟大師東溟日公碑銘佛心慈濟妙辨大師別峰同公塔銘扶宗宏辨禪師育王裕公生塔之碑故靈隱住持樸隱禪師淨公塔銘處州福林院白雲禪師度公塔銘佛真文懿禪師無夢和尚碑銘明辨正宗廣慧禪師徑山和尚及公塔銘卷之二國初大浮屠塔銘凡十有五人佛心普濟禪師緣公塔銘無盡燈禪師行業碑銘杭州集慶教寺原璞法師璋公圓塚碑銘佛心了悟本覺玅明真淨大禪師寧公碑銘佛智弘辨禪師傑峰愚公石塔碑銘華嚴法師古庭學公塔銘杭州靈隱寺故輔良大師石塔碑銘元故演福教寺住持瞽庵講師示公道行碑銘住持淨慈禪寺孤峰德公塔銘阿育王山廣利禪寺大千禪師照公石墳碑文淨慈禪師竹庵渭公白塔碑銘淨慈山報恩光孝禪寺住持仁公塔銘淨慈禪寺第七十六代住持無旨禪師授公碑銘日本夢窗正宗普濟國師碑銘日本建長禪寺古先原禪師道行碑卷之三元末大浮屠塔銘凡十有一人妙果禪師塔銘佛慧圓明廣照無邊普利大禪師塔銘故文明海慧法師塔銘普福法師天岸濟公塔銘天竺靈山教寺慈光圓照法師若公塔銘元故寶林禪師桐江大公行業碑銘佛鑑圓照論師大用才公行業碑銘天龍禪師無用貴公塔銘徑山興聖萬壽禪寺住持竺遠源公塔銘佛光普照大師塔銘廣智全悟大禪師遷塔記卷之四碑重興太平萬壽禪寺碑銘句容奉聖禪寺興造碑銘重建繩金寶塔院碑蘇州萬壽禪寺重構佛殿碑毘盧寶藏閣碑四明阿育王山廣利禪寺碑銘重塑釋迦文佛臥像碑銘重建龍德大雄殿碑官巖院碑明覺寺碑麗水陳孝女墓碑附卷之五記蔣山廣薦佛會記附跋三則日本瑞龍山重建轉法輪藏禪寺記四明佛隴禪寺興修記龍游重建證果寺記重建龍興粵源寺記杭州天龍寺石佛記育王山廣利禪寺塗田記吳門重建幻住禪庵記蘭溪法海精舍記仁和圓應庵記浦陽栖靜精舍記浦陽善應精舍記金華安化院記金華清隱禪林記金華永寧禪庵記寶蓋山實際禪居記栖雲室記松隱庵記叢桂樓記松風閣記沖默齋記卷之六序金剛般若經新解序新刻楞伽經序新注楞伽經後序楞伽阿跋多羅寶經集註題辭般若波羅密多心經文句引善財南詢華藏海因緣序大般若經通關法序寶積三昧集序錄傳法正宗記序重刻護法論題辭釋氏護教編後引夾註輔教編序旃檀大愛妙色三經小引卷之七序瑞巖和尚語錄序雪窗禪師語錄序南堂禪師語錄序千巖禪師語錄序育王禪師裕公三會語錄序古鼎和尚四會語錄序贊徑山悅堂禪師四會語序重刻寂照和尚四會語題辭徑山愚庵禪師四會語序楚石禪師六會語序靈隱和尚復公禪師三會語序靈隱大師復公文集序用明禪師文集序水雲亭小稿序卷之八序送無逸勤公出使還鄉省親序恭跋御製詩後附送覺初禪師還江心序送慧日師入下竺靈山教寺受經序送用明上人還四明序贈令儀藏主序送璞原師還越中序送季芳聯上人東還四明序送天淵禪師濬公還四明序贈定巖上人入東序送允師省母序贈清源上人歸泉州覲省序卷之九誥西天僧撒哈咱失理授善世禪師誥和林國師孕兒只怯列失思巴藏卜授都綱禪師誥贊血書華嚴經贊金剛般若尊經序贊金剛經靈異贊新刻法華經序贊八支了義淨戒序贊寫經為像及血書心經贊觀音大士觀瀑像贊觀音菩薩畫像贊吳道玄觀音贊魚籃觀音像贊童真觀音像贊魚籃觀音靈照女二贊十八應真贊十八大阿羅漢贊達摩大師贊高峰妙禪師像贊永明智覺禪師遺像贊蒲菴禪師畫像贊全室禪師像贊約之禪師畫像贊南堂禪師像贊靈隱良禪師遺像贊般若松贊觀音石贊銘大慈山虎跑泉銘唐鑄旃檀神王銅