body:
  text: 皇明金華宋濂著雲棲袾宏輯虞山錢謙益訂國初大浮屠塔銘凡十有五人佛心普濟禪師緣公塔銘洪武二年化我佛如來演說三乘十二分教蓋欲利益有情絕類離倫直躋覺路同涉不思議妙境至有插一莖茅設一淨食亦號為佛事者夫事有大小而心無大小一念之起即遍三千三千融攝終歸實際又烏可以形跡論哉予于佛心普濟禪師之事不能忘言焉師諱自緣其號曰會堂俗姓陳氏台之臨海人父某以書詩為業人稱為石泉處士母某氏感奇夢而生師氣骨不凡翛然有出塵之趣每入招提見像變梵夾必胡跪合爪作皈依狀處士君見之謂其母曰是子如青蓮花水不能沾豈俗能淹邪乃命從四明白雪寺觀公為弟子觀公愛其容止修雅言辭溫簡以內典授之讀年十七薙髮受具足戒趺坐一室日以縛禪為事已而還台謁同郡天寧日溪泳公泳公一見輒加獎予使居左右為執侍尋陞掌鑰泳遷住杭之淨慈師從其行淨慈居五山之列號大叢林四方龍象咸來棲止師自是咨決心要知解且日至漸息群念期造于無念時處士君春秋高師欲盡覲省之禮已而復還台道經寧海日已暮悲風號林莽間師遑遑急走欲求憩泊之地竟不可得夜行三里所乃逢逆旅主人破屋一間不能蔽風雨師竟夕不寐明發指天自誓曰所不能建庵廬以延旦過者有如日闤闠中有妙相古寺兩廡蕭然不留一物師往還視喜曰是足以遂吾志矣白于主僧明公假其西偏糞除廡薉具床几設衾褥下至庖廚溷湢之屬罔不整潔吳楚閩浙之士肩摩袂接而至或一宿焉或信宿焉或浹旬焉皆飫其食飲而去其費皆出師之經畫明公及其同袍印公義師之為亦傾助不倦先是縣東有桃源橋跨廣度河上故有圓通閣歲久將壓縣人李斯民撤而新之邀致師為主師遂遷至其處遇過客如初師猶以為未足儉衣削食建華嚴寶閣月集善士閱華嚴經橋之南復築彌陀閣像淨土十六觀相覽者觀相興行啟發極樂正因閣道行空朱甍耀日儼然如化人天宮矣事聞于朝授師金襴法衣及錫今號仍畀報恩寺額以寵異之師既受命復自念曰上之恩侈矣顧塵居雜遝塵氛襲人無以稱清淨宏偉之觀爰擇地縣北五里而近大橋之陽林樾蒼潤蔚為神靈之壤新建報恩禪院一區晨夕帥其徒以祝釐報上為務由是兩地之間鍾魚互答有若西東家焉元季政亂海上兵動烽火漲天三閣與寺皆為茂草之場師盡然傷心又以興復為己任持缽行化聚落中隨其地建華嚴傳經之會演說因果屠沽為之易業于是施者四集師仍于桃源夾河兩隄悉甃以石建傑閣三楹間命工塑佛菩薩天神諸像畢工未久而師厭世矣師一旦早作無疾如平時索浴更衣屬諸弟子以見性為急且曰吾明日將逝至期呼筆書偈怡然委順時國朝洪武戊申三月某日世壽五十九僧臘四十二龕留七日顏貌如生荼毘得舍利無算其上首祖溢智榮正珪等以其年六月二十一日奉遺殖樹塔于寺界相之西北偏祖溢以鄉先生夏克復所序行業介予學子方孝孺來徵銘予聞華嚴有四種法界其三曰理事無礙所謂理事無礙者在有而不廢無雖動而不離靜譬如水與波焉真空不礙幻有即水以辨波幻有不礙真空即波以明水緣生假有二相雙存者也師今熾然建立雖隨事為而能無所染著竟全于真理其有得華嚴者歟銘以昭之以示後之人銘曰臨海有上士夙依如來智自著福田衣晝夜為佛事憫諸求法者經行山澤中倀倀無所依乃就古伽藍汛掃得清淨床第及衾枕以至觸器等無不皆現前來者一如歸了不生怖畏非惟身安穩饑虛獲充實雜華與淨土最是方便門建閣造經像俾人生敬信更闡大伽藍普施無量法入者輒攝受共趨涅槃城豈知劫火起盡化為煨燼中心鐵石堅誓圖興復計未能暢本懷竟歸寂滅海四眾悉悲慟大法無繫故奉此設利羅樹塔安置之龍鬼當訶護時現大神通有如住世時不示生滅相生滅二皆空是名三昧力憨山云此篇未列見性因緣惟崇事行至末後一段光明束歸華嚴以示夙習因地正是作者別出手眼無盡燈禪師行業碑銘洪武二年化天台有上雲峰在川城西南十餘里重崖疊巘如雲旓翠蕤盪摩于空濛而靈巖龍湫吐納光景尤號勝絕是宜有道者之所棲息五季時東甌大士永安來居之疏釋經論多至百餘卷皈依者日眾遂闢地為鉅剎錢忠懿王賜額曰證道三百年間洊罹焚毀唯存斷礎于斜照荒煙中無盡禪師傷之周覽故址歎曰大士韶國師之法嗣也吾可不遵行遺轍乎延祐甲寅縛草為庵廬宴坐其間虎狼蛇豕交跡于戶外禪師攝伏之不能加害日與其徒修苦行以自給冬一裘夏一葛朝夕飯一盂影不出山者踰五十春秋人多化之以勤勞修持為第一義荊棘之區變為寶坊金碧交輝上矗天際而諸禪林環列于其下上雲之境于是為尤勝有以土田為布施者則辭之曰先佛以乞食為事吾焉用此為南堂欲公名重一時作長偈寄之謂禪師行業不讓大士然天性尢孝謹迎母童氏養山中年九十四而終眾以非沙門行讓之禪師曰世尊尚升忉利天為母說經我何人斯敢忘所自哉洪武己酉春正月忽示微疾召其嗣法惠峰主僧普饒繼其席二月八日復作書與同袍道別夜將半顧左右曰天向明乎對曰未也或曰和尚正當此際何如禪師破顏微笑曰昔古德坐疾有問者云還有不病者乎古德云有又問云何物是不病者古德云阿爺阿爺禪師既舉此語良久又曰如此喚做病得否眾皆無言禪師祝曰色身無常早求證悟時至吾將去矣侍者執紙乞偈禪師曰終不無偈便未可死邪侍者請之益堅乃書曰生滅與去來本是如來藏拶倒五須彌廓然無背向投筆端坐而逝時是月九日也壽七十八臘五十七火化異香襲人所獲舍利不可勝計其弟子智宗善守道成及今住持普饒以某月日建塔于峰之左原大河衛鎮撫林君性宗嘗從禪師游師勉以忠孝迄能為國宣勞為時顯人恐禪師之行不白于叢林以隆恩大師道原所為狀來徵文謹按狀禪師諱祖燈無盡其字也族王氏四明人父好謙嘗寫華嚴經五色設利見于筆端禪師年方幼歎曰般若之驗一至于斯邪年十四即求出家依郡之天寧僧良偉尋事其寺住持東白明公既得度復受具戒于開元奎律師已而日溪泳公來代明公說法命掌綱維司藏鑰日溪升堂禪師出問曰生死事大無常迅速乞賜指示日溪曰十二時中密密參究忽然觸著卻來再問禪師抗聲曰無常迅速生死事大語未終日溪便喝禪師遽禮拜日溪曰見何道理便爾作禮禪師曰開口即錯日溪頷之禪師服勤數載復出參名德以驗其所證時中峰本公在天目方山瑤公居淨慈無見睹公住華頂斗巖芳公主景星禪師皆與之辨詰其所印蓋不異日溪云禪師得道已思韜晦而護持之及遇上雲峰勝地卓錫其中遂至終身焉嗚呼若禪師者可謂能守道而弗遷者矣古之僧伽多寄跡巖穴友煙霞而侶泉石至有蹞步不與塵俗接者治內之功純務外之意絕也風教日偷學者始不知自立榮名利養之念日交蝕于心胸奔競干請無所不至是以來有識者之詘侮可勝歎哉禪師一缽自將策厲學徒于寂寞之濱雖施者填委振起頹廢重樓傑閣彈指現前亦未嘗見其有為震黃鍾于瓦釜雷鳴之際翔靈鳳于眾禽紛飛之時謂為禪師矯弊之功非邪評騭成章繫之以銘庶幾能箴末法之膏肓也歟銘曰台有聞僧幼輒弗群能感雜華思樂正因棄白趨緇鞠明究矄務治心垢甚救首焚頓忘色聲敻絕見聞歷抵諸師如提孤軍背水設陣瀕亡獲存有矗者山是曰上雲高摩翠旻低壓紫氛昔之開士來疏竺墳我追軌轍志符隱淪起廢為功策怠以勤寶殿高騫華宮糊紋丹雘絢麗觚稜紛紜此本無作彼應自臻一榻危坐八窗凝塵影不出庭錫常挂軒跡處恬曠俗慚競奔逢時而逝若臂之伸凡濟覺海實探心源外動苟息內靜方敦非有獨行曷昭群昏左原演迤白塔嶙峋凡入道者來視刻文杭州集慶教寺原璞法師璋公圓塚碑銘洪武元年化洪武元年夏六月二十七日杭之顯慈集慶教寺原璞法師滅度于京城大天界寺父母所生四十六年在菩提位中二十八夏其上首弟子住持圓覺一印昇元克勤等以某年月日奉舍利靈骨歸窆于郡之龍井辨才塔南遵像法也後七年克勤奉詔往使日本上嘉其不辱命俾反初服列官于朝濂時待罪禁林克勤數以法師塔銘為屬未幾克勤出鎮方嶽承宣山西瀕行又復諄諄言之繼而一印結集白業成書千餘言遣使者申言之於戲台衡之學佛法之太宗有若法師乃中流之舟楫觀化而往銘其可不造邪不造何以為訓邪法師諱士璋原璞其字也受生于海寧王氏伏犀貫頂目光炯炯射人自幼即決去羶葷弗御即御輒嘔逆不能勝唯日取天竺書習讀之鄰寺僧伽競曰此釋氏種也盍以乞我其父某怒曰吾兒非若倫也俾投城東太平興國傳法寺服五戒服其師某與翰林待制柳公貫遊公嘗憩止寺中親授法師儒家群經為正句讀敷繹旨要法師聞之有如破竹數節之後皆迎刃而解年一十九始除鬚髮著僧伽黎尋稟持犯于某師時佛護宣覺憲慈匡道大師自四明延慶遷主武林上天竺觀音教寺大師諱本無字我庵佛海法師湛堂澄公之嫡子令譽隆洽一時名浮圖爭擁輪下法師將擔簦趨之忽夢游寶所大乘菩薩教之胡跪作禮口唱懺辭覺而思之乃普賢淨行品偈文也法師以為祥徵佛護一見果刮目相視凡天台大小部書以次環授之志慮專一饑則親狎釜鬵以事烹飪一飽而止寒暑晝夜若不知切身佛護如三吳俾法師遷丈室之西以便飲食逮還見白煙一抹起其寢所則自爨猶故故佛護陰鑒其勤以遠大期之佛護之門人曰天心瑩素高亢不服人亦歆豔法師之行約共燈火磨切詰難極于毫絲餘子皆望風而畏稱為雙璧佛護既示寂東溟日公來補其處大演摩訶止觀陶治生徒夏中集讀選法師為之開科譬陟彼山顛仟陌溝邃雖詰曲鉤聯粲然辨數聽者心地朗融如飲甘露東溟性嚴毅而寡許可為之喜動顏色遂命其司賓繼陞領懺摩事纓緌之士皆願與法師交聲華由此日重元至正十三年江南行宣政院命主州之棲真教寺棲真與南天竺演福鄰古稱教海而大用才公絕宗繼公二三大長老皆在焉法師猶以學之未足時往叩其所未至凡部味教觀之奧偏圓本跡之微疇昔有疑而未徹者二老無不條分縷析以喻之法師彈指歎曰佛法教藏渺如煙海固非獨善偏長所能究使吾自畫而不加進其能免於專門寡陋乎二十年移住旌德教寺元季兵亂人多為自藏計法師竭心寺事不以世相為累彰善癉惡風采為之改觀日納清淨之眾共講諸經玄疏銷文入相洪纖弗遺才辨清發言與理冥往往推為義中之虎大方自是益斂衽矣皇明龍興當建元洪武之初三宗以今寺主席尚虛白于李曹公文忠公時戍杭遂從所請法師提唱接引如旌德時有過無弗及焉未幾中書被旨俾浙水西五府浮屠道流共甓京城立善世院以統僧尼同將作監交董其役時方內附相視莫知所為法師獨出方略具有條序十萬之眾多倣之以集事不幸報緣已盡竟入涅槃緇素翕然嗟惜之法師器局瀟灑論議慷慨據直道行不樂俯徇流俗意氣吻合即出肺肝相示否則白眼怒視俊乂來依推食解衣以遇之不計蓋藏有無然精練世故勇于有為棲賢敝陋殿堂門序為之一新旌德籍券久不白乃為鉤稽欺隱使有文可覈暴橫之徒束手待命始免捧漏沃焦之患每懲諸剎樹徒植黨而為怨尤之府誓不薙度弟子私建退休之室終身踐其言弗渝初法師受經佛護歷職東溟佛護既歿或者微以為諷法師笑曰丈夫制行當以義為斷豈可隨世浮沉哉終嗣佛護法師所著書多未脫稿詩文有別錄若干卷嗣法而出世者昇元圓覺之外曰某曰某共若干人云嗚呼圓頓法門實般若之樞機奈何傳失其宗指真心而名境認理性以為總論心有具造而遺于色似此之類紊亂真乘法智一起而麾之然後天台之道復盛曾未六傳習者流于知解之說務新騁奇頗駸駸近于山外慈辨再起而正之然後法智之教益明擔負大法之任者其所繫蓋甚重也近代以來佛海以純愨之質一以法智為師最號能守家法者故其授受真切出其門者咸赫然發聞于時法師乃其嫡孫其行解似無讓于前人孰不望其大振玄風而世壽僅僅若此銘以昭之一以傷斯道一以勉來裔云銘曰天台之學空假中一心三觀乃其宗如大火聚光彤彤五金遇之無不鎔渣滓渾化內外紅佛海援起建寶幢摩尼遍照天南東入其室者膽力雄披精進鎧手挾弓一戰欲死魔軍降誰為嫡胤躡狐蹤伏犀貫頂水剪瞳震旦群書貯心胸一朝易轍梵夾攻日狎井灶劬厥躬白煙上出橫晴虹五章四釋昭厥矇事理即具靡弗同肯綮一中萬里融行解雙至方建功三鎮名山黑白從龍興致雲虎嘯風輪下瓶錫無地容法水灌頂障執通亭亭淨植青芙蓉似此良師不易逢火風分散報緣終水月鏡像索還空作銘者濂碑則豐千百億劫鎮幽宮佛心了悟本覺妙明真淨大禪師寧公碑銘有序洪武二年化臨濟正宗九傳至於東山演公全機大用譬猶日月行天罅隙畢照其弟子上承法印開拓覺源固不可一二數就其傳派尤著者言之其一為圓悟勤其一為天目齊其一為開福寧圓悟而下又岐而為三曰虎丘隆曰此庵元曰大慧杲其道多行於南天目六傳至海雲簡開福六傳至金牛真其道多行於北佛性無南北而佛法亦然其融通混合覃被無際震盪鏗鍧靡間幽顯論者未易多此而少彼也金牛世適實太湖無用寬其又鐵中之錚錚者歟無用之子則吾一源師其人也師諱永寧一源字也自號虛幻子俗姓朱氏淮東通州人世為宦族父某母隴西李氏師既生舅氏吉安郡守某愛其黠慧命為嗣年六歲入鄉校經籍即能暗記且了其大意然非性之所樂也聞人舉佛陀號遽注耳聳聽九歲懇求離俗父母弗之許輒連日不火食乃使依族姻模上人於利和廣慧寺利和州之望剎宋有淮海肇禪師說法度人聲聞當時前一夕寺眾同夢迎禪師次日而師至識者異之謂禪師乘願輪而再世焉十二歲游揚之雍熙寺會主僧來峰泰編禪林類聚成師覽之笑曰此古人糟粕耳點檢何為河南王童童奇其幼而器之屬僧錄司給牒薙度為沙門尋受具足戒自時厥後蓬累出游浙河西見諸大老下語無所契中峰海方柄法蘇之萬壽留之經年已而入穹窿山謁克翁紹克翁察其志不凡俾掌藏室時年已十九年一旦欲歸鄉行省覲禮至毘陵約明極昶於焦子山精修禪定稍涉睡昏則戴沙運甓懸版坐空如是者五年明極曰藏主見解且至宜往參人遂至淮西太湖山求印可於無用無用門庭嚴峻師方入戶厲聲叱出之師作禮於門外合爪而立久之乃許入見問曰何處人師曰通州曰淮海近日盈虛若何曰沃日滔天不存涓滴曰不著㷮道曰請和尚道無用便喝師退就禪室徹夜不寐一旦聞無用舉雲門一念不起語聲未絕而有省急趨入堂無用便打然知師頓悟令造偈拈趙州師立成曰趙州狗子無佛性萬象森羅齊乞命無底籃兒盛死蛇多添少減無餘剩無用塔然一笑復舉證道偈問師曰掣電飛來全身不顧擬議之間聖凡無路速道速道師曰火迸星飛有何擬議敵面當機不是不是無用振威一喝師曰喝作麼無用曰東瓜山前吞匾擔捉住清風剝了皮師不覺通身汗下亟五體投地曰今日方知和尚用處無用曰閉著口自是侍左右者三年且以斷崖義所贊已像親署一花書授師曰汝緣在浙逢龍即住遇池便居師遂還浙時虛谷陵元叟端瀨翁慶幻住本天如則各據名山遞展化機師皆往叩擊道相吻合而幻住尤譽師弗置元祐庚申延師往廣德縛茆於大洞中洞左有實相寺馬祖弟子澄公道場師為起廢重新之同時有無一全遯跡於石溪石溪與大洞相望人謂廣德二甘露門至治癸亥宜興之龍池請師建立禪居師以名符懸記欣然赴之作室以間計者凡數十命之曰禹門興化庵先是山顛有龍池其深叵測龍出每大水民甚苦之師召龍受三皈依戒龍不復出師居之久復厭其未幽邃也擇絕巘作室以居至壁立如削處斲木為棧鉤環連鎖棲板於空中不日告成師足不越戶限者二年學徒聞風遐邇坌集師亦不能悉拒也帝師大寶法王稔師之道行降師號曰弘教普濟禪師泰定乙丑州西之九里有地曰青山山明水秀前僧副周某延師之至為創寺一區因以九里名之師曰善則善矣僅二紀必當變遷時人蓋不之信也至順庚午出世住李山禪寺辦香酬恩卒歸之於無用俄有詔集桑門千七百人閱毘羅大藏經一七日師陞座敷繹正法天降甘露之祥甫三年退歸龍池時元叟主雙徑月江印主雲峰皆招居第一座辭不赴元統甲戌淛西江東道廣教總管府具疏請主常之天寧萬壽州守戍將敦勸尢力師漠若無聞或激曰大法火冷灰寒師乃欲自暇自逸耶師為蹶然而寺常災方議經營前住持幽巖靜夢殿楹仆地師以隻手搘之暨師之至果為新釋迦寶殿塑佛菩薩天神諸像雄冠諸剎踰八年有言師於順帝者錫號曰本覺妙明真淨禪師至正壬午江南行宣政院命師主大華藏寺師舉龍門膺代之明年復命補天童景德禪寺師堅以疾辭又退歸龍池宜興銅棺山舊有北嶽菩提院燬於會昌士潘敬之重搆焉師以九里寺助建法堂丈室之屬以年稽之正二紀矣人益嗟愕謂師能前知戊子有旨趣入覲說法於龍光殿上悅賜金襴法衣兼以玉環加師號曰佛心了悟大禪師帝師亦有絳袍毳帽之賜居無何奉旨函香至五臺山曼殊大士為現祥光五道明年陛辭南還道過維揚鎮南王波羅普化率妃嬪等延師入宮稟受大戒賜以白金盂及僧伽黎衣遣司馬護還龍池庚子師為慕道者所逼出領善權寺寺已弊師施塗塈丹雘之功且甓其寶街明年募善士萬人為萬善同歸會二晝夜及瘞兵後枯骨至無萬數壬寅又退歸龍池癸卯廣德大旱師徇鄉民之求結壇誦咒梵唄未終大雨如瀉歲乃登眾愈知師有道不容其還強住麻蕻山慈慧禪庵未幾成大叢林國朝洪武戊申又退歸龍池己酉夏六月師示微疾屬弟子宗珦裁紙製內外衣且曰吾將逝矣或以藥劑進麾去之十五日自興化庵移龕至絕巘所居十七日昧爽師起沐浴服紙衣索筆書偈云七十八年守拙明明一場敗闕泥牛海底翻身六月炎炎飛雪書畢側臥而化停龕七日容貌如生先一月龍池水忽竭及師順寂噴湧異常時君子知為異徵黑白戀慕各衣衰麻繞龕悲啼如喪考妣至有然頂灼臂以為供養者執紼之人盈萬茶毘有五色光現齒牙舌輪及所持數珠皆不壞設利無算煙到中林亦纍纍然生人競折枝取之至於灰土亦掬取淘汰獲者亦眾於是門人志舜志思等各分餘骨與不壞者以某年月日就龍池太平齊山紫雲山麻蕻山五所建塔藏焉世壽七十有八僧臘六十有五師氣貌雄偉身長七尺有餘音吐鴻亮其接物也不以貴賤異其心所至者無不傾向若中書右丞相朵兒只若江淛行省左丞相別不花若趙文敏公孟頫若馮內翰子振尤所賓禮者也四民來獻薌幣衣履者肩摩而袂接既無虛日師既受即以施人曾無毫髮係吝其自處則布袍糲食沛然若有餘凡發為文偈了不經意引紙行墨而空義自彰有四會語行於世其嗣法弟子則季山之仁奉報本之詔洪芙蓉之志恭顯德之紹善也其所度弟子已出世者則祥符之紹密天寧之仁性竹山之祖瑛南禪之祖勤也未出世者則祖玟維祖宗會紹仁祖瑜祖林等也師之道德所霑丐者可謂侈矣師示寂後之七年仁性親撰行業記子通同祖玟謁余於禁林以塔上之銘為囑嗚呼古之學者孳孳為已及覺門已證懼失其傳無以續佛慧命不得已而出世為人後世乃藉是以為榮觀豪攘巧取無所不用其極果何為者耶有若師者得法之後固拳拳以度人為急及主大剎屢退養龍池雖天童實廁五山亦搖首弗顧其高風峻節如祥麟威鳳可望而不可即何其賢耶人疑為淮海之後身信不誣也聞師之風者可以自省矣是宜銘銘曰東山紹法統大弘臨濟宗一燈百千燈充滿於南北太湖鬱蔥蘢中有善知識怒罵作佛事見者輒畏縮唯師膽如山深入了不礙振威聞一喝有若霹靂飛凡情亦喪失通身汗如雨縛茅巖洞居說戒毒龍聽文彩漸彰露屢典大伽藍蔚為人天師皈依者如雲師以方便力破除煩惱障沃沃甘露漿隨量各充足況示莊嚴相隨處起樓閣五色雲中現若兜率天宮人見稱有為我以無為故應物而見形中心儼不動孤雲本無著動靜皆自然不識世間事何者為利聲但觀龍池水如我性清淨預言化期至剪紙以為衣坐脫目微瞑入彼寂滅場荼毘顯祥異神光互旋繞白煙及林木皆生設舍羅四輩悉號慟五處藏靈骨以表正法幢千古無壞者此以何因緣本無生滅故我出廣長舌贊述師功德鑱諸無縫塔鬼神共訶護佛智弘辨禪師傑峰愚公石塔碑銘洪武三年化禪師諱世愚號傑峰衢之西安人其父姓余諱某以書詩傳家母毛氏嘗有妊夢觀世音送青衣童子覺而生師自幼好禮佛塔迨長遂入蘭溪顯教禪寺從孤嶽嵩公供灑掃之役已而薙除鬚髮為大僧受具足戒晝夜奉香燈惟謹用針出指端血書金剛般若尊經忽抵几歎曰縱能盡書一大藏教亦屬有為絕如夢幻不可控搏盍學無為以明心宗乎出謁古崖純公石門剛公涕淚悲泣祈以求端用力之要二公欣然語之師佩受其言不分明暗兀坐如枯株時年二十五矣師復歎曰年日以增而學日以退豈非聞見未充無以啟發知解乎踏濤江而西見諸善知識時布衲雍公斷崖義公中峰本公大弘雪巖高峰之道師一一咨叩下語不契中心懋亂遂止南屏山中三年不踰戶限聞止巖成公倡道大慈山定慧禪寺門庭雖高峻而獲證悟者甚眾亟往謁焉止巖曰南泉有云不是心不是佛不是物是何物師聞而愈疑仍還南屏諸緣盡捨類氣絕之人行坐寢食不徇覺知唯一念歷然在太虛中如此者久之一夕坐至夜分聞鄰席僧唱證道歌至不除妄想不求真處豁然如釋重負舉目洞照不見一物留礙喜躍不自勝且曰佛法元在目前秪為太近故人自遠之耳即操觚成偈有夜半忽然忘月指虛空迸出日輪紅之句乃走見止巖會止巖游姑蘇走天池求證于元翁信公元翁止巖之師也元翁問曰上士從何來師曰大慈元翁曰大慈鼻孔甚深多少師卓錫杖一下元翁曰拗折錫杖爾將何卓師因作禮元翁曰爾可歸見止巖師既見備陳悟由止巖喝曰何處見神見鬼師曰今日捉了賊也止巖曰賊在何處師便喝止巖曰開口合口都不是向上舉將一句來師曰遍界明明不覆藏止巖豎起竹篦請師指名師便掀倒禪床止巖曰爾欲來捋虎鬚邪師復作禮止巖連打三下囑曰善自護持他日說法度人續佛慧命次日命為侍者服勤三年又還南屏住山樵隱逸公請司藏鑰尋入大慈為上座元至順二年師歸西安西安烏石山有福慧古剎久廢為瓦礫之區師獨結茅廬以居蛇虎縱橫了無恐怖意鄉民以為有道者負餱糧鹽醯以遺之師燈居攝念影不出山者一十六載聲光日振緇素之士坌集座下恒至二三千指其地或無所容縣大姓陳君嗣宗為造殿堂門廡及經藏鍾樓之屬其制如大伽藍且置山若田取其食以給眾帝師大寶法王聞之賜師佛智弘辨禪師之號至正六年冬江南行宣政院亦錄師之行業請主廣德石溪興龍禪寺師祝香報恩歸之于止巖表其自證也嚮化之盛不下烏石時連留三夏烏石之眾念師去鄉里者久如子失母力迎其還適郡境新建佛剎者四曰古望曰龍眼曰寶蓋曰普潤皆延師開山為第一祖師起應之無不感慕而奮迅國朝洪武三年冬十二月郡守黃君鎮戍將徐君與啟普度水陸大齋五晝夜僉謂非師不足拯拔沉淪師勉強成行竣事而返略示微疾召門弟子勉以精進入道索筆書偈云生本不生滅本不滅撒手便行一天明月擲筆而逝是月之十日也越七日奉師全身藏于烏石慈雲塔院師處菩提場中歷五十夏住人間世閱七十春秋四方參學莫知其數能其法者則慧觀慧進德隨等一十五人也所度弟子尤多其存則慧實道達等二十又三人也二會語四卷已刊行叢林中云師道價傾四方非惟禪林奔湊而公卿大夫若大尉高公納麟若中書兵部尚書黃公德昭若浙江行省左丞老老若江東廉訪副使伯顏不花或函香致敬或馳書問道或上謁親問玄要得其片言隻字寶之不翅南金師之施及可謂博矣使其正席名山則惠利所被宜益廣今乃僅止于斯有識者恒傷之紀載遺行以昭示來裔要不得而遽略也德隨既出世西安之崇壽佩師之德不忘與道達共圖不朽計結集成狀徵予為之銘予聞圓悟之道實發臨濟心髓之秘其五傳至荊叟功用益弘際遇穆陵寵遇甚至荊叟再傳而至天池以慈憫之故誘引初機恒俯而就之不為高絕難攀之行使人望門而還所以其弟子布滿東南者甚夥若師者則天池之嫡孫也師求道深切如救頭燃本心既明出語皆法彈指之頃起大道場于久廢之餘非其福慧具足為人天師疇克若是邪造銘以勒諸塔一以著師之善繼一以勵來者之進修當有惕然自省者矣銘曰先佛振靈青童應徵拓化原兮生而質美逢佛輒禮性之存兮歷抵諸師答問難疑入無門兮大慈雲矗遮山絡谷法雨均兮奮襼直前一死敢捐心逾痻兮如藥瞑眩有眼不見耳無聞兮其指頓忘夜半月明協如日輪兮周遍法界無內無外顯一真兮百千妙玄開目洞然照無垠兮為法出世附者川至度迷群兮瓦礫之業化為寶宮金碧文兮公侯之貴馳書奉贄祈普熏兮生滅兩非去住一機漫云云兮大虛凝碧萬里無跡絕纖塵兮烏石聿崇清泉不窮示法身兮遺行有煒表者大史勒堅玟兮華嚴法師古庭學公塔銘洪武三年化吳郡有高行浮屠曰古庭學師傳華嚴之教于寶覺法師簡公凡清涼大疏鈔及圓覺楞嚴起信諸部皆能融會甚深微玅之旨遐邇嗜學之子斂衽溯瞻不翅卿雲德星以獲一見為快師因造十玄門賦以示圓中大旨叢林傳誦以為能發越賢首諸祖之意他師好為立異有以應觀法界性為十界差別事唯心造為真如之理者師彈指曰真如生滅倒置錯亂一至于此耶是可為太息也其于匡衛宗乘唯恐稊稗之混黍苗固若甚嚴然其植心平易不肯沉溺專家以殊戶異軌為高理之所在輒翻然從之每升堂示眾曰吾宗法界還源非徒事于空言能于禪定而獲證入者乃為有得耳既而又曰吾蚤通法華雖累入法華三昧然長水璿問道於琅琊覺又從靈光敏傳賢首教靈光天台之人也古人為法乃爾吾徒可專守一門乎君子美其至公無我一掃近代互相矛盾之陋故師見諸著述者咸有可觀師嘗與同學原澄以一乘同別之義更質疊難為法華問答若干篇復因主修法華期懺撰法華隨品贊三十篇辨正教門關鍵錄若干卷及詩文並行于世嗚呼有若師者其與不可傳者沒矣可使之弗耀于來裔乎宜其弟子處仁法慧圖之之堅也謹按九皋聲公啟宗佑公所造行業記師諱善學自號為古庭生儒家馬氏自幼離俗往大覺院學出世間法恍若青蓮花超出淤泥亭亭淨植至治癸亥師年已十七矣始受度為大僧投華嚴諸師而窮其說久未有所入時寶覺講經曹溪師亟從之慧解濬發聞其演說勢若破竹然數節之後皆迎刃而解寶覺善甄別人物絲毫不少貸獨譽公不置間勉其門人曰學上人可謂名實相副矣爾曹能如其賢吾宗庶幾其復振乎自是名稱勃然而興老師宿學亦推之為人望別傳教公在報恩遂聘之出典賓客久之滸溪之光福偶乏首懺者古田滋公命師司之又久之無言宣公來繼報恩之席復延之於上座分筵說經聲采一時震動江南行宣政院請師開法崑山薦福寺宣公欲攝受為弟子師笑曰吾得法于寶覺忍背之乎力拒不聽賦曹溪水四章以見志越二年即棄去還東林隱居專修白業謂同志曰吾始習晉水源華嚴懺法行之已久及觀天竺慈雲式淨土懺儀明白簡要五悔諸文皆出華嚴吾欲藉是以祈生安養耳掌教者尊師之道不容肥遯自逸強主陽山之大慈光聲所被非惟天人具欽而山川草木亦若動色相慶皇明龍興庶事一新滸溪人戀嫪師為尤切聚黑白若干眾具疏幣雜以香華威儀請師居之師亦將大弘賢首之教以續佛慧命雖當儉歲躬分衛以食眾會天復旱院有觀世音銅像素著靈異郡二千石率僚屬迎致府廨屬師如其法禜之大雨三日由是士民知禎祥所致施者接踵而集師方思有所建置院僧以官賦違期當徙虔州有司知師專任講道欲與辨析之師曰吾為主僧法當坐敢累他人邪遂毅然請行或讓師為迂師曰宿業已定不可逭也行抵池陽馬當山示疾而化洪武庚戌四月二十日也春秋六十有四以某年月日建塔于某處藏焉師形貌尪瘠退然若不勝衣戒檢精嚴護持三業唯恐有所染汙獨居屋漏法衣不離體三藏諸文未嘗釋手雖盎無斗儲處之裕如謙恭自牧豎子來見亦無惰容勤于誘掖有不領解者方便比喻至于反覆數四必俟其心悟始罷云嗚呼大覺如來設為度門雖萬別千差不過因機應化如大醫王隨病制方初非有所同異也其立異同者乃末流之弊耳唯我清涼大士一遵如來遺教學無常師問律于澧公受南山行事于曇一傳涅槃起信論法界觀還源記于瓦官咨雜華于大詵習天台止觀法華維摩等疏于荊溪參決南宗禪法于牛頭忠徑山欽如此之類復不一而足所以群機盡攝萬理俱融卓然為一代人天之師今觀師升堂示眾之言蓋深自契于大士者也曾不得大行其志于時而夙因已不可逃矣哀哉濂于諸宗之文頗嘗習讀每病台衡賢首二家不能相通欲和會而融貫之恨鮮有可言斯事者不知世上乃復有師乎于是發不及見之之歎既序其事復綴之以銘曰賢首之學雜華為尊建立六相條分十門固自以為瑣瑣而不可易至若天台性善性惡三觀三德之旨一念三千之文又曷嘗不引之而示人況修門之注釋乃止觀熏習次第亦不外之而立言念古昔之諸祖皆契經之由循初何心于矛盾唯欲鑒于群昏或謂無斷伏分齊而失修證之道乃後裔之紛紜卓哉學師所見離倫剪剔其末枝融通其本根談諸法之相即含性具之緣因庶幾森萬象于寸心合千江于一源觀會通于大府闢局隘之專門柰之何道未克施而遂遘于邅逆安養之生固知可以無憾但學子之亡師譬獨渡河而失筏登陸而折轅企瞻弗及鬱邑難伸評群行以成章命勒之翠玟杭州靈隱寺故輔良大師石塔碑銘有序洪武四年化洪武四年正月十六日靈隱釋氏大師滅度報年五十又五僧夏四十龕留五日頂有煖氣體貌如生又二日用闍維法從事齒牙堅潔舌根紅潤皆無壞者及火既滅諸設利羅珠圓玉皦將至盈升四眾爭取灰燼為盡其弟子某等涕淚悲泣攀號無從於是俯從世禮以是年某月日瘞骨於歸雲塔中實在寺東偏若干步初大師未告寂之先以書屬後事于其同門今天界善世禪師泐公曰吾大期已至子宜速還若稍遲遲不復相見矣時公留姑蘇謂大師精神尚彊豈遽如其所言及治任來歸大師火化已數日矣公于塔前自誓必期有以白大師之行傳芳不朽垂範將來乃加評騭輯成簡編持示其友金華宋濂曰是大師也始終俊偉不愧龍象子通吾宗其言當見信于世盍為文揭之塔上然公以叢林碩德立冠五山護持正法不翅堅城乃不屬之他人而惟區區是托非相知之至深邪其又何辭大師諱輔良字用貞其號曰介菴蘇州吳縣人姓范氏文正公之十葉孫也父諱伯和母鄭氏大師誕種粹氣聰悟夙發見浮圖氏書輒躍然朗誦若所素習有挾相形術者謂父母曰是兒骨骼清聳緊峭恐非世間法可縛若使之學佛必能弘大宗乘矣父母方鍾愛不信其言大師之里多阿蘭若大師日與群童遨遊其間徘徊愛慕終日不忍去父察其志與相者言合乃謂之曰在昔范蜀公好與名僧交嘗勉圓悟勤公參叩道要卒為天下禪宗吾能惜爾而不使遂其志乎年十五俾從同里迎福院僧壽彌薙落及受具戒即慨然曰學佛將以明心心非師無以示肯綮終日墻面可乎去從北禪澤法師習天台教觀所謂三乘十二分研其精華攝其密微充然若有所契士瞻杓公時住天平山白雲寺寺蓋范氏所建以奉先者大師數至其間士瞻誨之曰教乘固當學若沉溺不返如入海筭沙徒自困耳何不更衣以事禪寂乎大師曰吾將焉從曰笑隱訢公見主龍翔集慶寺其道大被東南緇白信從如子歸母朝廷嘉之賜以廣智全悟大禪師之號汝曷不往依焉於是大師往見廣智即以全器法寶期之問答之際棒喝兼施弦發而箭馳雷舂而電掃剎那之頃凡情頓喪雖未至清淨覺地而所入正塗超然出於物表他日廣智再有所問大師發言愈厲廣智笑曰得則得矣終居第二義也大師弗懈益虔久之遂契其心法雲空川流了無留礙尋掌藏鑰於四明阿育王山與住持石室瑛公縱橫相叩擊石室極推譽之至正壬午行宣政院檄大師出世嘉興資聖寺陞座說法終歸恩於廣智云時大師年始二十有六眾頗易之大師殺衣黜食為修建之計崇基廣搆文甓雕甍金碧燁然前後相照往來觀者始皆信服居十三年遷越之天章僅閱四春秋移杭之中天竺其傾嚮者益多有踰資聖天章時會海內大亂兵燹相仍南北兩山諸剎皆化於烈焰靈隱古稱絕勝覺場涼煙白草凄迷於夕照之間過者為之慨歎康里公為江淛行省丞相妙揀名僧能任起廢者莫大師為宜遣使者命居之既至剪剔荊叢葺茅為廬以棲四方學者雖當凋零之秋開示徒眾語尤激切其言有曰達磨一宗陵夷殆盡汝等用力如救頭然可也然百千法門無量玅義於一毫端可以周知如知之變大地為黃金受之當無所讓否則貽素餐之愧矣歲月流電向上之事汝等急自進修參學之士多有因其語而入者化緣既周手疏衣貲入公帑散交游及治喪斂之事顧謂左右曰翼日巳時吾將逝矣及期澡浴端坐書偈而歿大師四坐道場解結發覆如利刃之破骨索甘露之灑稠林無不斷絕無不霑潤故所度弟子心果等若干人說法住山明宗等若干人頗號繼跡重輝者也大師性簡直雖面折人過而胸中無留物與人交無少長一以誠相遇所造偈辭初不經意而語出渾成有若宿搆舉揚大法不務緣飾而西來之旨自明復以淨土觀門苦海舟航時兼修之未嘗少怠其所見蓋卓然云嗚呼道行無跡玅極無象求而即之吻契本真未定之先則萬緣鼎沸發慧之後則一性洞虛所謂不用其力而無所不力則神器化於玄冥而忠信發乎天光矣有如大師和粹外形淵懿內朗造請之間因言懸解證不染不遷之域泯差別次第之門非上智宿植惡乎至此哉濂也不敏蚤從諸老游欲假般若為宅心之地夙障已深竟為世諦文字之所纏縛雞鳴而起唯倀倀逐物而已操觚而銘大師之塔豈不惕然以自憐悵然而遐思者乎銘曰真體如如絕待離分妄識所膠攪為法塵譬猶飆風鼓埃揚氛化晝作夜觸目重昏佛啟覺塗高懸慧日白光爛然下銷群慝破相玄門最為勝特能定諸緣即超秘密昭昭大師上承禪宗一真歸源萬幻咸空染淨兩寘本跡俱融廣智之傳其學遂東昭昭大師為法出世嬉笑怒罵皆真實諦湧殿崇峨飛樓弘麗假相以昭非與道戾昭昭大師變通弗拘緣盡即滅視世為虛死生者誰出沒在吾化為舍利如摩尼珠來也非留去焉非逝白雲在天周流無滯法象既亡勒石為偈式播徽音用垂來裔憨山云未見如何參究即能少年了手豈多生功用純熟乎古人云參禪一生不悟來生出頭現成殆可知矣元故演福教寺住持瞽庵講師示公道行碑銘洪武四年化台衡之學至佛海大師澄公光明俊偉如日出扶桑四方之人無不瞻仰故其入室弟子各能具大無畏得無礙智而闡教于十方及其化去予多摭群行而銘其塔若今瞽庵示公之歿其烏得無辭乎瞽庵壽六十九國朝洪武四年出游虎林以某月日順寂于太平興國傳法教寺神思不亂而返故廬六年三月七日其徒子延慶住持智曉函靈骨歸藏受經祖塔之側復恐無以傳來裔持狀來徵銘按狀台之寧海有盧某者謹敕之士也其娶金氏金夢寶阤大士現五色雲中覺而有娠及生一男子自幼逮長灑然有出塵之思眾咸曰是子從佛乘中來耶年二十一投會稽悟本院為沙彌一山元公為之脫白一山度弟子四人取醍醐經開示悟入為之名而瞽庵遂名顯示號之曰瞽庵元天曆初受毘尼大戒即踰濤江而西欲講天台教觀時天岸濟公方主萬壽圓覺寺瞽庵往事焉久之濟公見其天機峻利有一瀉千里之勢乃曰子盍從吾師游乎他日大顯南嶽一宗吾于子有望矣濟公之師即佛海也佛海倡道于上天竺靈感觀音教寺來受經者雲蒸海湧瞽庵廁多士中晝夜研摩三觀十乘之旨察其密微至于蠶絲牛毛設有疑悶進質諸佛海退與四方俊彥縱橫講切不至于洞達弗措也精積日久大小乘部文義句悉貯心胸有叩之者辯口如水東注不見其所窮朋類推服恒以為不可及佛海器之命其司賓及佛海退居南天竺虎巖頤公來紹其後升掌懺摩而賢叟思公又延居第一座鍊徒牧眾不異于常時至正五年始出世隆壽教寺疆畝人侵者復之殿序僧毀者葺之一坐十二春秋雖蕞爾小剎聲望頓增遷雷峰顯嚴教寺破屋殘僧觸目皆凄涼之境瞽庵既至學徒散者漸集迄復伽藍舊規人以為難越六年江浙省丞力聘主崇恩演福教寺寺當兵燹之餘鞠為荒墟瞽庵創丈室五楹間以納負笈之士遇有咨問者悉竭平昔所蘊亹亹而語之至于南屏霅川之同異尢嚴于斷制歷引諸家經疏辨證無遺或譏其過勞輒笑曰為法忘軀桑門之常事爾子以為勞乎已而兵禍日亟飄然東邁向悟本樵山祖塔棲焉屏絕人事顓志於西方淨土之學終日繫念未嘗少忘屢有靈瑞之應瞽庵古貌長身寡言笑清儉自持一榻二十年瀟然如在逆旅當時齒臘相亞職業相肖咸據席名山瞽庵視之澹然雅不事于謁其出世為人皆迫于群情不得已而起性不樂俗藻麗章句凡有述作一本山家諸師之論其所度弟子某等若干人其嗣法者祥符思賢等若干人嗟夫大化絪縕變合無垠而獲生人道為難既幸為人得服福田衣又難雖服福田衣從桑門之後而聞諸大法又難法或可以治諸躬至于收攝一切有情使其解脫則又難之最難者也瞽庵於此數者皆可以無憾狀謂能衍佛海之道傳之方來動靜出處綽有可觀者誠可信不誣也序而銘之孰謂非宜銘曰維木之生兮處乎鄧林雨露所滋兮其崇百尋材既足用兮嘉聞孔章締搆攸宜兮清廟明堂取以媲師兮髣髴類之道積厥躬兮位亦克施玄風四播兮象龍駿奔足躡紺蓮兮口舒霠雲一氣回斡兮造化發機區萌畢造兮有鬯無夷安養固遐兮最邇者心彈指即至兮何間古今幻生終滅兮有弗滅存一真獨露兮無身而身樵山不老兮青色如藍銘其塔婆兮來者是監住持淨慈禪寺孤峰德公塔銘洪武五年化古者住持各據席說法以利益有情未嘗有崇卑之位焉逮乎宋季史衛王奏立五山十剎如世之所謂官署其服勞於其間者必出世小院侯其聲華彰著然後使之拾級而升其得至於五名山殆猶仕宦而至將相為人情之至榮無復有所增加緇素之人往往歆豔之然非行業敻出常倫則有未易臻此者矣此濂與淨慈禪師之事頗願識焉師諱明德其號為孤峰族姓朱氏世家明之昌國父有成母黃氏父與補怛洛迦山僧玠公交玠聞雞聲入道凡說法必鼓翅為雞號玠亡已久母夢玠來託宿覺而有娠歷十四月而生在童幼兒不好嬉弄每結跏端坐不動天童司藏慧明師諸叔也乃訶之曰童子不知誦詩讀書癡坐將焉求師曰欲學坐禪求作佛爾明奇之挾至鄞縣金鵝院俾給灑掃之役時師年十二矣越五載得度為大僧為橫山錫公弟子已而詣五臺受具足戒慨然有求道之志杖錫而出首謁竺西坦公於天童竺西問云汝從何方來曰金鵝來曰金鵝山高多少曰不見其頂竺西斥之師益自策厲以必證為期竺西一日升座舉世尊拈花之事師於眾中聞之忽若有解遽造偈以呈竺西竺西頷之而師弗自是也復如淨慈見晦機熙公晦機道價傾東南湊其門者如蝟晦機見師至問曰什麼人恁麼來師曰胡張三黑李四又問汝從朝至暮著衣喫飯還認自己否師又曰胡張三黑李四晦機拈棒欲打師拂袖竟出抵雙林見明極俊公一見之頃塤箎協應而了無障礙命歸侍司繼付藏鑰令掌之會日本遣使迎明極為國師師送至海濱而竺田霖公亦自雪竇至見師氣貌不凡延歸山中以第一座處之竺田上堂敷揚正法眼藏舉隱山泥牛入海公案諄諄誘掖音聲如雷師不覺慶快群疑頓釋因以偈呈竺田竺田歎曰人天眼目儼然猶在自是提唱宗乘稱性而說且邀仲方倫公結庵於桃花塢相與激揚暇則翻閱華嚴大經足不踰戶限者凡五春秋名稱日聞寢不可掩行宣政院請住松江之東禪禪寺師起應之然香以嗣竺田不忘所證也久之再遷集慶之保寧師一座十五夏煆煉來學曲盡善巧有餘力則為之興廢補壞細大不遺帝師聞師之令譽授之圓明定慧之號副以金襴法衣大司徒楚國文公歐陽玄亦賦詩遠寄且為作內外錄序一時名薦紳莫不願與之交三遷湖之道場閱二年寺災僧徒無以自寧托缽四出造祖師堂暨伽藍神祠而蒙堂前資寮亦次第就緒方將大施營造之功會杭之淨慈虛席江淛行省丞相康里公以謂淨慈乃五山之一非師不可居罔請主之時當元季戎馬紛紜國事已不可為矣逮入聖朝師以耄年謝歸道場竹林庵一日示微疾戒其徒曰吾身雖微一真圓性與如來等世相起滅無異石火電光晝夜勤行毋生退轉吾歿後當遵佛制付之茶毘勿令四眾衣麻而哭也言畢索觚翰寫頌一首泊然入滅時洪武五年二月二十七日也世壽七十又九僧臘六十有二烈火之餘頂骨不壞舍利羅累累出灰燼中某月某日建塔瘞靈骨於東岡所度弟子若干人得法分居列剎者若干人四會語有錄行於學者後四年其弟子大用恐其師之名不傳持佛頂康公所聚群行一通介保寧慧公謁余詞垣請為塔上之銘嗚呼從無始來人於其間生化出歿無數矣何者為名何者為相何者為真我若復計我我所將以何者為定乎銘勿作焉可也雖然師之行業敻出常倫致位名山垂芳當世苟不有以顯著之則無以表大法之寄慰來學之思也雖欲勿銘惡得而勿銘銘曰我觀禪那之所至即是一乘圓頓旨其中無二亦無三真體無麤悉玄妙秪緣根性分利鈍所以造詣有異同曹溪而下分五家震動鏗鍧獨臨濟至今子孫如星繁執持大法使弗墜如師脫白金鵝山歷抵諸方苦參叩孰知枘鑿不相投東西遑遑競奔走其後乃自音聲入卻見泥牛鬥入海桃花開時春滿塢更了雜花六相義文采漸彰不可遏出世說法度有情四遷直上南屏山作大獅王日哮吼一起一滅世間相倏然變幻如煙雲盡付闍維三昧火一彈指頃等虛空虛空無盡難名言苟加讚詠愚且惑太史述辭鐫白塔不過欲慰學子思有無雙遣入玄門言至無言乃真際阿育王山廣利禪寺大千禪師照公石墳碑文洪武六年化西方聖人示現世間百億三昧無非度門而禪定之宗實為之館轄蓋覺性圓朗本來充滿包三界而不礙窮萬劫而不昏非涉善惡了無顯晦巖栖澗飲之士能泯諸塵剎那之頃證入一實境界光明殊勝與虛空同體不起不滅所以其教熾然常盛而不衰有能知之而又能遵行之者其我大千師乎師諱慧照大千其字也永嘉麻氏子麻號積慶之家宜生上士父均母黃氏既誕育師寶之勝摩尼珠師自童年亦駿利倍常堅欲入道聞人誦習契經合爪諦聽年十五往依沙門了定于縣之瑞光院了定師從兄也長老良公知為法器即剃落為弟子明年稟持犯於處之天寧蟬蛻萬緣誓究大不思議事首謁晦機熙公於杭之淨慈未契圓證一日閱真淨語至頭陀石擲筆峰處默識懸解流汗浹背時東嶼海公以石林鞏公世嫡提唱於蘇之薦嚴師杖錫往謁東嶼問曰東奔西走將欲何為師曰特來參禮爾東嶼曰天無四壁地絕八荒汝於何地措足耶師抵掌於几而退東嶼知其夙有所悟尋復召至反覆勘辨師如宜僚擲丸飛舞空中東嶼甚嘉之遂留執侍左右師以為心法既通不閱修多羅藏無以闡揚正教聳人天之聽乃主藏室於郡之萬壽及東嶼遷淨慈邀師分座以表儀四眾已而無言宣公主溫之江心豔師高行復招師至處之如淨慈天曆戊辰出世樂清之明慶據師子座集諸僧伽而誨之曰佛法欲得現前莫存知解縛禪看教未免皆為障礙何如一物不立而起居自在乎所以德山之棒臨濟之喝亦有甚不得已爾聞者說繹而去至正乙未遷四明之寶陀先是寺以搆訟而廢師以訟興在乎辨難太迫一處之以寬慈絕弗與較且曰我佛得無諍三昧所以超出群品我為佛子可不遵其教耶眾服其化寶陀僧夢一神人衣冠甚偉飛空而來僧作禮問之神人曰我從阿育王山來欲請大千師赴供耳未幾行宣政院署師往是山識者以為玄應師既至群疑景附遠眾響臻師亦憫大法陵夷孳孳誘掖不遺餘力嘗垂三關語以驗參學其一曰山中猛虎以肉為命何故不食其子其二曰虛空無向背何緣有南北東西其三曰飲乳等四大海水積骨如毘富羅山何者是汝最初父母此第三關最為峻切惜未有契其機者居九年退于妙喜泉上築室曰夢庵因自號為夢世叟掩關獨處凝塵滿席不顧也洪武癸丑十月朔召門弟子曰吾將西歸汝輩有在外者宜趣其還越七月屬後事于住持約之裕公沐浴更衣索紙書記書已恬然化滅在菩提位中歷七十夏示人間壽相八十五年經三日用茶毘法焚之牙齒眼睛及數珠不壞餘成設利羅五色爛然約之因造四偈贊之且竭力為治喪事云師三坐道場有語錄若干卷行世凡一燈所傳一雨所潤雖淺深有殊各得分願弟子某等若干人得法上首某某等若干人是年十二月九日葬靈骨于夢庵之後者至大也師智度沖深機神坦邁晝則凝坐夜則兼修淨業真積力久至于三際不住覺觀湛然非言辭之可擬議且服用儉約不如恒僧雖不與時俗低昂賢士大夫知其誠實不事矯飾多傾心為外護其遇學徒亦以真率或以事忤之而聲色不變動出語質朴不尚葩藻而指意超於言外名聞燕都帝師被以佛德圓明廣濟之號師略不少動于中初橫川珙公入滅之年師始生及其受業又同在瑞光至於歿也又同住阿育王山君子或異之嗟夫禪定之宗至宋季而敝膠滯局促無以振拔精明使直趍于覺路橫川當斯時密受天目法印持降魔杵樹真正幢升堂入室者不翅受靈山之所付囑佛法號為中興橫川之同門有石林者奮興實角立東西共斡化機西來之道于斯為盛師蓋石林之諸孫也故其死生之際光明盛大有如此者豈無自而然哉某雖不敏每以文辭為佛事今因文妥之請故歷序師之行業勒諸琬琰而復繫之以銘用勸方來繼師而興起焉者世當有其人乎銘曰萬緣紛紜逐物而競曷以攝之實惟禪定禪定斯何言辭罔宣浮翳盡斂月輪在天初分一燈千燄交映如百鍊餘金色逾勝師之挺生銳思絕塵萬里只尺欲趍頓門片簡雖微中具全體瞥爾觸之凡情盡死從抵碩師勇決其私振迅奮擲類獅子兒出世為人澍大甘雨法雷轟轟震驚百里海岸孤絕潮音吐吞與此大法殊流同源神人飛空持疏來謁孰知玄微若合符節彼舍利羅寶塔晝扃助我發機靈光晶熒翩然西歸趺坐而滅示不壞相火中珠結生死之關鮮執其樞坦然弗惑如人歸廬前修漸遐後武思厲不有昭之遺則淪墜太史著銘勒石山樊虛空有盡師道永存淨慈禪師竹庵渭公白塔碑銘洪武八年化濟北正宗傳至我大慧普覺禪師以大乘根器總攝天上人間諸文字相化為慈雲遍布索訶世界鼓以雷風澍為法雨有識含靈咸被霑潤既而圓鑑光師為其世適自時厥後以次相傳若光孝簡師若育王觀師若佛智熙師若廣智全悟訢師後先勃興荷擔正法其所以黼黻宗綱折衝外侮皆兼用辭章為佛事至今聲聞烜著于霄壤間爛然如日星之光何其雄哉今清遠師則全悟俗姓之甥而法門之嗣子也初清遠之生有靈芝產于庭槐占者云芝乃靈秀所凝是子將以文顯乎已而果英發誦書攻文不待師授而知解日勝時全悟以大中大夫住持集慶大龍翔寺聞之喜曰此吾宗千里駒也亟挽致座下集慶為東南都會而行御史臺蒞焉四方名薦紳無不翕聚無不與全悟游初科第一人張公起巖來為中丞尢號最厚翰林承旨張公翥中書左丞危公素時尚布衣亦往來乎其中四三君子或發天人性命之秘或談古今治忽之幾或論文辭開闔之法清遠咸得與聞之反覆參求益探其閫奧其學于是大進形諸篇翰如千葩競放錦麗霞張而不見春風煦嫗之跡沉冥盡斂精明自然老干文學者爭歆慕之曰此文中虎也清遠恚曰公等謂吾專攻是業耶佛法與世法不相違背故以餘力及之將光潤其宗教爾苟用此相夸豈知我哉一日全悟警勵諸徒眾未有對清遠直前肆言如俊鶻橫秋目無留行全悟振威叱之眾為駭愕清遠氣不少沮如是詰難至于二三全悟莞爾而笑曰汝可入吾室矣命為記室向之歆慕者則又曰清遠所證悟已造殊勝徒以文夸之宜其恚也全悟瀕沒亦呼而告之曰吾據師位者四十餘年接人非不夥能弘大慧之道使不墜者唯爾與宗泐爾汝其𢡟哉宗泐字季潭今大天界寺主僧也寺即故龍翔云全悟既示寂清遠肆為汗漫游見虞文靖公集于臨川謁大司徒楚國歐陽文公玄于瀏陽二公聞其雄辨螽起文彩彰露僉曰是無忝于舅氏者也浙江行省丞相康里公重其文行遣使者具書弊延主會稽之寶相未幾遷杭之報國轉湖之道場雖當兵燹相仍之際為法求人無少退轉國朝洪武初淨慈禪林虛席四眾一心復請為主持會儀曹奉詔設無遮大會于鍾山二浙名浮屠咸集清遠一至京師遂退居錢塘之梁渚梁渚乃全悟藏瓜髮之地問道者接踵而至不翅住山時八年十二月四大若有所惱召門弟子善解屬以後事怡然而逝是月之十六日也踰七日火化得不壞者三曰牙齒曰缽塞莫曰室利羅十年十二月二十六日祔葬爪髮塔之東若干步所度弟子某某嗣師之道出主名山者某等若干人四會語有錄其詩文曰外集者凡若干篇不待結集而盛行于時所書草隸亦遍流四方清遠善鼓琴同袍以無益諷之清遠笑曰非爾所知是亦般若所寓也清遠軀分短小神宇超朗終身持誦金剛般若經未嘗虛日報國入院季秋而山丹發花一枝五萼如佛手然淨慈行化有陳氏婦預夢神僧臨其門及清遠至稽首作禮願為尼以相依清遠舉大法以開導之其婦恍若有所悟入清遠行未百步而婦竟與家人別坐脫而去生平守道弗變元至正末避地匡廬悍兵來索金帛清遠瞋目訶之曰浮屠烏有是物耶兵怒拔劍欲殺之清遠引頸就劍兵歎息而去清遠偉行甚眾舉此例知餘不詳載也清遠諱懷渭清遠其字也晚自號竹庵南昌魏氏子世壽五十又九僧臘四十云濂聞之世間萬事皆可偽唯死生之際不可偽有若清遠凡夫俗子孰不以文辭僧目之及其亡也三事不壞光明熾盛驚動當世非有證入毘盧性海寧有靈驗哉大慧以來累葉相承蓋亦若斯而已濂長清遠八歲雖屢承容色官守所拘不暇以宗乘相叩今九京不可作矣其入室弟子報國道謙特自為事狀同鍾山德瓊以塔上之文為請因略其細而掇其大書而遺之使刻焉銘曰大慧正攴七葉相承焜燿鏗鍧以文華稱文非徒文般若為體其本既弘用則自偉譬諸雲氣遙映日光東西照之霞纈錦章所以達人兼治弗廢黼黻折衝莫非佛事堂堂渭師結秀之姿庭槐有知應在瑞芝既抵碩師日交簪組文彩聲明一時彰著人見其粗玉貫珠聯我窺其精說法熾然持此應緣隨時順逆飛鴻度空曾無一跡報身已滅大火方融舍利粲粲叢生其中矧是三德熏修所致世間萬理唯此無偽靈明上通所遺者文因文而入不限見聞山色溪聲皆歸實相于此見師是謂無妄梁渚之墟雙塔巍巍惟舅洎甥先後聯輝山石可泐川流可息此人天師永保貞吉淨慈山報恩光孝禪寺住持仁公塔銘洪武八年化佛滅度後波羅奈王收佛舍利用七寶造塔為作銘記名曰達舍婆陵迦有塔之有銘尚矣後世學佛者道尊行崇其歿也因刻石以表其藏自大法入中國晉宋以來嘗間一見焉碑版焜煌始盛於唐宋之際及今淨慈禪師之示滅既葬舍利靈骨於金華北山隨世變遷理則然也山之麓其上首弟子件繫得悟出世之因來徵塔上之文其義實應古法濂不敢辭師諱普仁字德隱族趙氏婺之蘭溪人父端母楊淑貞皆名宦家師生有出塵之思年十歲往依金華寶石演法院月公月公號秋潭嘗主閩之囊山于人慎許與獨以遠大期師俾習讀東魯西竺諸書師性爽朗即能領解義趣十四祝髮受具足戒二十有慨然求道之志危坐達旦期息妄緣時鄰院智者住山了然義公以大辨之子慧朗之孫丕振臨濟之宗師往造焉入室問答機鋒遞相奮觸電掣霆奔義公命為侍香久之出游閩浙江湘凡名剎所在必求諸尊宿以證其所悟無不改容禮之東陽輝公方主湖之道場豔師之能文請掌外記自是聲稱籍籍起叢林間武林雙徑江南諸寺之最主僧南楚說公召師分座說法及說公遷化古鼎銘公來補其處益推敬師且謂相見之晚師猶不敢自足聞月江印公在育王雲外岫公居天童亟走四明見之相與辨詰無虛日徵以宗門機緣大而沙界小而毫芒無不收攝已而還浙水西相羊于名山水間達人勝士日游衍而激揚正法旁及于辭章者唯覺隱誠公笑隱訢公為最密風簷月牖語蟬連不能休至忘寢食元至正乙丑始遷寶石山中乙未從部使者之請出世金華西峰淨土禪寺瓣香酬恩實歸于義公蓋表其所自得也時天下大亂師知事不可為鳴鼓而退戊戌冬大明皇帝親帥六師取婺州己亥春幸智者禪寺見其山川深秀而法席尚虛特詔師住之一坐十五夏唱道之外小大室宇咸為補葺一新別築燕居于寺之西麓曰潛庵將有終焉之志吳元年丁未處之連雲持公府檄起師主持不聽洪武戊申韶之南華不遠三千里致州侯之命來聘亦不從杭之中竺其請如南華又加勒焉師惠然欲往郡守鍾某意惜其行從容問師曰佛法有重輕邪曰否曰佛法既無重輕師位寧有崇卑邪師一笑而止淨慈居五山之一非耆學碩望莫堪戶之甲寅之秋使者自武林凡三至師乃起而應之開法筵之日黑白環聽者千人各挹深飲醲歎詠而去師尤以興壞起廢為急時有化主安淨者頗有人緣施者麋至師以禮延致之方將大見設施乙卯春秘書事起有誣智者寺僧購名畫以歸者事下刑曹刑曹以師舊主智者當知其是非逮而質焉事將白師忽示微疾于京師寓舍屈指計曰今夏五月矣左右曰然曰此八月八日最良吾將逝矣至朝整衣端坐而逝雖當溽暑容色不變其徒用茶毘法從事收骨還葬其年某月日也僧臘五十世壽六十有四師風指孤峭不樂與非類狎逢學行之士輒敬之如賓師縱無儋石儲亦必久留不厭故薦紳服其偉度樂與過從如王御史叔善胡教授仲申二公名德重當世尤與師為金石交善談論終日不倦玉貫珠聯纚纚絕可聽尤能汲引後進隨資誘掖克底于成有三會語若干卷山居詩一百首傳于世其嗣法上首智者志文景德原昭云云所度弟子𢡟建云云云濂竊惟大辨之道門庭森嚴氣局苞斂故出其輪下者多內衷誠愨而直趨最上菩提初不假葩澤衒鬻于外如義公者亦其人也師既因之得法見其真實可信不疑於是出世度人聲聞流布無間北南雖以百越之遠亦願一臨其地師之為人所企慕者從可知矣晚蒞南屏道價益重巋然如魯之靈光柰何緣業僅止于斯而師無意於人世矣惜哉濂與師交者頗久歸為序其盡靈語以傳復書其事俾鐫諸塔其不可知者不敢妄意而勦入之也銘曰大辨之門總攝群機棒喝交施飆旋雲飛誰為之孫乃克肖似奮迅直前是真獅子大方巖巖高風莫攀一彈指間衝破命關掌記集雲分席雙徑出世西峰大施政令繼遷靈源芳泉可𣂐灑以楊枝普潤焦枯聲光四達爭相挽致百越之區亦來交疏南屏崔崔名列五山龍鬼護經非賢孰于四眾驩呼迎師往住旛華塞塗觀者如蝟擊大法鼓出大音聲百蟄方冥一雷盡驚我法將隆我緣已滅生滅何心紅爐飛雪寶幢之仆聞者心摧翠竹黃花亦若茹哀實際如如哀則何有仰瞻中天白月在斗淨慈禪寺第七十六代住持無旨禪師授公碑銘洪武八年化臨濟之道十一傳至圓悟而益盛圓悟又五傳至破庵松源兩支分峙譬諸南北二斗爛然在天光芒參列瞻者目眩由是子孫布滿四海之內執法輪樞機晝夜弗停大法昭明若觀世尊于耆闍崛山一切有情無不攝受可謂極光明盛大者矣有如無旨禪師授公則松源六葉孫其授受分明證悟真切梵行有足書者入室弟子門郁不遠千里持法藏大師壽公所為狀來徵銘狀文淵愨而無誇辭是用據之以成序序曰公諱可授無旨其字也一號休庵台之臨海季氏子自幼處童子中屹然如稚松超乎嵩葭不與之齊然慕空王之法視塵坌膠轕若將溷焉年十二即思舍族而去時季父仲智為僧于同里石門寺乃往為驅烏仲智奇其風骨亢爽俾至越之九巖從萬壑觀公游授之內外典皆了達大旨十九得度受具為大僧已而歎曰所貴為比丘者務欲究明心宗爾苟纏蔽文字相中何時能脫離邪竟杖策而出遍歷諸名山下語多不契復退潛一室加澄靜之力久之參普覺明公于靈隱靈隱列在五山僧指盈萬其門庭嚴峻未易叩擊公直入無畏問答之頃疑情盡釋普覺以其俊爽欣然印可之特命充堂司公不復辭振挈綱維四眾悅服尋還石門白巖真公主真如艷禪師制行之堅延居上座助揚正化聲聞燁然騰緇素間元重紀至元六年出世大雄山之安聖執香自敘實上嗣普覺世人信之無異辭閱五年遷隆恩又二年補白巖故處明年行宣政院選主龍華一坐十三春秋百廢具興山門為之改觀公凡四坐道場皆不出乎台境諸方將倚之以為重競來敷致漠然若不聞作休庵于西塢日修淨土法門念佛三昧且曰此即禪定之功也惡可強分同異哉國朝洪武六年杭之中天竺寺以府侯之命起公主寺事公勉強應之行至錢塘江濱淨慈諸勤舊相與謀曰此大善知識胡可失也天竺尚可致吾屬獨不能邪帥眾邀于道擁居其位公屢卻之不聽色頹然不怡時當歲儉問道者如雲糗粻方患不繼而施者踵至居二載擊鍵椎集眾再三申精進之戒手撾鼓而退歸臥竹院忽示微疾端坐西向召左右謂曰吾將逝矣左右進觚翰請書偈公麾去之曰吾宗本無言說乃合爪連稱佛號至聲漸微而寂時八年八月十一日也世壽六十九僧臘五十龕留七日顏貌不變用闍維法從事齒牙貫珠不壞設利羅光色晶瑩如金銀水精者遍滿于地見者聞者無不哀慕太息其徒自省等斂其不壞者并遺骼歸龍塔而藏焉公儀觀雄碩識見敻卓其于榮名利養視之如無物出專法席皆迫于不得已會朝廷設善世院總統天下釋教事或勸公求檄以主名山公笑而不答然其所蒞之處不以恬退而不加之意必革其弊習新其規制使可貽於悠久所度弟子某等若干人得其法者則某某也五會語多肆口而說曾不經思四方先已傳誦不俟刊行平居遇物成詠率出人意表自省與文介類為十卷公戒勿示人亦不敢流布公之言論屢行為當時推重至于尊賢尚德推己及物有非人之所及叢林孰不能言之茲可略云嗚呼大雄氏之設教法門雖廣其所以攝妄念明真性者則一而已因根器之或不齊而誘掖化導之方不容不異有若思惟修之道與期生安養之功咸能拔迷津而升覺岸者也是故先德恒並行而不相悖宗照壽公得法于天台韶國師圓照本公傳道于天衣懷禪師二公兼修淨土之業俱有上品受生之徵載諸方策可考不誣今吾授公瀕沒之際又跏趺西向念佛而化然而三公皆主乎淨慈者也何其重徽而疊照哉當必有其故矣昧者不察強謂觀念之未能忘于形跡乃好誇過高之論非事實也于是直書其故使知佛法無二致以為後來者之勸銘曰能仁立教廣開度門萬別千差終歸一源禪那之修曰袪妄慮觀念之勤亦依真住均為攝念奚分異同一心既昭眾法自融所以先德內而不外破妄顯真兼行無礙公由幼齡挺然弗群有慕空宗留神竺墳法海冥茫屢形嘆息掬沙算之數何能畢持智慧刃斷其縶維八荒洞然不懸毫絲安養導師實我依怙一塵不立即為淨土空有俱息能所亦捐至無念處三昧現前出世鄉邦四占淨域化熱惱場入清涼國黑白歆豔如渴思漿飛錫所及熙如春陽腳踏濤江來赴天竺中道要遮奪去何速南屏草木大根小莖法雨普沾軋者皆萌俄結雙趺稱佛而化金臺來迎白光交射何以驗之見于茶毘設利繽紜光如琉璃龍華之阿有塔如筍琢石鐫文為此規準日本夢窗正宗普濟國師碑銘洪武八年立碑恭惟大明皇帝執金輪以御寶曆聲教所授與如來化境相為遠邇乃洪武八年秋七月日本國遣使者來貢方物考功監丞華克勤奏曰日本有高行僧夢窗禪師其入滅已若干年而白塔未有勒銘其弟子中津法孫中巽有慕中華文物之懿特因使者而求之然人臣無外交非奉敕旨不敢遽從所請敢拜手稽首以聞皇上欣然可其奏特詔詞臣宋濂為之文濂按其弟子住持善福寺周信狀云禪師諱智曤姓源氏勢州人宇多天王九世孫父某其母某氏無嗣默禱觀音大士夢吞金色光而孕歷十又三月始生有祥光盈室之異九歲出家依平鹽教院以居授之群書一覽輒能記暨長繪死屍九變之相獨坐觀想知色身不異空華慨然有求道之志十八為大僧禮慈觀律師受具足戒尋學顯密二教垂三年未久然恐執滯名相建修期道場以求玄應滿百日夢遊中國疏山石頭二剎一龐眉僧持達摩像授之曰爾善事之既寤拊髀歎曰洞明吾本心者其唯禪觀乎遂更名疏石字夢窗謁無隱範公於建仁寺繼至相州巨福山山之名院曰建長錙錫之所萃止時一山寧公主之一山見師甚相器重令為侍者朝夕便於咨決俄出游奧州聞有講天台止觀者師往聽之且曰斯亦何儗實相乎自是融攝諸部昭揭一乘之旨辨才無礙然終以心地未明倀倀然若無所歸洊修懺摩法期至七日感神人見空中益加振拔時一山自建長遷主圓覺寺師復蓬累而往備陳求法之故至於涕泣一山曰我宗無語言亦無一法與人師曰願和尚慈悲方便開示一山曰本來廓然清淨雖慈悲方便亦無如是者三返師疑悶不聊結跏澄坐視夜如晝目絕不交睫久之往萬壽禪不寺見佛國高峰日公扣請如前高峰曰一山云何師述其問答語甚悉高峰厲喝曰汝何不云和尚漏逗不少師於言下有省辭歸舊隱常牧山唯分陰是競誓不見道不止嘉元三年夏五月一夕坐久偶作倚壁勢身忽仆去師豁然大悟平生礙膺之物冰解雪融心眼爛然如月佛祖玄機一時爍破乃作偈自慶有等閑擊碎虛空骨之句亟見高峰求印可高峰喜溢顏面囑曰西來密意汝今已得之善自護持出其師佛光無學元公手書一通畀之以寓相傳付囑之意師回棲甲州龍山庵高峰招住上野州之長樂寺師力辭卓庵濃州古溪都元帥平公某之母覺海夫人某氏慕師有道欲一見之師竟入五臺山縛吸江庵既而遯入海嶼夫人遣使索得之俾出世雲巖寺師復辭搆泊船庵於臥龍山退耕庵於總州有終身丘壑之志正中二年師春秋五十一國主後醍醐天王命宮使起師領南禪禪寺入見王賜坐師自言志在煙霞出世非所願王曰吾心非有他欲朝夕問道耳師不得已應命王時幸臨之相與談玄竟日乃去將及期王遜位師又引退道經勢州會新建善應寺成延師開山未幾棄去抵相州樞府郡公逼主淨智寺尋歸錦屏山營瑞泉蘭若元德元年圓覺四眾必欲致師師為勉強一出又復棄去二年羽州守藤道蘊初創慧林寺迫師蒞其事元弘元年達官貴人又有以建長請師者師復辭二年瑞光寺援善應故事求師為第一代三年王既復辟召師入見以介子都督親王之邸更為靈龜山臨川禪院命師為其長賜以國師之號建武元年秋王妃薨王留師宮中二七日罷政而講法因請師宣說大戒執弟子之禮彌謹及還強師再入南禪王親率群臣至山見群僧入禪定秩然有序次第行食靜而不譁王悅師升座提唱音聲鴻朗辭意警策王愈喜給腴田若干畝以飯僧先是近臣有毀斥禪宗者王舉問師師以自性三寶何必強生分別為對王已信之至是益知禪學為貴謗言無自而入忽退處兜率內院而建仁禪寺又欲逼起之師笑不答曆應二年攝州守某革西芳教寺為禪僉言非師無以厭眾望師振錫而往舉揚達摩氏之道聽者改容為建無縫閣以水晶寶塔安置舍利萬夥其中他若奇勝之地多冠以亭榭以憩四方游士規制燦然可觀師夢王作沙門相乘寶車往靈龜山已而即世征夷大將軍源公某造天龍資聖禪寺以助冥福聘師住持遂與前夢協阿州守源公某新立補陀院師亦俯徇其意為之說法即還天龍康永元年春太倉天王親往受戒願為弟子三年建八幡菩薩靈廟於寺側貞和元年王復帥群臣來聽法敷宣之際有二星降於庭光如白日賜以金襴紫衣二年春令弟子志玄補其處退歸雲居庵冬召師入宮加以正覺之號觀應元年春兩宮國母請師於仙洞受五戒二年春師謂左右曰天龍宮室幸皆就緒唯僧堂猶闕當力為之堂成可容七百人廷議重師名德復強師入天龍師百丈清規聲振朝野王遣使復加心宗普濟之號且遺以手書其略有曰道振三朝名飛四海主天龍席再轉法輪秉佛祖權數摧魔壘國中以為榮師以年高又復引退兜率內院九月朔召門弟子曰吾世壽七十又七僧臘亦六十矣旦夕將西歸凡有所疑可頻叩焉於是集座下者如雲師隨機開示皆充然有得而去越七日示以微疾兩宮洊臨問起居師為陳攝心正因精神不少衰至二十九日遺誡授門人作偈別大將軍源公囑令外護復書辭世頌一首三十日鳴鼓集眾告別翛然而逝顏色不變時有白氣一道橫貫師之寢室黑白二萬餘人皆哀慟不能勝以某年月日奉全身塔于內院之後分存日所剪瓜髮瘞于雲居髮中累累生舍利云其嗣法上天龍曰志玄曰玅葩建長曰慈永南禪曰通徹曰周澤所度弟子載名于籍者一萬五千有餘師儀觀高朗慧學淵深舉揚正教如密雲廣布甘雨頻澍凡具生性者隨其根器小大皆獲成就上自國王宰臣下逮士庶無不頂禮敬信凡所蒞止如見七佛出世香華供養唯恐或後故管領源公賴之嘗與人言曰我從先人聽國師劇談佛法頗達真乘遂能死生如一臨事不懾而先人竟死於忠吾亦知委身以事君者皆國師化導之力由是而觀師道非特究明心學實足增夫世教之重況其內外之功兩得祛縛釋粘起廢補壞以安輯清淨海眾人患不能有其一師獨兼之然其抗志高明視榮名利養澹若無物唯欲棲身林泉屢典大剎皆迫于王命而起世稱大善知識者非師孰能當之嗚呼宋南渡後傳達摩氏之宗於日本者自千光禪師榮西始厥後無學元公以佛鑑範公之子附海舶東游大振厥宗高峰纂而承之師為高峰之遺胤益有顯於前烈重疊照光于海東止惡防非有裨朝政功用不闡人思弗忘濂因奉敕撰文畀中津等歸鑱樂石以見佛性無內外皇化無遠邇昭示千載俾勿壞銘曰達摩之學傳至真丹一花五葉其支寢繁臨濟名宗昭于佛鑑有子如龍乘桴東泛海東有國接於榑桑民惇俗龐環水為疆膜拜奉迎若佛之至四眾聞之其從如雨伊誰繼之心境兩融日出高峰海水皆紅金光見夢長虹不滅篤生異人丕照先烈何文不搜何義不求孰授厥像截斷眾流其心倀倀有淚如霰感彼神人白晝而見本來清淨一法實無疾馳索首非迷即愚一喝之中真靈獨露朗月中天其色純素我歸我山與雲往還豈意聲華落彼世間文彩一彰疇不歆慕鉅剎名藍非住而住說法千座緇素共聆天見祥徵二星墜庭百廢具興我敢用逸寶華樓閣重重兜率上自君公下逮黔黎稽首作禮如天人師屢出屢退泊然無礙終與實相不相違背吾緣垂盡預告化期爾毋懈怠來質所疑遺戒諄諄續佛慧命言已即化若入禪定覺照至圓體性本空生滅不二唯道之從若見若聞同喪考妣法幢既摧大眾何倚孰為佛乘孰為眾生縱有言說皆是強名勒此塔銘龜趺螭首焯德序功以示不朽執金輪以御曆云云元黃文獻公鳳凰山大報國寺記語也文憲學于黃公故襲用其語先輩文字其學有師承若此日本建長禪寺古先原禪師道行碑銘洪武七年化禪師諱印原字古先世居相州姓藤氏藤為國中貴族父某母某氏禪師生有異徵垂髫時輒刻木為佛陀像持以印空父奇之曰是兒與菩提有緣宜使之離俗學究竟法甫八歲歸桃溪悟公執童子之役年十三即剃髮受具足戒自時厥後遍歷諸師戶庭咸無所證入乃嘅然歎曰中夏乃佛法淵藪盍往求之乎於是不憚鯨波之險奮然南遊初參無見睹公於天台華頂峰公語之曰汝之緣不在於斯中峰本公以高峰上足現說法杭之天目山爐𮧫正赤遠近學徒無不受其煆煉此真汝導師也汝宜急行禪師即蓬累而出往見中峰中峰一見遽命給侍左右禪師屢呈見解中峰呵之曰根塵不斷如纏縛何禪師退涕淚悲泣至於飲食皆廢中峰憐其誠懇乃謂之曰此心包羅萬象迷則生死悟則涅槃生死之迷固是未易驅斥涅槃之悟猶是入眼金塵當知般若如大火聚近之則焦首爛額唯存不退轉一念生與同生死與同死自然與道相符脫使未悟之際千釋迦萬慈氏傾出四海大水入汝耳根總是虛妄塵勞皆非究竟之事也禪師聞之不覺通身汗下無晝無夜未嘗暫捨積之之久一旦忽有所省現前境界一白無際急趨丈室告中峰曰原以撞入銀山鐵壁去也中峰曰既入銀山鐵壁來此何為禪師超然領解十二時中觸物圓融無纖毫滯礙禪師辭去中峰再三囑之曰善自護持當是時虛谷靈公古林茂公東嶼海公月江印公各據高座展化於一方禪師咸往謁焉諸大老見其證悟親切機鋒穎利以叢林師子兒稱之會清拙澄公將入日本建立法幢禪師送至四明澄公曰子能同歸以輔成我乎禪師曰雲水之蹤無住無心何不可之有即攝衣升舟其後澄公能化行於遐邇者皆禪師之力也禪師出世甲州之慧林瓣香酬恩的歸之中峰黑白來依猶萬水之赴壑古山源公議革城州等持教寺為禪物論非禪師無以厭伏眾心竟迎師主之俄住州之真如又遷萬壽又遷相之淨智已而謝事行化于奧州禪師之兄藤君新建普應寺延師為第一住持禪師赴而應之關東連帥源公建長壽院於相州復請師開山兼主圓覺俄遷建長禪師說法度人孜孜弗懈一如慧林時俄退歸長壽有終焉之志歲甲寅春正月禪師示疾至二十三日夜參半召門人謂曰吾今日逝矣爾等即龕瘞之毋徇世俗行祭奠之禮更可遍語諸剎舊弟子恪守吾平日所訓使法輪永轉可也黎明賓朋候問起居應接如平常及午呼侍者曰時至矣可持觚翰來及至復曰吾塔已成唯未書額耳大書心印二字入室端坐泊然入滅世壽八十僧臘六十又八弟子遵成命即日奉全身瘞于某處塔下初禪師專以流通大法建立梵宮為事若丹州之願勝津州之保壽江州之普門信州之盛興房州之天寧皆鬱然成大蘭若而建長之西復創廣德庵命其徒守之故前後所度比丘一千餘人云禪師端嚴若神雖燕坐之時儼若臨眾目光炯炯射人見者若未易親炙及聞其誨言溫若春陽莫不心悅誠服而去人有來求法語偈頌者濡毫之頃翩翩數百言曾不經意皆契合真如禪師不自以為是也取語錄并外集投於火中曰吾祖不立文字單傳心印留此糟粕何為門人欲畫師像預索贊語禪師作一圓相題其上曰玅相圓明如如不動觸處相逢是何面孔其方便為人皆類此嗚呼佛法之流于日本者台衡秘密為最盛禪宗雖僅有之將寥寥中絕矣千光院有大善知識曰榮西和尚以黃龍九世嫡孫握佛祖正印唱最上一乘飆馳電鍧逢者膽落達摩氏之道藉是以中興其示寂之時且曰吾入滅後五十餘年禪宗當大興今禪師承天目之正傳見道分明契悟精深則其懸記之足徵若合符節然而自天目泝而上之至楊岐十有二世楊岐黃龍則同宗慈明者也其道固同矣道之同則凡嗣其學者先後奮發其有不言而喻者乎予早歲屢閱一大藏教晚獨慕乎心宗因其徒大宣介範堂儀上人持狀請銘禪師之塔有不得辭也銘曰天目之峰高嶙峋陰陽變幻割明曛中有導師人天尊白眉青眼照秋旻西江欲以一口吞流傳法印千子孫日本有國在海濱達摩示現留圓墳或晦或顯道則存黃龍奮迅爪攫雲九世宏開靜慮門千光炫燿接朝暾師雖後起乘願輪佛印印空了無痕法派端自天目分致令執拂誨諄諄涅槃生死俱幻塵有壁積銕山如銀一朝直入不見身大千世界琉璃勻出世秉法如握矜左擊右刺伏魔軍出其餘力智巧敶飛樓湧殿聳輪囷奈何無縫塔既新大字題額即反真此道本來無詘信我於般若曾與聞大書偉行沃言根元無隻字鐫蒼玟
